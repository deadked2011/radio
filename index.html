<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212" id="themeColorMeta">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0c0c0e;
    --text: #ffffff;
    --text-sec: #8e8e93;
    --surface: #1c1c1e;
    --surface-hover: #2c2c2e;
    --accent: #fc3c44;
    --player-bg: rgba(20, 20, 25, 0.85);
    --border: rgba(255, 255, 255, 0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  /* Основной контейнер */
  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  /* Шапка и табы */
  header {
    padding: 16px;
    background: linear-gradient(to bottom, var(--bg), transparent);
    z-index: 10;
  }

  .genre-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding-bottom: 8px;
  }
  .genre-tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Список станций */
  .stations-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 100px 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .station-card {
    display: flex;
    align-items: center;
    padding: 12px;
    background: var(--surface);
    border-radius: 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s ease, background-color 0.2s ease;
  }
  .station-card:active {
    transform: scale(0.98);
    background: var(--surface-hover);
  }

  /* ИДЕАЛЬНО КРУГЛЫЕ КАРТИНКИ: Фикс бага с овалом */
  .station-logo-wrap {
    width: 52px;
    height: 52px;
    min-width: 52px;
    min-height: 52px;
    max-width: 52px;
    max-height: 52px;
    border-radius: 50%;
    overflow: hidden;
    margin-right: 14px;
    flex-shrink: 0; /* Запрещает flexbox сжимать картинку в овал */
    border: 1px solid var(--border);
    position: relative;
    background: #111;
  }

  .station-logo {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Сохраняет пропорции */
    aspect-ratio: 1 / 1; /* Жесткое соотношение 1:1 */
    display: block;
  }

  .station-info {
    flex: 1;
    min-width: 0;
  }
  .station-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .station-genre {
    font-size: 13px;
    color: var(--text-sec);
  }

  /* Нижний мини-плеер */
  .mini-player {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 12px);
    left: 12px;
    right: 12px;
    height: 64px;
    background: var(--player-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* Полноэкранный плеер (TikTok-style) */
  .full-player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 200;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: calc(var(--safe-top) + 24px) 24px calc(var(--safe-bottom) + 40px) 24px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
  }
  .full-player.open {
    transform: translateY(0);
  }

  /* Фикс овала в большом плеере */
  .big-cover-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .big-cover-wrap {
    width: 75vw;
    height: 75vw;
    max-width: 320px;
    max-height: 320px;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    border: 4px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .big-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    aspect-ratio: 1 / 1;
  }

  /* Кнопки управления */
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 32px;
    margin-top: 24px;
  }
  .btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-play {
    width: 72px;
    height: 72px;
    background: var(--text);
    color: #000;
    border-radius: 50%;
    box-shadow: 0 4px 14px rgba(255,255,255,0.3);
  }

  /* Выезжающий Чат */
  .chat-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70vh;
    background: #141416;
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    z-index: 300;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    border-top: 1px solid var(--border);
    will-change: transform;
  }
  .chat-sheet.open { transform: translateY(0); }

  .chat-handle {
    width: 40px;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    margin: 12px auto;
  }

  /* Анимация бегущей строки */
  .marquee-box {
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    width: 100%;
  }
  .scrollable {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 12s linear infinite;
  }
  @keyframes marquee {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
  }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="genre-tabs" id="genreTabs"></div>
  </header>

  <div class="stations-list" id="stationsList"></div>
</div>

<div class="mini-player" onclick="openFullPlayer()">
  <div class="station-logo-wrap">
    <img src="" id="mMiniLogo" class="station-logo" alt="">
  </div>
  <div class="station-info">
    <div class="station-name" id="mSub">Radio Go</div>
    <div class="marquee-box">
      <div class="station-genre" id="fTrack">Выберите станцию</div>
    </div>
  </div>
  <button class="btn" style="margin-left:auto; padding:10px;" onclick="event.stopPropagation(); togglePlay();">
    <svg id="miniPlayIcon" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>
</div>

<div class="full-player" id="fullPlayer">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <button class="btn" onclick="closeFullPlayer()">
      <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
    </button>
    <div style="font-weight:600; font-size:14px; letter-spacing:1px; color:var(--text-sec);">NOW PLAYING</div>
    <button class="btn" onclick="openChatSheet()">
      <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
    </button>
  </div>

  <div class="big-cover-container" id="playerSwipeZone">
    <div class="big-cover-wrap">
      <img src="" id="mFullLogo" class="big-cover" alt="">
    </div>
  </div>

  <div style="text-align:center; padding: 0 20px;">
    <h2 id="fName" style="font-size:24px; font-weight:800; margin-bottom:6px;">Radio Go</h2>
    <p id="fGenre" style="color:var(--text-sec); font-size:15px;"></p>
  </div>

  <div class="controls">
    <button class="btn" onclick="prevStation()">
      <svg width="36" height="36" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button class="btn btn-play" onclick="togglePlay()">
      <svg id="fullPlayIcon" width="36" height="36" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn" onclick="nextStation()">
      <svg width="36" height="36" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
    </button>
  </div>
</div>

<div class="chat-sheet" id="chatSheet">
  <div class="chat-handle" onclick="closeChatSheet()"></div>
  <div style="padding:16px; text-align:center; color:var(--text-sec);">Чат временно пуст</div>
</div>

<script>
// Вшитая высококлассная база данных станций
window.genres = [
  {id:"all", label:"Все"},
  {id:"deep", label:"Deep House"},
  {id:"pop", label:"Поп"},
  {id:"rock", label:"Рок"},
  {id:"retro", label:"Ретро"},
  {id:"edm", label:"EDM"}
];

window.stations = [
  {name:"SOUNDPARK DEEP", genre:"Deep House", tag:"deep", logo:"https://radiopotok.ru/f/station/256/1260.png", stream:"https://h.getradio.me/spdeep/hls.m3u8"},
  {name:"Record Deep", genre:"Deep House", tag:"deep", logo:"https://radiorecord.ru/images/logos/deep.png", stream:"https://radiorecord.hostingradio.ru/deep96.aacp"},
  {name:"SomaFM Groove Salad", genre:"Ambient / Deep", tag:"deep", logo:"https://somafm.com/img3/groovesalad-400.jpg", stream:"https://ice1.somafm.com/groovesalad-128-mp3"},
  {name:"Radio Go EDM", genre:"EDM / Festival", tag:"edm", logo:"https://upload.wikimedia.org/wikipedia/commons/2/26/Electronic-music-icon.png", stream:"https://radiorecord.hostingradio.ru/club96.aacp"},
  {name:"Love Radio", genre:"Pop", tag:"pop", logo:"https://onlineradiobox.com/img/l/1880.v22.png", stream:"https://love.hostingradio.ru/love128.aacp"},
  {name:"Pioneer FM", genre:"Indie / Pop", tag:"pop", logo:"https://onlineradiobox.com/img/l/11454.v8.png", stream:"https://pioneer.hostingradio.ru/pioneer96.aacp"}
];

let currentGenre = 'all';
let currentIndex = 0;
let isPlaying = false;
const audio = new Audio();
let hls = null;
let watchdogTimer = null;

// Инициализация
window.addEventListener('DOMContentLoaded', () => {
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  }
  renderTabs();
  renderList();
  selectStation(0, false);
  initSwipeGestures();
  initAudioWatchdog();
});

function renderTabs() {
  const container = document.getElementById('genreTabs');
  container.innerHTML = window.genres.map(g => `
    <div class="tab ${g.id === currentGenre ? 'active' : ''}" onclick="setGenre('${g.id}')">${g.label}</div>
  `).join('');
}

function setGenre(id) {
  currentGenre = id;
  renderTabs();
  renderList();
}

function renderList() {
  const container = document.getElementById('stationsList');
  const filtered = window.stations.filter(s => currentGenre === 'all' || s.tag === currentGenre);
  
  container.innerHTML = filtered.map((s, idx) => {
    const realIdx = window.stations.indexOf(s);
    return `
      <div class="station-card" onclick="selectStation(${realIdx}, true)">
        <div class="station-logo-wrap">
          <img src="${s.logo}" class="station-logo" loading="lazy">
        </div>
        <div class="station-info">
          <div class="station-name">${s.name}</div>
          <div class="station-genre">${s.genre}</div>
        </div>
      </div>
    `;
  }).join('');
}

function selectStation(index, autoPlay = true) {
  if(index < 0 || index >= window.stations.length) return;
  currentIndex = index;
  const station = window.stations[currentIndex];

  document.getElementById('mSub').textContent = station.name;
  document.getElementById('fName').textContent = station.name;
  document.getElementById('fGenre').textContent = station.genre;
  document.getElementById('fTrack').textContent = "Поток: " + station.genre;
  
  // Обновление логотипов (фикс сжатия картинок сработает тут автоматически)
  document.getElementById('mMiniLogo').src = station.logo;
  document.getElementById('mFullLogo').src = station.logo;

  stopAudio();

  if (autoPlay) {
    playStream(station.stream);
  }
}

function playStream(url) {
  isPlaying = true;
  if (url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      if (hls) hls.destroy();
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(err => console.log(err)));
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url;
      audio.play().catch(err => console.log(err));
    }
  } else {
    audio.src = url;
    audio.play().catch(err => console.log(err));
  }
  updateUI();
  updateMediaSession();
}

function stopAudio() {
  audio.pause();
  if (hls) {
    hls.destroy();
    hls = null;
  }
  audio.src = '';
  isPlaying = false;
  updateUI();
}

function togglePlay() {
  if (isPlaying) {
    stopAudio();
  } else {
    playStream(window.stations[currentIndex].stream);
  }
}

function nextStation() {
  let next = currentIndex + 1;
  if (next >= window.stations.length) next = 0;
  selectStation(next, true);
}

function prevStation() {
  let prev = currentIndex - 1;
  if (prev < 0) prev = window.stations.length - 1;
  selectStation(prev, true);
}

function updateUI() {
  const playSvg = `<svg width="36" height="36" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  const pauseSvg = `<svg width="36" height="36" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
  
  const miniPlayIcon = document.getElementById('miniPlayIcon');
  const fullPlayIcon = document.getElementById('fullPlayIcon');

  if (isPlaying) {
    miniPlayIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
    fullPlayIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
  } else {
    miniPlayIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
    fullPlayIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
  }
}

// Защита от зависания стрима (Watchdog)
function initAudioWatchdog() {
  setInterval(() => {
    if (isPlaying && audio.paused && audio.src) {
      // Поток завис в буферизации — перезапускаем
      console.log("Watchdog: перезапуск зависшего стрима...");
      playStream(window.stations[currentIndex].stream);
    }
  }, 5000);
}

// Навигация и Свайпы (TikTok-style)
function openFullPlayer() { document.getElementById('fullPlayer').classList.add('open'); }
function closeFullPlayer() { document.getElementById('fullPlayer').classList.remove('open'); }
function openChatSheet() { document.getElementById('chatSheet').classList.add('open'); }
function closeChatSheet() { document.getElementById('chatSheet').classList.remove('remove'); }

function initSwipeGestures() {
  const zone = document.getElementById('playerSwipeZone');
  let startY = 0;
  let endY = 0;

  zone.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, {passive: true});
  zone.addEventListener('touchend', (e) => {
    endY = e.changedTouches[0].clientY;
    const diff = startY - endY;
    if (Math.abs(diff) > 60) {
      if (diff > 0) nextStation(); // Свайп вверх -> Следующая
      else prevStation();          // Свайп вниз -> Предыдущая
    }
  }, {passive: true});
}

// MediaSession API для системного экрана блокировки
function updateMediaSession() {
  if ('mediaSession' in navigator) {
    const station = window.stations[currentIndex];
    navigator.mediaSession.metadata = new MediaMetadata({
      title: station.name,
      artist: "Radio Go Live",
      album: station.genre,
      artwork: [{ src: station.logo, sizes: '512x512', type: 'image/png' }]
    });
    
    navigator.mediaSession.setActionHandler('play', togglePlay);
    navigator.mediaSession.setActionHandler('pause', togglePlay);
    navigator.mediaSession.setActionHandler('previoustrack', prevStation);
    navigator.mediaSession.setActionHandler('nexttrack', nextStation);
  }
}
</script>
</body>
</html>
