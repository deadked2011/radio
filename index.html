<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══ RESET ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}

/* ══ TOKENS ═════════════════════════════════════════ */
:root{
  /* colours */
  --bg:#f5f4f0;--card:#ffffff;--text:#1a1a1a;--muted:#9a9a9a;
  --accent:#1a1a1a;--border:#e8e6e0;--pill:#eeece7;--pill-text:#7a7a7a;
  --green:#3eb87a;--red:#e05555;--orange:#f0a030;
  --shadow:0 2px 16px rgba(0,0,0,.07);--shadow-up:0 -2px 16px rgba(0,0,0,.07);
  /* spacing */
  --px:16px;--gap:8px;--sp-sm:12px;--sp-md:18px;
  /* radius */
  --r-card:20px;--r-row:14px;--r-btn:12px;
  /* safe area */
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
:root.dark{
  --bg:#111113;--card:#1c1c1e;--text:#f0f0f0;--muted:#636366;
  --accent:#f0f0f0;--border:#2c2c2e;--pill:#242426;--pill-text:#8e8e93;
  --shadow:0 2px 16px rgba(0,0,0,.4);--shadow-up:0 -2px 16px rgba(0,0,0,.4);
}

/* ══ LAYOUT ══════════════════════════════════════════ */
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  transition:background .25s,color .25s;
}
.page{
  display:flex;flex-direction:column;min-height:100vh;
  padding:calc(var(--sat) + 14px) var(--px) 0;
}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--sab) + 20px)}
.app{width:100%;max-width:640px;margin:0 auto}

/* ══ HEADER ══════════════════════════════════════════ */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md)}
.header-title{font-family:'DM Serif Display',serif;font-size:clamp(20px,5vw,28px);letter-spacing:-.3px;line-height:1}
.header-right{display:flex;align-items:center;gap:var(--gap)}
.clock{font-size:13px;color:var(--muted);font-weight:300;font-variant-numeric:tabular-nums}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0}
.live-dot.on{background:var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* icon buttons (theme / car / chat) */
.icon-btn{
  width:36px;height:36px;border-radius:10px;background:var(--pill);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .18s;flex-shrink:0;
}
.icon-btn svg{width:17px;height:17px}
.icon-btn:active,.icon-btn.on{background:var(--accent);color:var(--bg)}

/* car mode — enlarge icon buttons */
body.car .icon-btn{width:48px;height:48px;border-radius:14px}
body.car .icon-btn svg{width:22px;height:22px}

/* ══ TABS ════════════════════════════════════════════ */
.tabs{display:flex;gap:var(--gap);margin-bottom:var(--sp-sm)}
.tab-btn{
  flex:1;padding:10px 0;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;border:none;background:var(--pill);color:var(--pill-text);
  transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab-btn svg{width:14px;height:14px;flex-shrink:0}
.tab-btn.active{background:var(--accent);color:var(--bg)}
body.car .tab-btn{font-size:16px;padding:14px 0}

/* ══ SEARCH ══════════════════════════════════════════ */
.search-wrap{position:relative;margin-bottom:var(--sp-sm)}
.search-input{
  width:100%;padding:11px 16px 11px 42px;
  background:var(--card);border:none;border-radius:14px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);
  box-shadow:0 1px 6px rgba(0,0,0,.05);outline:none;-webkit-appearance:none;
  transition:background .25s,color .25s,box-shadow .18s;
}
.search-input:focus{box-shadow:0 0 0 2px var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;display:flex}
.search-icon svg{width:16px;height:16px}

/* ══ GENRE PILLS ══════════════════════════════════════ */
.genres{display:flex;gap:6px;overflow-x:auto;margin-bottom:var(--sp-md);padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.genres::-webkit-scrollbar{display:none}
.genre-pill{
  padding:7px 14px;border-radius:100px;background:var(--pill);
  color:var(--pill-text);font-size:12px;font-weight:500;cursor:pointer;
  border:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;
  transition:all .18s;
}
.genre-pill.active{background:var(--accent);color:var(--bg)}
body.car .genre-pill{font-size:15px;padding:10px 18px}

/* ══ RESUME BADGE ════════════════════════════════════ */
.resume-badge{
  display:none;align-items:center;gap:8px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;padding:10px 16px;margin-bottom:var(--sp-sm);
  font-size:13px;color:var(--muted);
}
.resume-badge.show{display:flex}
.resume-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);animation:blink 1s infinite;flex-shrink:0}

/* ══ NOW PLAYING CARD ════════════════════════════════ */
.now-card{
  background:var(--card);border-radius:var(--r-card);
  padding:var(--sp-md);box-shadow:var(--shadow);
  margin-bottom:var(--sp-sm);display:none;
  transition:background .25s;
}
.now-card.visible{display:block}

.now-top{display:flex;align-items:center;gap:14px;margin-bottom:var(--sp-md)}
.now-logo{
  width:60px;height:60px;border-radius:14px;background:var(--pill);
  overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:26px;transition:all .3s;
}
.now-logo img{width:100%;height:100%;object-fit:cover}
body.car .now-logo{width:80px;height:80px;border-radius:18px;font-size:34px}

.now-info{flex:1;min-width:0}
.now-name{
  font-family:'DM Serif Display',serif;font-size:clamp(17px,4vw,24px);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.15;margin-bottom:4px;
}
body.car .now-name{font-size:clamp(20px,5vw,30px)}
.now-genre{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

.fav-btn{
  background:none;border:none;cursor:pointer;
  font-size:26px;color:var(--muted);flex-shrink:0;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:all .15s;
}
.fav-btn:active{background:var(--pill);transform:scale(1.2)}
.fav-btn.on{color:var(--red)}
body.car .fav-btn{font-size:32px;width:52px;height:52px}

/* loading bar */
.loading-bar{height:3px;background:var(--border);border-radius:99px;margin-bottom:var(--sp-sm);overflow:hidden;display:none}
.loading-bar.active{display:block}
.loading-bar-inner{height:100%;width:35%;background:var(--accent);border-radius:99px;animation:loadAnim 1.1s ease-in-out infinite}
@keyframes loadAnim{0%{transform:translateX(-150%)}100%{transform:translateX(450%)}}

/* visualizer */
.viz{height:36px;display:flex;align-items:center;gap:2px;margin-bottom:var(--sp-md)}
.bar{flex:1;background:var(--border);border-radius:99px;height:4px}
.bar.on{background:var(--accent);animation:pulse var(--dur,.8s) ease-in-out infinite alternate}
@keyframes pulse{from{height:var(--min,4px)}to{height:var(--max,24px)}}

/* controls */
.controls{display:flex;align-items:center;justify-content:space-between;gap:var(--gap);margin-bottom:var(--sp-md)}
.ctrl{
  width:52px;height:52px;border-radius:var(--r-btn);
  background:var(--pill);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all .15s;flex-shrink:0;
}
.ctrl:active{background:var(--border);color:var(--text);transform:scale(.95)}
.ctrl svg{width:22px;height:22px}
.play-btn{
  width:68px;height:68px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(0,0,0,.18);transition:transform .15s,background .25s;flex-shrink:0;
}
.play-btn:active{transform:scale(.93)}
.play-btn svg{width:24px;height:24px;fill:var(--bg);margin-left:3px;transition:fill .25s}
.play-btn.playing svg{margin-left:0}
body.car .ctrl{width:72px;height:72px;border-radius:18px}
body.car .ctrl svg{width:30px;height:30px}
body.car .play-btn{width:96px;height:96px}
body.car .play-btn svg{width:34px;height:34px}

/* volume */
.vol-row{display:flex;align-items:center;gap:10px;padding-top:var(--sp-sm);border-top:1px solid var(--border)}
.vol-emoji{font-size:18px;flex-shrink:0}
.vol-wrap{flex:1;position:relative;display:flex;align-items:center;height:36px}
.vol-track-bg{position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;height:4px;border-radius:99px;background:var(--border);pointer-events:none}
.vol-fill{position:absolute;left:0;top:50%;transform:translateY(-50%);height:4px;border-radius:99px;pointer-events:none;transition:width .06s linear,background-color .25s}
input.vol-input{position:relative;z-index:2;width:100%;-webkit-appearance:none;height:4px;border-radius:99px;background:transparent;outline:none;cursor:pointer}
input.vol-input::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--card);border:2px solid var(--border);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .15s,box-shadow .15s}
input.vol-input:active::-webkit-slider-thumb,input.vol-input.dragging::-webkit-slider-thumb{transform:scale(1.2);box-shadow:0 3px 14px rgba(0,0,0,.22)}
.vol-val{font-size:12px;font-weight:600;color:var(--muted);min-width:34px;text-align:right;flex-shrink:0;transition:color .25s}

/* ══ STATION LIST ═════════════════════════════════════ */
.section-label{
  font-size:11px;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);font-weight:600;margin-bottom:10px;padding:0 2px;
}
.list{display:flex;flex-direction:column;gap:6px}

/* FIX: row layout — was breaking on small screens */
.row{
  background:var(--card);border-radius:var(--r-row);
  padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;user-select:none;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  transition:box-shadow .15s,background .25s;
  /* prevent collapse */
  min-height:64px;
  width:100%;
}
.row:active{box-shadow:var(--shadow);transform:scale(.993)}
.row.active{outline:2px solid var(--accent);outline-offset:-1px}

/* logo — fixed size, never shrinks */
.row-img{
  width:46px;height:46px;min-width:46px;
  border-radius:11px;background:var(--pill);overflow:hidden;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.row-img img{width:100%;height:100%;object-fit:cover;display:block}

/* info — takes remaining space, clips text */
.row-info{flex:1;min-width:0;overflow:hidden}
.row-name{
  font-size:14px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.row-sub{
  font-size:12px;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}

/* right side — fixed, never stretches */
.row-right{
  display:flex;flex-direction:column;align-items:flex-end;
  gap:4px;flex-shrink:0;margin-left:4px;
}
.row-dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.row.active .row-dot{background:var(--green);animation:blink 1.5s infinite}
.row-cnt{font-size:11px;color:var(--muted);white-space:nowrap}

/* car mode list */
body.car .row{min-height:78px;padding:14px 16px;gap:14px}
body.car .row-img{width:58px;height:58px;min-width:58px;border-radius:14px;font-size:26px}
body.car .row-name{font-size:17px}
body.car .row-sub{font-size:13px}

.empty{
  text-align:center;color:var(--muted);
  padding:40px 20px;font-size:14px;line-height:1.7;
}
.empty-icon{display:block;font-size:36px;margin-bottom:10px}

/* ══ CHAT OVERLAY ════════════════════════════════════ */
.chat-overlay{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--card);border-top:1px solid var(--border);
  box-shadow:var(--shadow-up);
  display:none;flex-direction:column;
  height:clamp(260px,50vh,440px);
  transition:background .25s;
}
.chat-overlay.show{display:flex}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.chat-header-title{font-weight:600;font-size:15px}
.chat-close-btn{
  width:30px;height:30px;border-radius:50%;background:var(--pill);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);
}
.chat-close-btn svg{width:14px;height:14px}
.chat-open-btn{
  background:var(--accent);color:var(--bg);border:none;border-radius:100px;
  padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:6px;
}
.chat-actions{display:flex;align-items:center;gap:8px}
.chat-messages{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.chat-msg{display:flex;gap:8px;align-items:flex-start;font-size:13px}
.chat-msg-avatar{
  width:32px;height:32px;min-width:32px;border-radius:50%;
  background:var(--accent);color:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
}
.chat-msg-body{background:var(--pill);padding:6px 12px;border-radius:12px;max-width:85%}
.chat-msg-name{font-weight:600;font-size:11px;margin-bottom:2px;color:var(--muted)}
.chat-msg-text{word-break:break-word;line-height:1.4}
</style>
<script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));</script>
</head>
<body>
<div class="page">
  <div class="scroll-area">
    <div class="app">

      <!-- HEADER -->
      <div class="header">
        <div class="header-title">Radio Go</div>
        <div class="header-right">
          <span class="live-dot" id="liveDot"></span>
          <span class="clock" id="clock"></span>
          <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="Тёмная тема">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="icon-btn" id="carBtn" onclick="toggleCar()" title="Авторежим">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="10" width="22" height="9" rx="2"/><path d="m6.5 10 2-6h7l2 6"/><circle cx="7.5" cy="19" r="1.5"/><circle cx="16.5" cy="19" r="1.5"/></svg>
          </button>
          <button class="icon-btn" id="chatToggleBtn" onclick="toggleChat()" title="Чат">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
      </div>

      <!-- RESUME BADGE -->
      <div class="resume-badge" id="resumeBadge">
        <span class="resume-dot"></span>
        <span id="resumeText">Восстанавливаю радио…</span>
      </div>

      <!-- TABS -->
<div class="tabs" id="tabs">

  <button class="tab-btn active"
          id="tabAll"
          onclick="setTab('all')">

    <svg viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2.5">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 8v4l3 3"/>
    </svg>

    Все станции
  </button>

  <button class="tab-btn"
          id="tabFav"
          onclick="setTab('fav')">

    <svg viewBox="0 0 24 24"
         fill="currentColor">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>

    Избранное
  </button>

  <button class="tab-btn"
          id="tabRap"
          onclick="setTab('rap')">

    <svg viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2.5">

      <path d="M12 3v12"/>
      <path d="M7 8v8"/>
      <path d="M17 6v10"/>

      <circle cx="7" cy="18" r="2"/>
      <circle cx="12" cy="16" r="2"/>
      <circle cx="17" cy="18" r="2"/>

    </svg>

    Рэп
  </button>

</div>

      <!-- SEARCH + GENRES -->
      <div id="searchWrap" class="search-wrap">
        <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input class="search-input" id="searchInput" placeholder="Поиск станции..." oninput="renderList()">
      </div>
      <div class="genres" id="genrePills"></div>

      <!-- NOW PLAYING -->
      <div class="now-card" id="nowCard">
        <div class="now-top">
          <div class="now-logo" id="nowLogo">🎵</div>
          <div class="now-info">
            <div class="now-name" id="nowName">—</div>
            <div class="now-genre" id="nowGenre">—</div>
          </div>
          <button class="fav-btn" id="favBtn" onclick="toggleFav()">♡</button>
        </div>
        <div class="loading-bar" id="loadingBar"><div class="loading-bar-inner"></div></div>
        <div class="viz" id="viz"></div>
        <div class="controls">
          <button class="ctrl" onclick="prev()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="ctrl" onclick="next()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
        </div>
        <div class="vol-row">
          <span class="vol-emoji" id="volEmoji">🔈</span>
          <div class="vol-wrap">
            <div class="vol-track-bg"></div>
            <div class="vol-fill" id="volFill"></div>
            <input type="range" class="vol-input" id="volSlider" min="0" max="100" value="80"
              oninput="onVolChange(this.value)"
              onmousedown="this.classList.add('dragging')" onmouseup="this.classList.remove('dragging')"
              ontouchstart="this.classList.add('dragging')" ontouchend="this.classList.remove('dragging')">
          </div>
          <span class="vol-val" id="volVal">80%</span>
        </div>
      </div>

      <!-- LIST -->
      <div class="section-label" id="listLabel">Все станции</div>
      <div class="list" id="stationList"></div>

    </div><!-- /app -->
  </div><!-- /scroll-area -->
</div><!-- /page -->

<!-- CHAT OVERLAY -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-header">
    <span class="chat-header-title">💬 Чат радио</span>
    <div class="chat-actions">

  genre:"rap",
  tag:"rap",
  logo:null,
  stream:"https://radio.streemlion.com:1875/stream",
  listeners:3100
},

{
  name:"Classic Hip Hop",
  genre:"rap",
  tag:"rap",
  logo:null,
  stream:"https://icecast.radiofrance.fr/fiphiphop-hifi.aac",
  listeners:5000
}
];


const genres = [
  {id:"all",label:"Все"},{id:"deep",label:"Deep House"},{id:"pop",label:"Поп"},
  {id:"rock",label:"Рок"},{id:"retro",label:"Ретро"},{id:"shanson",label:"Шансон"},
  {id:"news",label:"Новости"},{id:"edm",label:"Электро"},{id:"chill",label:"Чилаут"},{id:"rap",label:"Рэп"},
];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let curIdx=0, playing=false, activeGenre="all", activeTab="all";
let darkMode=localStorage.getItem("rDark")==="1";
let carMode=localStorage.getItem("rCar")==="1";
let favs=JSON.parse(localStorage.getItem("rfavs")||"[]");
let userPaused=false, wasInterrupted=false, resumeTimer=null, lastAudioTime=0;
let hlsInstance=null;
let chatVisible=false;
const audio=document.getElementById("audio");
audio.volume=0.8;

// apply saved / tg theme
if(darkMode||tg?.colorScheme==="dark"){darkMode=true;document.documentElement.classList.add("dark");}
document.getElementById("darkBtn").classList.toggle("on",darkMode);
if(carMode){document.body.classList.add("car");applyCarMode(true);}
document.getElementById("carBtn").classList.toggle("on",carMode);

// ══════════════════════════════════════════════════════
// THEME & CAR MODE
// ══════════════════════════════════════════════════════
function toggleDark(){
  darkMode=!darkMode;
  document.documentElement.classList.toggle("dark",darkMode);
  document.getElementById("darkBtn").classList.toggle("on",darkMode);
  localStorage.setItem("rDark",darkMode?"1":"0");
  if(tg)tg.HapticFeedback?.impactOccurred("light");
}
function toggleCar(){
  carMode=!carMode;
  document.body.classList.toggle("car",carMode);
  document.getElementById("carBtn").classList.toggle("on",carMode);
  localStorage.setItem("rCar",carMode?"1":"0");
  applyCarMode(carMode);
  if(tg)tg.HapticFeedback?.impactOccurred("medium");
}
function applyCarMode(on){
  const hide=s=>s.style.display=on?"none":"";
  hide(document.getElementById("tabs"));
  hide(document.getElementById("searchWrap"));
  hide(document.getElementById("genrePills"));
  hide(document.getElementById("listLabel"));
  hide(document.getElementById("stationList"));
}

// ══════════════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════════════
function tick(){const n=new Date();document.getElementById("clock").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
setInterval(tick,1000);tick();

// ══════════════════════════════════════════════════════
// VISUALIZER
// ══════════════════════════════════════════════════════
const bars=[];const vizEl=document.getElementById("viz");
for(let i=0;i<30;i++){
  const b=document.createElement("div");b.className="bar";
  const mn=3+Math.random()*4,mx=10+Math.random()*20,dur=.4+Math.random()*.75;
  b.style.cssText=`height:${mn}px;--min:${mn}px;--max:${mx}px;--dur:${dur}s;animation-delay:${(Math.random()*.5).toFixed(2)}s`;
  vizEl.appendChild(b);bars.push(b);
}
function vizOn(on){bars.forEach(b=>on?b.classList.add("on"):b.classList.remove("on"));}
function setLoading(on){document.getElementById("loadingBar").classList.toggle("active",on);}
function showBadge(t){document.getElementById("resumeText").textContent=t;document.getElementById("resumeBadge").classList.add("show");}
function hideBadge(){document.getElementById("resumeBadge").classList.remove("show");}

// ══════════════════════════════════════════════════════
// AUDIO EVENTS (auto-resume)
// ══════════════════════════════════════════════════════
audio.addEventListener("pause",()=>{
  if(userPaused||!playing)return;
  wasInterrupted=true;lastAudioTime=Date.now();
  showBadge("Радио прервано — восстановлю…");
  clearTimeout(resumeTimer);
  resumeTimer=setTimeout(()=>{if(wasInterrupted&&!userPaused&&!document.hidden)attemptResume();},1200);
});
audio.addEventListener("ended",()=>{if(!userPaused&&playing){wasInterrupted=true;attemptResume();}});
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden&&wasInterrupted&&!userPaused){clearTimeout(resumeTimer);resumeTimer=setTimeout(attemptResume,600);}
});
if(tg)tg.onEvent("activated",()=>{if(wasInterrupted&&!userPaused){clearTimeout(resumeTimer);resumeTimer=setTimeout(attemptResume,600);}});
setInterval(()=>{if(wasInterrupted&&!userPaused&&!document.hidden&&Date.now()-lastAudioTime>3000)attemptResume();},3000);

async function attemptResume(){
  wasInterrupted=false;showBadge("Возвращаю радио…");
  audio.volume=0;playStream(stations[curIdx].stream);
  const target=Number(document.getElementById("volSlider").value)/100;
  let v=0;
  const fade=setInterval(()=>{v+=0.04;if(v>=target){v=target;clearInterval(fade);hideBadge();}audio.volume=v;},60);
}

// ══════════════════════════════════════════════════════
// MEDIA SESSION
// ══════════════════════════════════════════════════════
function updateMediaSession(s){
  if(!("mediaSession" in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({title:s.name,artist:s.genre,album:"Radio Go",artwork:[{src:s.logo,sizes:"256x256",type:"image/png"}]});
  navigator.mediaSession.setActionHandler("previoustrack",prev);
  navigator.mediaSession.setActionHandler("nexttrack",next);
  navigator.mediaSession.setActionHandler("play",()=>{userPaused=false;playStream(stations[curIdx].stream);});
  navigator.mediaSession.setActionHandler("pause",()=>{userPaused=true;audio.pause();setPlaying(false);});
}

// ══════════════════════════════════════════════════════
// STREAM PLAYBACK
// ══════════════════════════════════════════════════════
function playStream(url){
  if(!url)return;
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
  setLoading(true);vizOn(false);
  if(url.includes(".m3u8")){
    if(audio.canPlayType("application/vnd.apple.mpegurl")){
      audio.src=url;
      audio.play().then(()=>{setLoading(false);setPlaying(true);hideBadge();}).catch(()=>setLoading(false));
      return;
    }
    if(typeof Hls!=="undefined"&&Hls.isSupported()){
      hlsInstance=new Hls({enableWorker:true,lowLatencyMode:true,backBufferLength:30});
      hlsInstance.loadSource(url);hlsInstance.attachMedia(audio);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{
        audio.play().then(()=>{setLoading(false);setPlaying(true);hideBadge();}).catch(()=>setLoading(false));
      });
      hlsInstance.on(Hls.Events.ERROR,(_,d)=>{
        if(d.fatal){
          if(d.type===Hls.ErrorTypes.NETWORK_ERROR)hlsInstance.startLoad();
          else if(d.type===Hls.ErrorTypes.MEDIA_ERROR)hlsInstance.recoverMediaError();
          else{setLoading(false);setPlaying(false);}
        }
      });
      return;
    }
  }
  audio.src=url;
  audio.play().then(()=>{setLoading(false);setPlaying(true);hideBadge();}).catch(()=>setLoading(false));
}

// ══════════════════════════════════════════════════════
// PLAYER CONTROLS
// ══════════════════════════════════════════════════════
function ge(tag){return{deep:"🎧",pop:"🎤",rock:"🎸",retro:"📻",shanson:"🎶",news:"📰",edm:"🎛",chill:"🌊"}[tag]||"🎵";}

function loadStation(idx,autoplay){
  curIdx=idx;const s=stations[idx];
  document.getElementById("nowLogo").innerHTML=s.logo?`<img src="${s.logo}" onerror="this.parentElement.innerHTML='${ge(s.tag)}'">`:ge(s.tag);
  document.getElementById("nowName").textContent=s.name;
  document.getElementById("nowGenre").textContent=s.genre;
  document.getElementById("nowCard").classList.add("visible");
  updateFavBtn();updateMediaSession(s);renderList();
  if(autoplay||playing){userPaused=false;playStream(s.stream);}
  else{if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}audio.pause();audio.src="";setPlaying(false);}
}

function setPlaying(on){
  playing=on;vizOn(on);
  document.getElementById("liveDot").classList.toggle("on",on);
  document.getElementById("playBtn").classList.toggle("playing",on);
  document.getElementById("playIcon").innerHTML=on
    ?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    :'<polygon points="5 3 19 12 5 21 5 3"/>';
  if("mediaSession" in navigator)navigator.mediaSession.playbackState=on?"playing":"paused";
}

function togglePlay(){
  if(tg)tg.HapticFeedback?.impactOccurred("light");
  if(!playing){userPaused=false;wasInterrupted=false;hideBadge();playStream(stations[curIdx].stream);}
  else{userPaused=true;wasInterrupted=false;clearTimeout(resumeTimer);if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}audio.pause();setPlaying(false);hideBadge();}
}
function prev(){if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation((curIdx-1+stations.length)%stations.length,true);}
function next(){if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation((curIdx+1)%stations.length,true);}

// ══════════════════════════════════════════════════════
// VOLUME
// ══════════════════════════════════════════════════════
function volColor(v){if(v===0)return"transparent";if(v<=50)return"#c8c5c0";if(v<=80)return"#3eb87a";return"#f0a030";}
function updateVolUI(v){
  v=Number(v);
  document.getElementById("volFill").style.width=v+"%";
  document.getElementById("volFill").style.backgroundColor=volColor(v);
  document.getElementById("volVal").textContent=Math.round(v)+"%";
  document.getElementById("volVal").style.color=v<=50?"var(--muted)":v<=80?"#3eb87a":"#f0a030";
  const em=v===0?"🔇":v<30?"🔈":v<70?"🔉":"🔊";
  document.getElementById("volEmoji").textContent=em;
}
function onVolChange(v){audio.volume=v/100;updateVolUI(v);}
updateVolUI(80);

// ══════════════════════════════════════════════════════
// FAVOURITES
// ══════════════════════════════════════════════════════
function toggleFav(){
  if(tg)tg.HapticFeedback?.notificationOccurred("success");
  const name=stations[curIdx].name;
  const i=favs.indexOf(name);
  if(i===-1)favs.push(name);else favs.splice(i,1);
  localStorage.setItem("rfavs",JSON.stringify(favs));
  updateFavBtn();
  if(activeTab==="fav")renderList();
}
function updateFavBtn(){
  const on=favs.includes(stations[curIdx].name);
  const b=document.getElementById("favBtn");
  b.textContent=on?"♥":"♡";b.classList.toggle("on",on);
}

// ══════════════════════════════════════════════════════
// TABS / GENRES / LIST
// ══════════════════════════════════════════════════════
function setTab(tab){
  activeTab=tab;
  document.getElementById("tabAll").classList.toggle("active",tab==="all");
  document.getElementById("tabFav").classList.toggle("active",tab==="fav");
  document.getElementById("searchWrap").style.display=tab==="all"?"":"none";
  document.getElementById("genrePills").style.display=tab==="all"?"":"none";
  if(tab==="all")renderGenres();
  renderList();
}

function renderGenres(){
  const el=document.getElementById("genrePills");el.innerHTML="";
  genres.forEach(g=>{
    const b=document.createElement("button");
    b.className="genre-pill"+(g.id===activeGenre?" active":"");
    b.textContent=g.label;
    b.onclick=()=>{activeGenre=g.id;renderGenres();renderList();};
    el.appendChild(b);
  });
}

function renderList(){
  const q=(document.getElementById("searchInput").value||"").toLowerCase();
  const el=document.getElementById("stationList");el.innerHTML="";
  const filtered=activeTab==="fav"
    ?stations.filter(s=>favs.includes(s.name))
    :stations.filter(s=>(activeGenre==="all"||s.tag===activeGenre)&&(!q||s.name.toLowerCase().includes(q)||s.genre.toLowerCase().includes(q)));
  document.getElementById("listLabel").textContent=
    activeTab==="fav"?`Избранное (${filtered.length})`:
    activeGenre==="all"?`Все станции (${filtered.length})`:`${filtered.length} станций`;
  if(!filtered.length){
    el.innerHTML=activeTab==="fav"
      ?'<div class="empty"><span class="empty-icon">♡</span>Нажмите ♡ на любой станции</div>'
      :'<div class="empty"><span class="empty-icon">🔍</span>Ничего не найдено</div>';
    return;
  }
  filtered.forEach(s=>{
    const idx=stations.indexOf(s);
    const row=document.createElement("div");
    row.className="row"+(idx===curIdx?" active":"");
    row.innerHTML=`
      <div class="row-img">${s.logo?`<img src="${s.logo}" onerror="this.parentElement.innerHTML='${ge(s.tag)}'">`:ge(s.tag)}</div>
      <div class="row-info">
        <div class="row-name">${s.name}</div>
        <div class="row-sub">${s.genre}</div>
      </div>
      <div class="row-right">
        <div class="row-dot"></div>
        <div class="row-cnt">${(s.listeners||0).toLocaleString("ru")}</div>
      </div>`;
    row.onclick=()=>{if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation(idx,true);};
    el.appendChild(row);
  });
}

// ══════════════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════════════
function toggleChat(){
  chatVisible=!chatVisible;
  document.getElementById("chatOverlay").classList.toggle("show",chatVisible);
  document.getElementById("chatToggleBtn").classList.toggle("on",chatVisible);
  if(chatVisible)loadChatMessages();
}
function openChat(){
  const url="https://t.me/strmradiochat/2";
  if(tg)tg.openTelegramLink(url);else window.open(url,"_blank");
}
async function loadChatMessages(){
  const container=document.getElementById("chatMessages");
  if(!CHAT_API_BASE.includes("your-worker")){
    try{
      const res=await fetch(`${CHAT_API_BASE}/get-messages`);
      const msgs=await res.json();
      container.innerHTML="";
      if(!msgs.length){container.innerHTML='<div style="text-align:center;color:var(--muted);padding:20px;font-size:14px">Пока нет сообщений</div>';return;}
      msgs.forEach(m=>{
        const div=document.createElement("div");div.className="chat-msg";
        div.innerHTML=`<div class="chat-msg-avatar">${(m.name[0]||"").toUpperCase()}</div><div class="chat-msg-body"><div class="chat-msg-name">${m.name}</div><div class="chat-msg-text">${m.text}</div></div>`;
        container.appendChild(div);
      });
      container.scrollTop=container.scrollHeight;
    }catch(e){container.innerHTML='<div style="text-align:center;color:var(--muted);padding:20px;font-size:14px">Не удалось загрузить сообщения</div>';}
  }else{
    container.innerHTML='<div style="text-align:center;color:var(--muted);padding:24px 16px;font-size:14px;line-height:1.6">Чат появится после<br>настройки CHAT_API_BASE</div>';
  }
}
setInterval(()=>{if(chatVisible)loadChatMessages();},3000);

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
renderGenres();renderList();loadStation(0,false);
</script>
