<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Go</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="stations.js"></script>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-sidebar: #111827;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #fc3c44;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body.dimmed-theme {
            filter: brightness(0.4) contrast(1.1);
        }
        body.dimmed-theme #right-sidebar, body.dimmed-theme #genres-bar, body.dimmed-theme #header {
            filter: brightness(1.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: var(--text); height: 100vh; overflow: hidden; user-select: none; }

        #app { display: flex; width: 100vw; height: 100vh; position: relative; }
        #left-player { flex: 1; height: 100%; display: flex; flex-direction: column; background: #05070c; position: relative; }

        /* Шапка */
        #header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(9, 13, 22, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 10; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; background: linear-gradient(45deg, #fc3c44, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { display: flex; gap: 10px; }
        .btn-round { background: var(--glass); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .btn-round:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }

        /* Жанры (Исправлен скролл на ПК) */
        #genres-bar { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; white-space: nowrap; background: rgba(5, 7, 12, 0.6); scrollbar-width: none; cursor: grab; }
        #genres-bar::-webkit-scrollbar { display: none; }
        #genres-bar:active { cursor: grabbing; }
        .genre-tag { padding: 8px 16px; border-radius: 20px; background: var(--glass); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .genre-tag.active, .genre-tag:hover { background: var(--accent); color: #fff; border-color: transparent; box-shadow: 0 4px 12px rgba(252, 60, 68, 0.3); }

        /* TikTok Лента */
        #feed { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        #feed::-webkit-scrollbar { display: none; }
        
        .card { height: 100%; width: 100%; scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .blur-bg { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(60px) brightness(0.2); z-index: 1; }
        .content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 20px; width: 100%; max-width: 380px; }
        
        .img-box { width: 180px; height: 180px; margin-bottom: 20px; border-radius: 28px; box-shadow: 0 16px 32px rgba(0,0,0,0.6); background: #1e293b; overflow: hidden; border: 2px solid var(--border); }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .title { font-size: 24px; font-weight: 800; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        .sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
        
        /* Монитор текущего трека */
        .track-box { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 16px; width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
        .live-lbl { background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; }
        .track-txt { flex: 1; font-size: 14px; font-weight: 600; color: #38bdf8; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .play-btn { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .play-btn:hover { transform: scale(1.05); }
        .play-btn svg { width: 28px; height: 28px; fill: #000; }
        .play-btn.playing { background: var(--accent); }
        .play-btn.playing svg { fill: #fff; }

        /* ПРАВАЯ ПАНЕЛЬ: 50/50 НА ПК */
        #right-sidebar { width: 420px; height: 100%; background: var(--bg-sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 20; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .side-header-mob { display: none; padding: 16px 20px; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .side-split { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .side-split-top { border-bottom: 1px solid var(--border); }
        .side-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 16px 20px 10px; }
        .side-scroll { flex: 1; overflow-y: auto; padding: 0 20px 20px; }

        /* Элементы истории */
        .hist-card { display: flex; align-items: center; gap: 12px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; border: 1px solid transparent; }
        .hist-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .hist-info { flex: 1; overflow: hidden; }
        .hist-name { font-size: 13px; font-weight: 700; color: var(--text); }
        .hist-track { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-time { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 6px; }

        /* Адаптивность под мобилки */
        @media (max-width: 1023px) {
            #right-sidebar { position: fixed; right: 0; top: 0; width: 100%; height: 100%; transform: translateX(100%); }
            #right-sidebar.open { transform: translateX(0); }
            .side-header-mob { display: flex; }
        }
        @media (min-width: 1024px) {
            #right-sidebar { transform: translateX(0) !important; }
        }
    </style>
</head>
<body>

    <div id="app">
        <main id="left-player">
            <header id="header">
                <div class="logo">RADIO GO</div>
                <div class="controls">
                    <button class="btn-round" onclick="toggleDim()" title="Затемнение">🌓</button>
                    <button class="btn-round" onclick="toggleSidebar()" title="Общение / История">💬</button>
                </div>
            </header>

            <div id="genres-bar"></div>
            <div id="feed"></div>
        </main>

        <aside id="right-sidebar">
            <div class="side-header-mob">
                <h3>Общение и История</h3>
                <button class="btn-round" style="width:32px; height:32px" onclick="toggleSidebar()">✕</button>
            </div>
            
            <div class="side-split side-split-top">
                <div class="side-title">🕒 История прослушивания</div>
                <div id="history-box" class="side-scroll"></div>
            </div>
            
            <div class="side-split">
                <div class="side-title">💬 Комментарии канала</div>
                <div class="side-scroll" style="padding-top: 5px;">
                    <div id="tg-widget-container">
                        </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let audio = new Audio();
        let hlsPlayer = null;
        let activeIdx = -1;
        let isPlaying = false;
        let userTouched = false;
        let currentFilter = 'all';
        
        let historyData = JSON.parse(localStorage.getItem('radio_history')) || [];
        let trackCheckInterval = null;
        let lastTrackTitle = "";

        document.addEventListener("DOMContentLoaded", () => {
            initGenres();
            initDragScroll();
            renderFeed('all');
            initTheme();
            renderHistory();
            initTelegramComments();
        });

        // 1. Рендер ленты жанров
        function initGenres() {
            const bar = document.getElementById('genres-bar');
            if(!window.genres) return;
            bar.innerHTML = window.genres.map((g, i) => `
                <div class="genre-tag ${i===0?'active':''}" onclick="filterGenre('${g.id}', this)">${g.label}</div>
            `).join('');
        }

        // 2. Листание жанров на ПК (Мышь + Колесо)
        function initDragScroll() {
            const bar = document.getElementById('genres-bar');
            bar.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) { e.preventDefault(); bar.scrollLeft += e.deltaY * 1.2; }
            }, { passive: false });

            let isDown = false, startX, scrollLeft;
            bar.addEventListener('mousedown', (e) => {
                isDown = true; startX = e.pageX - bar.offsetLeft; scrollLeft = bar.scrollLeft;
            });
            bar.addEventListener('mouseleave', () => isDown = false);
            bar.addEventListener('mouseup', () => isDown = false);
            bar.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - bar.offsetLeft;
                bar.scrollLeft = scrollLeft - (x - startX) * 2;
            });
        }

        function filterGenre(id, el) {
            document.querySelectorAll('.genre-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentFilter = id;
            renderFeed(id);
            document.getElementById('feed').scrollTop = 0;
        }

        // 3. TikTok Лента станций
        function renderFeed(filterId) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            const filtered = filterId === 'all' ? window.stations : window.stations.filter(s => s.tag === filterId);
            if(!filtered || filtered.length === 0) {
                feed.innerHTML = '<div style="text-align:center;padding-top:40vh;color:#94a3b8">Станций не найдено</div>';
                return;
            }

            filtered.forEach((st, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = idx;
                card.dataset.stream = st.stream;
                card.dataset.name = st.name;
                card.dataset.logo = st.logo;

                card.innerHTML = `
                    <div class="blur-bg" style="background-image:url('${st.logo}')"></div>
                    <div class="content">
                        <div class="img-box">
                            <img src="${st.logo}" alt="${st.name}" onerror="imgFallback(this, '${st.name}')">
                        </div>
                        <div class="title">${st.name}</div>
                        <div class="sub">${st.genre || 'Радиостанция'}</div>
                        
                        <div class="track-box">
                            <span class="live-lbl">LIVE</span>
                            <div class="track-txt" id="ticker-${idx}">Загрузка трека...</div>
                        </div>

                        <button class="play-btn" onclick="handlePlayClick(${idx}, '${st.stream}', this, event)">
                            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>
                `;
                feed.appendChild(card);
            });

            bindObserver();
        }

        // Автогенерация картинок при ошибке ссылки
        function imgFallback(img, name) {
            img.onerror = null;
            const letters = name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
            const canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 200;
            const ctx = canvas.getContext('2d');
            const gr = ctx.createLinearGradient(0,0,200,200);
            gr.addColorStop(0, '#fc3c44'); gr.addColorStop(1, '#000');
            ctx.fillStyle = gr; ctx.fillRect(0,0,200,200);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 50px Inter, sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(letters || '📻', 100, 100);
            img.src = canvas.toDataURL();
        }

        // 4. Свайп Обсервер (TikTok переключение)
        function bindObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        const card = entry.target;
                        const idx = parseInt(card.dataset.index);
                        activeIdx = idx;
                        
                        // Парсим трек "Кто поет"
                        monitorTrackTitle(card.dataset.stream, idx, card.dataset.name, card.dataset.logo);

                        // Если юзер уже нажимал плей — запускаем поток автоматом при скролле
                        if(userTouched) {
                            runAudioStream(card.dataset.stream);
                        }
                    }
                });
            }, { root: document.getElementById('feed'), threshold: 0.6 });

            document.querySelectorAll('.card').forEach(c => observer.observe(c));
        }

        // 5. Потоковый Аудио-Движок (HLS + Обычный Аудио)
        function runAudioStream(url) {
            if(hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            audio.pause();

            if(url.includes('.m3u8')) {
                if(Hls.isSupported()) {
                    hlsPlayer = new Hls();
                    hlsPlayer.loadSource(url);
                    hlsPlayer.attachMedia(audio);
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(()=>{}));
                } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                    audio.src = url;
                    audio.play().catch(()=>{});
                }
            } else {
                audio.src = url;
                audio.play().catch(()=>{});
            }
            isPlaying = true;
            updatePlayButtonsUI();
        }

        function handlePlayClick(idx, url, btn, e) {
            e.stopPropagation();
            userTouched = true;

            if(activeIdx === idx && isPlaying) {
                audio.pause();
                isPlaying = false;
                updatePlayButtonsUI();
            } else {
                runAudioStream(url);
            }
        }

        function updatePlayButtonsUI() {
            document.querySelectorAll('.play-btn').forEach((btn, idx) => {
                if(idx === activeIdx && isPlaying) {
                    btn.classList.add('playing');
                    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                } else {
                    btn.classList.remove('playing');
                    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
                }
            });
        }

        // 6. Парсинг текущего трека (Кто сейчас поет) через ваш воркер
        async function monitorTrackTitle(streamUrl, idx, stationName, logo) {
            if(trackCheckInterval) clearInterval(trackCheckInterval);
            
            const fetcher = async () => {
                try {
                    const res = await fetch(`https://radio-chat.deadked2011.workers.dev/now-playing?url=${encodeURIComponent(streamUrl)}`);
                    const data = await res.json();
                    const title = data.title && data.title.trim() ? data.title : 'Прямой эфир';
                    
                    const ticker = document.getElementById(`ticker-${idx}`);
                    if(ticker) ticker.innerText = title;

                    if(activeIdx === idx && title !== lastTrackTitle && title !== 'Прямой эфир') {
                        lastTrackTitle = title;
                        pushToHistory(stationName, logo, title);
                    }
                } catch(e) {
                    const ticker = document.getElementById(`ticker-${idx}`);
                    if(ticker) ticker.innerText = 'Музыкальный эфир';
                }
            };

            fetcher();
            trackCheckInterval = setInterval(fetcher, 25000); // Опрос раз в 25 сек
        }

        // 7. Работа с историей треков
        function pushToHistory(station, logo, track) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            historyData.unshift({ station, logo, track, time });
            if(historyData.length > 20) historyData.pop();
            localStorage.setItem('radio_history', JSON.stringify(historyData));
            renderHistory();
        }

        function renderHistory() {
            const box = document.getElementById('history-box');
            if(historyData.length === 0) {
                box.innerHTML = '<div style="color:var(--text-muted); font-size:12px; text-align:center; padding:20px;">История пуста</div>';
                return;
            }
            box.innerHTML = historyData.map(h => `
                <div class="hist-card">
                    <img class="hist-img" src="${h.logo}" onerror="imgFallback(this, '')">
                    <div class="hist-info">
                        <div class="hist-name">${h.station}</div>
                        <div class="hist-track">${h.track}</div>
                    </div>
                    <div class="hist-time">${h.time}</div>
                </div>
            `).join('');
        }

        // 8. Легкий инжект виджета комментариев
        function initTelegramComments() {
            const container = document.getElementById('tg-widget-container');
            container.innerHTML = '';
            const script = document.createElement('script');
            script.async = true;
            script.src = "https://telegram.org/js/telegram-widget.js?22";
            script.setAttribute('data-telegram-discussion', 'radiostream_chat'); // Ваш линк чата
            script.setAttribute('data-comments-limit', '5');
            script.setAttribute('data-color', 'fc3c44');
            script.setAttribute('data-dark', '1');
            container.appendChild(script);
        }

        // 9. Системные тумблеры (Интерфейс)
        function initTheme() {
            if(localStorage.getItem('dimmed') === 'true') document.body.classList.add('dimmed-theme');
        }
        function toggleDim() {
            const isDim = document.body.classList.toggle('dimmed-theme');
            localStorage.setItem('dimmed', isDim);
        }
        function toggleSidebar() {
            document.getElementById('right-sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
