<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Go</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── LIGHT THEME (default) ── */
:root {
  --bg: #f7f6f3;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #9a9a9a;
  --accent: #1a1a1a;
  --border: #e8e6e1;
  --pill: #f0ede8;
  --pill-text: #7a7a7a;
  --shadow: 0 2px 20px rgba(0,0,0,0.07);
  --shadow-deep: 0 6px 30px rgba(0,0,0,0.13);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  /* car mode overrides */
  --row-h: 40px;
  --row-font: 13px;
  --row-sub: 11px;
  --row-pad: 11px 14px;
  --row-radius: 15px;
  --pill-pad: 6px 13px;
  --pill-font: 11px;
  --play-size: 58px;
  --play-icon: 20px;
  --ctrl-icon: 20px;
  --now-logo: 50px;
  --now-name: 16px;
  --tab-font: 12px;
  --tab-pad: 7px 14px;
}

/* ── DARK THEME ── */
:root.dark {
  --bg: #141416;
  --card: #1e1e22;
  --text: #f0f0f0;
  --muted: #6e6e78;
  --accent: #e8e8e8;
  --border: #2a2a30;
  --pill: #26262c;
  --pill-text: #8e8e98;
  --shadow: 0 2px 20px rgba(0,0,0,0.3);
  --shadow-deep: 0 6px 30px rgba(0,0,0,0.45);
}

/* ── CAR MODE ── */
:root.car {
  --row-h: 70px;
  --row-font: 17px;
  --row-sub: 13px;
  --row-pad: 16px 18px;
  --row-radius: 18px;
  --pill-pad: 10px 20px;
  --pill-font: 13px;
  --play-size: 80px;
  --play-icon: 28px;
  --ctrl-icon: 26px;
  --now-logo: 70px;
  --now-name: 20px;
  --tab-font: 14px;
  --tab-pad: 9px 20px;
}

html, body {
  height: 100%;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: calc(var(--safe-top) + 12px) 14px calc(var(--safe-bottom) + 20px);
  transition: background .25s, color .25s;
}
.app { width: 100%; max-width: 500px; margin: 0 auto; }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; padding: 0 2px;
}
.header-title { font-family: 'DM Serif Display', serif; font-size: 21px; letter-spacing: -.2px; }
.header-right { display: flex; align-items: center; gap: 6px; }
.clock { font-size: 12px; color: var(--muted); font-weight: 300; min-width: 36px; text-align: right; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; flex-shrink: 0; }
.live-dot.on { background: #4caf7d; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Icon buttons in header */
.icon-btn {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--pill); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: all .2s;
  flex-shrink: 0;
}
.icon-btn:active, .icon-btn.on { background: var(--accent); color: var(--bg); }
.icon-btn svg { width: 15px; height: 15px; }

/* ── TABS ── */
.tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.tab-btn {
  padding: var(--tab-pad); border-radius: 100px;
  font-family: 'DM Sans', sans-serif; font-size: var(--tab-font);
  font-weight: 500; cursor: pointer; border: none;
  background: var(--pill); color: var(--pill-text);
  transition: all .2s; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.tab-btn.active { background: var(--accent); color: var(--bg); }

/* ── SEARCH ── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--card); border: none; border-radius: 13px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
  box-shadow: 0 1px 6px rgba(0,0,0,0.05); outline: none; -webkit-appearance: none;
  transition: background .25s, color .25s, box-shadow .2s;
}
.search-input:focus { box-shadow: 0 1px 6px rgba(0,0,0,0.05), 0 0 0 2px var(--accent); }
.search-input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; display: flex; }

/* ── GENRE PILLS ── */
.genres { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.genres::-webkit-scrollbar { display: none; }
.genre-pill {
  padding: var(--pill-pad); border-radius: 100px;
  background: var(--pill); color: var(--pill-text);
  font-size: var(--pill-font); font-weight: 500; cursor: pointer;
  transition: all .2s; border: none; white-space: nowrap;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.genre-pill.active { background: var(--accent); color: var(--bg); }

/* ── RESUME BADGE ── */
.resume-badge {
  display: none; align-items: center; gap: 7px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 11px; padding: 8px 12px; margin-bottom: 12px;
  font-size: 12px; color: var(--muted);
}
.resume-badge.show { display: flex; }
.resume-dot { width: 6px; height: 6px; border-radius: 50%; background: #f0a030; animation: blink 1s infinite; flex-shrink: 0; }

/* ── NOW PLAYING CARD ── */
.now-card {
  background: var(--card); border-radius: 22px;
  padding: 18px 18px 16px; box-shadow: var(--shadow); margin-bottom: 14px;
  display: none; transition: background .25s, box-shadow .25s;
}
.now-card.visible { display: block; }

.now-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.now-logo {
  width: var(--now-logo); height: var(--now-logo); border-radius: 13px;
  background: var(--pill); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 22px;
  transition: width .25s, height .25s;
}
.now-logo img { width: 100%; height: 100%; object-fit: cover; }
.now-info { flex: 1; min-width: 0; }
.now-name {
  font-family: 'DM Serif Display', serif;
  font-size: var(--now-name); margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: font-size .25s;
}
.now-genre { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.fav-btn { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--muted); flex-shrink: 0; padding: 4px; transition: transform .15s; }
.fav-btn:active { transform: scale(1.2); }
.fav-btn.on { color: #e05555; }

/* Loading bar */
.loading-bar { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; display: none; }
.loading-bar.active { display: block; }
.loading-bar-inner { height: 100%; width: 35%; background: var(--accent); border-radius: 2px; animation: loadingAnim 1.1s ease-in-out infinite; }
@keyframes loadingAnim { 0%{transform:translateX(-150%)} 100%{transform:translateX(450%)} }

/* Visualizer */
.viz { height: 32px; display: flex; align-items: center; gap: 2px; margin-bottom: 16px; }
.bar { flex: 1; background: var(--border); border-radius: 3px; height: 4px; transition: background .3s; }
.bar.on { background: var(--accent); animation: pulse var(--dur,.8s) ease-in-out infinite alternate; }
@keyframes pulse { from{height:var(--min,4px)} to{height:var(--max,24px)} }

/* Controls */
.controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.ctrl {
  background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 10px; border-radius: 50%; transition: all .15s; display: flex;
}
.ctrl:active { background: var(--pill); color: var(--text); }
.ctrl svg { width: var(--ctrl-icon); height: var(--ctrl-icon); transition: width .25s, height .25s; }

.play-btn {
  width: var(--play-size); height: var(--play-size); border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-deep); transition: transform .15s, width .25s, height .25s, background .25s;
}
.play-btn:active { transform: scale(.93); }
.play-btn svg { width: var(--play-icon); height: var(--play-icon); fill: var(--bg); margin-left: 2px; transition: width .25s, height .25s, fill .25s; }
.play-btn.playing svg { margin-left: 0; }

/* Volume */
.vol-row { display: flex; align-items: center; gap: 10px; padding-top: 13px; border-top: 1px solid var(--border); }
.vol-icon { color: var(--muted); display: flex; }
.vol-icon svg { width: 15px; height: 15px; }
input[type=range] { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 3px; background: var(--border); outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; transition: background .25s; }

/* ── STATION LIST ── */
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 500; margin-bottom: 8px; padding: 0 2px; }
.list { display: flex; flex-direction: column; gap: 6px; }

.row {
  background: var(--card); border-radius: var(--row-radius); padding: var(--row-pad);
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  box-shadow: 0 1px 5px rgba(0,0,0,0.04); transition: box-shadow .2s, background .25s, border-radius .25s, padding .25s;
  user-select: none;
}
.row:active { box-shadow: var(--shadow); }
.row.active { outline: 2px solid var(--accent); }

.row-img {
  width: var(--row-h); height: var(--row-h); border-radius: 11px;
  background: var(--pill); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: width .25s, height .25s;
}
.row-img img { width: 100%; height: 100%; object-fit: cover; }
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: var(--row-font); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: font-size .25s; }
.row-sub { font-size: var(--row-sub); color: var(--muted); margin-top: 2px; transition: font-size .25s; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.row-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .3s; }
.row.active .row-dot { background: #4caf7d; animation: blink 1.5s infinite; }
.row-cnt { font-size: 10px; color: var(--muted); }

.empty { text-align: center; color: var(--muted); font-size: 13px; padding: 36px 0; line-height: 1.6; }
.empty-icon { font-size: 32px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">Radio Go</div>
    <div class="header-right">
      <!-- Dark mode -->
      <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="Тёмная тема">

      </button>

      Избранное

  <!-- SEARCH -->

      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input class="search-input" id="searchInput" placeholder="Поиск станции..." oninput="renderList()">
  </div>

  <!-- GENRE PILLS -->
  <div class="genres" id="genrePills"></div>

  <!-- NOW PLAYING -->
  <div class="now-card" id="nowCard">
    <div class="now-top">
      <div class="now-logo" id="nowLogo">🎵</div>
      <div class="now-info">
        <div class="now-name" id="nowName">—</div>
        <div class="now-genre" id="nowGenre">—</div>
      </div>
      <button class="fav-btn" id="favBtn" onclick="toggleFav()">♡</button>
    </div>
    <div class="loading-bar" id="loadingBar"><div class="loading-bar-inner"></div></div>
    <div class="viz" id="viz"></div>
    <div class="controls">
      <button class="ctrl" onclick="prev()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl" onclick="next()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>
    <div class="vol-row">
      <span class="vol-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
      <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
    </div>
  </div>

  <div class="section-label" id="listLabel">Все станции</div>
  <div class="list" id="stationList"></div>
</div>

<audio id="audio"></audio>

// ── STATE ──────────────────────────────────────────────────────────────────

// ── VISUALIZER ─────────────────────────────────────────────────────────────
const viz = document.getElementById("viz");
const bars = [];
for (let i = 0; i < 28; i++) {
  const b = document.createElement("div");
  b.className = "bar";
  const mn = 3+Math.random()*4, mx = 10+Math.random()*20, dur = .4+Math.random()*.75;
  b.style.cssText = `height:${mn}px;--min:${mn}px;--max:${mx}px;--dur:${dur}s;animation-delay:${(Math.random()*.5).toFixed(2)}s`;
  viz.appendChild(b); bars.push(b);
}
function vizOn(on) { bars.forEach(b => on ? b.classList.add("on") : b.classList.remove("on")); }

// ── RESUME BADGE ───────────────────────────────────────────────────────────
function showBadge(txt) {
  document.getElementById("resumeText").textContent = txt;
  document.getElementById("resumeBadge").classList.add("show");
}
function hideBadge() { document.getElementById("resumeBadge").classList.remove("show"); }

// ── INTERRUPTION DETECTION ─────────────────────────────────────────────────
audio.addEventListener("pause", () => {
  if (userPaused || !playing) return;
  wasInterrupted = true;
  showBadge("Радио прервано — восстановлю…");
  clearTimeout(resumeTimer);
  resumeTimer = setTimeout(() => {
    if (wasInterrupted && !userPaused) attemptResume();
  }, RESUME_DELAY);
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden && wasInterrupted && !userPaused) {
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(attemptResume, 700);
  }
});

if (tg) {
  tg.onEvent("activated", () => {
    if (wasInterrupted && !userPaused) {
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(attemptResume, 700);
    }
  });
}

function attemptResume() {
  wasInterrupted = false;
  showBadge("Восстанавливаю радио…");
  playStream(stations[curIdx].stream);
}

// ── MEDIA SESSION API (управление с руля/экрана машины) ──────────────────
function updateMediaSession(s) {
  if (!("mediaSession" in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.name,
    artist: s.genre,
    album: "Radio Go",
  });
  navigator.mediaSession.setActionHandler("previoustrack", () => prev());
  navigator.mediaSession.setActionHandler("nexttrack",     () => next());
  navigator.mediaSession.setActionHandler("play",  () => { userPaused = false; playStream(stations[curIdx].stream); });
  navigator.mediaSession.setActionHandler("pause", () => { userPaused = true; audio.pause(); setPlaying(false); });
}

// ── PLAYBACK ───────────────────────────────────────────────────────────────
function isHLS(url) { return url && url.includes(".m3u8"); }

function playStream(url) {
  if (!url) return;
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  setLoading(true); vizOn(false);

  if (isHLS(url)) {
    // Safari: native HLS
    if (audio.canPlayType("application/vnd.apple.mpegurl")) {
      audio.src = url;
      audio.play()
        .then(() => { setLoading(false); setPlaying(true); hideBadge(); })
        .catch(e => { console.warn(e); setLoading(false); });
      return;
    }
    // Chrome/Firefox: hls.js
    if (typeof Hls !== "undefined" && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 30 });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(audio);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        audio.play()
          .then(() => { setLoading(false); setPlaying(true); hideBadge(); })
          .catch(e => { console.warn(e); setLoading(false); });
      });
      hlsInstance.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
          else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInstance.recoverMediaError();
          else { setLoading(false); setPlaying(false); }
        }
      });
      return;
    }
  }

  // Direct stream (.mp3 / .aacp) — works natively in all browsers
  audio.src = url;
  audio.play()
    .then(() => { setLoading(false); setPlaying(true); hideBadge(); })
    .catch(e => { console.warn(e); setLoading(false); });
}

function loadStation(idx, autoplay) {
  curIdx = idx;
  const s = stations[idx];
  const nl = document.getElementById("nowLogo");
  if (s.logo) {
    nl.innerHTML = `<img src="${s.logo}" onerror="this.parentElement.innerHTML='🎵'">`;
  } else {
    nl.textContent = genreEmoji(s.tag);
  }
  document.getElementById("nowName").textContent  = s.name;
  document.getElementById("nowGenre").textContent = s.genre;
  updateFavBtn();
  document.getElementById("nowCard").classList.add("visible");
  updateMediaSession(s);
  renderList();

  if (autoplay || playing) {
    userPaused = false;
    playStream(s.stream);
  } else {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    audio.pause(); audio.src = ""; setPlaying(false);
  }
}

function genreEmoji(tag) {
  const map = { deep:"🎧", pop:"🎤", edm:"🎛", rap:"🎤", dnb:"🥁", trance:"🌀", techno:"⚙️", chill:"🌊", rock:"🎸", retro:"📻", shanson:"🎶", news:"📰", jazz:"🎷", classic:"🎻", foreign:"🌍" };
  return map[tag] || "🎵";
}

function setPlaying(on) {
  playing = on;
  vizOn(on);
  document.getElementById("liveDot").classList.toggle("on", on);
  document.getElementById("playBtn").classList.toggle("playing", on);
  document.getElementById("playIcon").innerHTML = on
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
  if ("mediaSession" in navigator) {
    navigator.mediaSession.playbackState = on ? "playing" : "paused";
  }
}

function togglePlay() {
  if (tg) tg.HapticFeedback?.impactOccurred("light");
  if (!playing) {
    userPaused = false; wasInterrupted = false; hideBadge();
    playStream(stations[curIdx].stream);
  } else {
    userPaused = true; wasInterrupted = false;
    clearTimeout(resumeTimer);
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    audio.pause(); setPlaying(false); hideBadge();
  }
}

function prev() {
  if (tg) tg.HapticFeedback?.impactOccurred("light");
  loadStation((curIdx - 1 + stations.length) % stations.length, playing);
}
function next() {
  if (tg) tg.HapticFeedback?.impactOccurred("light");
  loadStation((curIdx + 1) % stations.length, playing);
}
function setVol(v) { audio.volume = v / 100; }

// ── FAVORITES ──────────────────────────────────────────────────────────────
function toggleFav() {
  if (tg) tg.HapticFeedback?.notificationOccurred("success");
  const name = stations[curIdx].name;
  const i = favs.indexOf(name);
  if (i === -1) favs.push(name); else favs.splice(i, 1);
  localStorage.setItem("rfavs", JSON.stringify(favs));
  updateFavBtn();
  if (activeTab === "fav") renderList();
}
function updateFavBtn() {
  const on = favs.includes(stations[curIdx].name);
  const b = document.getElementById("favBtn");
  b.textContent = on ? "♥" : "♡";
  b.classList.toggle("on", on);
}

// ── TABS ───────────────────────────────────────────────────────────────────
function setTab(tab) {
  activeTab = tab;
  document.getElementById("tabAll").classList.toggle("active", tab === "all");
  document.getElementById("tabFav").classList.toggle("active", tab === "fav");
  const showFilters = tab === "all";
  document.getElementById("searchWrap").style.display  = showFilters ? "" : "none";
  document.getElementById("genrePills").style.display  = showFilters ? "" : "none";
  if (showFilters) renderGenres();
  renderList();
}

// ── GENRES ─────────────────────────────────────────────────────────────────
function renderGenres() {
  const el = document.getElementById("genrePills");
  el.innerHTML = "";
  genres.forEach(g => {
    const b = document.createElement("button");
    b.className = "genre-pill" + (g.id === activeGenre ? " active" : "");
    b.textContent = g.label;
    b.onclick = () => { activeGenre = g.id; renderGenres(); renderList(); };
    el.appendChild(b);
  });
}

// ── STATION LIST ────────────────────────────────────────────────────────────
function renderList() {
  const q  = (document.getElementById("searchInput").value || "").toLowerCase();
  const el = document.getElementById("stationList");
  el.innerHTML = "";

  let filtered;
  if (activeTab === "fav") {
    filtered = stations.filter(s => favs.includes(s.name));
  } else {
    filtered = stations.filter(s =>
      (activeGenre === "all" || s.tag === activeGenre) &&
      (!q || s.name.toLowerCase().includes(q) || s.genre.toLowerCase().includes(q))
    );
  }

  const label = document.getElementById("listLabel");
  if (activeTab === "fav") {
    label.textContent = `Избранное (${filtered.length})`;
  } else if (activeGenre === "all") {
    label.textContent = `Все станции (${filtered.length})`;
  } else {
    label.textContent = `${filtered.length} станций`;
  }

  if (!filtered.length) {
    el.innerHTML = activeTab === "fav"
      ? '<div class="empty"><span class="empty-icon">♡</span>Добавьте станции в избранное<br>нажав ♡ во время воспроизведения</div>'
      : '<div class="empty"><span class="empty-icon">🔍</span>Ничего не найдено</div>';
    return;
  }

  filtered.forEach(s => {
    const idx = stations.indexOf(s);
    const isActive = idx === curIdx;
    const row = document.createElement("div");
    row.className = "row" + (isActive ? " active" : "");

    const imgHtml = s.logo
      ? `<img src="${s.logo}" onerror="this.parentElement.innerHTML='${genreEmoji(s.tag)}'">`
      : genreEmoji(s.tag);

    row.innerHTML = `
      <div class="row-img">${imgHtml}</div>
      <div class="row-info">
        <div class="row-name">${s.name}</div>
        <div class="row-sub">${s.genre}</div>
      </div>
      <div class="row-right">
        <div class="row-dot"></div>
        <div class="row-cnt">${(s.listeners||0).toLocaleString("ru")}</div>
      </div>`;
    row.onclick = () => {
      if (tg) tg.HapticFeedback?.impactOccurred("light");
      loadStation(idx, true);
    };
    el.appendChild(row);
  });
}
