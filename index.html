<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Go</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #9a9a9a;
  --accent: #1a1a1a;
  --border: #e8e6e1;
  --pill: #f0ede8;
  --pill-text: #7a7a7a;
  --shadow: 0 2px 20px rgba(0,0,0,0.07);
  --shadow-deep: 0 6px 30px rgba(0,0,0,0.13);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
:root.dark {
  --bg: #141416;
  --card: #1e1e22;
  --text: #f0f0f0;
  --muted: #6e6e78;
  --accent: #e8e8e8;
  --border: #2a2a30;
  --pill: #26262c;
  --pill-text: #8e8e98;
  --shadow: 0 2px 20px rgba(0,0,0,0.3);
  --shadow-deep: 0 6px 30px rgba(0,0,0,0.45);
}

html, body {
  height: 100%;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .25s, color .25s;
}

/* ════════════════════════════════
   NORMAL MODE
════════════════════════════════ */
.normal-ui {
  display: block;
  padding: calc(var(--safe-top) + 12px) 14px calc(var(--safe-bottom) + 20px);
}
.app { width: 100%; max-width: 500px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 0 2px; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 21px; letter-spacing: -.2px; }
.header-right { display: flex; align-items: center; gap: 6px; }
.clock { font-size: 12px; color: var(--muted); font-weight: 300; min-width: 36px; text-align: right; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; flex-shrink: 0; }
.live-dot.on { background: #4caf7d; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.icon-btn {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--pill); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: all .2s; flex-shrink: 0;
}
.icon-btn:active, .icon-btn.on { background: var(--accent); color: var(--bg); }
.icon-btn svg { width: 15px; height: 15px; }

/* Tabs */
.tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.tab-btn {
  padding: 7px 14px; border-radius: 100px; font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer; border: none;
  background: var(--pill); color: var(--pill-text); transition: all .2s;
  display: flex; align-items: center; gap: 5px;
}
.tab-btn.active { background: var(--accent); color: var(--bg); }

/* Search */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--card); border: none; border-radius: 13px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
  box-shadow: 0 1px 6px rgba(0,0,0,0.05); outline: none; -webkit-appearance: none;
  transition: background .25s, color .25s;
}
.search-input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; display: flex; }

/* Genres */
.genres { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 4px; scrollbar-width: none; }
.genres::-webkit-scrollbar { display: none; }
.genre-pill {
  padding: 6px 13px; border-radius: 100px; background: var(--pill); color: var(--pill-text);
  font-size: 11px; font-weight: 500; cursor: pointer; transition: all .2s; border: none;
  white-space: nowrap; text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.genre-pill.active { background: var(--accent); color: var(--bg); }

/* Resume badge */
.resume-badge {
  display: none; align-items: center; gap: 7px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 11px; padding: 8px 12px; margin-bottom: 12px;
  font-size: 12px; color: var(--muted);
}
.resume-badge.show { display: flex; }
.resume-dot { width: 6px; height: 6px; border-radius: 50%; background: #f0a030; animation: blink 1s infinite; flex-shrink: 0; }

/* Now card */
.now-card {
  background: var(--card); border-radius: 22px; padding: 18px 18px 16px;
  box-shadow: var(--shadow); margin-bottom: 14px; display: none;
  transition: background .25s;
}
.now-card.visible { display: block; }
.now-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.now-logo {
  width: 50px; height: 50px; border-radius: 13px; background: var(--pill);
  overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.now-logo img { width: 100%; height: 100%; object-fit: cover; }
.now-info { flex: 1; min-width: 0; }
.now-name { font-family: 'DM Serif Display', serif; font-size: 16px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.now-genre { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.fav-btn { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--muted); flex-shrink: 0; padding: 4px; transition: transform .15s; }
.fav-btn:active { transform: scale(1.2); }
.fav-btn.on { color: #e05555; }

.loading-bar { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; display: none; }
.loading-bar.active { display: block; }
.loading-bar-inner { height: 100%; width: 35%; background: var(--accent); border-radius: 2px; animation: loadAnim 1.1s ease-in-out infinite; }
@keyframes loadAnim { 0%{transform:translateX(-150%)} 100%{transform:translateX(450%)} }

.viz { height: 32px; display: flex; align-items: center; gap: 2px; margin-bottom: 16px; }
.bar { flex: 1; background: var(--border); border-radius: 3px; height: 4px; }
.bar.on { background: var(--accent); animation: pulse var(--dur,.8s) ease-in-out infinite alternate; }
@keyframes pulse { from{height:var(--min,4px)} to{height:var(--max,24px)} }

.controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.ctrl {
  background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 10px; border-radius: 50%; transition: all .15s; display: flex;
}
.ctrl:active { background: var(--pill); color: var(--text); }
.ctrl svg { width: 20px; height: 20px; }
.play-btn {
  width: 58px; height: 58px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-deep); transition: transform .15s, background .25s;
}
.play-btn:active { transform: scale(.93); }
.play-btn svg { width: 20px; height: 20px; fill: var(--bg); margin-left: 2px; transition: fill .25s; }
.play-btn.playing svg { margin-left: 0; }

.vol-row { display: flex; align-items: center; gap: 10px; padding-top: 13px; border-top: 1px solid var(--border); }
.vol-icon { color: var(--muted); display: flex; }
.vol-icon svg { width: 15px; height: 15px; }
input[type=range] { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 3px; background: var(--border); outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; }

.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 500; margin-bottom: 8px; padding: 0 2px; }
.list { display: flex; flex-direction: column; gap: 6px; }
.row {
  background: var(--card); border-radius: 15px; padding: 11px 14px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  box-shadow: 0 1px 5px rgba(0,0,0,0.04); transition: box-shadow .2s, background .25s;
  user-select: none;
}
.row:active { box-shadow: var(--shadow); }
.row.active { outline: 2px solid var(--accent); }
.row-img {
  width: 40px; height: 40px; border-radius: 11px; background: var(--pill);
  overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.row-img img { width: 100%; height: 100%; object-fit: cover; }
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.row-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.row.active .row-dot { background: #4caf7d; animation: blink 1.5s infinite; }
.row-cnt { font-size: 10px; color: var(--muted); }
.empty { text-align: center; color: var(--muted); font-size: 13px; padding: 36px 0; line-height: 1.6; }
.empty-icon { font-size: 32px; display: block; margin-bottom: 8px; }

/* ════════════════════════════════
   CAR MODE — полноэкранный
════════════════════════════════ */
.car-ui {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  flex-direction: column;
  z-index: 100;
  padding: calc(var(--safe-top) + 10px) 16px calc(var(--safe-bottom) + 12px);
  transition: background .25s;
}
body.car .normal-ui { display: none; }
body.car .car-ui    { display: flex; }

/* Car: top bar */
.car-topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.car-clock {
  font-size: 32px; font-weight: 300; letter-spacing: -1px; color: var(--text);
  font-family: 'DM Serif Display', serif;
}
.car-topright { display: flex; gap: 8px; align-items: center; }
.car-live-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
.car-live-dot.on { background: #4caf7d; animation: blink 1.5s infinite; }

/* Car icon btn (larger) */
.car-icon-btn {
  width: 44px; height: 44px; border-radius: 14px;
  background: var(--pill); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: all .2s;
}
.car-icon-btn:active, .car-icon-btn.on { background: var(--accent); color: var(--bg); }
.car-icon-btn svg { width: 20px; height: 20px; }

/* Car: station display */
.car-station {
  background: var(--card); border-radius: 24px;
  padding: 20px 22px; box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 14px; flex-shrink: 0;
}
.car-logo {
  width: 90px; height: 90px; border-radius: 18px;
  background: var(--pill); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 38px;
}
.car-logo img { width: 100%; height: 100%; object-fit: cover; }
.car-station-info { flex: 1; min-width: 0; }
.car-name {
  font-family: 'DM Serif Display', serif; font-size: 28px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 6px; line-height: 1.1;
}
.car-genre { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.car-fav {
  background: none; border: none; cursor: pointer;
  font-size: 32px; color: var(--muted); flex-shrink: 0; padding: 6px;
  transition: transform .15s;
}
.car-fav:active { transform: scale(1.2); }
.car-fav.on { color: #e05555; }

/* Car: visualizer */
.car-viz {
  height: 50px; display: flex; align-items: center; gap: 3px;
  margin-bottom: 14px; flex-shrink: 0;
}
.car-viz .bar { border-radius: 4px; }

/* Car: controls */
.car-controls {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-shrink: 0; gap: 12px;
}
.car-ctrl {
  background: var(--card); border: none; cursor: pointer; color: var(--muted);
  border-radius: 22px; display: flex; align-items: center; justify-content: center;
  transition: all .15s; box-shadow: var(--shadow); flex: 1; height: 80px;
}
.car-ctrl:active { background: var(--pill); transform: scale(.96); }
.car-ctrl svg { width: 36px; height: 36px; }

.car-play-btn {
  flex: 1.6; height: 80px; border-radius: 22px;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22); transition: transform .15s, background .25s;
}
.car-play-btn:active { transform: scale(.96); }
.car-play-btn svg { width: 36px; height: 36px; fill: var(--bg); margin-left: 3px; transition: fill .25s; }
.car-play-btn.playing svg { margin-left: 0; }

/* Car: volume row */
.car-vol-row {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 16px; flex-shrink: 0;
}
.car-vol-icon { color: var(--muted); display: flex; }
.car-vol-icon svg { width: 22px; height: 22px; }
.car-vol-row input[type=range] { flex: 1; -webkit-appearance: none; height: 6px; border-radius: 6px; background: var(--border); outline: none; cursor: pointer; }
.car-vol-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

/* Car: genre pills */
.car-genres {
  display: flex; gap: 8px; overflow-x: auto;
  margin-bottom: 12px; padding-bottom: 4px; scrollbar-width: none; flex-shrink: 0;
}
.car-genres::-webkit-scrollbar { display: none; }
.car-genre-pill {
  padding: 10px 20px; border-radius: 100px; background: var(--pill); color: var(--pill-text);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; border: none;
  white-space: nowrap; text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.car-genre-pill.active { background: var(--accent); color: var(--bg); }

/* Car: station list */
.car-list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.car-list { display: flex; flex-direction: column; gap: 8px; }
.car-row {
  background: var(--card); border-radius: 18px; padding: 16px 18px;
  display: flex; align-items: center; gap: 16px; cursor: pointer;
  box-shadow: 0 1px 5px rgba(0,0,0,0.04); transition: box-shadow .2s;
  user-select: none; min-height: 74px;
}
.car-row:active { box-shadow: var(--shadow); }
.car-row.active { outline: 2.5px solid var(--accent); }
.car-row-img {
  width: 56px; height: 56px; border-radius: 14px; background: var(--pill);
  overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.car-row-img img { width: 100%; height: 100%; object-fit: cover; }
.car-row-info { flex: 1; min-width: 0; }
.car-row-name { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.car-row-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
.car-row-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
.car-row.active .car-row-dot { background: #4caf7d; animation: blink 1.5s infinite; }

/* Car loading */
.car-loading { height: 3px; background: var(--border); border-radius: 3px; margin-bottom: 10px; overflow: hidden; display: none; flex-shrink: 0; }
.car-loading.active { display: block; }
.car-loading-inner { height: 100%; width: 35%; background: var(--accent); border-radius: 3px; animation: loadAnim 1.1s ease-in-out infinite; }
</style>
</head>
<body>

<!-- ══════════════════════════════════
     NORMAL MODE UI
══════════════════════════════════ -->
<div class="normal-ui">
<div class="app">

  <div class="header">
    <div class="header-title">Radio Go</div>
    <div class="header-right">
      <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="Тёмная тема">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" id="carBtn" onclick="toggleCar()" title="Авторежим">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="10" width="22" height="9" rx="2"/><path d="m6.5 10 2-6h7l2 6"/><circle cx="7.5" cy="19" r="1.5"/><circle cx="16.5" cy="19" r="1.5"/></svg>
      </button>
      <span class="live-dot" id="liveDot"></span>
      <span class="clock" id="clock"></span>
    </div>
  </div>

  <div class="resume-badge" id="resumeBadge">
    <span class="resume-dot"></span>
    <span id="resumeText">Восстанавливаю радио…</span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabAll" onclick="setTab('all')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
      Все станции
    </button>
    <button class="tab-btn" id="tabFav" onclick="setTab('fav')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      Избранное
    </button>
  </div>

  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input class="search-input" id="searchInput" placeholder="Поиск станции..." oninput="renderList()">
  </div>

  <div class="genres" id="genrePills"></div>

  <div class="now-card" id="nowCard">
    <div class="now-top">
      <div class="now-logo" id="nowLogo">🎵</div>
      <div class="now-info">
        <div class="now-name" id="nowName">—</div>
        <div class="now-genre" id="nowGenre">—</div>
      </div>
      <button class="fav-btn" id="favBtn" onclick="toggleFav()">♡</button>
    </div>
    <div class="loading-bar" id="loadingBar"><div class="loading-bar-inner"></div></div>
    <div class="viz" id="viz"></div>
    <div class="controls">
      <button class="ctrl" onclick="prev()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl" onclick="next()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>
    <div class="vol-row">
      <span class="vol-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
      <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
    </div>
  </div>

  <div class="section-label" id="listLabel">Все станции</div>
  <div class="list" id="stationList"></div>
</div>
</div>

<!-- ══════════════════════════════════
     CAR MODE UI — полноэкранный
══════════════════════════════════ -->
<div class="car-ui" id="carUi">

  <!-- Topbar -->
  <div class="car-topbar">
    <div class="car-clock" id="carClock">00:00</div>
    <div class="car-topright">
      <span class="car-live-dot" id="carLiveDot"></span>
      <button class="car-icon-btn" id="carDarkBtn" onclick="toggleDark()" title="Тёмная тема">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="car-icon-btn on" onclick="toggleCar()" title="Выйти из авторежима">

function makeViz(container, count) {

  }

}

  if (!document.hidden && wasInterrupted && !userPaused) { clearTimeout(resumeTimer); resumeTimer = setTimeout(attemptResume, 700); }

// ── MEDIA SESSION ──────────────────────────────────────────────────────────
function updateMediaSession(s) {
  if (!("mediaSession" in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({ title: s.name, artist: s.genre, album: "Radio Go" });
  navigator.mediaSession.setActionHandler("previoustrack", prev);
  navigator.mediaSession.setActionHandler("nexttrack",     next);
  navigator.mediaSession.setActionHandler("play",  () => { userPaused = false; playStream(stations[curIdx].stream); });
  navigator.mediaSession.setActionHandler("pause", () => { userPaused = true; audio.pause(); setPlaying(false); });
}

// ── PLAYBACK ───────────────────────────────────────────────────────────────
function playStream(url) {
  if (!url) return;
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  setLoading(true); vizOn(false);

  if (url.includes(".m3u8")) {
    if (audio.canPlayType("application/vnd.apple.mpegurl")) {
      audio.src = url;
      audio.play().then(() => { setLoading(false); setPlaying(true); hideBadge(); }).catch(() => setLoading(false));
      return;
    }
    if (typeof Hls !== "undefined" && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 30 });
      hlsInstance.loadSource(url); hlsInstance.attachMedia(audio);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        audio.play().then(() => { setLoading(false); setPlaying(true); hideBadge(); }).catch(() => setLoading(false));
      });
      hlsInstance.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) {
          if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
          else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInstance.recoverMediaError();
          else { setLoading(false); setPlaying(false); }
        }
      });
      return;
    }
  }
  audio.src = url;
  audio.play().then(() => { setLoading(false); setPlaying(true); hideBadge(); }).catch(() => setLoading(false));
}

  const show = tab === "all";
  document.getElementById("searchWrap").style.display  = show ? "" : "none";
  document.getElementById("genrePills").style.display  = show ? "" : "none";
  if (show) renderGenres();
  renderList();
}

// ── NORMAL GENRES ──────────────────────────────────────────────────────────
function renderGenres() {
  const el = document.getElementById("genrePills"); el.innerHTML = "";
  genres.forEach(g => {
    const b = document.createElement("button");
    b.className = "genre-pill" + (g.id === activeGenre ? " active" : "");
    b.textContent = g.label;
    b.onclick = () => { activeGenre = g.id; renderGenres(); renderList(); renderCarList(); };
    el.appendChild(b);
  });
}

// ── CAR GENRES ─────────────────────────────────────────────────────────────
function renderCarGenres() {
  const el = document.getElementById("carGenrePills"); el.innerHTML = "";
  genres.forEach(g => {
    const b = document.createElement("button");
    b.className = "car-genre-pill" + (g.id === activeGenre ? " active" : "");
    b.textContent = g.label;
    b.onclick = () => { activeGenre = g.id; renderGenres(); renderCarGenres(); renderList(); renderCarList(); };
    el.appendChild(b);
  });
}

// ── NORMAL LIST ────────────────────────────────────────────────────────────
function renderList() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  const el = document.getElementById("stationList"); el.innerHTML = "";
  const filtered = activeTab === "fav"
    ? stations.filter(s => favs.includes(s.name))
    : stations.filter(s => (activeGenre === "all" || s.tag === activeGenre) && (!q || s.name.toLowerCase().includes(q) || s.genre.toLowerCase().includes(q)));
  document.getElementById("listLabel").textContent = activeTab === "fav" ? `Избранное (${filtered.length})` : activeGenre === "all" ? `Все станции (${filtered.length})` : `${filtered.length} станций`;
  if (!filtered.length) { el.innerHTML = activeTab === "fav" ? '<div class="empty"><span class="empty-icon">♡</span>Нажмите ♡ на любой станции</div>' : '<div class="empty"><span class="empty-icon">🔍</span>Ничего не найдено</div>'; return; }
  filtered.forEach(s => {
    const idx = stations.indexOf(s);
    const row = document.createElement("div");
    row.className = "row" + (idx === curIdx ? " active" : "");
    row.innerHTML = `<div class="row-img">${s.logo ? `<img src="${s.logo}" onerror="this.parentElement.innerHTML='${genreEmoji(s.tag)}'">` : genreEmoji(s.tag)}</div><div class="row-info"><div class="row-name">${s.name}</div><div class="row-sub">${s.genre}</div></div><div class="row-right"><div class="row-dot"></div><div class="row-cnt">${(s.listeners||0).toLocaleString("ru")}</div></div>`;
    row.onclick = () => { if (tg) tg.HapticFeedback?.impactOccurred("light"); loadStation(idx, true); };
    el.appendChild(row);
  });
}

// ── CAR LIST ───────────────────────────────────────────────────────────────
function renderCarList() {
  const el = document.getElementById("carList"); el.innerHTML = "";
  const filtered = stations.filter(s => activeGenre === "all" || s.tag === activeGenre);
  filtered.forEach(s => {
    const idx = stations.indexOf(s);
    const row = document.createElement("div");
    row.className = "car-row" + (idx === curIdx ? " active" : "");
    row.innerHTML = `<div class="car-row-img">${s.logo ? `<img src="${s.logo}" onerror="this.parentElement.innerHTML='${genreEmoji(s.tag)}'">` : genreEmoji(s.tag)}</div><div class="car-row-info"><div class="car-row-name">${s.name}</div><div class="car-row-sub">${s.genre}</div></div><div class="car-row-dot"></div>`;
    row.onclick = () => { if (tg) tg.HapticFeedback?.impactOccurred("light"); loadStation(idx, true); };
    el.appendChild(row);
  });
}

// ── BOOT ──────────────────────────────────────────────────────────────────
renderGenres();
renderCarGenres();
renderList();
renderCarList();
loadStation(0, false);
</script>
</body>
</html>
