<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Radio</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icon-192.png"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="stylesheet" href="player-fixes.css"/>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
  <style>
    :root {
      --bg:#1a1a1a; --surface:#242424; --surface2:#2e2e2e;
      --accent:#7c5cfc; --text:#f0f0f0; --text2:#aaa;
      --border:#333; --mini-h:64px; --player-bg:#1a1a1a;
    }
    body.light {
      --bg:#f5f5f5; --surface:#ffffff; --surface2:#e8e8e8;
      --text:#1a1a1a; --text2:#666; --border:#ddd; --player-bg:#f5f5f5;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:var(--mini-h);transition:background .3s,color .3s}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:#555;border-radius:3px}

    /* Header */
    .header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border)}
    .genre-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
    .genre-bar::-webkit-scrollbar{display:none}
    .genre-btn{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;white-space:nowrap;transition:all .2s}
    .genre-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .genre-btn:hover:not(.active){background:rgba(128,128,128,.12)}
    .tabs-row{display:flex;align-items:center;padding:0 16px 8px;gap:4px}
    .tab-btn{padding:5px 12px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;transition:all .2s}
    .tab-btn.active{background:var(--accent);color:#fff;font-weight:600}
    .tab-btn:hover:not(.active){opacity:.8}
    .auto-btn{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
    .auto-btn.on{background:rgba(124,92,252,.15);border:1px solid var(--accent);color:var(--accent)}
    .auto-btn.off{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

    /* Content */
    .content{max-width:700px;margin:0 auto;padding:12px 16px}

    /* Station cards */
    .station-list{display:flex;flex-direction:column;gap:8px}
    .station-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:12px;cursor:pointer;transition:background .15s;border:2px solid transparent}
    .station-card:hover{background:var(--surface2)}
    .station-card.active{border-color:var(--accent)}
    .station-logo{width:48px;height:48px;border-radius:10px;object-fit:contain;background:var(--surface2);flex-shrink:0}
    .station-info{flex:1;min-width:0}
    .station-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .station-genre{font-size:12px;color:var(--text2);margin-top:2px}
    .station-listeners{font-size:12px;color:var(--text2);flex-shrink:0;display:flex;align-items:center;gap:4px}

    /* History */
    .history-list,.comment-list{display:flex;flex-direction:column;gap:8px}
    .history-item,.comment-item{background:var(--surface);border-radius:10px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start}
    .history-time,.comment-time{font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0;margin-top:2px}
    .history-track{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .history-station{font-size:12px;color:var(--text2)}

    /* Comments */
    .comment-input-area{background:var(--surface);border-radius:10px;padding:12px;margin-bottom:10px}
    .comment-input-label{font-size:13px;color:var(--text2);margin-bottom:8px}
    .comment-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;resize:none;font-family:inherit}
    .comment-textarea:focus{outline:none}
    .comment-send{margin-top:6px;padding:6px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600}
    .comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
    .comment-body{flex:1;min-width:0}
    .comment-meta{display:flex;gap:8px;align-items:center;margin-bottom:4px}
    .comment-text{font-size:13px;line-height:1.5}
    .empty-msg{text-align:center;color:var(--text2);padding:40px 0;font-size:14px}

    /* Mini player */
    .mini-player{position:fixed;bottom:0;left:0;right:0;height:var(--mini-h);background:var(--surface);border-top:1px solid var(--border);display:none;align-items:center;padding:0 16px;gap:12px;z-index:100;cursor:pointer}
    .mini-player.visible{display:flex}
    .mini-logo{width:40px;height:40px;border-radius:50%;object-fit:contain;background:var(--surface2);flex-shrink:0;transition:transform .1s}
    .mini-logo.spinning{animation:spin-logo 8s linear infinite}
    .mini-info{flex:1;min-width:0}
    .mini-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mini-track{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mini-ctrl-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
    .mini-ctrl-btn:disabled{color:transparent;cursor:default}
    .mini-ctrl-btn:not(:disabled):hover{background:var(--surface2)}
    .mini-play-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:10px}
    .mini-play-btn:hover{opacity:.85}

    /* Full player */
    .full-player{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:var(--player-bg);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden;overflow-y:auto}
    .full-player.open{transform:translateY(0)}
    .fp-bg{position:fixed;inset:0;background-size:cover;background-position:center;filter:blur(60px) brightness(.35);transform:scale(1.15);z-index:0;pointer-events:none;transition:background-image .5s}
    .fp-close{position:absolute;top:20px;right:20px;z-index:10;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .fp-close:hover{background:rgba(255,255,255,.25)}
    .fp-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:18px;padding:60px 24px 30px;width:100%;max-width:440px}
    .fp-logo-wrap{position:relative}
    .fp-logo{border-radius:50%;object-fit:contain;background:rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.6);width:clamp(150px,40vw,220px);height:clamp(150px,40vw,220px)}
    .fp-logo.spinning{animation:spin-logo 8s linear infinite}
    .fp-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(124,92,252,.5);animation:spin 4s linear infinite;display:none}
    .fp-ring.visible{display:block}
    .fp-station-name{font-size:clamp(18px,5vw,24px);font-weight:700;color:#fff;text-align:center}
    .fp-genre{font-size:14px;color:rgba(255,255,255,.6)}
    #fTrack{font-size:13px;color:rgba(255,255,255,.65);text-align:center;padding:0 16px;min-height:18px;transition:color .25s}
    .fp-controls{display:flex;align-items:center;gap:20px}
    .fp-ctrl-btn{width:48px;height:48px;border-radius:50%;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:12px;transition:background .2s}
    .fp-ctrl-btn.enabled{background:rgba(255,255,255,.15)}
    .fp-ctrl-btn.disabled{background:rgba(255,255,255,.05);color:rgba(255,255,255,.2);cursor:default}
    .fp-ctrl-btn.enabled:hover{background:rgba(255,255,255,.25)}
    .fp-main-btn{width:68px;height:68px;border-radius:50%;border:none;background:rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:18px;transition:background .2s}
    .fp-main-btn:hover{background:rgba(255,255,255,.3)}
    .fp-main-btn.playing{background:var(--accent)}
    .fp-volume{display:flex;align-items:center;gap:10px;width:100%}
    .fp-volume svg{width:20px;height:20px;fill:rgba(255,255,255,.6);flex-shrink:0}
    .fp-volume input{flex:1;height:4px;accent-color:var(--accent);cursor:pointer}
    .auto-badge{font-size:12px;color:rgba(124,92,252,.9);background:rgba(124,92,252,.15);padding:4px 12px;border-radius:20px}
    .fp-history{width:100%;margin-top:8px}
    .fp-history-title{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
    .fp-history-item{display:flex;gap:10px;align-items:center;margin-bottom:6px}
    .fp-history-time{font-size:11px;color:rgba(124,92,252,.8);flex-shrink:0}
    .fp-history-track{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Utils */
    audio{display:none}
    input[type=range]{accent-color:var(--accent)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes spin-logo{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .spinner{width:100%;height:100%;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    .spinner-sm{width:22px;height:22px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  </style>
</head>
<body>
<audio id="audio" preload="none"></audio>

<div class="header">
  <div class="genre-bar" id="genreBar"></div>
  <div class="tabs-row">
    <button class="tab-btn active" data-tab="stations" onclick="switchTab('stations')">Станции</button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">История</button>
    <button class="tab-btn" data-tab="comments" onclick="switchTab('comments')">Комменты</button>
    <div style="flex:1"></div>
    <button class="auto-btn off" id="autoBtn" onclick="toggleAuto()">AUTO</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" style="margin-left:6px">☀️</button>
  </div>
</div>

<div class="content" id="mainContent"></div>

<!-- Mini player -->
<div class="mini-player" id="miniPlayer" onclick="openFullPlayer()">
  <img class="mini-logo" id="mLogo" src="" alt=""/>
  <div class="mini-info">
    <div class="mini-name" id="mName">—</div>
    <div class="mini-track" id="mTrack">В эфире</div>
  </div>
  <button class="mini-ctrl-btn" id="miniPrev" onclick="event.stopPropagation();goPrev()" disabled title="Предыдущая">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
  </button>
  <button class="mini-play-btn" onclick="event.stopPropagation();togglePlay()" id="miniPlayBtn">
    <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path id="mPlayIcon" d="M8 5v14l11-7z"/></svg>
  </button>
  <button class="mini-ctrl-btn" id="miniNext" onclick="event.stopPropagation();goNext()" disabled title="Следующая">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
  </button>
</div>

<!-- Full player -->
<div class="full-player" id="fullPlayer">
  <div class="fp-bg" id="fpBg"></div>
  <button class="fp-close" onclick="closeFullPlayer()">✕</button>
  <div class="fp-content">
    <div class="fp-logo-wrap">
      <img class="fp-logo" id="fLogo" src="" alt=""/>
      <div class="fp-ring" id="fpRing"></div>
    </div>
    <div class="fp-station-name" id="fName">—</div>
    <div class="fp-genre" id="fGenreLabel"></div>
    <div id="fTrack">В эфире</div>
    <div class="fp-controls">
      <button class="fp-ctrl-btn disabled" id="fpPrev" onclick="goPrev()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="fp-main-btn" id="fpMainBtn" onclick="togglePlay()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path id="fPlayIcon" d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="fp-ctrl-btn disabled" id="fpNext" onclick="goNext()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="fp-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.8" oninput="setVolume(this.value)"/>
    </div>
    <div class="auto-badge" id="autoBadge" style="display:none">⚡ Авторежим включён</div>
    <div class="fp-history" id="fpHistory" style="display:none">
      <div class="fp-history-title">Недавние треки</div>
      <div id="fpHistoryList"></div>
    </div>
  </div>
</div>

<script src="stations.js"></script>
<script>
// ── Storage helpers ─────────────────────────────────────────────
function lsGet(k,def){try{var v=localStorage.getItem(k);return v?JSON.parse(v):def}catch(e){return def}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

// ── State ───────────────────────────────────────────────────────
var audio = document.getElementById('audio');
window.audio = audio;
var curIdx = -1; window.curIdx = -1;
var isPlaying = false; window.isPlaying = false;
var hls = null; window.hls = null;
var curGenre = 'all';
var autoMode = false;
var currentTrack = 'В эфире';
var history = lsGet('radio_history', []);
var comments = lsGet('radio_comments', []);
var activeTab = 'stations';
var reconnectAttempted = false;
var reconnectTimer = null;
var waitingTimer = null;
var metaTimer = null;
var autoTimer = null;
var lastTrack = '';

// ── Theme ───────────────────────────────────────────────────────
var theme = lsGet('radio_theme', 'dark');
applyTheme(theme);

function applyTheme(t) {
  theme = t;
  document.body.classList.toggle('light', t === 'light');
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  lsSet('radio_theme', t);
}
function toggleTheme() { applyTheme(theme === 'dark' ? 'light' : 'dark'); }

// ── Auto mode ───────────────────────────────────────────────────
function toggleAuto() {
  autoMode = !autoMode;
  var btn = document.getElementById('autoBtn');
  btn.className = 'auto-btn ' + (autoMode ? 'on' : 'off');
  document.getElementById('autoBadge').style.display = autoMode ? 'block' : 'none';
}

// ── Time helper ─────────────────────────────────────────────────
function nowStr() {
  var d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// ── Genre bar ───────────────────────────────────────────────────
(function(){
  var bar = document.getElementById('genreBar');
  genres.forEach(function(g){
    var btn = document.createElement('button');
    btn.className = 'genre-btn' + (g.id==='all'?' active':'');
    btn.textContent = g.label;
    btn.dataset.genre = g.id;
    btn.onclick = function(){ filterGenre(g.id); };
    bar.appendChild(btn);
  });
})();

function filterGenre(id) {
  curGenre = id;
  document.querySelectorAll('.genre-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.genre===id); });
  updateNavBtns();
  if (activeTab === 'stations') renderContent();
}

// ── Navigation ──────────────────────────────────────────────────
function getFiltered() {
  return curGenre === 'all' ? stations : stations.filter(function(s){ return s.tag === curGenre; });
}
function getFilteredIdx() {
  if (curIdx < 0) return -1;
  var f = getFiltered();
  return f.indexOf(stations[curIdx]);
}
function updateNavBtns() {
  var fi = getFilteredIdx();
  var f = getFiltered();
  var hasPrev = fi > 0;
  var hasNext = fi >= 0 && fi < f.length - 1;

  var fpPrev = document.getElementById('fpPrev');
  var fpNext = document.getElementById('fpNext');
  var mPrev = document.getElementById('miniPrev');
  var mNext = document.getElementById('miniNext');

  fpPrev.className = 'fp-ctrl-btn ' + (hasPrev ? 'enabled' : 'disabled');
  fpNext.className = 'fp-ctrl-btn ' + (hasNext ? 'enabled' : 'disabled');
  mPrev.disabled = !hasPrev;
  mNext.disabled = !hasNext;
}
function goPrev() {
  var fi = getFilteredIdx(); var f = getFiltered();
  if (fi > 0) playStation(stations.indexOf(f[fi-1]));
}
function goNext() {
  var fi = getFilteredIdx(); var f = getFiltered();
  if (fi >= 0 && fi < f.length-1) playStation(stations.indexOf(f[fi+1]));
}
window.goPrev = goPrev; window.goNext = goNext;

// ── Icons / loading ─────────────────────────────────────────────
var PLAY_D  = 'M8 5v14l11-7z';
var PAUSE_D = 'M6 19h4V5H6v14zM14 5v14h4V5h-4z';

function setPlayIcons(playing) {
  var d = playing ? PAUSE_D : PLAY_D;
  var fi = document.getElementById('fPlayIcon');
  var mi = document.getElementById('mPlayIcon');
  if (fi) fi.setAttribute('d', d);
  if (mi) mi.setAttribute('d', d);

  var fpBtn = document.getElementById('fpMainBtn');
  if (fpBtn) fpBtn.classList.toggle('playing', !!playing);

  var logoFp = document.getElementById('fLogo');
  var logoMi = document.getElementById('mLogo');
  var ring = document.getElementById('fpRing');
  if (logoFp) logoFp.classList.toggle('spinning', !!playing);
  if (logoMi) logoMi.classList.toggle('spinning', !!playing);
  if (ring) ring.classList.toggle('visible', !!playing);
}

function setLoading(on) {
  var fpBtn = document.getElementById('fpMainBtn');
  var mBtn = document.getElementById('miniPlayBtn');
  if (!fpBtn) return;
  if (on) {
    fpBtn.innerHTML = '<div class="spinner"></div>';
    mBtn.innerHTML = '<div class="spinner-sm"></div>';
  } else {
    var d = isPlaying ? PAUSE_D : PLAY_D;
    fpBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path id="fPlayIcon" d="'+d+'"/></svg>';
    mBtn.innerHTML  = '<svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path id="mPlayIcon" d="'+d+'"/></svg>';
  }
}

function setTrack(t) {
  currentTrack = t;
  var ft = document.getElementById('fTrack');
  var mt = document.getElementById('mTrack');
  if (ft) ft.textContent = '🎵 ' + t;
  if (mt) mt.textContent = t;
}

// ── Track metadata ──────────────────────────────────────────────
function fetchMeta(idx) {
  if (metaTimer) { clearTimeout(metaTimer); metaTimer = null; }
  var s = stations[idx];
  if (!s) return;
  var rpId = (s.logo.match(/\/(\d+)\.png$/) || [])[1];
  if (!rpId) return;
  fetch('https://radiopotok.ru/ajax/track?id=' + rpId)
    .then(function(r){ return r.json(); })
    .then(function(d){
      var track = (d && (d.track || d.title)) || '';
      if (track && track !== lastTrack) {
        lastTrack = track;
        setTrack(track);
        history.unshift({ stationName: s.name, track: track, time: nowStr() });
        if (history.length > 50) history = history.slice(0, 50);
        lsSet('radio_history', history);
        renderFpHistory();
        if (activeTab === 'history') renderContent();
      }
    })
    .catch(function(){});
  metaTimer = setTimeout(function(){ fetchMeta(idx); }, 15000);
}

// ── Fatal / recover ─────────────────────────────────────────────
window.fatalError = function() {
  reconnectAttempted = false;
  if (reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer=null; }
  if (waitingTimer)  { clearTimeout(waitingTimer);   waitingTimer=null; }
  if (autoTimer)     { clearTimeout(autoTimer);      autoTimer=null; }
  if (metaTimer)     { clearTimeout(metaTimer);      metaTimer=null; }
  setTrack('Недоступно');
  setLoading(false);
  try { audio.pause(); } catch(e){}
  isPlaying = false; window.isPlaying = false;
  setPlayIcons(false);
  if (autoMode && curIdx >= 0) {
    autoTimer = setTimeout(function(){
      var next = curIdx + 1 < stations.length ? curIdx+1 : 0;
      playStation(next);
    }, 3000);
  }
};

window.recover = function(reason) {
  if (curIdx===-1 || !isPlaying) return;
  if (reconnectAttempted) { window.fatalError(); return; }
  reconnectAttempted = true;
  setTrack('Переподключение через 5 сек...');
  reconnectTimer = setTimeout(function(){
    reconnectTimer = null;
    startStream(curIdx);
  }, 5000);
};

// ── Stream start ─────────────────────────────────────────────────
function startStream(idx) {
  var s = stations[idx];
  if (!s) return;
  if (hls) { try{hls.destroy();}catch(e){} hls=null; window.hls=null; }
  audio.pause(); audio.src = '';

  audio.volume = parseFloat(document.getElementById('volSlider').value || 0.8);

  if (typeof Hls !== 'undefined' && Hls.isSupported() && s.stream.includes('.m3u8')) {
    hls = new Hls({ enableWorker:true, lowLatencyMode:false, maxBufferLength:30 });
    window.hls = hls;
    hls.loadSource(s.stream);
    hls.attachMedia(audio);
    hls.on(Hls.Events.MANIFEST_PARSED, function(){ audio.play().catch(function(){window.fatalError();}); });
    hls.on(Hls.Events.ERROR, function(e,d){ if (d.fatal) window.fatalError(); });
  } else if (audio.canPlayType('application/vnd.apple.mpegurl') && s.stream.includes('.m3u8')) {
    audio.src = s.stream; audio.load(); audio.play().catch(function(){window.fatalError();});
  } else {
    audio.src = s.stream; audio.load(); audio.play().catch(function(){window.fatalError();});
  }
}

// ── Play station ─────────────────────────────────────────────────
window.playStation = function(idx) {
  var s = stations[idx];
  if (!s) return;

  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer=null; }
  if (waitingTimer)   { clearTimeout(waitingTimer);   waitingTimer=null; }
  if (autoTimer)      { clearTimeout(autoTimer);      autoTimer=null; }
  if (metaTimer)      { clearTimeout(metaTimer);      metaTimer=null; }
  reconnectAttempted = false;
  lastTrack = '';

  curIdx = idx; window.curIdx = idx;
  isPlaying = true; window.isPlaying = true;

  // Mini player
  var mp = document.getElementById('miniPlayer');
  if (mp) mp.classList.add('visible');
  document.getElementById('mLogo').src = s.logo;
  document.getElementById('mName').textContent = s.name;
  setTrack('В эфире');

  // Full player
  document.getElementById('fLogo').src = s.logo;
  document.getElementById('fpBg').style.backgroundImage = "url('"+s.logo+"')";
  document.getElementById('fName').textContent = s.name;
  document.getElementById('fGenreLabel').textContent = s.genre;

  setLoading(true);
  setPlayIcons(true);
  updateNavBtns();

  // Highlight card
  document.querySelectorAll('.station-card').forEach(function(c){
    c.classList.toggle('active', parseInt(c.dataset.idx)===idx);
  });

  startStream(idx);
  fetchMeta(idx);
};

// ── Toggle play ──────────────────────────────────────────────────
window.togglePlay = function() {
  if (curIdx === -1) { playStation(0); openFullPlayer(); return; }
  if (audio.paused) {
    audio.play().catch(function(){window.fatalError();});
    isPlaying = true; window.isPlaying = true;
    setPlayIcons(true);
  } else {
    audio.pause();
    isPlaying = false; window.isPlaying = false;
    setPlayIcons(false);
  }
};

function setVolume(v) { audio.volume = parseFloat(v); }

// ── Audio events ─────────────────────────────────────────────────
audio.addEventListener('playing', function(){
  setLoading(false); isPlaying=true; window.isPlaying=true;
  setPlayIcons(true); reconnectAttempted=false;
  if (waitingTimer){clearTimeout(waitingTimer);waitingTimer=null;}
});
audio.addEventListener('pause', function(){ isPlaying=false; window.isPlaying=false; setLoading(false); setPlayIcons(false); });
audio.addEventListener('waiting', function(){
  if (!audio.paused){
    setLoading(true);
    if (waitingTimer) clearTimeout(waitingTimer);
    waitingTimer = setTimeout(function(){ window.recover('waiting'); }, 8000);
  }
});
audio.addEventListener('stalled', function(){ if (!audio.paused) window.recover('stalled'); });
audio.addEventListener('error',   function(){ window.fatalError(); });

// ── Full player open/close ────────────────────────────────────────
function openFullPlayer() { document.getElementById('fullPlayer').classList.add('open'); }
function closeFullPlayer(){ document.getElementById('fullPlayer').classList.remove('open'); }
window.openFullPlayer=openFullPlayer; window.closeFullPlayer=closeFullPlayer;

// ── Tabs ─────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
  renderContent();
}

// ── Render ────────────────────────────────────────────────────────
function renderContent() {
  var el = document.getElementById('mainContent');
  if (activeTab === 'stations') el.innerHTML = renderStationsHTML();
  else if (activeTab === 'history') el.innerHTML = renderHistoryHTML();
  else el.innerHTML = renderCommentsHTML();
}

function renderStationsHTML() {
  var f = getFiltered();
  var html = '<div class="station-list">';
  f.forEach(function(s){
    var idx = stations.indexOf(s);
    var active = idx===curIdx?' active':'';
    var listeners = (s.listeners/1000).toFixed(1)+'K';
    html += '<div class="station-card'+active+'" data-idx="'+idx+'" onclick="playStation('+idx+');openFullPlayer()">' +
      '<img class="station-logo" src="'+s.logo+'" alt="" onerror="this.src=\'icon-192.png\'"/>' +
      '<div class="station-info"><div class="station-name">'+s.name+'</div><div class="station-genre">'+s.genre+'</div></div>' +
      '<div class="station-listeners">' +
        '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>' +
        listeners + '</div>' +
    '</div>';
  });
  return html + '</div>';
}

function renderHistoryHTML() {
  if (!history.length) return '<div class="empty-msg">История появится во время прослушивания</div>';
  var html = '<div class="history-list">';
  history.forEach(function(h){
    html += '<div class="history-item"><div class="history-time">'+h.time+'</div>' +
      '<div style="flex:1;min-width:0"><div class="history-track">'+h.track+'</div>' +
      '<div class="history-station">'+h.stationName+'</div></div></div>';
  });
  return html + '</div>';
}

function renderCommentsHTML() {
  var s = curIdx>=0 ? stations[curIdx] : null;
  var stComments = comments.filter(function(c){return c.stIdx===curIdx;});
  var inputBlock = s
    ? '<div class="comment-input-area">' +
        '<div class="comment-input-label">Комментарии к: <strong>'+s.name+'</strong></div>' +
        '<textarea class="comment-textarea" id="commentInput" rows="2" placeholder="Написать комментарий..." ' +
          'onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendComment()}"></textarea>' +
        '<button class="comment-send" onclick="sendComment()">Отправить</button>' +
      '</div>'
    : '<div class="empty-msg">Выберите станцию для комментариев</div>';

  var listBlock = '';
  if (stComments.length) {
    listBlock = '<div class="comment-list">';
    stComments.forEach(function(c){
      var letter = (c.text[0]||'?').toUpperCase();
      listBlock += '<div class="comment-item">' +
        '<div class="comment-avatar">'+letter+'</div>' +
        '<div class="comment-body">' +
          '<div class="comment-meta"><span class="comment-time">'+c.time+'</span></div>' +
          '<div class="comment-text">'+c.text.replace(/</g,'&lt;')+'</div>' +
        '</div></div>';
    });
    listBlock += '</div>';
  }
  return inputBlock + listBlock;
}

function sendComment() {
  var el = document.getElementById('commentInput');
  if (!el) return;
  var txt = el.value.trim();
  if (!txt) return;
  comments.unshift({ id: Date.now(), stIdx: curIdx, text: txt, time: nowStr() });
  if (comments.length>100) comments=comments.slice(0,100);
  lsSet('radio_comments', comments);
  el.value = '';
  renderContent();
}
window.sendComment = sendComment;

function renderFpHistory() {
  var wrap = document.getElementById('fpHistory');
  var list = document.getElementById('fpHistoryList');
  if (!history.length) { wrap.style.display='none'; return; }
  wrap.style.display='block';
  list.innerHTML = history.slice(0,5).map(function(h){
    return '<div class="fp-history-item"><span class="fp-history-time">'+h.time+'</span>' +
      '<span class="fp-history-track">'+h.track+'</span></div>';
  }).join('');
}

// ── Init ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
renderContent();
renderFpHistory();
</script>
<script src="player-fixes.js"></script>
</body>
</html>
