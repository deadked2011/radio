<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- ✅ ИСПРАВЛЕНИЕ: hls.js для воспроизведения .m3u8 в Chrome/Firefox -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f3;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #9a9a9a;
  --accent: #1a1a1a;
  --border: #e8e6e1;
  --pill: #f0ede8;
  --shadow: 0 2px 24px rgba(0,0,0,0.07);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body {
  height: 100%;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 24px);
}
.app { width: 100%; max-width: 480px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding: 0 2px; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 22px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.clock { font-size: 12px; color: var(--muted); font-weight: 300; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; flex-shrink: 0; }
.live-dot.on { background: #4caf7d; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Search */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-input {
  width: 100%; padding: 11px 16px 11px 40px;
  background: var(--card); border: none; border-radius: 14px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
  box-shadow: 0 1px 8px rgba(0,0,0,0.05); outline: none;
  -webkit-appearance: none;
}
.search-input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; display: flex; }

/* Genres */
.genres { display: flex; gap: 7px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.genres::-webkit-scrollbar { display: none; }
.genre-pill {
  padding: 6px 13px; border-radius: 100px; background: var(--pill);
  color: var(--muted); font-size: 11px; font-weight: 500; cursor: pointer;
  transition: all .2s; border: none; white-space: nowrap;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.genre-pill.active { background: var(--accent); color: #fff; }

/* Now playing card */
.now-card {
  background: var(--card); border-radius: 22px;
  padding: 20px; box-shadow: var(--shadow); margin-bottom: 14px;
  display: none;
}
.now-card.visible { display: block; }
.now-top { display: flex; align-items: center; gap: 13px; margin-bottom: 18px; }
.now-logo {
  width: 50px; height: 50px; border-radius: 13px;
  background: var(--pill); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.now-logo img { width: 100%; height: 100%; object-fit: cover; }
.now-info { flex: 1; min-width: 0; }
.now-name { font-family: 'DM Serif Display', serif; font-size: 16px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.now-genre { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.fav-btn { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--muted); flex-shrink: 0; padding: 4px; }
.fav-btn.on { color: #e05555; }

/* Буферизация */
.loading-bar {
  height: 2px; background: var(--border); border-radius: 2px;
  margin-bottom: 14px; overflow: hidden; display: none;
}
.loading-bar.active { display: block; }
.loading-bar-inner {
  height: 100%; width: 30%; background: var(--accent);
  border-radius: 2px; animation: loading 1.2s ease-in-out infinite;
}
@keyframes loading { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }

/* Visualizer */
.viz { height: 34px; display: flex; align-items: center; gap: 2px; margin-bottom: 18px; }
.bar { flex: 1; background: var(--border); border-radius: 3px; height: 4px; }
.bar.on { background: var(--accent); animation: pulse var(--dur,.8s) ease-in-out infinite alternate; }
@keyframes pulse { from{height:var(--min,4px)} to{height:var(--max,26px)} }

/* Controls */
.controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.ctrl {
  background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 10px; border-radius: 50%; transition: all .15s; display: flex;
  -webkit-tap-highlight-color: transparent;
}
.ctrl:active { background: var(--pill); color: var(--text); }
.ctrl svg { width: 20px; height: 20px; }
.play-btn {
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(0,0,0,0.18); transition: transform .15s;
  -webkit-tap-highlight-color: transparent;
}
.play-btn:active { transform: scale(.95); }
.play-btn svg { width: 20px; height: 20px; fill: white; margin-left: 2px; }
.play-btn.playing svg { margin-left: 0; }

/* Volume */
.vol-row { display: flex; align-items: center; gap: 10px; padding-top: 14px; border-top: 1px solid var(--border); }
.vol-icon { color: var(--muted); display: flex; }
.vol-icon svg { width: 15px; height: 15px; }
input[type=range] {
  flex: 1; -webkit-appearance: none; height: 3px; border-radius: 3px;
  background: var(--border); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
}

/* List */
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 500; margin-bottom: 9px; padding: 0 2px; }
.list { display: flex; flex-direction: column; gap: 7px; }
.row {
  background: var(--card); border-radius: 15px; padding: 11px 14px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  transition: box-shadow .2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.row:active { box-shadow: var(--shadow); }
.row.active { outline: 2px solid var(--accent); }
.row-img {
  width: 40px; height: 40px; border-radius: 10px; background: var(--pill);
  overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.row-img img { width: 100%; height: 100%; object-fit: cover; }
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.row-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.row.active .row-dot { background: #4caf7d; animation: blink 1.5s infinite; }
.row-cnt { font-size: 10px; color: var(--muted); }
.empty { text-align: center; color: var(--muted); font-size: 13px; padding: 28px 0; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-title">Radio</div>
    <div class="header-right">
      <span class="live-dot" id="liveDot"></span>
      <span class="clock" id="clock"></span>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input class="search-input" id="searchInput" placeholder="Поиск..." oninput="renderList()">
  </div>

  <div class="genres" id="genrePills"></div>

  <div class="now-card" id="nowCard">
    <div class="now-top">
      <div class="now-logo" id="nowLogo">🎵</div>
      <div class="now-info">
        <div class="now-name" id="nowName">—</div>
        <div class="now-genre" id="nowGenre">—</div>
      </div>
      <button class="fav-btn" id="favBtn" onclick="toggleFav()">♡</button>
    </div>
    <!-- Полоска загрузки -->
    <div class="loading-bar" id="loadingBar"><div class="loading-bar-inner"></div></div>
    <div class="viz" id="viz"></div>
    <div class="controls">
      <button class="ctrl" onclick="prev()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl" onclick="next()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>
    <div class="vol-row">
      <span class="vol-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
      <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVol(this.value)">
    </div>
  </div>

  <div class="section-label" id="listLabel">Все станции</div>
  <div class="list" id="stationList"></div>
</div>

<audio id="audio"></audio>

<script>
// Инициализация Telegram Mini App
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
  if (tg.colorScheme === "dark") {
    document.documentElement.style.setProperty("--bg", "#1c1c1e");
    document.documentElement.style.setProperty("--card", "#2c2c2e");
    document.documentElement.style.setProperty("--text", "#ffffff");
    document.documentElement.style.setProperty("--muted", "#8e8e93");
    document.documentElement.style.setProperty("--border", "#3a3a3c");
    document.documentElement.style.setProperty("--pill", "#3a3a3c");
    document.documentElement.style.setProperty("--accent", "#ffffff");
  }
}

const stations = [
  { id:1260, name:"SOUNDPARK DEEP",      genre:"Deep House",    tag:"deep",       logo:"https://radiopotok.ru/f/station/256/1260.png", listeners:3317 },
  { id:85,   name:"Русское Радио",        genre:"Русская поп",  tag:"pop",        logo:"https://radiopotok.ru/f/station/256/85.png",   listeners:17757 },
  { id:1323, name:"Маруся ФМ",            genre:"Русская поп",  tag:"pop",        logo:"https://radiopotok.ru/f/station/256/1323.png", listeners:15262 },
  { id:1543, name:"Русская Волна",        genre:"Русская поп",  tag:"pop",        logo:"https://radiopotok.ru/f/station/256/1543.png", listeners:13308 },
  { id:1576, name:"Европа Плюс",          genre:"Поп / Хиты",  tag:"pop",        logo:"https://radiopotok.ru/f/station/256/1576.png", listeners:8133 },
  { id:221,  name:"Новое радио 98.4 FM",  genre:"Поп",          tag:"pop",        logo:"https://radiopotok.ru/f/station/256/221.png",  listeners:3096 },
  { id:1218, name:"ТНТ MUSIC RADIO",      genre:"Поп",          tag:"pop",        logo:"https://radiopotok.ru/f/station/256/1218.png", listeners:2214 },
  { id:1992, name:"TOP 100",              genre:"Хиты",         tag:"pop",        logo:"https://radiopotok.ru/f/station/256/1992.png", listeners:1678 },
  { id:177,  name:"Романтика",            genre:"Лирика",       tag:"pop",        logo:"https://radiopotok.ru/f/station/256/177.png",  listeners:2001 },
  { id:4,    name:"Радио ЭНЕРДЖИ (NRG)",  genre:"Электронная",  tag:"electronic", logo:"https://radiopotok.ru/f/station/256/4.png",    listeners:1473 },
  { id:1901, name:"Remix FM",             genre:"Ремиксы",      tag:"electronic", logo:"https://radiopotok.ru/f/station/256/1901.png", listeners:1871 },
  { id:35,   name:"Радио PREMIUM",        genre:"Клубная",      tag:"electronic", logo:"https://radiopotok.ru/f/station/256/35.png",   listeners:1558 },
  { id:542,  name:"Атмосфера",            genre:"Lounge / Chill",tag:"chill",     logo:"https://radiopotok.ru/f/station/256/542.png",  listeners:1470 },
  { id:1480, name:"Для фона",             genre:"Chillout",     tag:"chill",      logo:"https://radiopotok.ru/f/station/256/1480.png", listeners:900 },
  { id:1434, name:"Для души",             genre:"Лирика",       tag:"chill",      logo:"https://radiopotok.ru/f/station/256/1434.png", listeners:800 },
  { id:1594, name:"Русский Рок",          genre:"Рок",          tag:"rock",       logo:"https://radiopotok.ru/f/station/256/1594.png", listeners:2345 },
  { id:1570, name:"Ретро Хит",            genre:"Ретро",        tag:"retro",      logo:"https://radiopotok.ru/f/station/256/1570.png", listeners:3588 },
  { id:644,  name:"Вести FM",             genre:"Новости",      tag:"news",       logo:"https://radiopotok.ru/f/station/256/644.png",  listeners:7716 },
  { id:2,    name:"Радио Шансон",         genre:"Шансон",       tag:"shanson",    logo:"https://radiopotok.ru/f/station/256/2.png",    listeners:2464 },
  { id:1743, name:"Дядя Ваня на даче",    genre:"Шансон",       tag:"shanson",    logo:"https://radiopotok.ru/f/station/256/1743.png", listeners:1702 },
  { id:603,  name:"Радио Монте-Карло",    genre:"Зарубежная",   tag:"foreign",    logo:"https://radiopotok.ru/f/station/256/603.png",  listeners:5059 },
  { id:780,  name:"Шоколад",             genre:"Каверы",       tag:"foreign",    logo:"https://radiopotok.ru/f/station/256/780.png",  listeners:4212 },
  { id:487,  name:"Хорошее Радио",        genre:"Зарубежная",   tag:"foreign",    logo:"https://radiopotok.ru/f/station/256/487.png",  listeners:3818 },
  { id:83,   name:"Дорожное радио СПб",   genre:"Разное",       tag:"foreign",    logo:"https://radiopotok.ru/f/station/256/83.png",   listeners:4922 },
];

const genres = [
  { id:"all",        label:"Все" },
  { id:"deep",       label:"Deep House" },
  { id:"pop",        label:"Поп" },
  { id:"electronic", label:"Электро" },
  { id:"chill",      label:"Чилаут" },
  { id:"rock",       label:"Рок" },
  { id:"retro",      label:"Ретро" },
  { id:"shanson",    label:"Шансон" },
  { id:"foreign",    label:"Зарубежная" },
  { id:"news",       label:"Новости" },
];

let curIdx = 0, playing = false, activeGenre = "all";
let favs = JSON.parse(localStorage.getItem("rfavs") || "[]");
const audio = document.getElementById("audio");
audio.volume = 0.8;

// ✅ ИСПРАВЛЕНИЕ: глобальный экземпляр hls.js
let hlsInstance = null;

// Часы
function tick() {
  const n = new Date();
  document.getElementById("clock").textContent =
    String(n.getHours()).padStart(2,"0") + ":" + String(n.getMinutes()).padStart(2,"0");
}
setInterval(tick, 1000); tick();

// Визуализатор
const viz = document.getElementById("viz");
const bars = [];
for (let i = 0; i < 30; i++) {
  const b = document.createElement("div");
  b.className = "bar";
  const mn = 3+Math.random()*5, mx = 10+Math.random()*20, dur = .45+Math.random()*.7;
  b.style.cssText = `height:${mn}px;--min:${mn}px;--max:${mx}px;--dur:${dur}s;animation-delay:${(Math.random()*.5).toFixed(2)}s`;
  viz.appendChild(b); bars.push(b);
}
function vizOn(on) { bars.forEach(b => on ? b.classList.add("on") : b.classList.remove("on")); }
function setLoading(on) { document.getElementById("loadingBar").classList.toggle("active", on); }

// Stream URL
function streamUrl(id) {
  if (id === 1260) return "https://h.getradio.me/spdeep/hls.m3u8";
  return `https://h.getradio.me/rp${id}/hls.m3u8`;
}

// ✅ ИСПРАВЛЕНИЕ: универсальная функция воспроизведения HLS
function playHLS(url) {
  // Уничтожаем предыдущий экземпляр hls
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }

  setLoading(true);
  vizOn(false);

  // Safari поддерживает HLS нативно
  if (audio.canPlayType("application/vnd.apple.mpegurl")) {
    audio.src = url;
    audio.play()
      .then(() => { setLoading(false); setPlaying(true); })
      .catch(e => { console.warn("Safari play error:", e); setLoading(false); setPlaying(false); });
    return;
  }

  // Chrome/Firefox/другие — используем hls.js
  if (typeof Hls !== "undefined" && Hls.isSupported()) {
    hlsInstance = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      backBufferLength: 30,
    });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(audio);

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      audio.play()
        .then(() => { setLoading(false); setPlaying(true); })
        .catch(e => { console.warn("HLS play error:", e); setLoading(false); setPlaying(false); });
    });

    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        console.error("HLS fatal error:", data.type, data.details);
        setLoading(false);
        setPlaying(false);
        // Пробуем восстановить поток
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          hlsInstance.startLoad();
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hlsInstance.recoverMediaError();
        }
      }
    });
  } else {
    // Фоллбэк: прямая подстановка (для очень старых браузеров)
    audio.src = url;
    audio.play()
      .then(() => { setLoading(false); setPlaying(true); })
      .catch(() => { setLoading(false); setPlaying(false); });
  }
}

// Загрузить станцию
function loadStation(idx, autoplay) {
  curIdx = idx;
  const s = stations[idx];
  const nl = document.getElementById("nowLogo");
  nl.innerHTML = `<img src="${s.logo}" onerror="this.parentElement.textContent='🎵'">`;
  document.getElementById("nowName").textContent = s.name;
  document.getElementById("nowGenre").textContent = s.genre;
  updateFavBtn();
  document.getElementById("nowCard").classList.add("visible");

  if (tg) tg.setHeaderColor(tg.colorScheme === "dark" ? "#2c2c2e" : "#f7f6f3");

  renderList();

  if (autoplay || playing) {
    playHLS(streamUrl(s.id));
  } else {
    // Остановить воспроизведение при смене без автоплея
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    audio.pause();
    audio.src = "";
    setPlaying(false);
  }
}

function setPlaying(on) {
  playing = on;
  vizOn(on);
  document.getElementById("liveDot").classList.toggle("on", on);
  const btn = document.getElementById("playBtn");
  btn.classList.toggle("playing", on);
  document.getElementById("playIcon").innerHTML = on
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
}

function togglePlay() {
  if (tg) tg.HapticFeedback?.impactOccurred("light");
  if (!playing) {
    playHLS(streamUrl(stations[curIdx].id));
  } else {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    audio.pause();
    setPlaying(false);
    setLoading(false);
  }
}

function prev() {
  if (tg) tg.HapticFeedback?.impactOccurred("light");
  loadStation((curIdx - 1 + stations.length) % stations.length, playing);
}
function next() {
  if (tg) tg.HapticFeedback?.impactOccurred("light");
  loadStation((curIdx + 1) % stations.length, playing);
}
function setVol(v) { audio.volume = v / 100; }

function toggleFav() {
  if (tg) tg.HapticFeedback?.notificationOccurred("success");
  const id = stations[curIdx].id;
  const i = favs.indexOf(id);
  if (i === -1) favs.push(id); else favs.splice(i, 1);
  localStorage.setItem("rfavs", JSON.stringify(favs));
  updateFavBtn();
}
function updateFavBtn() {
  const on = favs.includes(stations[curIdx].id);
  const b = document.getElementById("favBtn");
  b.textContent = on ? "♥" : "♡";
  b.classList.toggle("on", on);
}

function renderGenres() {
  const el = document.getElementById("genrePills");
  el.innerHTML = "";
  genres.forEach(g => {
    const b = document.createElement("button");
    b.className = "genre-pill" + (g.id === activeGenre ? " active" : "");
    b.textContent = g.label;
    b.onclick = () => { activeGenre = g.id; renderGenres(); renderList(); };
    el.appendChild(b);
  });
}

function renderList() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const el = document.getElementById("stationList");
  el.innerHTML = "";
  const filtered = stations.filter(s =>
    (activeGenre === "all" || s.tag === activeGenre) &&
    (!q || s.name.toLowerCase().includes(q) || s.genre.toLowerCase().includes(q))
  );
  document.getElementById("listLabel").textContent =
    activeGenre === "all" ? `Все станции (${filtered.length})` : `${filtered.length} станций`;

  if (!filtered.length) {
    el.innerHTML = '<div class="empty">Ничего не найдено</div>';
    return;
  }
  filtered.forEach(s => {
    const idx = stations.indexOf(s);
    const row = document.createElement("div");
    row.className = "row" + (idx === curIdx ? " active" : "");
    row.innerHTML = `
      <div class="row-img"><img src="${s.logo}" onerror="this.parentElement.textContent='🎵'"></div>
      <div class="row-info">
        <div class="row-name">${s.name}</div>
        <div class="row-sub">${s.genre}</div>
      </div>
      <div class="row-right">
        <div class="row-dot"></div>
        <div class="row-cnt">${s.listeners.toLocaleString("ru")}</div>
      </div>`;
    row.onclick = () => {
      if (tg) tg.HapticFeedback?.impactOccurred("light");
      loadStation(idx, true);
    };
    el.appendChild(row);
  });
}

renderGenres();
renderList();
loadStation(0, false);
</script>
</body>
</html>
