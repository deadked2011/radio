<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* =============================================
   GLOBAL RESET & CORE VARIABLES
   ============================================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{position:fixed;width:100%;height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#f6f5f1;--card:#ffffff;--text:#121214;--muted:#8e8e93;
  --accent:#121214;--brand:#2bbd6e;--border:rgba(0,0,0,.06);
  --pill:#eae8e2;--pill-text:#636366;--green:#2bbd6e;--red:#ff3b30;--orange:#ff9500;
  --shadow:0 8px 32px rgba(0,0,0,.03),0 1px 4px rgba(0,0,0,.02);
  --px:clamp(14px,4vw,24px);--gap:10px;--sp-sm:12px;--sp-md:20px;
  --r-card:28px;--r-row:16px;--r-btn:14px;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
:root.dark,body.dark{
  --bg:#0b0b0d;--card:#16161a;--text:#f5f5f7;--muted:#7c7c82;
  --accent:#f5f5f7;--brand:#2bbd6e;--border:rgba(255,255,255,.06);
  --pill:#222227;--pill-text:#a1a1aa;--shadow:0 12px 40px rgba(0,0,0,.4);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}

/* ── DESKTOP / TABLET LAYOUT ── */
.page{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;padding:calc(var(--sat)+12px) calc(var(--sar)+var(--px)) calc(var(--sab)+12px) calc(var(--sal)+var(--px))}
.app{flex:1;min-height:0;display:flex;flex-direction:column;width:100%;max-width:600px;margin:0 auto}
.scroll-area{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{display:none}

/* ── COMMON COMPONENTS ── */
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-md)}
.header-title{font-family:'DM Serif Display',serif;font-size:clamp(24px,5vw,32px);letter-spacing:-.5px}
.header-right{display:flex;align-items:center;gap:8px}
.clock{font-size:14px;color:var(--muted);font-weight:500;font-variant-numeric:tabular-nums;margin-right:4px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
.live-dot.on{background:var(--green);animation:pulseLive 2s infinite}
@keyframes pulseLive{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.15)}}
.icon-btn{width:42px;height:42px;border-radius:var(--r-btn);background:var(--pill);border:1px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--pill-text);transition:all .2s}
.icon-btn svg{width:20px;height:20px}
.icon-btn:active,.icon-btn.on{background:var(--accent);color:var(--bg)}

/* станции, карточка, контролы – всё по прежнему, но без дублирования */
.tabs{flex-shrink:0;display:flex;gap:var(--gap);margin-bottom:var(--sp-sm)}
.tab-btn{flex:1;padding:12px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--pill);color:var(--pill-text);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.tab-btn.active{background:var(--accent);color:var(--bg)}
.search-wrap{flex-shrink:0;position:relative;margin-bottom:var(--sp-sm)}
.search-input{width:100%;padding:13px 16px 13px 44px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;font-size:14px;font-weight:500;color:var(--text);box-shadow:var(--shadow);outline:none;transition:all .25s}
.search-input:focus{border-color:var(--brand);box-shadow:0 8px 24px rgba(0,0,0,.06)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);display:flex}
.genres{flex-shrink:0;display:flex;gap:8px;overflow-x:auto;margin-bottom:var(--sp-md);padding-bottom:4px;scrollbar-width:none}
.genres::-webkit-scrollbar{display:none}
.genre-pill{padding:8px 16px;border-radius:100px;background:var(--pill);color:var(--pill-text);font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;text-transform:uppercase;transition:all .2s}
.genre-pill.active{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(43,189,110,.2)}

/* NOW PLAYING CARD */
.now-card{flex-shrink:0;background:var(--card);border-radius:var(--r-card);padding:var(--sp-md);box-shadow:var(--shadow);margin-bottom:var(--sp-sm);display:none;transition:background .3s;position:relative;overflow:hidden}
.now-card.visible{display:block}
.now-card-bg{position:absolute;inset:-30px;z-index:0;background-size:cover;background-position:center;filter:blur(36px) saturate(1.5) brightness(.5);opacity:0;transition:opacity .8s;transform:scale(1.1)}
.now-card.has-bg .now-card-bg{opacity:1}
.now-card-bg-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(145deg,rgba(0,0,0,.2) 0%,rgba(0,0,0,.45) 100%);opacity:0;transition:opacity .8s}
.now-card.has-bg .now-card-bg-overlay{opacity:1}
.now-card-content{position:relative;z-index:2}
.now-card.has-bg .now-name{color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.now-card.has-bg .now-genre{color:rgba(255,255,255,.75)}
.now-card.has-bg .fav-btn{color:rgba(255,255,255,.5)}
.now-card.has-bg .fav-btn.on{color:#ff2d55}
.now-card.has-bg .ctrl{background:rgba(255,255,255,.12);color:#fff;backdrop-filter:blur(10px)}
.now-card.has-bg .play-btn{background:#ffffff;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.now-card.has-bg .play-btn svg{fill:#121214}
.now-card.has-bg .vol-row{border-top-color:rgba(255,255,255,.12)}
.now-card.has-bg .vol-icon-svg,.now-card.has-bg .vol-val{color:rgba(255,255,255,.7)!important}
.now-card.has-bg .vol-track-bg{background:rgba(255,255,255,.2)}
.now-card.has-bg .vol-fill{background:rgba(255,255,255,.8)!important}
.now-card.has-bg input.vol-input::-webkit-slider-thumb{background:#fff;border-color:rgba(255,255,255,.2)}
.now-card.has-bg .loading-bar{background:rgba(255,255,255,.15)}
.now-card.has-bg .loading-bar-inner{background:#ffffff}
.now-top{display:flex;align-items:center;gap:16px;margin-bottom:var(--sp-md)}
.now-logo{width:clamp(68px,11vw,88px);height:clamp(68px,11vw,88px);border-radius:50%;background:var(--pill);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 6px 20px rgba(0,0,0,.12);border:2px solid rgba(255,255,255,.1)}
.now-logo img{width:100%;height:100%;object-fit:cover}
.now-info{flex:1;min-width:0}
.now-name{font-family:'DM Serif Display',serif;font-size:clamp(20px,4.5vw,25px);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;margin-bottom:2px}
.now-genre{font-size:12px;font-weight:700;color:var(--text);opacity:.6;text-transform:uppercase;letter-spacing:.8px}
.now-track{font-size:13px;font-weight:600;color:var(--orange);margin-top:6px;white-space:nowrap;overflow:hidden;max-width:100%;display:none}
.now-track.visible{display:block}
.now-track-inner{display:inline-block;padding-right:40px}
.now-track.marquee .now-track-inner{animation:streamingMarquee 15s linear infinite}
@keyframes streamingMarquee{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(-50%,0,0)}}
.now-card.has-bg .now-track{color:#f0a030}
.fav-btn{background:none;border:none;cursor:pointer;font-size:26px;color:var(--muted);flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:transform .15s}
.fav-btn:active{transform:scale(1.18)}
.fav-btn.on{color:var(--brand)}

.loading-bar{height:4px;background:var(--border);border-radius:99px;margin-bottom:var(--sp-sm);overflow:hidden;display:none}
.loading-bar.active{display:block}
.loading-bar-inner{height:100%;width:30%;background:var(--accent);border-radius:99px;animation:streamLoad 1.2s infinite}
@keyframes streamLoad{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.viz{height:26px;display:flex;align-items:flex-end;gap:3px;margin:0 auto var(--sp-sm);width:160px;justify-content:center;mask-image:linear-gradient(to right,transparent 0%,#000 15%,#000 85%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,#000 15%,#000 85%,transparent 100%)}
.bar{width:3.5px;min-width:3.5px;background:rgba(128,128,128,.2);border-radius:99px;height:4px;transition:background .3s}
.bar.on{background:var(--accent);animation:dynamicWave var(--dur,.8s) ease-in-out infinite alternate}
.now-card.has-bg .bar{background:rgba(255,255,255,.25)}
.now-card.has-bg .bar.on{background:rgba(255,255,255,.95)}
@keyframes dynamicWave{from{height:4px}to{height:26px}}

.controls{display:flex;align-items:center;justify-content:space-between;gap:var(--gap);margin-bottom:var(--sp-sm)}
.ctrl{width:50px;height:50px;border-radius:var(--r-btn);background:var(--pill);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--pill-text);transition:transform .15s}
.ctrl:active{transform:scale(.94)}
.ctrl svg{width:22px;height:22px}
.play-btn{width:66px;height:66px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.15);transition:transform .2s}
.play-btn:active{transform:scale(.92)}
.play-btn svg{width:24px;height:24px;fill:var(--bg);margin-left:3px}
.play-btn.playing svg{margin-left:0}

/* VOLUME */
.vol-row{display:flex;align-items:center;gap:12px;padding-top:var(--sp-sm);border-top:1px solid var(--border)}
.vol-icon-svg{display:flex;align-items:center;flex-shrink:0;color:var(--muted);width:20px;height:20px}
.vol-icon-svg svg{width:100%;height:100%}
.vol-wrap{flex:1;position:relative;display:flex;align-items:center;height:32px;min-width:60px}
.vol-track-bg{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:5px;border-radius:99px;background:var(--border);pointer-events:none}
.vol-fill{position:absolute;left:9px;top:50%;transform:translateY(-50%);height:5px;width:0;border-radius:99px;background:var(--brand);pointer-events:none;transition:background-color .25s}
input.vol-input{position:relative;z-index:2;width:100%;-webkit-appearance:none;appearance:none;height:5px;background:transparent;outline:none;cursor:pointer;border-radius:99px}
input.vol-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--card);border:2.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.12);transition:transform .15s;cursor:pointer}
input.vol-input:active::-webkit-slider-thumb,input.vol-input.dragging::-webkit-slider-thumb{transform:scale(1.3)}
input.vol-input::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--card);border:2.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer}
.vol-val{font-size:13px;font-weight:700;color:var(--muted);min-width:36px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}

/* STATION LIST */
.section-label{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;margin-bottom:12px;padding:0 2px;margin-top:20px;flex-shrink:0}
.list{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.row{background:var(--card);border-radius:var(--r-row);padding:12px 14px;display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none;box-shadow:var(--shadow);border:1px solid transparent;transition:transform .2s;min-height:64px}
.row:active{transform:scale(.985)}
.row.active{border-color:var(--brand);box-shadow:0 4px 16px rgba(43,189,110,.06)}
.row-img{width:44px;height:44px;min-width:44px;border-radius:12px;background:var(--pill);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.row-img img{width:100%;height:100%;object-fit:cover;display:block}
.row-info{flex:1;min-width:0;overflow:hidden}
.row-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.row-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:4px}
.row-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.row.active .row-dot{display:none}
.row-eq{display:none;align-items:flex-end;gap:2px;height:13px}
.row.active .row-eq{display:flex}
.row-eq-bar{width:2.5px;background:var(--brand);border-radius:99px;animation:eqPulse .6s ease-in-out infinite alternate;transform-origin:bottom}
.row-eq-bar:nth-child(1){height:4px;animation-delay:0s}
.row-eq-bar:nth-child(2){height:12px;animation-delay:.15s}
.row-eq-bar:nth-child(3){height:7px;animation-delay:.3s}
.row-eq-bar:nth-child(4){height:13px;animation-delay:.08s}
@keyframes eqPulse{0%{transform:scaleY(.3)}100%{transform:scaleY(1)}}
.empty{text-align:center;color:var(--muted);padding:48px 24px;font-size:14px;font-weight:500}
.show-more-btn{width:100%;margin-top:8px;padding:14px;border:none;cursor:pointer;background:var(--pill);color:var(--pill-text);border-radius:var(--r-row);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;transition:background .2s}
.show-more-btn:active{background:var(--border)}

/* CHAT (десктоп) */
.chat-section{background:rgba(255,255,255,.4);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(0,0,0,.04);border-radius:var(--r-card);box-shadow:var(--shadow);margin-top:var(--gap);display:none;flex-direction:column;height:260px;transition:background .3s}
.chat-section.show{display:flex}
.chat-section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(128,128,128,.1);flex-shrink:0}
.chat-section-title{font-weight:700;font-size:14px}
.chat-open-btn{background:var(--pill);color:var(--pill-text);border:none;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s}
.chat-open-btn:active{background:var(--border)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chat-msgs::-webkit-scrollbar{display:none}
.chat-msg{display:flex;gap:10px;align-items:flex-start;font-size:13px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chat-msg-avatar{width:30px;height:30px;min-width:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.chat-msg-body{background:rgba(0,0,0,.03);padding:8px 12px;border-radius:14px;max-width:85%}
body.dark .chat-msg-body{background:rgba(255,255,255,.04)}
.chat-msg-name{font-weight:700;font-size:11px;margin-bottom:2px;color:var(--muted)}
.chat-msg-text{word-break:break-word;line-height:1.45;font-size:13px;color:var(--text)}

/* ── MOBILE TIKTOK VIEW ── */
@media(max-width:768px){
  body{background:#000}
  #tiktokView{position:fixed;inset:0;z-index:9999;background:#000;display:block;overflow:hidden}
  .page,.app{display:none!important}
  .tt-bg{position:absolute;inset:-30px;z-index:0;background-size:cover;background-position:center;filter:blur(40px) brightness(.25) saturate(1.4);transform:scale(1.12)}
  .tt-bg-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,0) 55%,rgba(0,0,0,.85) 100%)}
  .tt-header{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px)+10px) 16px 12px;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 100%)}
  .tt-header-left{display:flex;align-items:center;gap:10px}
  .tt-title{font-family:'DM Serif Display',serif;font-size:18px;color:#fff;letter-spacing:-.2px}
  .tt-header-right{display:flex;gap:8px}
  .tt-hbtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;flex-shrink:0;transition:transform .1s}
  .tt-hbtn:active{transform:scale(.84)}
  .tt-hbtn svg{width:17px;height:17px}
  .tt-hbtn.on{background:rgba(255,255,255,.9);color:#000}
  .tt-center{position:absolute;z-index:3;top:50%;left:0;right:0;transform:translateY(-58%);display:flex;flex-direction:column;align-items:center;padding:0 20px}
  .tt-logo{width:clamp(100px,30vw,150px);height:clamp(100px,30vw,150px);border-radius:50%;background:#1a1a1a;overflow:hidden;flex-shrink:0;box-shadow:0 12px 44px rgba(0,0,0,.65),0 0 0 3px rgba(255,255,255,.08);margin-bottom:20px}
  .tt-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .tt-logo.playing{animation:ttLogoSpin 12s linear infinite}
  @keyframes ttLogoSpin{to{transform:rotate(360deg)}}
  .tt-info{text-align:center;width:100%}
  .tt-name{font-family:'DM Serif Display',serif;font-size:clamp(20px,5.5vw,28px);color:#fff;line-height:1.2;margin-bottom:5px;text-shadow:0 2px 16px rgba(0,0,0,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tt-genre{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5)}
  .tt-track{font-size:12px;font-weight:600;color:#f0a030;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:8px;min-height:16px}
  .tt-viz{display:flex;align-items:flex-end;gap:3px;height:22px;margin-top:16px;justify-content:center}
  .tt-bar{width:3px;background:rgba(255,255,255,.18);border-radius:99px;height:4px}
  .tt-bar.on{background:rgba(255,255,255,.9);animation:ttWave var(--dur,.65s) ease-in-out infinite alternate}
  @keyframes ttWave{from{height:4px}to{height:22px}}
  .tt-side-actions{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:20px;z-index:40}
  .tt-side-btn{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer}
  .tt-side-icon{width:52px;height:52px;border-radius:16px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .12s}
  .tt-side-btn:active .tt-side-icon{transform:scale(.84)}
  .tt-side-icon.fav-on{background:rgba(255,45,85,.3);border-color:rgba(255,45,85,.35)}
  .tt-side-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.3px}
  .tt-controls{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:0 20px calc(env(safe-area-inset-bottom,0px)+24px);background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.5) 50%,transparent 100%)}
  .tt-bottom-info{margin-bottom:18px;padding-left:4px}
  .tt-station-label{font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:3px}
  .tt-station-name-sm{font-size:16px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tt-genre-sm{font-size:10px;color:rgba(255,255,255,.42);margin-top:2px}
  .tt-nav-row{display:flex;align-items:center;justify-content:center;gap:20px}

<script>
// ═══ КОНФИГУРАЦИЯ ═══════════════════════════════════
const CHAT_API_BASE = "https://radio-chat.deadked2011.workers.dev";
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.enableClosingConfirmation();}

// ═══ СОСТОЯНИЕ ══════════════════════════════════════
const audio = document.getElementById("audio");
audio.volume = 0.8;

let curIdx=0, playing=false, activeGenre="all", activeTab="all";
let darkMode  = localStorage.getItem("rDark")==="1";
let carMode   = localStorage.getItem("rCar")==="1";
let splitMode = localStorage.getItem("splitMode")==="1";
let chatVisible = false;
let favs = JSON.parse(localStorage.getItem("rfavs")||"[]");
let hlsInstance=null, nowPlayingTimer=null;
let userPaused=false, wasInterrupted=false, resumeTimer=null, lastAudioTime=0;
let listExpanded = {};

// ═══ ТЕМА ═══════════════════════════════════════════
function toggleDark(){
  darkMode=!darkMode;
  document.body.classList.toggle("dark",darkMode);
  document.documentElement.classList.toggle("dark",darkMode);
  document.getElementById("darkBtn").classList.toggle("on",darkMode);
  localStorage.setItem("rDark",darkMode?"1":"0");
  if(tg)tg.HapticFeedback?.impactOccurred("light");
}

// ═══ АВТОРЕЖИМ ══════════════════════════════════════
function applyCarMode(on){
  ["tabs","searchWrap","genrePills","listLabel","stationList"].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display=on?"none":"";
  });
  if(on && curIdx>=0) renderCarRecs(curIdx);
  else { const r=document.getElementById("carRecs"); if(r) r.innerHTML=""; }
}
function toggleCar(){
  carMode=!carMode;
  document.body.classList.toggle("car",carMode);
  document.getElementById("carBtn").classList.toggle("on",carMode);
  localStorage.setItem("rCar",carMode?"1":"0");
  applyCarMode(carMode);
  if(tg)tg.HapticFeedback?.impactOccurred("medium");
}

// ═══ РАЗДЕЛЕНИЕ ЭКРАНА (только для десктопа) ════════
function applySplit(on){
  document.body.classList.toggle("split",on);
  document.getElementById("splitBtn").classList.toggle("on",on);
  if(on){ loadChatMessages(); if(curIdx>=0) renderCarRecs(curIdx); }
  localStorage.setItem("splitMode",on?"1":"0");
}
function onSplitClick(){
  if(window.innerWidth<960){ if(tg)tg.HapticFeedback?.notificationOccurred("warning"); return; }
  splitMode=!splitMode; applySplit(splitMode);
  if(tg)tg.HapticFeedback?.impactOccurred("light");
}
window.addEventListener("resize",()=>{
  if(window.innerWidth<960 && splitMode && document.body.classList.contains("split")) applySplit(false);
});

// ═══ ЧАТ (десктоп) ═══════════════════════════════════
function toggleChat(){
  chatVisible=!chatVisible;
  document.getElementById("chatSection").classList.toggle("show",chatVisible);
  document.getElementById("chatToggleBtn").classList.toggle("on",chatVisible);
  if(chatVisible) loadChatMessages();
}

// ═══ ЧАСЫ ════════════════════════════════════════════
function tick(){const n=new Date();document.getElementById("clock").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
setInterval(tick,1000); tick();

// ═══ ВИЗУАЛИЗАТОР (десктоп) ══════════════════════════
const bars=[], vizEl=document.getElementById("viz");
for(let i=0;i<24;i++){
  const b=document.createElement("div"); b.className="bar";
  const mn=4, mx=4+Math.floor(Math.random()*18);
  b.style.cssText=`height:${mn}px;--min:${mn}px;--max:${mx}px;--dur:${(0.45+Math.random()*0.55).toFixed(2)}s;animation-delay:${(Math.random()*0.4).toFixed(2)}s`;
  vizEl.appendChild(b); bars.push(b);
}
function vizOn(on){ bars.forEach(b=>on?b.classList.add("on"):b.classList.remove("on")); }
function setLoading(on){ document.getElementById("loadingBar").classList.toggle("active",on); }

// ═══ АУДИО – АВТОМАТИЧЕСКОЕ ВОЗОБНОВЛЕНИЕ ════════════
audio.addEventListener("pause",()=>{
  if(userPaused||!playing) return;
  wasInterrupted=true; lastAudioTime=Date.now();
  clearTimeout(resumeTimer);
  resumeTimer=setTimeout(()=>{ if(wasInterrupted&&!userPaused&&!document.hidden) attemptResume(); },1500);
});
audio.addEventListener("ended",()=>{ if(!userPaused&&playing){ wasInterrupted=true; attemptResume(); } });
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden&&wasInterrupted&&!userPaused){ clearTimeout(resumeTimer); resumeTimer=setTimeout(attemptResume,600); }
});
setInterval(()=>{ if(wasInterrupted&&!userPaused&&!document.hidden&&Date.now()-lastAudioTime>4000) attemptResume(); },4000);

async function attemptResume(){
  wasInterrupted=false;
  audio.volume=0;
  if(window.stations&&window.stations[curIdx]) playStream(window.stations[curIdx].stream);
  const target=Number(document.getElementById("volSlider").value)/100;
  let v=0;
  const fade=setInterval(()=>{ v+=0.04; if(v>=target){v=target;clearInterval(fade);} audio.volume=v; },60);
}

// ═══ MEDIA SESSION ════════════════════════════════════
function updateMediaSession(s){
  if(!("mediaSession" in navigator)) return;
  const cover=s.logo||`https://ui-avatars.com/api/?name=${encodeURIComponent(s.name||'FM')}&background=random&color=fff&size=256&font-size=0.4`;
  navigator.mediaSession.metadata=new MediaMetadata({title:s.name,artist:s.genre||"",album:"Radio Go",artwork:[{src:cover,sizes:"256x256",type:"image/png"}]});
  navigator.mediaSession.setActionHandler("previoustrack",prev);
  navigator.mediaSession.setActionHandler("nexttrack",next);
  navigator.mediaSession.setActionHandler("play",()=>{ userPaused=false; playStream(window.stations[curIdx].stream); });
  navigator.mediaSession.setActionHandler("pause",()=>{ userPaused=true; audio.pause(); setPlaying(false); });
}

// ═══ ПЛЕЙЛИСТ ════════════════════════════════════════
function playStream(url){
  if(!url) return;
  if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; }
  setLoading(true); vizOn(false);
  if(url.includes(".m3u8")){
    if(audio.canPlayType("application/vnd.apple.mpegurl")){
      audio.src=url;
      audio.play().then(()=>setPlaying(true)).catch(()=>onPlayError());
      return;
    }
    if(typeof Hls!=="undefined"&&Hls.isSupported()){
      hlsInstance=new Hls({enableWorker:true,lowLatencyMode:true,backBufferLength:30});
      hlsInstance.loadSource(url); hlsInstance.attachMedia(audio);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{ audio.play().then(()=>setPlaying(true)).catch(()=>onPlayError()); });
      hlsInstance.on(Hls.Events.ERROR,(_,d)=>{
        if(!navigator.onLine){ showOfflineState(true); return; }
        if(d.fatal){
          if(d.type===Hls.ErrorTypes.NETWORK_ERROR){ setTimeout(()=>{ try{ hlsInstance&&hlsInstance.startLoad(); }catch(e){} },1500); }
          else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){ try{ hlsInstance&&hlsInstance.recoverMediaError(); }catch(e){} }
          else { if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; } onPlayError(); }
        }
      });
      return;
    }
  }
  audio.src=url;
  audio.play().then(()=>setPlaying(true)).catch(()=>onPlayError());
}

function setPlaying(on){
  playing=on; setLoading(false); vizOn(on);
  document.getElementById("liveDot").classList.toggle("on",on);
  document.getElementById("playBtn").classList.toggle("playing",on);
  document.getElementById("playIcon").innerHTML=on
    ?'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
    :'<polygon points="5 3 19 12 5 21 5 3"/>';
  if("mediaSession" in navigator) navigator.mediaSession.playbackState=on?"playing":"paused";
  if(window.ttSyncPlay) window.ttSyncPlay();
}

function onPlayError(){
  playing=false; setPlaying(false); setLoading(false);
  const inner=document.getElementById("nowTrackInner"), el=document.getElementById("nowTrack");
  if(inner&&el){ inner.textContent="⚠️ Поток недоступен. Переключаем..."; el.classList.add("visible"); }
  setTimeout(()=>{ if(!playing) next(); },3000);
}

function togglePlay(){
  if(tg)tg.HapticFeedback?.impactOccurred("light");
  if(!playing){ userPaused=false; wasInterrupted=false; playStream(window.stations[curIdx].stream); }
  else{ userPaused=true; wasInterrupted=false; clearTimeout(resumeTimer); if(hlsInstance){hlsInstance.destroy();hlsInstance=null;} audio.pause(); setPlaying(false); }
}
function prev(){ if(tg)tg.HapticFeedback?.impactOccurred("light"); loadStation((curIdx-1+window.stations.length)%window.stations.length,true); }
function next(){ if(tg)tg.HapticFeedback?.impactOccurred("light"); loadStation((curIdx+1)%window.stations.length,true); }

const VOL_THUMB_R = 9;
function recalcVolFill(v){
  const fill=document.getElementById("volFill");
  const slider=document.getElementById("volSlider");
  if(!fill||!slider) return;
  const w=slider.getBoundingClientRect().width||slider.offsetWidth;
  if(!w) return;
  const usable=w-VOL_THUMB_R*2;
  fill.style.left=VOL_THUMB_R+"px";
  fill.style.width=Math.max(0,(v/100)*usable)+"px";
}
function onVolChange(v){
  v=Number(v); audio.volume=v/100;
  recalcVolFill(v);
  document.getElementById("volVal").textContent=Math.round(v)+"%";
}
window.addEventListener("resize",()=>recalcVolFill(Number(document.getElementById("volSlider")?.value||80)));

const SHOW_INIT=8;
function renderList(){
  if(!window.stations||!window.stations.length) return;
  const q=(document.getElementById("searchInput").value||"").toLowerCase();
  const el=document.getElementById("stationList"); el.innerHTML="";
  let filtered=window.stations.filter(s=>{
    if(activeTab==="fav"&&!favs.includes(s.name)) return false;
    if(activeTab==="all"&&activeGenre!=="all"&&s.tag!==activeGenre) return false;
    if(q&&!s.name.toLowerCase().includes(q)&&!(s.genre&&s.genre.toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById("listLabel").textContent=activeTab==="fav"?`Избранное (${filtered.length})`:`Все станции (${filtered.length})`;
  if(!filtered.length){ el.innerHTML=activeTab==="fav"?'<div class="empty">♡ Нажмите ♡ на любой станции</div>':'<div class="empty">Ничего не найдено</div>'; return; }
  const key=activeTab+"_"+activeGenre+"_"+q;
  const expanded=!!listExpanded[key];
  filtered.slice(0,expanded?filtered.length:Math.min(SHOW_INIT,filtered.length)).forEach(s=>{
    const idx=window.stations.indexOf(s), row=document.createElement("div");
    row.className="row"+(idx===curIdx?" active":"");
    const img=s.logo||fbImg(s.name);
    row.innerHTML=`<div class="row-img"><img src="${img}" onerror="this.src='${fbImg(s.name)}'" loading="lazy"></div><div class="row-info"><div class="row-name">${s.name}</div><div class="row-sub">${s.genre||"Радио"}</div></div><div class="row-right"><div class="row-dot"></div><div class="row-eq"><div class="row-eq-bar"></div><div class="row-eq-bar"></div><div class="row-eq-bar"></div><div class="row-eq-bar"></div></div></div>`;
    row.onclick=()=>{ if(tg)tg.HapticFeedback?.impactOccurred("light"); loadStation(idx,true); };
    el.appendChild(row);
  });
  if(filtered.length>SHOW_INIT){
    const hidden=filtered.length-SHOW_INIT, btn=document.createElement("button");
    btn.className="show-more-btn"+(expanded?" expanded":"");
    btn.textContent=expanded?"Свернуть":`Ещё ${hidden} станций`;
    btn.onclick=()=>{ listExpanded[key]=!expanded; renderList(); if(!listExpanded[key]) el.scrollIntoView({behavior:"smooth",block:"start"}); };
    el.appendChild(btn);
  }
}

function renderCarRecs(idx){
  const recs=document.getElementById("carRecs"); if(!recs||!window.stations||!window.stations.length) return;
  const cur=window.stations[idx]; if(!cur){ recs.innerHTML=""; return; }
  const similar=window.stations.filter(s=>s.tag===cur.tag&&window.stations.indexOf(s)!==idx).sort((a,b)=>(b.listeners||0)-(a.listeners||0)).slice(0,4);
  if(!similar.length){ recs.innerHTML=""; return; }
  recs.innerHTML='<div class="car-recs-title">🎵 Рекомендации</div>';
  similar.forEach(s=>{
    const si=window.stations.indexOf(s), btn=document.createElement("button"); btn.className="car-rec-row";
    const img=s.logo||fbImg(s.name);
    const cnt=s.listeners?(s.listeners>=1000?(s.listeners/1000).toFixed(0)+"k":s.listeners):"";
    btn.innerHTML=`<div class="car-rec-img"><img src="${img}" onerror="this.src='${fbImg(s.name)}'" loading="lazy"></div><div class="car-rec-info"><div class="car-rec-name">${s.name}</div><div class="car-rec-genre">${s.genre||"Радио"}</div></div>${cnt?`<div style="font-size:11px;color:var(--muted);flex-shrink:0">${cnt}</div>`:""}`;
    btn.onclick=()=>{ if(tg)tg.HapticFeedback?.impactOccurred("light"); loadStation(si,true); };
    recs.appendChild(btn);

async function fetchNowPlaying(url){
  const el=document.getElementById("nowTrack"), inner=document.getElementById("nowTrackInner");
  if(!el||!inner) return;
  try{
    const r=await fetch(`${CHAT_API_BASE}/now-playing?url=${encodeURIComponent(url)}`);
    if(!r.ok) return;
    const{title}=await r.json();
    if(title&&title.trim()){
      const text="♪ "+title.trim(), long=title.length>35;
      inner.textContent=long?text+"   "+text:text;
      el.classList.add("visible"); el.classList.toggle("marquee",long);
    }else{ inner.textContent=""; el.classList.remove("visible","marquee"); }
  }catch(e){ el.classList.remove("visible","marquee"); }
}
function startNowPlaying(url){
  if(nowPlayingTimer) clearInterval(nowPlayingTimer);
  document.getElementById("nowTrackInner").textContent="";
  document.getElementById("nowTrack").classList.remove("visible","marquee");
  fetchNowPlaying(url);
  nowPlayingTimer=setInterval(()=>fetchNowPlaying(url),15000);
}

  window.ttCloseChat = function(){ chatOv.classList.remove('open'); chatBk.classList.remove('open'); if(chatPollId){ clearInterval(chatPollId); chatPollId = null; } };

  function ttLoadChat(){
    fetch(`${CHAT_API_BASE}/get-messages`).then(r=>r.json()).then(msgs=>{
      if(!Array.isArray(msgs)||!msgs.length){ chatMs.innerHTML='<div style="text-align:center;color:rgba(255,255,255,.3);padding:24px 0;font-size:13px">Пока нет сообщений</div>'; return; }
      chatMs.innerHTML='';
      msgs.forEach(m=>{
        const hue=([].reduce.call(m.name||'?',(a,c)=>a+c.charCodeAt(0),0)*47)%360;
        const t=m.time?new Date(m.time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';
        const d=document.createElement('div'); d.className='tt-chat-msg';
        d.innerHTML=`<div class="tt-chat-avatar" style="background:hsl(${hue},48%,42%)">${(m.name[0]||'?').toUpperCase()}</div><div class="tt-chat-body"><div class="tt-chat-name">${m.name||'Аноним'}${t?' <span style="font-weight:400;opacity:.5">'+t+'</span>':''}</div><div class="tt-chat-text">${m.text||''}</div></div>`;
        chatMs.appendChild(d);
      });
      chatMs.scrollTop=chatMs.scrollHeight;
    }).catch(()=>{});
  }

  window.ttOpenSearch = function(){ searchIn.value=''; ttSearchFilter(); searchOv.classList.add('open'); setTimeout(()=>searchIn.focus(),300); };
  window.ttCloseSearch = function(){ searchOv.classList.remove('open'); searchIn.blur(); };
  window.ttSearchFilter = function(){
    const q=(searchIn.value||'').toLowerCase().trim(), st=window.stations||[];
    const res=q?st.filter(s=>s.name.toLowerCase().includes(q)||(s.genre&&s.genre.toLowerCase().includes(q))):st.slice(0,24);
    searchRes.innerHTML='';
    if(!res.length){ searchRes.innerHTML='<div class="tt-s-empty">Ничего не найдено</div>'; return; }
    res.slice(0,30).forEach(s=>{
      const idx=st.indexOf(s), isAct=idx===curIdx, cover=s.logo||fbImg(s.name);
      const item=document.createElement('div'); item.className='tt-s-item';
      item.innerHTML=`<div class="tt-s-img"><img src="${cover}" onerror="this.src='${fbImg(s.name)}'" loading="lazy"></div><div style="flex:1;min-width:0"><div class="tt-s-name">${s.name}</div><div class="tt-s-genre">${s.genre||'Радио'}</div></div>${isAct?'<div class="tt-s-play">▶</div>':''}`;
      item.onclick=function(){ loadStation(idx,true); ttCloseSearch(); setTimeout(()=>{renderSlide();setTimeout(ttSyncPlay,120);},80); };
      searchRes.appendChild(item);
    });
  };

  window.ttOpenList = function(){ listOv.style.display='block'; ttBuildList(); };
  window.ttCloseList = function(){ listOv.style.display='none'; };
  function ttBuildList(){
    listBody.innerHTML=''; const st=window.stations||[]; const groups={};
    st.forEach((s,idx)=>{ const g=s.tag||s.genre||'Другое'; if(!groups[g]) groups[g]=[]; groups[g].push({s,idx}); });
    Object.keys(groups).sort().forEach(g=>{
      const arr=groups[g], grp=document.createElement('div'); grp.className='tt-genre-grp';
      if(arr.some(x=>x.idx===curIdx)) grp.classList.add('open');
      grp.innerHTML=`<div class="tt-genre-hdr"><div class="tt-genre-hdr-name">${g}</div><div class="tt-genre-cnt">${arr.length}</div><div class="tt-genre-arr">▼</div></div><div class="tt-genre-list"></div>`;
      grp.querySelector('.tt-genre-hdr').onclick=()=>grp.classList.toggle('open');
      const gList=grp.querySelector('.tt-genre-list');
      arr.forEach(x=>{
        const isAct=x.idx===curIdx, cover=x.s.logo||fbImg(x.s.name);
        const row=document.createElement('div'); row.className='tt-l-item'+(isAct?' playing':'');
        row.innerHTML=`<div class="tt-l-img"><img src="${cover}" onerror="this.src='${fbImg(x.s.name)}'" loading="lazy"></div><div style="flex:1;min-width:0"><div class="tt-l-name">${x.s.name}</div><div class="tt-l-genre">${x.s.genre||'Радио'}</div></div>${isAct?'<div class="tt-l-play">▶</div>':''}`;
        row.onclick=function(){ loadStation(x.idx,true); ttCloseList(); setTimeout(()=>{renderSlide();setTimeout(ttSyncPlay,120);},80); };
        gList.appendChild(row);
      });
      listBody.appendChild(grp);
    });
  }

  function ttInit(){
    if(initialized || !isMobile()) return;
    initialized = true;
    view.style.display = 'block';
    let tries = 0;
    const wait = setInterval(()=>{
      tries++;
      if((window.stations && window.stations.length) || tries > 60){ clearInterval(wait); renderSlide(); }
    }, 150);
    document.addEventListener('touchstart', e => { if(searchOv.classList.contains('open') && !searchOv.contains(e.target)) ttCloseSearch(); }, {passive: true});
  }

  window.addEventListener('resize', () => {
    if(isMobile()){ if(!initialized) ttInit(); else view.style.display='block'; }
    else view.style.display='none';
  });

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', ()=>setTimeout(ttInit,300));
  else setTimeout(ttInit,300);
})();

// ═══ ИНИЦИАЛИЗАЦИЯ ════════════════════════════════════
window.addEventListener("DOMContentLoaded",()=>{
  if(darkMode||tg?.colorScheme==="dark"){ darkMode=true; document.body.classList.add("dark"); document.documentElement.classList.add("dark"); }
  document.getElementById("darkBtn").classList.toggle("on",darkMode);
  if(carMode){ document.body.classList.add("car"); applyCarMode(true); }
  document.getElementById("carBtn").classList.toggle("on",carMode);
  if(window.innerWidth>=960 && localStorage.getItem("splitMode")===null){ splitMode=true; applySplit(true); }
  else if(splitMode && window.innerWidth>=960) applySplit(true);
  requestAnimationFrame(()=>{ onVolChange(80); });
  if(window.stations && window.stations.length>0){
    renderGenres(); renderList(); loadStation(0,false);
  } else {
    document.getElementById("stationList").innerHTML='<div class="empty">Не удалось загрузить станции</div>';
  }
});
</script>
</body>
</html>
