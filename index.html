<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" id="themeColorMeta">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="stations.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --text: #000000;
    --text-sec: #8e8e93;
    --surface: #f2f2f7;
    --surface-hover: #e5e5ea;
    --accent: #fc3c44;
    --player-bg: rgba(255, 255, 255, 0.85);
    --border: rgba(0, 0, 0, 0.08);
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --sidebar-width: 380px;
    --chat-width: 380px;
  }

  body.dark {
    --bg: #000000;
    --text: #ffffff;
    --text-sec: #ebebf599;
    --surface: #1c1c1e;
    --surface-hover: #2c2c2e;
    --player-bg: rgba(28, 28, 30, 0.85);
    --border: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); overflow: hidden; transition: background 0.3s; height: 100vh; height: 100dvh; }

  /* ─── ГЛАВНЫЙ МАКЕТ ─── */
  .app-layout { display: flex; width: 100%; height: 100%; overflow: hidden; position: relative; }
  
  .sidebar-panel { width: 100%; display: flex; flex-direction: column; height: 100%; border-right: 1px solid var(--border); flex-shrink: 0; background: var(--bg); position: relative; z-index: 10; }
  
  .header { padding: calc(var(--safe-top) + 16px) 20px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .header-left { display: flex; flex-direction: column; }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  
  /* Часы и Индикатор Прямого Эфира */
  .live-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-sec); font-weight: 600; margin-top: 2px; }
  .live-dot { width: 8px; height: 8px; background: #34c759; border-radius: 50%; display: inline-block; }
  body.playing .live-dot { animation: pulse-green 1.5s infinite; }
  @keyframes pulse-green {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 199, 89, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }
  .header-actions button { background: var(--surface); border: none; width: 36px; height: 36px; border-radius: 50%; color: var(--text); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.2s; }
  .header-actions button:active { opacity: 0.75; }
  .header-actions button.active { background: var(--text); color: var(--bg); }

  .content-scroll { flex: 1; overflow-y: auto; padding: 0 20px calc(var(--safe-bottom) + 100px); -webkit-overflow-scrolling: touch; }
  .content-scroll::-webkit-scrollbar { display: none; }

  /* Правая панель (Чат для ПК) */
  .chat-panel { display: none; width: var(--chat-width); height: 100%; border-left: 1px solid var(--border); background: var(--bg); flex-direction: column; flex-shrink: 0; z-index: 10; }
  .chat-header { padding: calc(var(--safe-top) + 22px) 20px 16px; font-size: 18px; font-weight: 800; letter-spacing: -0.3px; border-bottom: 1px solid var(--border); text-align: center; flex-shrink: 0; }
  .chat-body { flex: 1; overflow-y: auto; padding: 0; background: var(--surface); position: relative; width: 100%; }

  .tg-group-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: #24a1de; color: #ffffff; text-decoration: none; padding: 10px 16px; border-radius: 12px; font-weight: 600; font-size: 14px; margin: 12px 16px; transition: opacity 0.2s; box-shadow: 0 4px 12px rgba(36, 161, 222, 0.2); flex-shrink: 0; border: none; width: calc(100% - 32px); cursor: pointer; }
  .tg-group-btn:active { opacity: 0.8; }

  @media (min-width: 1024px) {
    .sidebar-panel { width: var(--sidebar-width); }
    .chat-panel { display: flex; }
    .content-scroll { padding-bottom: 24px; }
  }

  /* ─── ПОИСК И ВКЛАДКИ ─── */
  .search-box { margin: 16px 0; background: var(--surface); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .search-box input { border: none; background: transparent; width: 100%; font-size: 16px; color: var(--text); outline: none; }
  .search-box input::placeholder { color: var(--text-sec); }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; flex-shrink: 0; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 8px 16px; border-radius: 20px; background: var(--surface); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; border: none; transition: 0.2s; }
  .tab.active { background: var(--text); color: var(--bg); }

  /* ─── СПИСОК СТАНЦИЙ ─── */
  .station-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; cursor: pointer; border-bottom: 1px solid var(--border); transition: opacity 0.2s; }
  .station-row:active { opacity: 0.6; }
  .station-img { width: 52px; height: 52px; border-radius: 10px; background: var(--surface); object-fit: cover; }
  .sidebar-panel .station-row:hover { opacity: 0.85; }
  .station-info { flex: 1; min-width: 0; }
  .station-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .station-meta-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-sec); }
  .station-listeners-count { display: inline-flex; align-items: center; gap: 3px; }
  .playing-icon { display: none; color: var(--accent); font-size: 12px; font-weight: bold; }
  .station-row.active .playing-icon { display: block; }
  .station-row.active .station-name { color: var(--accent); }

  /* ─── МОБИЛЬНАЯ ШТОРКА ЧАТА ─── */
  .sheet-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 19999; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  
  .chat-sheet { position: fixed; bottom: 0; left: 0; right: 0; height: 80vh; background: var(--bg); border-top-left-radius: 24px; border-top-right-radius: 24px; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 20000; display: flex; flex-direction: column; }
  .chat-sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 5px; background: var(--text-sec); border-radius: 3px; margin: 8px auto 0; opacity: 0.4; flex-shrink: 0; }
  
  .sheet-header { padding: 12px 20px 4px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
  .sheet-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .sheet-close { background: var(--surface); border: none; width: 32px; height: 32px; border-radius: 50%; color: var(--text); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; }
  .sheet-body { flex: 1; overflow-y: auto; padding: 0; background: var(--surface); -webkit-overflow-scrolling: touch; position: relative; }

  @media (min-width: 1024px) {
    .chat-sheet { left: 50%; right: auto; width: 450px; border-radius: 24px 24px 0 0; transform: translate(-50%, 100%); }
    .chat-sheet.open { transform: translate(-50%, 0); }
  }

  /* ─── МИНИ-ПЛЕЕР ДЛЯ ТЕЛЕФОНОВ ─── */
  .mini-player { position: fixed; bottom: calc(var(--safe-bottom) + 12px); left: 12px; right: 12px; background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 8px 16px 8px 8px; display: flex; align-items: center; gap: 12px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.12); cursor: pointer; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
  .mini-player.hidden { transform: translateY(180%); }
  .mini-art { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: var(--surface); }
  .mini-info { flex: 1; min-width: 0; overflow: hidden; }
  .mini-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-sub { font-size: 13px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-controls { display: flex; align-items: center; gap: 16px; }
  .btn-icon { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; }
  .btn-icon svg { width: 26px; height: 26px; fill: currentColor; }

  /* ─── ПОЛНОЭКРАННЫЙ / ЦЕНТРАЛЬНЫЙ ПЛЕЕР ─── */
  .full-player { background: var(--bg); display: flex; flex-direction: column; position: relative; }
  .fp-bg { position: absolute; top: -50px; left: -50px; right: -50px; bottom: -50px; background-size: cover; background-position: center; filter: blur(60px) brightness(0.6); z-index: 1; opacity: 0.5; }
  body.dark .fp-bg { opacity: 0.3; }
  .fp-content { position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; height: 100%; max-width: 440px; width: 100%; margin: 0 auto; padding: var(--safe-top) 24px calc(var(--safe-bottom) + 40px); }
  
  .fp-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 32px; flex-shrink: 0; }
  .fp-down { background: rgba(128,128,128,0.2); border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; backdrop-filter: blur(10px); }
  .fp-down svg { width: 24px; height: 24px; }
  .fp-desktop-title { font-size: 18px; font-weight: 700; display: none; color: var(--text); text-align: center; width: 100%; }

  /* АНИМАЦИЯ ПЛАСТИНКИ */
  @keyframes record-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .fp-art-wrap { 
    width: 100%; max-width: 340px; aspect-ratio: 1; margin: 0 auto 4vh; 
    border-radius: 50%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
    overflow: hidden; flex-shrink: 0; user-select: none; pointer-events: none; position: relative; 
    background: var(--surface);
  }
  .fp-art { 
    width: 100%; height: 100%; object-fit: cover; 
    animation: record-spin 18s linear infinite;
    animation-play-state: paused; 
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.4s;
    transform: scale(0.9); 
    filter: brightness(0.8);
  }
  .fp-art.playing { 
    animation-play-state: running; 
    transform: scale(1);
    filter: brightness(1);
  }

  .fp-info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3vh; width: 100%; flex-shrink: 0; padding: 0 10px; }
  .fp-titles { flex: 1; min-width: 0; overflow: hidden; }
  
  .marquee-container { overflow: hidden; white-space: nowrap; max-width: 78%; }
  .fp-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .fp-track-wrap { display: flex; align-items: center; justify-content: flex-start; gap: 12px; width: 100%; overflow: hidden; }
  .fp-track { font-size: 16px; color: var(--accent); font-weight: 500; display: inline-block; white-space: nowrap; }
  body.playing .fp-track.scrollable { animation: track-marquee 12s linear infinite; padding-left: 10px; }
  @keyframes track-marquee {
    0% { transform: translateX(0); }
    50% { transform: translateX(-25%); }
    100% { transform: translateX(0); }
  }

  .visualizer-bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; width: 22px; flex-shrink: 0; opacity: 0.85; }
  .v-bar { width: 3px; height: 100%; background: var(--accent); border-radius: 1px; transform-origin: bottom; transform: scaleY(0.2); transition: transform 0.1s ease; }

  .fp-meta-info { display: flex; align-items: center; gap: 12px; margin-top: 6px; font-size: 13px; color: var(--text-sec); }
  .fp-listeners { display: inline-flex; align-items: center; gap: 4px; }

  .fp-controls { display: flex; align-items: center; justify-content: space-between; margin: 0 0 4vh; padding: 0 20px; width: 100%; flex-shrink: 0; }
  .fp-main-btn { width: 76px; height: 76px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: transform 0.1s; }
  .fp-main-btn:active { transform: scale(0.92); }
  .fp-main-btn svg { width: 34px; height: 34px; fill: currentColor; }
  .fp-sec-btn { background: none; border: none; color: var(--text); cursor: pointer; transition: transform 0.1s; padding: 10px; }
  .fp-sec-btn:active { transform: scale(0.85); }
  .fp-sec-btn svg { width: 34px; height: 34px; fill: currentColor; }
  
  .fav-btn { transition: transform 0.1s; margin-left: 12px; }
  .fav-btn:active { transform: scale(0.8); }
  .fav-btn.active { color: var(--accent); }

  .vol-bar { display: flex; align-items: center; gap: 12px; color: var(--text-sec); width: 100%; padding: 0 10px; flex-shrink: 0; }
  .vol-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: rgba(128,128,128,0.3); outline: none; }
  .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); cursor: pointer; }

  @media (max-width: 1023px) {
    .full-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .full-player.open { transform: translateY(0); }
    .vol-bar { display: none !important; }
  }
  @media (min-width: 1024px) {
    .full-player { flex: 1; height: 100%; border-right: 1px solid var(--border); }
    .fp-down { display: none !important; }
    .fp-desktop-title { display: block !important; }
    .mini-player { display: none !important; }
  }

  /* 🚗 КРУПНЫЙ ИНТЕРФЕЙС АВТОРЕЖИМА (CAR MODE) 🚗 */
  body.car .sidebar-panel, body.car .chat-panel, body.car .mini-player, body.car .sheet-backdrop, body.car .chat-sheet { display: none !important; }
  body.car .full-player { display: flex !important; position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; background: var(--bg); }
  body.car .fp-content { max-width: 500px; padding: calc(var(--safe-top) + 20px) 24px calc(var(--safe-bottom) + 20px); justify-content: space-around; align-items: center; text-align: center; margin: 0 auto; width: 100%; }
  body.car .fp-art-wrap { width: 220px; height: 220px; max-width: 220px; box-shadow: 0 12px 35px rgba(0,0,0,0.4); margin: 0 auto; }
  body.car .fp-title { font-size: 32px; text-align: center; font-weight: 900; width: 100%; }
  body.car .fp-track { font-size: 20px; text-align: center; }
  body.car .fp-track-wrap { justify-content: center; width: 100%; gap: 14px; }
  body.car .fp-meta-info { justify-content: center; font-size: 15px; width: 100%; }
  body.car .fp-titles { text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; }
  body.car .fp-info-row { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; margin-bottom: 2vh; padding: 0; }
  body.car .fp-controls { padding: 0; margin-bottom: 1vh; width: 100%; max-width: 360px; justify-content: space-around; }
  body.car .fp-main-btn { width: 96px; height: 96px; }
  body.car .fp-main-btn svg { width: 42px; height: 42px; }
  body.car .fp-sec-btn svg { width: 44px; height: 44px; }
  body.car .visualizer-bars { height: 20px; width: 26px; gap: 4px; }
  body.car .v-bar { width: 4px; }
  body.car .fp-down { display: none !important; }
  body.car .fp-header { display: flex !important; justify-content: center; padding-bottom: 10px; width: 100%; }
  body.car .fp-desktop-title { display: block !important; font-size: 16px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>

<div class="app-layout">
  
  <div class="sidebar-panel">
    <div class="header">
      <div class="header-left">
    <h1 id="headerTitle">Радио</h1> <div class="live-status">
        <span class="live-dot"></span>
        <span id="liveClock">00:00:00</span>
    </div>
</div>
      <div class="header-actions">
        <button onclick="toggleCarMode()" id="carBtn" title="Режим авто">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="22" height="13" rx="2"/><path d="M4 21v-2h16v2M7 16v-3h10v3"/></svg>
        </button>
        <button onclick="openChatSheet()" id="headerChatBtn" title="Чат эфира">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button onclick="toggleTheme()" id="themeBtn" title="Переключить тему">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>

    <div class="content-scroll">
      <div class="search-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-sec)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Найти станцию..." oninput="onSearchInput()">
      </div>
      
      <div class="tabs" id="genreTabs"></div>
      <div id="stationList"></div>
    </div>
  </div>

  <div class="full-player" id="fullPlayer">
    <div class="fp-bg" id="fBg"></div>
    <div class="fp-content">
      <div class="fp-header">
        <button class="fp-down" onclick="closeFullPlayer()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="fp-desktop-title" id="fpDesktopTitle" onclick="if(carMode) toggleCarMode()" style="cursor: pointer;">Сейчас играет</div>
        <div style="width: 40px;" class="fp-down"></div>
      </div>
      
      <div class="fp-art-wrap">
        <img src="" class="fp-art" id="fArt">
      </div>

      <div class="fp-info-row">
        <div class="fp-titles">
          <div class="fp-title" id="fTitle">Выберите станцию</div>
          <div class="fp-track-wrap">
            <div class="marquee-container">
              <div class="fp-track" id="fTrack">Радио Готово к запуску</div>
            </div>
            <div class="visualizer-bars" id="fpVisualizer">
              <div class="v-bar"></div>
              <div class="v-bar"></div>
              <div class="v-bar"></div>
              <div class="v-bar"></div>
            </div>
          </div>
          <div class="fp-meta-info">
            <span id="fGenre">Эфир</span>
            <span class="fp-listeners" id="fListenersRow" style="display:none;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 5.42 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              <span id="fListenersCount">0</span>
            </span>
          </div>
        </div>
        <button class="btn-icon fav-btn" id="fFavBtn" onclick="toggleFav()">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>

      <div class="fp-controls">
        <button class="fp-sec-btn" onclick="prevStation()">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="fp-main-btn" onclick="togglePlay()">
          <svg id="fPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="fp-sec-btn" onclick="nextStation()">

<script>
// ─── НАСТРОЙКИ ТЕЛЕГРАМ ЧАТА ───
const TELEGRAM_CHANNEL = "strmradio"; 

// --- ИНИЦИАЛИЗАЦИЯ ДАННЫХ ---
const stations = window.stations || [];
const radioGenres = window.genres || [{id:"all", label:"Все"}];

let curIdx = -1;
let isPlaying = false;
let activeTab = "all";
let hls = null;

const audio = document.getElementById('audio');
audio.crossOrigin = "anonymous"; 

const favs = JSON.parse(localStorage.getItem('radio_favs') || '[]');
let trackPoll = null;

let carMode = localStorage.getItem('radio_car') === '1';

let audioCtx = null;
let analyser = null;
let audioSource = null;
let isVisualizerInit = false;

const tg = window.Telegram?.WebApp;
if(tg) { tg.ready(); tg.expand(); }

// --- ФУНКЦИЯ ДЛЯ ОТКРЫТИЯ ССЫЛКИ НА ЧАТ ---
function openExternalChat(e) {
  if (e) e.preventDefault();
  if (tg && tg.openTelegramLink) {
    tg.openTelegramLink('https://t.me/' + TELEGRAM_CHANNEL);
  } else {
    window.open('https://t.me/' + TELEGRAM_CHANNEL, '_blank');
  }
}

// --- ЧАСЫ ОБНОВЛЕНИЯ ---
function tick() {
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const clockEl = document.getElementById('liveClock');
  if (clockEl) clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
setInterval(tick, 1000);

// --- РЕЖИМ АВТО ---
function applyCarMode() {
  document.body.classList.toggle('car', carMode);
  document.getElementById('carBtn').classList.toggle('active', carMode);
  
  const desktopTitle = document.getElementById('fpDesktopTitle');
  if (carMode) {
    desktopTitle.textContent = "🚗 РЕЖИМ АВТО (ВЫЙТИ)";
    if (window.innerWidth < 1024) openFullPlayer();
  } else {
    desktopTitle.textContent = "Сейчас играет";
  }
}

function toggleCarMode() {
  carMode = !carMode;
  localStorage.setItem('radio_car', carMode ? '1' : '0');
  applyCarMode();
  if(tg) tg.HapticFeedback?.impactOccurred('medium');
}

// --- MEDIA SESSION ---
function updateMediaSession(station, trackTitle = 'Прямой эфир') {
  if ('mediaSession' in navigator) {
    const cover = station.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(station.name)}&background=random`;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: station.name,
      artist: trackTitle,
      album: station.genre || 'Радио',
      artwork: [
        { src: cover, sizes: '96x96', type: 'image/png' },
        { src: cover, sizes: '192x192', type: 'image/png' },
        { src: cover, sizes: '512x512', type: 'image/png' }
      ]
    });
  }
}

function initMediaSessionActions() {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('play', () => togglePlay());
    navigator.mediaSession.setActionHandler('pause', () => togglePlay());
    navigator.mediaSession.setActionHandler('previoustrack', () => prevStation());
    navigator.mediaSession.setActionHandler('nexttrack', () => nextStation());
  }
}

// --- ТЕМИЗАЦИЯ ---
let isDark = localStorage.getItem('radio_dark') === '1' || (tg && tg.colorScheme === 'dark');
function applyTheme() {
  document.body.classList.toggle('dark', isDark);
  document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#000000' : '#ffffff');
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('radio_dark', isDark ? '1' : '0');
  applyTheme();
  loadTelegramChat();
  if(tg) tg.HapticFeedback?.impactOccurred('light');
}

// --- РЕНДЕР ИНТЕРФЕЙСА ---
function renderTabs() {
  const tabsEl = document.getElementById('genreTabs');
  let displayGenres = [...radioGenres];
  if (!displayGenres.some(g => g.id === 'fav')) {
    displayGenres.splice(1, 0, {id: 'fav', label: 'Избранное'});
  }
  tabsEl.innerHTML = displayGenres.map(g => 
    `<button class="tab ${activeTab === g.id ? 'active' : ''}" onclick="setTab('${g.id}')">${g.label}</button>`
  ).join('');
}

function setTab(id) {
  activeTab = id;
  renderTabs();
  renderList();
  if(tg) tg.HapticFeedback?.selectionChanged();
}

onSearchInput = function() { renderList(); }

function renderList() {
  const listEl = document.getElementById('stationList');
  listEl.style.display = 'block';

  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = stations.filter(s => {
    if (activeTab === 'fav' && !favs.includes(s.name)) return false;
    if (activeTab !== 'all' && activeTab !== 'fav' && s.tag !== activeTab) return false;
    if (q && !s.name.toLowerCase().includes(q)) return false;
    return true;
  });

  if (!filtered.length) {
    listEl.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-sec)">Ничего не найдено</div>`;
    return;
  }

  listEl.innerHTML = filtered.map((s) => {
    const origIdx = stations.indexOf(s);
    const isActive = origIdx === curIdx;
    const cover = s.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random`;
    const fallback = `this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random';`;
    
    return `
      <div class="station-row ${isActive ? 'active' : ''}" onclick="playStation(${origIdx})">
        <img src="${cover}" class="station-img" loading="lazy" onerror="${fallback}">
        <div class="station-info">
          <div class="station-name">${s.name}</div>
          <div class="station-meta-row">
            <span class="station-genre">${s.genre || 'Радио'}</span>
            <span class="station-listeners-count">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="opacity:0.7;"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 5.42 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              <span>${s.listeners || 0}</span>
            </span>
          </div>
        </div>
        <div class="playing-icon">ЭФИР ▶</div>
      </div>
    `;
  }).join('');
}

// --- ЧАТ ТЕЛЕГРАМ ---
function loadTelegramChat() {
  const isDesktop = window.innerWidth >= 1024;
  const isSheetOpen = document.getElementById('chatSheet').classList.contains('open');
  
  document.getElementById('tgChatContainer').innerHTML = '';
  document.getElementById('mobileSheetChatContainer').innerHTML = '';
  
  if (!isDesktop && !isSheetOpen) return;
  
  const containerId = isSheetOpen ? 'mobileSheetChatContainer' : 'tgChatContainer';
  const container = document.getElementById(containerId);
  if (!container) return;
  
  const script = document.createElement('script');
  script.async = true;
  script.src = "https://telegram.org/js/telegram-widget.js?22";
  script.setAttribute('data-telegram-discussion', TELEGRAM_CHANNEL);
  script.setAttribute('data-comments-limit', '20');
  script.setAttribute('data-width', '100%');
  if (isDark) script.setAttribute('data-dark', '1');
  
  container.appendChild(script);
}

function openChatSheet() {
  const sheet = document.getElementById('chatSheet');
  sheet.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
  if (window.innerWidth >= 1024) sheet.style.transform = 'translate(-50%, 0)';
  else sheet.style.transform = 'translateY(0)';
  
  sheet.classList.add('open');
  document.getElementById('chatBackdrop').classList.add('open');
  loadTelegramChat();
  if(tg) tg.HapticFeedback?.impactOccurred('light');
}

function closeChatSheet() {
  const sheet = document.getElementById('chatSheet');
  sheet.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
  if (window.innerWidth >= 1024) sheet.style.transform = 'translate(-50%, 100%)';
  else sheet.style.transform = 'translateY(100%)';
  
  sheet.classList.remove('open');
  document.getElementById('chatBackdrop').classList.remove('open');
  setTimeout(() => {
    document.getElementById('mobileSheetChatContainer').innerHTML = '';
    if (window.innerWidth >= 1024) loadTelegramChat();
  }, 400);
}

function initChatSheetGestures() {
  const sheet = document.getElementById('chatSheet');
  let startY = 0, currentY = 0;
  sheet.addEventListener('touchstart', (e) => {
    if (window.innerWidth >= 1024) return;
    const body = document.getElementById('mobileSheetChatContainer');
    if (body.scrollTop <= 0 || e.target.closest('.sheet-header') || e.target.closest('.sheet-handle')) {
      startY = e.touches[0].clientY;
    } else startY = 0;
  }, { passive: true });
  sheet.addEventListener('touchmove', (e) => {
    if (!startY || window.innerWidth >= 1024) return;
    currentY = e.touches[0].clientY;
    let diffY = currentY - startY;
    if (diffY > 0) {
      sheet.style.transform = `translateY(${diffY}px)`;
      sheet.style.transition = 'none';
    }
  }, { passive: true });
  sheet.addEventListener('touchend', (e) => {
    if (!startY || !currentY || window.innerWidth >= 1024) return;
    let diffY = currentY - startY;
    sheet.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
    if (diffY > 120) closeChatSheet();
    else sheet.style.transform = 'translateY(0)';
    startY = 0; currentY = 0;
  }, { passive: true });
}

// ─── РЕАЛЬНЫЙ АУДИО ВИЗУАЛИЗАТОРА ───
function initAudioAnalyser() {
  if (isVisualizerInit) return;
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    
    audioSource = audioCtx.createMediaElementSource(audio);
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    isVisualizerInit = true;
    startVisualizerRenderLoop();
  } catch (e) {
    startProceduralFallbackLoop();
  }
}

function startVisualizerRenderLoop() {
  const bars = document.querySelectorAll('.v-bar');
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function render() {
    requestAnimationFrame(render);
    if (!isPlaying || audio.paused) {
      bars.forEach(b => b.style.transform = 'scaleY(0.2)');
      return;
    }
    analyser.getByteFrequencyData(dataArray);
    let checkSum = 0;
    for (let i = 0; i < dataArray.length; i++) checkSum += dataArray[i];
    
    if (checkSum === 0) {
      let time = Date.now() * 0.004;
      bars.forEach((bar, i) => {
        let val = Math.sin(time + i * 0.7) * 0.4 + 0.6;
        bar.style.transform = `scaleY(${val})`;
      });
      return;
    }
    const bins = [2, 5, 8, 12]; 
    bars.forEach((bar, i) => {
      let rawValue = dataArray[bins[i]] || 0;
      let targetScale = 0.2 + (rawValue / 255) * 0.8;
      bar.style.transform = `scaleY(${targetScale})`;
    });
  }
  render();
}

function startProceduralFallbackLoop() {
  const bars = document.querySelectorAll('.v-bar');
  function render() {
    requestAnimationFrame(render);
    if (!isPlaying || audio.paused) {
      bars.forEach(b => b.style.transform = 'scaleY(0.2)');
      return;
    }
    let time = Date.now() * 0.005;
    bars.forEach((bar, i) => {
      let val = 0.2 + (Math.sin(time + i * 1.2) * 0.4 + 0.4);
      bar.style.transform = `scaleY(${val})`;
    });
  }
  render();
}

// --- УПРАВЛЕНИЕ АУДИОПОТОКОМ ---
function playStation(idx) {
  if (curIdx === idx && isPlaying) {
    if (window.innerWidth < 1024) openFullPlayer();
    return;
  }
  
  if (tg) tg.HapticFeedback?.impactOccurred('medium');
  curIdx = idx;
  const s = stations[idx];
  
  updateUI();
  if (window.innerWidth < 1024 && !carMode) {
    document.getElementById('miniPlayer').classList.remove('hidden');
  }
  
  if (hls) { hls.destroy(); hls = null; }
  audio.pause();
  audio.src = '';
  audio.crossOrigin = "anonymous"; 

  initAudioAnalyser();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  
  if (s.stream && s.stream.includes('.m3u8') && Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true });
    hls.loadSource(s.stream);
    hls.attachMedia(audio);
    hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(()=>{}));
  } else if(s.stream) {
    audio.src = s.stream;
    audio.play().catch(()=>{});
  }
  
  isPlaying = true;
  document.body.classList.add('playing');
  updatePlayButtons();
  renderList();
  
  updateMediaSession(s, 'Загрузка...');
  fetchTrack(s.stream);
  
  if (trackPoll) clearInterval(trackPoll);
  trackPoll = setInterval(() => fetchTrack(s.stream), 15000);
}

function togglePlay() {
  if (curIdx === -1 && stations.length > 0) return playStation(0);
  if (curIdx === -1) return;
  
  if (tg) tg.HapticFeedback?.impactOccurred('light');
  initAudioAnalyser();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  if (isPlaying) { 
    audio.pause(); 
    isPlaying = false; 
    document.body.classList.remove('playing');
  } else { 
    audio.play().catch(()=>{}); 
    isPlaying = true; 
    document.body.classList.add('playing');
  }
  
  updatePlayButtons();
  updateUI();
  if (stations[curIdx]) updateMediaSession(stations[curIdx], document.getElementById('fTrack').textContent);
}

function nextStation() {
  if(stations.length === 0) return;
  let nextIdx = curIdx + 1;
  if (nextIdx >= stations.length) nextIdx = 0;
  playStation(nextIdx);
}

function prevStation() {
  if(stations.length === 0) return;
  let prevIdx = curIdx - 1;
  if (prevIdx < 0) prevIdx = stations.length - 1;
  playStation(prevIdx);
}

function changeVolume(val) { audio.volume = val / 100; }

function updateUI() {
  const favBtn = document.getElementById('fFavBtn');
  const headerTitle = document.getElementById('headerTitle');
  
  if (curIdx === -1 || !stations[curIdx]) {
    headerTitle.textContent = "Радио";
    document.getElementById('mTitle').textContent = "Выберите станцию";
    document.getElementById('mSub').textContent = "";
    document.getElementById('fTitle').textContent = "Выберите станцию";
    document.getElementById('fTrack').textContent = "Радио Готово к запуску";
    document.getElementById('fGenre').textContent = "Эфир";
    document.getElementById('fListenersRow').style.display = "none";
    document.getElementById('fArt').style.opacity = "0";
    document.getElementById('fBg').style.backgroundImage = "none";
    favBtn.style.visibility = "hidden";
    return;
  }
  
  const s = stations[curIdx];
  headerTitle.textContent = s.name; 
  const cover = s.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random&color=fff&bold=true`;
  const fallback = `this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random';`;
  const isFav = favs.includes(s.name);
  
  document.getElementById('fArt').src = cover;
  favBtn.style.visibility = "visible";

  const mArt = document.getElementById('mArt');
  mArt.src = cover;
  mArt.setAttribute('onerror', fallback);
  document.getElementById('mTitle').textContent = s.name;
  
  document.getElementById('fBg').style.backgroundImage = `url(${cover})`;
  
  const fArt = document.getElementById('fArt');
  fArt.src = cover;
  fArt.setAttribute('onerror', fallback);
  document.getElementById('fTitle').textContent = s.name;
  document.getElementById('fGenre').textContent = s.genre || 'Радио';
  
  if (s.listeners !== undefined) {
    document.getElementById('fListenersCount').textContent = s.listeners;
    document.getElementById('fListenersRow').style.display = "inline-flex";
  } else {
    document.getElementById('fListenersRow').style.display = "none";
  }
  
  isPlaying ? fArt.classList.add('playing') : fArt.classList.remove('playing');

  favBtn.innerHTML = isFav 
    ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`
    : `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  favBtn.classList.toggle('active', isFav);
}

function updatePlayButtons() {
  const playPath = `<path d="M8 5v14l11-7z"/>`;
  const pausePath = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
  document.getElementById('mPlayIcon').innerHTML = isPlaying ? pausePath : playPath;
  document.getElementById('fPlayIcon').innerHTML = isPlaying ? pausePath : playPath;
}

function openFullPlayer() { 
  if (window.innerWidth < 1024 || carMode) {
    document.getElementById('fullPlayer').classList.add('open'); 
  }
}
function closeFullPlayer() { 
  if (!carMode) document.getElementById('fullPlayer').classList.remove('open'); 
}

function initSwipeGestures() {
  const fp = document.getElementById('fullPlayer');
  let startX = 0, startY = 0;
  fp.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
  }, { passive: true });
  fp.addEventListener('touchend', (e) => {
    if (!startX || !startY) return;
    let endX = e.changedTouches[0].clientX, endY = e.changedTouches[0].clientY;
    let diffX = startX - endX, diffY = startY - endY;
    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
      if (diffX > 0) nextStation(); else prevStation();
    } else if (window.innerWidth < 1024 && diffY < -80 && Math.abs(diffY) > Math.abs(diffX)) {
      closeFullPlayer();
    }
    startX = 0; startY = 0;
  }, { passive: true });
}

function toggleFav() {
  if (curIdx === -1) return;
  if(tg) tg.HapticFeedback?.notificationOccurred('success');
  const name = stations[curIdx].name;
  const idx = favs.indexOf(name);
  if (idx > -1) favs.splice(idx, 1); else favs.push(name);
  localStorage.setItem('radio_favs', JSON.stringify(favs));
  updateUI();
  if (activeTab === 'fav') renderList();
}

async function fetchTrack(url) {
  try {
    const res = await fetch(`https://radio-chat.deadked2011.workers.dev/now-playing?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const track = data.title && data.title.trim() ? data.title : 'В эфире';
    const trackEl = document.getElementById('fTrack');
    trackEl.textContent = track;
    document.getElementById('mSub').textContent = track;
    if (track.length > 22) trackEl.classList.add('scrollable');
    else trackEl.classList.remove('scrollable');
    if (curIdx !== -1 && stations[curIdx]) updateMediaSession(stations[curIdx], track);
  } catch (e) {
    if (curIdx !== -1 && stations[curIdx]) {
      const fallback = stations[curIdx].genre || 'Радио';
      document.getElementById('mSub').textContent = fallback;
      document.getElementById('fTrack').textContent = fallback;
      document.getElementById('fTrack').classList.remove('scrollable');
    }
  }
}

window.addEventListener('resize', () => {
  renderTabs();
  renderList();
  if (window.innerWidth >= 1024) { closeFullPlayer(); closeChatSheet(); }
  applyCarMode();
  loadTelegramChat();
});

window.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  applyCarMode();
  initMediaSessionActions();
  audio.volume = 0.8;
  renderTabs();
  renderList();
  updateUI();
  initSwipeGestures();
  initChatSheetGestures();
  loadTelegramChat();
  tick();
});
</script>
</body>
</html>
