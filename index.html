<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3; --card: #ffffff; --text: #1a1a1a; --muted: #9a9a9a;
  --accent: #1a1a1a; --border: #e8e6e1; --pill: #f0ede8;
  --shadow: 0 2px 24px rgba(0,0,0,0.07);
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bottom: env(safe-area-inset-bottom,0px);
  --touch-size: 48px; /* минимум для авто-экрана */
}

/* ── АВТО-РЕЖИМ: тёмная тема по умолчанию ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#111113; --card:#1e1e20; --text:#f0f0f0; --muted:#6e6e73;
    --accent:#f0f0f0; --border:#2e2e30; --pill:#2a2a2c;
  }
}

html, body { height:100%; overscroll-behavior:none; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh;
  padding:calc(var(--safe-top) + 14px) 16px calc(var(--safe-bottom) + 20px);
}
.app { width:100%; max-width:520px; margin:0 auto; }

/* ═══ HEADER ═══ */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.header-title { font-family:'DM Serif Display',serif; font-size:22px; letter-spacing:-.3px; }
.header-right { display:flex; align-items:center; gap:10px; }
.clock { font-size:13px; color:var(--muted); font-weight:300; font-variant-numeric:tabular-nums; }
.live-pill {
  display:flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:100px; background:var(--pill);
  font-size:11px; font-weight:500; color:var(--muted);
  text-transform:uppercase; letter-spacing:.4px;
  transition:all .3s;
}
.live-pill.on { background:#1a3a2a; color:#4caf7d; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
.live-pill.on .live-dot { background:#4caf7d; animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ═══ SEARCH ═══ */
.search-wrap { position:relative; margin-bottom:12px; }
.search-input {
  width:100%; padding:12px 16px 12px 42px;
  background:var(--card); border:none; border-radius:14px;
  font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text);
  box-shadow:0 1px 8px rgba(0,0,0,0.06); outline:none; -webkit-appearance:none;
}
.search-input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; display:flex; }

/* ═══ GENRES ═══ */
.genres { display:flex; gap:7px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.genres::-webkit-scrollbar { display:none; }
.genre-pill {
  padding:8px 15px; border-radius:100px; background:var(--pill);
  color:var(--muted); font-size:12px; font-weight:500; cursor:pointer;
  border:none; white-space:nowrap; text-transform:uppercase; letter-spacing:.3px;
  flex-shrink:0; min-height:var(--touch-size); display:flex; align-items:center;
  transition:all .15s;
}
.genre-pill.active { background:var(--accent); color:var(--bg); }

/* ═══ NOW PLAYING CARD ═══ */
.now-card {
  background:var(--card); border-radius:22px; padding:20px;
  box-shadow:var(--shadow); margin-bottom:14px; display:none;
}
.now-card.visible { display:block; }

.now-top { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.now-logo {
  width:56px; height:56px; border-radius:14px; background:var(--pill);
  overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:24px;
}
.now-logo img { width:100%; height:100%; object-fit:cover; }
.now-info { flex:1; min-width:0; }
.now-name { font-family:'DM Serif Display',serif; font-size:18px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.now-genre { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
.fav-btn {
  background:none; border:none; cursor:pointer; font-size:24px; color:var(--muted);
  flex-shrink:0; width:var(--touch-size); height:var(--touch-size);
  display:flex; align-items:center; justify-content:center; border-radius:50%;
  transition:all .15s;
}
.fav-btn:active { background:var(--pill); }
.fav-btn.on { color:#e05555; }

/* Loading bar */
.loading-bar { height:2px; background:var(--border); border-radius:2px; margin-bottom:12px; overflow:hidden; display:none; }
.loading-bar.active { display:block; }
.loading-bar-inner { height:100%; width:30%; background:var(--accent); border-radius:2px; animation:loading 1.2s ease-in-out infinite; }
@keyframes loading { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }

/* Visualizer */
.viz { height:36px; display:flex; align-items:center; gap:2px; margin-bottom:16px; }
.bar { flex:1; background:var(--border); border-radius:3px; height:4px; }
.bar.on { background:var(--accent); animation:pulse var(--dur,.8s) ease-in-out infinite alternate; }
@keyframes pulse { from{height:var(--min,4px)} to{height:var(--max,26px)} }

/* ═══ CONTROLS — большие для авто ═══ */
.controls { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.ctrl {
  background:var(--pill); border:none; cursor:pointer; color:var(--muted);
  width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0;
}
.ctrl:active { background:var(--border); color:var(--text); transform:scale(.95); }
.ctrl svg { width:22px; height:22px; }
.play-btn {
  width:68px; height:68px; border-radius:50%;
  background:var(--accent); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 22px rgba(0,0,0,0.2); transition:transform .15s;
}
.play-btn:active { transform:scale(.94); }
.play-btn svg { width:24px; height:24px; fill:var(--bg); margin-left:3px; }
.play-btn.playing svg { margin-left:0; }

/* Volume */
.vol-row { display:flex; align-items:center; gap:12px; padding-top:14px; border-top:1px solid var(--border); }
.vol-icon { color:var(--muted); display:flex; flex-shrink:0; }
.vol-icon svg { width:16px; height:16px; }
input[type=range] {
  flex:1; -webkit-appearance:none; height:4px; border-radius:4px;
  background:var(--border); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px;
  border-radius:50%; background:var(--accent); cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,0.2);
}

/* ═══ STATION LIST ═══ */
.section-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:500; margin-bottom:9px; padding:0 2px; }
.list { display:flex; flex-direction:column; gap:7px; }
.row {
  background:var(--card); border-radius:16px; padding:13px 16px;
  display:flex; align-items:center; gap:14px; cursor:pointer;
  box-shadow:0 1px 6px rgba(0,0,0,0.05); user-select:none;
  min-height:68px; /* крупнее для авто */
  transition:box-shadow .15s;
}
.row:active { box-shadow:var(--shadow); transform:scale(.99); }
.row.active { outline:2px solid var(--accent); }
.row-img { width:44px; height:44px; border-radius:11px; background:var(--pill); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; }
.row-img img { width:100%; height:100%; object-fit:cover; }
.row-info { flex:1; min-width:0; }
.row-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-sub { font-size:12px; color:var(--muted); margin-top:2px; }
.row-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.row-dot { width:8px; height:8px; border-radius:50%; background:var(--border); }
.row.active .row-dot { background:#4caf7d; animation:blink 1.5s infinite; }
.row-cnt { font-size:11px; color:var(--muted); }
.empty { text-align:center; color:var(--muted); font-size:14px; padding:32px 0; }

/* ═══ АВТО-РЕЖИМ: горизонтальный layout на широких экранах ═══ */
@media (min-width:700px) and (orientation:landscape) {
  .app { max-width:100%; display:grid; grid-template-columns:340px 1fr; gap:16px; align-items:start; }
  .header, .search-wrap, .genres { grid-column:1/-1; }
  .now-card { position:sticky; top:16px; }
  .section-label, .list { grid-column:2; }
  .play-btn { width:80px; height:80px; }
  .play-btn svg { width:28px; height:28px; }
  .ctrl { width:60px; height:60px; }
  .ctrl svg { width:26px; height:26px; }
  .now-logo { width:64px; height:64px; }
  .now-name { font-size:20px; }
  .row { min-height:76px; }
  .row-name { font-size:15px; }
}
</style>

// ═══ ВИЗУАЛИЗАТОР ═══
const viz=document.getElementById("viz");const bars=[];
for(let i=0;i<32;i++){const b=document.createElement("div");b.className="bar";const mn=3+Math.random()*5,mx=10+Math.random()*20,dur=.4+Math.random()*.7;b.style.cssText=`height:${mn}px;--min:${mn}px;--max:${mx}px;--dur:${dur}s;animation-delay:${(Math.random()*.6).toFixed(2)}s`;viz.appendChild(b);bars.push(b);}
function vizOn(on){bars.forEach(b=>on?b.classList.add("on"):b.classList.remove("on"));}
function setLoading(on){document.getElementById("loadingBar").classList.toggle("active",on);}

// ═══ HLS ВОСПРОИЗВЕДЕНИЕ ═══
function playStream(url) {
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
  setLoading(true); vizOn(false);

  const isHLS = url.includes(".m3u8");

  if(isHLS && audio.canPlayType("application/vnd.apple.mpegurl")) {
    // Safari / WebKit (iOS, некоторые авто-системы на WebKit)
    audio.src=url;
    audio.play().then(()=>{setLoading(false);setPlaying(true);}).catch(()=>{setLoading(false);setPlaying(false);});
    return;
  }
  if(isHLS && typeof Hls!=="undefined" && Hls.isSupported()) {
    // Chrome / Firefox / Android WebView
    hlsInstance=new Hls({enableWorker:true,lowLatencyMode:true,backBufferLength:30});
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(audio);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{
      audio.play().then(()=>{setLoading(false);setPlaying(true);}).catch(()=>{setLoading(false);setPlaying(false);});
    });
    hlsInstance.on(Hls.Events.ERROR,(_,data)=>{
      if(data.fatal){
        setLoading(false);setPlaying(false);
        if(data.type===Hls.ErrorTypes.NETWORK_ERROR) hlsInstance.startLoad();
        else if(data.type===Hls.ErrorTypes.MEDIA_ERROR) hlsInstance.recoverMediaError();
      }
    });
    return;
  }
  // Прямые MP3/AAC потоки — для старых систем
  audio.src=url;
  audio.play().then(()=>{setLoading(false);setPlaying(true);}).catch(()=>{setLoading(false);setPlaying(false);});
}

// ═══ MEDIA SESSION API — управление с руля / кнопок автомагнитолы ═══
function updateMediaSession(s) {
  if (!("mediaSession" in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.name,
    artist: s.genre,
    album: "Radio",
    artwork: [
      { src: s.logo, sizes: "256x256", type: "image/png" }
    ]
  });
  navigator.mediaSession.setActionHandler("play", ()=>{ if(!playing) togglePlay(); });
  navigator.mediaSession.setActionHandler("pause", ()=>{ if(playing) togglePlay(); });
  navigator.mediaSession.setActionHandler("previoustrack", prev);
  navigator.mediaSession.setActionHandler("nexttrack", next);
}

// ═══ ЗАГРУЗКА СТАНЦИИ ═══
function loadStation(idx, autoplay) {
  curIdx=idx;
  const s=stations[idx];
  const nl=document.getElementById("nowLogo");
  nl.innerHTML=`<img src="${s.logo}" onerror="this.parentElement.textContent='🎵'">`;
  document.getElementById("nowName").textContent=s.name;
  document.getElementById("nowGenre").textContent=s.genre;
  updateFavBtn();
  document.getElementById("nowCard").classList.add("visible");
  if(tg) tg.setHeaderColor?.(tg.colorScheme==="dark"?"#1e1e20":"#f7f6f3");
  renderList();
  if(autoplay||playing){
    playStream(s.url);
    updateMediaSession(s);
  } else {
    if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
    audio.pause(); audio.src=""; setPlaying(false);
  }
}

function setPlaying(on) {
  playing=on; vizOn(on);
  const pill=document.getElementById("livePill");
  pill.classList.toggle("on",on);
  document.getElementById("liveLabel").textContent=on?"Эфир":"Стоп";
  const btn=document.getElementById("playBtn");
  btn.classList.toggle("playing",on);
  document.getElementById("playIcon").innerHTML=on
    ?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    :'<polygon points="5 3 19 12 5 21 5 3"/>';
  if("mediaSession" in navigator)
    navigator.mediaSession.playbackState=on?"playing":"paused";
}

function togglePlay(){
  if(tg)tg.HapticFeedback?.impactOccurred("light");
  if(!playing){
    playStream(stations[curIdx].url);
    updateMediaSession(stations[curIdx]);
  } else {
    if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
    audio.pause(); setPlaying(false); setLoading(false);
  }
}
function prev(){if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation((curIdx-1+stations.length)%stations.length,playing);}
function next(){if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation((curIdx+1)%stations.length,playing);}
function setVol(v){audio.volume=v/100;}

function toggleFav(){
  if(tg)tg.HapticFeedback?.notificationOccurred("success");
  const id=stations[curIdx].id;const i=favs.indexOf(id);
  if(i===-1)favs.push(id);else favs.splice(i,1);
  localStorage.setItem("rfavs",JSON.stringify(favs));updateFavBtn();
}
function updateFavBtn(){
  const on=favs.includes(stations[curIdx].id);
  const b=document.getElementById("favBtn");b.textContent=on?"♥":"♡";b.classList.toggle("on",on);
}

function renderGenres(){
  const el=document.getElementById("genrePills");el.innerHTML="";
  genres.forEach(g=>{const b=document.createElement("button");b.className="genre-pill"+(g.id===activeGenre?" active":"");b.textContent=g.label;b.onclick=()=>{activeGenre=g.id;renderGenres();renderList();};el.appendChild(b);});
}

function renderList(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const el=document.getElementById("stationList");el.innerHTML="";
  const filtered=stations.filter(s=>(activeGenre==="all"||s.tag===activeGenre)&&(!q||s.name.toLowerCase().includes(q)||s.genre.toLowerCase().includes(q)));
  document.getElementById("listLabel").textContent=activeGenre==="all"?`Все станции (${filtered.length})`:`${filtered.length} станций`;
  if(!filtered.length){el.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  filtered.forEach(s=>{
    const idx=stations.indexOf(s);
    const row=document.createElement("div");
    row.className="row"+(idx===curIdx?" active":"");
    row.innerHTML=`
      <div class="row-img"><img src="${s.logo}" onerror="this.parentElement.textContent='🎵'"></div>
      <div class="row-info">
        <div class="row-name">${s.name}</div>
        <div class="row-sub">${s.genre}</div>
      </div>
      <div class="row-right">
        <div class="row-dot"></div>
        ${s.listeners>0?`<div class="row-cnt">${s.listeners.toLocaleString("ru")}</div>`:""}
      </div>`;
    row.onclick=()=>{if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation(idx,true);};
    el.appendChild(row);
  });
}

renderGenres(); renderList(); loadStation(0,false);
</script>
