<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" id="themeColorMeta">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #000000;
    --text-sec: #8e8e93;
    --surface: #f2f2f7;
    --surface-hover: #e5e5ea;
    --accent: #fc3c44; /* Apple Music Red */
    --player-bg: rgba(255, 255, 255, 0.85);
    --border: rgba(0, 0, 0, 0.08);
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  body.dark {
    --bg: #000000;
    --text: #ffffff;
    --text-sec: #ebebf599;
    --surface: #1c1c1e;
    --surface-hover: #2c2c2e;
    --player-bg: rgba(28, 28, 30, 0.85);
    --border: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); overflow: hidden; transition: background 0.3s; }

  /* ─── MAIN LAYOUT ─── */
  .app-container { height: 100dvh; display: flex; flex-direction: column; }
  
  .header { padding: calc(var(--safe-top) + 16px) 20px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .header-actions button { background: var(--surface); border: none; width: 36px; height: 36px; border-radius: 50%; color: var(--text); cursor: pointer; display: flex; justify-content: center; align-items: center; }

  .content-scroll { flex: 1; overflow-y: auto; padding: 0 20px calc(var(--safe-bottom) + 100px); scrollbar-width: none; }
  .content-scroll::-webkit-scrollbar { display: none; }

  /* ─── SEARCH & TABS ─── */
  .search-box { margin: 16px 0; background: var(--surface); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .search-box input { border: none; background: transparent; width: 100%; font-size: 16px; color: var(--text); outline: none; }
  .search-box input::placeholder { color: var(--text-sec); }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 8px 16px; border-radius: 20px; background: var(--surface); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; border: none; transition: 0.2s; }
  .tab.active { background: var(--text); color: var(--bg); }

  /* ─── STATION LIST ─── */
  .station-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; cursor: pointer; border-bottom: 1px solid var(--border); transition: opacity 0.2s; }
  .station-row:active { opacity: 0.6; }
  .station-img { width: 52px; height: 52px; border-radius: 10px; background: var(--surface); object-fit: cover; }
  .station-info { flex: 1; min-width: 0; }
  .station-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .station-genre { font-size: 13px; color: var(--text-sec); }
  .playing-icon { display: none; color: var(--accent); font-size: 12px; }
  .station-row.active .playing-icon { display: block; }
  .station-row.active .station-name { color: var(--accent); }

  /* ─── MINI PLAYER (BOTTOM BAR) ─── */
  .mini-player { position: fixed; bottom: var(--safe-bottom); left: 12px; right: 12px; background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 8px 16px 8px 8px; display: flex; align-items: center; gap: 12px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.12); cursor: pointer; transition: transform 0.3s; }
  .mini-player.hidden { transform: translateY(150%); }
  .mini-art { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: var(--surface); }
  .mini-info { flex: 1; min-width: 0; }
  .mini-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-sub { font-size: 13px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-controls { display: flex; align-items: center; gap: 16px; }
  .btn-icon { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn-icon svg { width: 24px; height: 24px; fill: currentColor; }

  /* ─── FULL SCREEN PLAYER ─── */
  .full-player { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: var(--bg); z-index: 200; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow: hidden; }
  .full-player.open { transform: translateY(0); }
  .fp-bg { position: absolute; top: -50px; left: -50px; right: -50px; bottom: -50px; background-size: cover; background-position: center; filter: blur(60px) brightness(0.6); z-index: 1; opacity: 0.5; }
  body.dark .fp-bg { opacity: 0.3; }
  .fp-content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; padding: var(--safe-top) 24px calc(var(--safe-bottom) + 24px); }
  
  .fp-header { display: flex; justify-content: space-between; padding: 16px 0 32px; }
  .fp-down { background: none; border: none; color: var(--text); cursor: pointer; }
  .fp-down svg { width: 32px; height: 32px; }

  .fp-art-wrap { width: 100%; aspect-ratio: 1; margin-bottom: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; flex-shrink: 0; }
  .fp-art { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .fp-art:not(.playing) { transform: scale(0.85); border-radius: 24px; }

  .fp-info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .fp-titles { flex: 1; min-width: 0; }
  .fp-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fp-track { font-size: 16px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;}

  .fp-controls { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 40px; padding: 0 20px; }
  .fp-main-btn { width: 72px; height: 72px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; }
  .fp-main-btn svg { width: 32px; height: 32px; fill: currentColor; }
  .fp-sec-btn { background: none; border: none; color: var(--text); cursor: pointer; }
  .fp-sec-btn svg { width: 32px; height: 32px; fill: currentColor; }
  
  .fav-btn.active { color: var(--accent); }

  /* Volume */
  .vol-bar { display: flex; align-items: center; gap: 12px; color: var(--text-sec); }
  .vol-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: var(--border); outline: none; }
  .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1>Radio</h1>
    <div class="header-actions">
      <button onclick="toggleTheme()" id="themeBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div class="content-scroll">
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-sec)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Найти станцию..." oninput="renderList()">
    </div>
    
    <div class="tabs" id="genreTabs">
      </div>

    <div id="stationList">
      </div>
  </div>
</div>

<div class="mini-player hidden" id="miniPlayer" onclick="openFullPlayer()">
  <img src="" class="mini-art" id="mArt">
  <div class="mini-info">
    <div class="mini-title" id="mTitle">Station Name</div>
    <div class="mini-sub" id="mSub">Artist - Track</div>
  </div>
  <div class="mini-controls">
    <button class="btn-icon" onclick="event.stopPropagation(); togglePlay()">
      <svg id="mPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn-icon" onclick="event.stopPropagation(); nextStation()">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
  </div>
</div>

<div class="full-player" id="fullPlayer">
  <div class="fp-bg" id="fBg"></div>
  <div class="fp-content">
    <div class="fp-header">
      <button class="fp-down" onclick="closeFullPlayer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
    
    <div class="fp-art-wrap">
      <img src="" class="fp-art" id="fArt">
    </div>

    <div class="fp-info-row">
      <div class="fp-titles">
        <div class="fp-title" id="fTitle">Station Name</div>
        <div class="fp-track" id="fTrack">Loading track...</div>
      </div>
      <button class="btn-icon fav-btn" id="fFavBtn" onclick="toggleFav()">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>

    <div class="fp-controls">
      <button class="fp-sec-btn" onclick="prevStation()">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="fp-main-btn" onclick="togglePlay()">
        <svg id="fPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="fp-sec-btn" onclick="nextStation()">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <div class="vol-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/></svg>
      <input type="range" class="vol-slider" min="0" max="100" value="80" oninput="changeVolume(this.value)" id="vSlider">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
// --- БАЗА ДАННЫХ ---
const stations = [
  {name:"SOUNDPARK DEEP", genre:"Deep House", tag:"deep", logo:"https://radiopotok.ru/f/station/256/1260.png", stream:"https://h.getradio.me/spdeep/hls.m3u8"},
  {name:"Русское Радио", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/85.png", stream:"https://h.getradio.me/rp85/hls.m3u8"},
  {name:"Маруся ФМ", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/1323.png", stream:"https://h.getradio.me/rp1323/hls.m3u8"},
  {name:"Европа Плюс", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/1576.png", stream:"https://h.getradio.me/rp1576/hls.m3u8"},
  {name:"Ретро Хит", genre:"Ретро", tag:"retro", logo:"https://radiopotok.ru/f/station/256/1570.png", stream:"https://h.getradio.me/rp1570/hls.m3u8"},
  {name:"Вести FM", genre:"Новости", tag:"news", logo:"https://radiopotok.ru/f/station/256/644.png", stream:"https://h.getradio.me/rp644/hls.m3u8"}
];

// --- СОСТОЯНИЕ ---
let curIdx = -1;
let isPlaying = false;
let activeTab = "all";
let hls = null;
const audio = document.getElementById('audio');
const favs = JSON.parse(localStorage.getItem('radio_favs') || '[]');
let trackPoll = null;

// Инициализация Telegram (если открыто внутри ТГ)
const tg = window.Telegram?.WebApp;
if(tg) { tg.ready(); tg.expand(); }

// --- ТЕМА ---
let isDark = localStorage.getItem('radio_dark') === '1' || (tg && tg.colorScheme === 'dark');
function applyTheme() {
  document.body.classList.toggle('dark', isDark);
  document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#000000' : '#ffffff');
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('radio_dark', isDark ? '1' : '0');
  applyTheme();
  if(tg) tg.HapticFeedback?.impactOccurred('light');
}
applyTheme();

// --- РЕНДЕР ИНТЕРФЕЙСА ---
function renderTabs() {
  const tabsEl = document.getElementById('genreTabs');
  const genres = [{id: 'all', name: 'Все'}, {id: 'fav', name: 'Избранное'}];
  const uniqueTags = [...new Set(stations.map(s => s.tag))];
  uniqueTags.forEach(t => genres.push({id: t, name: t.toUpperCase()}));

  tabsEl.innerHTML = genres.map(g => 
    `<button class="tab ${activeTab === g.id ? 'active' : ''}" onclick="setTab('${g.id}')">${g.name}</button>`
  ).join('');
}

function setTab(id) {
  activeTab = id;
  renderTabs();
  renderList();
  if(tg) tg.HapticFeedback?.selectionChanged();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const listEl = document.getElementById('stationList');
  
  const filtered = stations.filter(s => {
    if (activeTab === 'fav' && !favs.includes(s.name)) return false;
    if (activeTab !== 'all' && activeTab !== 'fav' && s.tag !== activeTab) return false;
    if (q && !s.name.toLowerCase().includes(q)) return false;
    return true;
  });

  if (!filtered.length) {
    listEl.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-sec)">Ничего не найдено</div>`;
    return;
  }

  listEl.innerHTML = filtered.map((s) => {
    const origIdx = stations.indexOf(s);
    const isActive = origIdx === curIdx;
    return `
      <div class="station-row ${isActive ? 'active' : ''}" onclick="playStation(${origIdx})">
        <img src="${s.logo}" class="station-img" loading="lazy">
        <div class="station-info">
          <div class="station-name">${s.name}</div>
          <div class="station-genre">${s.genre}</div>
        </div>
        <div class="playing-icon">АУДИО ▶</div>
      </div>
    `;
  }).join('');
}

// --- ПЛЕЕР ---
function playStation(idx) {
  if (curIdx === idx && isPlaying) return openFullPlayer(); // Если уже играет, просто открываем
  
  if (tg) tg.HapticFeedback?.impactOccurred('medium');
  curIdx = idx;
  const s = stations[idx];
  
  updateUI();
  document.getElementById('miniPlayer').classList.remove('hidden');
  
  // Очистка HLS
  if (hls) { hls.destroy(); hls = null; }
  audio.pause();
  audio.src = '';
  
  // Запуск
  if (s.stream.includes('.m3u8') && Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode: true });
    hls.loadSource(s.stream);
    hls.attachMedia(audio);
    hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(()=>{}));
  } else {
    audio.src = s.stream;
    audio.play().catch(()=>{});
  }
  
  isPlaying = true;
  updatePlayButtons();
  renderList();
  fetchTrack(s.stream);
  
  if (trackPoll) clearInterval(trackPoll);
  trackPoll = setInterval(() => fetchTrack(s.stream), 15000);
}

function togglePlay() {
  if (curIdx === -1) return playStation(0);
  if (tg) tg.HapticFeedback?.impactOccurred('light');
  
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play(); isPlaying = true; }
  
  updatePlayButtons();
  updateUI(); // Для анимации обложки
}

function nextStation() {
  let nextIdx = curIdx + 1;
  if (nextIdx >= stations.length) nextIdx = 0;
  playStation(nextIdx);
}

function prevStation() {
  let prevIdx = curIdx - 1;
  if (prevIdx < 0) prevIdx = stations.length - 1;
  playStation(prevIdx);
}

function changeVolume(val) {
  audio.volume = val / 100;
}

// --- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---
function updateUI() {
  if (curIdx === -1) return;
  const s = stations[curIdx];
  const isFav = favs.includes(s.name);

  // Обновление Mini Player
  document.getElementById('mArt').src = s.logo;
  document.getElementById('mTitle').textContent = s.name;
  
  // Обновление Full Player
  document.getElementById('fBg').style.backgroundImage = `url(${s.logo})`;
  document.getElementById('fArt').src = s.logo;
  document.getElementById('fTitle').textContent = s.name;
  
  // Анимация обложки (увеличение при игре, уменьшение на паузе)
  const fArt = document.getElementById('fArt');
  isPlaying ? fArt.classList.add('playing') : fArt.classList.remove('playing');

  // Избранное
  const favBtn = document.getElementById('fFavBtn');
  favBtn.innerHTML = isFav 
    ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`
    : `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  favBtn.classList.toggle('active', isFav);
}

function updatePlayButtons() {
  const playPath = `<path d="M8 5v14l11-7z"/>`;
  const pausePath = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
  document.getElementById('mPlayIcon').innerHTML = isPlaying ? pausePath : playPath;
  document.getElementById('fPlayIcon').innerHTML = isPlaying ? pausePath : playPath;
}

// --- УПРАВЛЕНИЕ FULL PLAYER ---
function openFullPlayer() { document.getElementById('fullPlayer').classList.add('open'); }
function closeFullPlayer() { document.getElementById('fullPlayer').classList.remove('open'); }

// --- ИЗБРАННОЕ ---
function toggleFav() {
  if (curIdx === -1) return;
  if(tg) tg.HapticFeedback?.notificationOccurred('success');
  
  const name = stations[curIdx].name;
  const idx = favs.indexOf(name);
  if (idx > -1) favs.splice(idx, 1);
  else favs.push(name);
  
  localStorage.setItem('radio_favs', JSON.stringify(favs));
  updateUI();
  if (activeTab === 'fav') renderList();
}

// --- НАЗВАНИЕ ТРЕКА (API) ---
async function fetchTrack(url) {
  try {
    const res = await fetch(`https://radio-chat.deadked2011.workers.dev/now-playing?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const track = data.title && data.title.trim() ? data.title : 'В эфире';
    document.getElementById('mSub').textContent = track;
    document.getElementById('fTrack').textContent = track;
  } catch (e) {
    document.getElementById('mSub').textContent = stations[curIdx].genre;
    document.getElementById('fTrack').textContent = stations[curIdx].genre;
  }
}

// --- СТАРТ ---
audio.volume = 0.8;
renderTabs();
renderList();
</script>
</body>
</html>
