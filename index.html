<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FM Stream — TikTok Radio</title>
    <script src="stations.js"></script>
    <style>
        /* ══════════════════════════════════════════════════════
           ГЛОБАЛЬНЫЕ СТИЛИ (Fluent / Material Design)
           ══════════════════════════════════════════════════════ */
        :root {
            --bg-main: #090d16;
            --bg-sidebar: #111827;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            transition: filter 0.3s ease;
        }

        /* Режим затемнения экрана */
        body.dimmed-theme {
            filter: brightness(0.45) contrast(1.1);
        }
        body.dimmed-theme #right-sidebar-panel, 
        body.dimmed-theme #genres-container,
        body.dimmed-theme #app-header {
            filter: brightness(1.3); /* Сохраняем читаемость текста панелей */
        }

        #app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ══════════════════════════════════════════════════════
           ЛЕВАЯ ЧАСТЬ: ПЛЕЕР С ТИК-ТОК ЛЕНТОЙ
           ══════════════════════════════════════════════════════ */
        #left-player-panel {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #05070c;
        }

        /* Шапка управления */
        #app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(9, 13, 22, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 110;
        }

        .app-logo-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px #ef4444; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .app-logo-title h2 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-group {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        /* Горизонтальная лента жанров (Исправлено для ПК) */
        .genres-bar {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            overflow-x: auto;
            white-space: nowrap;
            background: rgba(5, 7, 12, 0.6);
            backdrop-filter: blur(10px);
            z-index: 100;
            scrollbar-width: none; /* Скрываем дефолтный скроллбар в Firefox */
            cursor: grab;
        }
        
        .genres-bar:active {
            cursor: grabbing;
        }

        .genres-bar::-webkit-scrollbar {
            display: none; /* Скрываем скроллбар Chrome/Safari */
        }

        .genre-btn {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            font-weight: 500;
        }

        .genre-btn.active, .genre-btn:hover {
            background: var(--accent-color);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Вертикальный Свайпер (TikTok-Style) */
        .swiper-main {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .swiper-main::-webkit-scrollbar {
            display: none;
        }

        .station-card {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Задний размытый фон */
        .station-blur-bg {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(0.25);
            z-index: 1;
            transition: background-image 0.5s ease;
        }

        .station-content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        /* Оформление логотипа */
        .logo-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 25px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .station-main-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 32px;
            border: 2px solid var(--glass-border);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .station-main-logo.loaded {
            opacity: 1;
        }

        .station-card.active-focus .station-main-logo {
            transform: scale(1.03);
        }

        .station-card-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            letter-spacing: -0.5px;
        }

        .station-card-genre {
            font-size: 14px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.08);
            padding: 4px 14px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        /* Информационная панель "Кто поет" */
        .now-playing-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            padding: 12px 18px;
            border-radius: 18px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .live-badge {
            background: #ef4444;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .track-info-text {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: #38bdf8;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.3s ease;
        }
        
        .track-info-text.updated {
            color: #34d399;
        }

        .listeners-count {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 35px;
        }

        /* Центральная Кнопка Воспроизведения */
        .center-play-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255,255,255,0.2), 0 0 0 0 rgba(255,255,255,0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .center-play-btn:hover {
            transform: scale(1.08);
        }

        .center-play-btn .play-icon { font-size: 28px; margin-left: 4px; color: #000; }
        .center-play-btn .pause-icon { font-size: 28px; color: #000; }

        .center-play-btn.playing {
            background: var(--accent-color);
            box-shadow: 0 10px 25px var(--accent-glow);
        }
        .center-play-btn.playing .pause-icon { color: #fff; }

        /* ══════════════════════════════════════════════════════
           ПРАВАЯ ЧАСТЬ: ИСТОРИЯ + КОММЕНТАРИИ (50/50 НА ПК)
           ══════════════════════════════════════════════════════ */
        #right-sidebar-panel {
            width: 450px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 150;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header-mobile {
            display: none; /* Нужен только для мобилок */
            padding: 16px 20px;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .close-sidebar-btn {
            background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer;
        }

        /* Секции разметки */
        .sidebar-section {
            flex: 1; /* Делит пополам 50/50 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .history-section {
            border-bottom: 1px solid var(--glass-border);
        }

        .section-title-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 20px 10px 20px;
        }

        .section-title-wrapper h3 {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px 20px;
        }

        /* Стилизация Списка Истории */
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--glass-border);
        }

        .history-item-logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            background: #1e293b;
        }

        .history-item-info {
            flex: 1;
            overflow: hidden;
        }

        .history-item-station {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .history-item-track {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-time {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 6px;
        }

        .empty-history {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 30px 10px;
        }

        /* Блок Комментариев */
        .telegram-widget-wrapper {
            width: 100%;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 14px;
            padding: 5px;
        }

        /* ══════════════════════════════════════════════════════
           АДАПТИВНОСТЬ / МЕДИА-ЗАПРОСЫ
           ══════════════════════════════════════════════════════ */
        
        /* Мобильная версия (Экраны меньше 1024px) */
        @media (max-width: 1023px) {
            #right-sidebar-panel {
                position: fixed;
                right: 0;
                top: 0;
                width: 100%;
                height: 100%;
                transform: translateX(100%); /* По умолчанию скрыто, открывается по кнопке */
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            }

            #right-sidebar-panel.open {
                transform: translateX(0);
            }

            .sidebar-header-mobile {
                display: flex;
            }
        }

        /* Стационарный режим для больших мониторов (Широкий ПК) */
        @media (min-width: 1024px) {
            #right-sidebar-panel {
                transform: translateX(0) !important; /* Всегда открыто на ПК */
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        
        <main id="left-player-panel">
            
            <header id="app-header">
                <div class="app-logo-title">
                    <span class="live-pulse-dot"></span>
                    <h2>FM STREAM</h2>
                </div>
                
                <div class="controls-group">
                    <button id="theme-toggle-btn" class="header-btn" onclick="toggleTheme()" title="Затемнить экран">🌓</button>
                    <button id="sidebar-toggle-btn" class="header-btn" onclick="toggleSidebar()" title="Общение и История">💬</button>
                </div>
            </header>

            <div id="genres-container" class="genres-bar"></div>

            <div id="swiper-container" class="swiper-main"></div>

        </main>

        <aside id="right-sidebar-panel">
            <div class="sidebar-header-mobile">
                <h3>Общение и История</h3>
                <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
            </div>
            
            <div class="sidebar-section history-section">
                <div class="section-title-wrapper">
                    <span class="section-icon">🕒</span>
                    <h3>История прослушивания</h3>
                </div>
                <div id="history-list" class="scrollable-content"></div>
            </div>
            
            <div class="sidebar-section comments-section">
                <div class="section-title-wrapper">
                    <span class="section-icon">💬</span>
                    <h3>Комментарии эфира</h3>
                </div>
                <div id="comments-container" class="scrollable-content">
                    <div class="telegram-widget-wrapper">
                        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                                data-telegram-discussion="radiostream_chat" 
                                data-comments-limit="5" 
                                data-color="4f46e5" 
                                data-dark="1"></script>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <script>
        let currentObserver = null;
        let activeAudio = new Audio();
        let currentPlayingIndex = -1;
        let currentPlayingStream = '';
        let hasUserInteracted = false;
        
        // База данных треков по жанрам для отображения "Кто поет" в реальном времени
        const trackPresets = {
            deep: ["Ben Böhmer - Beyond Beliefs", "Boris Brejcha - Space Diver", "Nora En Pure - Come With Me", "Lane 8 - Brightest Lights", "Claptone - No Eyes", "Tinlicker - Because You Move Me"],
            pop: ["Zivert - Beverly Hills", "JONY - Комета", "The Weeknd - Blinding Lights", "Dua Lipa - Levitating", "Harry Styles - As It Was", "Artik & Asti - Гармония"],
            edm: ["Martin Garrix - Animals", "Avicii - Levels", "Tiësto - The Business", "David Guetta - Titanium", "Armin van Buuren - Blah Blah Blah"],
            rap: ["Miyagi & Эндшпиль - I Got Love", "Скриптонит - Положение", "Macan - Asphalt 8", "Eminem - Lose Yourself", "Travis Scott - Goosebumps"],
            dnb: ["Sub Focus - Desire", "Chase & Status - Baddadan", "Pendulum - Waterfront", "Wilkinson - Afterglow"],
            trance: ["Armin van Buuren - Shivers", "Paul van Dyk - For An Angel", "ATB - 9 PM (Till I Come)", "Above & Beyond - Sun & Moon"],
            techno: ["Charlotte de Witte - Doppler", "Amelie Lens - Underneath the Moon", "Adam Beyer - Space Date", "Carl Cox - I Want You"],
            chill: ["Tycho - Awake", "Bonobo - Kiara", "Air - Cherry Blossom Girl", "Massive Attack - Teardrop"],
            rock: ["Король и Шут - Лесник", "Би-2 - Полковнику никто не пишет", "Кино - Группа крови", "Linkin Park - In The End", "Nirvana - Smells Like Spirit"],
            retro: ["Modern Talking - You're My Heart", "Юрий Шатунов - Белые Розы", "Michael Jackson - Billie Jean", "Madonna - Vogue"],
            shanson: ["Михаил Круг - Владимирский Централ", "Сергей Трофимов - Город Сочи", "Михаил Шуфутинский - 3 Сентября"],
            news: ["Главные Новости - Прямой Эфир", "Бизнес Обзор - Котировки рынка", "Информационный вестник часа"],
            jazz: ["Miles Davis - So What", "Louis Armstrong - What a Wonderful World", "Dave Brubeck - Take Five"],
            classic: ["Beethoven - Symphony No. 9", "Mozart - Requiem", "Vivaldi - The Four Seasons"],
            foreign: ["Coldplay - Hymn For The Weekend", "Adele - Rolling in the Deep", "Ed Sheeran - Shape of You"]
        };

        let trackIntervals = {};
        let currentTracksState = {};
        let playbackHistory = JSON.parse(localStorage.getItem('radio_history_list')) || [];

        document.addEventListener("DOMContentLoaded", () => {
            initGenresBar();
            initGenresScrollPC();
            renderStationsList('all');
            initThemeState();
            renderHistoryList();
        });

        // 1. Инициализация панели жанров
        function initGenresBar() {
            const container = document.getElementById('genres-container');
            if (!window.genres) return;
            
            container.innerHTML = window.genres.map((g, i) => `
                <button class="genre-btn ${i === 0 ? 'active' : ''}" onclick="selectGenre('${g.id}', this)">
                    ${g.label}
                </button>
            `).join('');
        }

        // 2. Умный горизонтальный скролл на ПК (Колесико мыши + Перетаскивание)
        function initGenresScrollPC() {
            const bar = document.getElementById('genres-container');
            
            // Прокрутка колесиком
            bar.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    bar.scrollLeft += e.deltaY * 1.2;
                }
            }, { passive: false });

            // Захват мышкой
            let isDown = false;
            let startX;
            let scrollLeft;

            bar.addEventListener('mousedown', (e) => {
                isDown = true;
                bar.classList.add('dragging-active');
                startX = e.pageX - bar.offsetLeft;
                scrollLeft = bar.scrollLeft;
            });
            bar.addEventListener('mouseleave', () => { isDown = false; });
            bar.addEventListener('mouseup', () => { isDown = false; });
            bar.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - bar.offsetLeft;
                const walk = (x - startX) * 2;
                bar.scrollLeft = scrollLeft - walk;
            });
        }

        // Выбор жанра
        function selectGenre(tag, btn) {
            document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            renderStationsList(tag);
            document.getElementById('swiper-container').scrollTop = 0;
        }

        // 3. Генерация TikTok-ленты радиостанций
        function renderStationsList(filterTag = 'all') {
            const container = document.getElementById('swiper-container');
            container.innerHTML = '';
            
            const list = filterTag === 'all' 
                ? window.stations 
                : window.stations.filter(s => s.tag === filterTag);
                
            if (!list || list.length === 0) {
                container.innerHTML = '<div class="empty-history" style="margin-top:40vh">Нет радиостанций в этом жанре</div>';
                return;
            }

            list.forEach((station, idx) => {
                const card = document.createElement('div');
                card.className = 'station-card';
                card.dataset.index = idx;
                card.dataset.stream = station.stream;
                card.dataset.name = station.name;
                card.dataset.logo = station.logo;
                card.dataset.tag = station.tag;

                card.innerHTML = `
                    <div class="station-blur-bg" style="background-image: url('${station.logo}')"></div>
                    <div class="station-content-wrapper">
                        <div class="logo-container">
                            <img src="${station.logo}" alt="${station.name}" class="station-main-logo" onload="this.classList.add('loaded')" onerror="handleLogoError(this, '${station.name}')">
                        </div>
                        <h1 class="station-card-title">${station.name}</h1>
                        <p class="station-card-genre">${station.genre}</p>
                        
                        <div class="now-playing-container">
                            <span class="live-badge">ЭФИР</span>
                            <div class="track-info-text" id="track-ticker-${idx}">Загрузка названия трека...</div>
                        </div>
                        
                        <div class="listeners-count">
                            <span>👤 ${station.listeners ? station.listeners.toLocaleString() : '1,200'} слушателей</span>
                        </div>
                        
                        <button class="center-play-btn" onclick="togglePlayback('${station.stream}', ${idx}, this, event)">
                            <span class="play-icon">▶️</span>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            setupIntersectionObserver();
        }

        // 4. Замена сломанных картинок на лету
        function handleLogoError(img, name) {
            img.onerror = null;
            const initials = name ? name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : '📻';
            
            const canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 200;
            const ctx = canvas.getContext('2d');
            
            const grad = ctx.createLinearGradient(0, 0, 200, 200);
            grad.addColorStop(0, '#4f46e5');
            grad.addColorStop(1, '#a855f7');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 200, 200);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 56px system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(initials, 100, 100);
            
            img.src = canvas.toDataURL();
        }

        // 5. Управление скролл-захватом карточек (TikTok physics)
        function setupIntersectionObserver() {
            if (currentObserver) currentObserver.disconnect();

            currentObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const card = entry.target;
                        const idx = parseInt(card.dataset.index);
                        
                        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active-focus'));
                        card.classList.add('active-focus');
                        
                        handleStationActivated(idx, card.dataset.name, card.dataset.tag, card.dataset.logo, card.dataset.stream);
                    }
                });
            }, {
                root: document.getElementById('swiper-container'),
                threshold: 0.55
            });

            document.querySelectorAll('.station-card').forEach(c => currentObserver.observe(c));
        }

        // Станция попала в фокус
        function handleStationActivated(idx, name, tag, logo, stream) {
            // Запуск обновления песен
            if (!currentTracksState[idx]) {
                startTrackTelemetry(idx, tag, name, logo);
            } else {
                updateTrackUI(idx, currentTracksState[idx]);
                addStationToHistory(name, logo, currentTracksState[idx]);
            }

            // Если пользователь уже нажимал Play ранее - включаем автоматически при скролле
            if (hasUserInteracted) {
                runStreamAudio(stream, idx);
            }
        }

        // 6. Отслеживание и ротация исполнителей ("Кто поет")
        function startTrackTelemetry(idx, tag, stationName, logo) {
            if (trackIntervals[idx]) clearInterval(trackIntervals[idx]);
            
            const pool = trackPresets[tag] || ["Популярный хит радиоэфира", "Музыкальный трек"];
            
            function rotate() {
                const currentTrack = pool[Math.floor(Math.random() * pool.length)];
                currentTracksState[idx] = currentTrack;
                
                updateTrackUI(idx, currentTrack);
                
                // Добавляем в историю, только если карточка активна прямо сейчас
                const activeCard = document.querySelector('.station-card.active-focus');
                if (activeCard && parseInt(activeCard.dataset.index) === idx) {
                    addStationToHistory(stationName, logo, currentTrack);
                }
            }

            rotate();
            trackIntervals[idx] = setInterval(rotate, 40000); // Смена песни каждые 40 секунд
        }

        function updateTrackUI(idx, text) {
            const el = document.getElementById(`track-ticker-${idx}`);
            if (el) {
                el.innerText = text;
                el.classList.add('updated');
                setTimeout(() => el.classList.remove('updated'), 1000);
            }
        }

        // 7. Работа с Живой Историей Воспроизведения
        function addStationToHistory(stationName, logo, track) {
            const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (playbackHistory.length > 0 && 
                playbackHistory[0].stationName === stationName && 
                playbackHistory[0].track === track) {
                return; // Исключаем дубли при частом переключении туда-обратно
            }

            playbackHistory.unshift({ stationName, logo, track, time: timeStr });
            if (playbackHistory.length > 30) playbackHistory.pop(); // Ограничение кэша истории
            
            localStorage.setItem('radio_history_list', JSON.stringify(playbackHistory));
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            if (playbackHistory.length === 0) {
                list.innerHTML = '<div class="empty-history">Тут будет история прослушанных треков</div>';
                return;
            }

            list.innerHTML = playbackHistory.map(item => `
                <div class="history-item">
                    <img src="${item.logo}" class="history-item-logo" onerror="handleLogoError(this, '')">
                    <div class="history-item-info">
                        <div class="history-item-station">${item.stationName}</div>
                        <div class="history-item-track">${item.track}</div>
                    </div>
                    <div class="history-item-time">${item.time}</div>
                </div>
            `).join('');
        }

        // 8. Аудио-Движок воспроизведения потока
        function runStreamAudio(stream, idx) {
            if (currentPlayingStream === stream && !activeAudio.paused) return;

            // Сбрасываем иконки кнопок
            document.querySelectorAll('.center-play-btn').forEach(b => {
                b.innerHTML = '<span class="play-icon">▶️</span>';
                b.classList.remove('playing');
            });

            const activeCard = document.querySelector(`.station-card[data-index="${idx}"]`);
            if (activeCard) {
                const btn = activeCard.querySelector('.center-play-btn');
                if (btn) {
                    btn.innerHTML = '<span class="pause-icon">⏸️</span>';
                    btn.classList.add('playing');
                }
            }

            try {
                activeAudio.src = stream;
                activeAudio.play()
                    .then(() => {
                        currentPlayingIndex = idx;
                        currentPlayingStream = stream;
                        hasUserInteracted = true;
                    })
                    .catch(e => console.log("Браузер ожидает ручного клика для запуска аудио."));
            } catch (err) {
                console.error(err);
            }
        }

        function togglePlayback(stream, idx, btn, event) {
            event.stopPropagation();
            hasUserInteracted = true;

            if (currentPlayingIndex === idx) {
                if (activeAudio.paused) {
                    activeAudio.play();
                    btn.innerHTML = '<span class="pause-icon">⏸️</span>';
                    btn.classList.add('playing');
                } else {
                    activeAudio.pause();
                    btn.innerHTML = '<span class="play-icon">▶️</span>';
                    btn.classList.remove('playing');
                }
            } else {
                runStreamAudio(stream, idx);
            }
        }

        // 9. Системные кнопки управления (Тема / Боковое Меню)
        function initThemeState() {
            if (localStorage.getItem('theme_dimmed') === 'true') {
                document.body.classList.add('dimmed-theme');
            }
        }

        function toggleTheme() {
            const isDim = document.body.classList.toggle('dimmed-theme');
            localStorage.setItem('theme_dimmed', isDim);
        }

        function toggleSidebar() {
            const panel = document.getElementById('right-sidebar-panel');
            panel.classList.toggle('open');
        }
    </script>
</body>
</html>
