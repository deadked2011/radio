<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" id="themeColorMeta">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="stations.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --text: #000000;
    --text-sec: #8e8e93;
    --surface: #f2f2f7;
    --surface-hover: #e5e5ea;
    --accent: #fc3c44;
    --player-bg: rgba(255, 255, 255, 0.85);
    --border: rgba(0, 0, 0, 0.08);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"] {
    --bg: #000000;
    --text: #ffffff;
    --text-sec: #8e8e93;
    --surface: #1c1c1e;
    --surface-hover: #2c2c2e;
    --accent: #ff453a;
    --player-bg: rgba(28, 28, 30, 0.85);
    --border: rgba(255, 255, 255, 0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-top: var(--safe-top); padding-bottom: calc(64px + var(--safe-bottom)); transition: background 0.3s, color 0.3s; }
  
  #app { max-width: 600px; margin: 0 auto; padding: 0 16px; }
  
  #header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 12px; }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .header-actions { display: flex; gap: 12px; }
  .circle-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); transition: background 0.2s; }
  .circle-btn:hover { background: var(--surface-hover); }
  .circle-btn svg { width: 20px; height: 20px; fill: currentColor; }

  #tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab-btn { padding: 8px 16px; border-radius: 20px; background: var(--surface); border: none; color: var(--text-sec); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .tab-btn.active { background: var(--accent); color: #fff; }

  #searchContainer { position: relative; margin-bottom: 20px; }
  #searchBar { width: 100%; padding: 12px 16px 12px 42px; border-radius: 12px; border: none; background: var(--surface); color: var(--text); font-size: 15px; outline: none; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-sec); width: 18px; height: 18px; fill: currentColor; pointer-events: none; }

  #stationList { display: flex; flex-direction: column; gap: 4px; }
  .station-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
  .station-item:hover { background: var(--surface-hover); }
  .station-item.active { background: var(--surface); border-left: 4px solid var(--accent); padding-left: 8px; }
  
  .station-img { width: 48px; height: 48px; border-radius: 10px; margin-right: 14px; object-fit: cover; flex-shrink: 0; background: var(--surface); }
  .station-info { flex: 1; min-width: 0; }
  .station-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .station-genre { font-size: 13px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .station-right { display: flex; align-items: center; gap: 12px; }
  .listeners-count { font-size: 12px; color: var(--text-sec); background: var(--surface-hover); padding: 4px 8px; border-radius: 8px; font-weight: 500; }
  .fav-btn { background: none; border: none; cursor: pointer; color: var(--text-sec); display: flex; align-items: center; justify-content: center; }
  .fav-btn.active { color: var(--accent); }
  .fav-btn svg { width: 22px; height: 22px; fill: currentColor; }

  #miniPlayer { position: fixed; bottom: calc(60px + var(--safe-bottom)); left: 16px; right: 16px; height: 64px; background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 16px; display: flex; align-items: center; padding: 0 12px; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.06); cursor: pointer; z-index: 99; transition: transform 0.3s ease; }
  #miniPlayer.hidden { transform: translateY(150%); }
  .mini-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
  .mini-info { flex: 1; min-width: 0; }
  .mini-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-sub { font-size: 12px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .mini-actions { display: flex; align-items: center; gap: 8px; }
  .mini-btn { background: none; border: none; color: var(--text); cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .mini-btn svg { width: 24px; height: 24px; fill: currentColor; }

  .sheet { position: fixed; bottom: -100%; left: 0; right: 0; height: 85vh; background: var(--bg); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 999; transition: bottom 0.35s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; padding-bottom: var(--safe-bottom); border-top: 1px solid var(--border); }
  .sheet.open { bottom: 0; }
  .sheet-bar { width: 40px; height: 5px; background: var(--text-sec); opacity: 0.3; border-radius: 3px; margin: 12px auto 8px; flex-shrink: 0; }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sheet-title { font-size: 18px; font-weight: 700; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sheet-close { background: var(--surface); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--text); display: flex; align-items: center; justify-content: center; }
  
  /* Стиль для кнопки ручного перехода в TG */
  .chat-tg-btn { background: #24a1de; color: #fff; padding: 6px 12px; border-radius: 16px; text-decoration: none; font-size: 12px; font-weight: 600; margin-left: auto; margin-right: 12px; display: flex; align-items: center; gap: 4px; transition: opacity 0.2s; }
  .chat-tg-btn:hover { opacity: 0.9; }

  #fullPlayer { padding: 8px 24px 24px; overflow-y: auto; align-items: center; text-align: center; }
  .f-cover-container { width: 75vw; height: 75vw; max-width: 320px; max-height: 320px; margin: 24px auto; position: relative; }
  .f-img { width: 100%; height: 100%; border-radius: 24px; object-fit: cover; box-shadow: 0 16px 40px rgba(0,0,0,0.15); }
  .f-info { margin-bottom: 32px; width: 100%; }
  .f-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; }
  .f-track-box { height: 20px; overflow: hidden; position: relative; width: 100%; margin: 0 auto; }
  .f-track { font-size: 15px; color: var(--text-sec); white-space: nowrap; display: inline-block; width: 100%; text-align: center; }
  .f-track.scrollable { position: absolute; width: auto; animation: ticker 12s linear infinite; padding-left: 100%; }
  @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
  
  .f-controls { display: flex; justify-content: center; align-items: center; gap: 32px; margin-bottom: 32px; }
  .f-play { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(252,60,68,0.3); }
  .f-play svg { width: 32px; height: 32px; fill: currentColor; }
  .f-secondary-btn { background: var(--surface); border: none; width: 48px; height: 48px; border-radius: 50%; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .f-secondary-btn svg { width: 22px; height: 22px; fill: currentColor; }
  .f-secondary-btn.active { color: var(--accent); background: var(--surface-hover); }

  /* Стили контейнера чата */
  .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { background: var(--surface); padding: 10px 14px; border-radius: 14px; max-width: 85%; width: fit-content; word-break: break-word; align-self: flex-start; }
  .msg-meta { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 3px; font-size: 11px; }
  .msg-author { font-weight: 700; color: var(--accent); }
  .msg-time { color: var(--text-sec); }
  .msg-text { font-size: 14px; color: var(--text); line-height: 1.4; }
  
  .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: var(--bg); }
  .chat-input-area input { flex: 1; padding: 12px 16px; border-radius: 20px; border: none; background: var(--surface); color: var(--text); font-size: 14px; outline: none; }
  .chat-input-area button { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chat-input-area button svg { width: 18px; height: 18px; fill: currentColor; margin-left: 2px; }

  /* Модалка режима авто */
  .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center; color:#fff; padding:24px; }
  .modal-overlay.open { display:flex; }
  .car-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; width:100%; max-width:400px; margin-top:30px; }
  .car-btn { background:#222; border:2px solid #333; border-radius:16px; padding:24px; color:#fff; display:flex; flex-direction:column; align-items:center; gap:12px; cursor:pointer; }
  .car-btn svg { width:40px; height:40px; fill:#fff; }
  .car-btn.car-play-btn { background: var(--accent); border:none; grid-column: span 2; }
  .car-close { margin-top:40px; background:none; border:none; color:#aaa; font-size:16px; cursor:pointer; text-decoration:underline; }

  /* Нижний бар вкладок для iOS/Android стиля */
  #navBar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(60px + var(--safe-bottom)); background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: var(--safe-bottom); z-index: 98; }
  .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sec); background: none; border: none; cursor: pointer; font-size: 10px; font-weight: 500; gap: 4px; }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

  @media (min-width: 1024px) {
    body { padding-right: 380px; }
    #miniPlayer { right: 396px; }
    .sheet:not(#chatSheet) { max-width: 600px; left: 50%; transform: translateX(-50%); border-radius: 24px 24px 0 0; }
    #chatSheet { bottom: 0; left: auto; right: 0; top: 0; width: 380px; height: 100vh; border-radius: 0; border-left: 1px solid var(--border); border-top: none; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1 id="headerTitle">Radio Go</h1>
    <div class="header-actions">
      <button class="circle-btn" onclick="toggleTheme()" title="Сменить тему">
        <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
      </button>
      <button class="circle-btn" onclick="openCarMode()" title="Режим Авто">
        <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.27-3.82c.14-.4.51-.68.94-.68h9.56c.43 0 .8.28.94.68L19 11H5z"/></svg>
      </button>
    </div>
  </div>

  <div id="tabs"></div>

  <div id="searchContainer">
    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" id="searchBar" placeholder="Поиск радиостанции..." oninput="searchStations()">
  </div>

  <div id="stationList"></div>
</div>

<div id="miniPlayer" class="hidden" onclick="openFullPlayer()">
  <img src="" id="mImg" class="mini-img" alt="">
  <div class="mini-info">
    <div id="mTitle" class="mini-title">Не выбрано</div>
    <div id="mSub" class="mini-sub">Выберите станцию</div>
  </div>
  <div class="mini-actions" onclick="event.stopPropagation()">
    <button class="mini-btn" onclick="togglePlay()" id="mPlayBtn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>
</div>

<div id="navBar">
  <button class="nav-item active" onclick="switchNavTab('all')" id="navAll">
    <svg viewBox="0 0 24 24"><path d="M4 10h7V3H4v7zm0 11h7v-7H4v7zm8 0h7v-7h-7v7zm0-18v7h7V3h-7z"/></svg>
    <span>Главная</span>
  </button>
  <button class="nav-item" onclick="switchNavTab('fav')" id="navFav">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <span>Избранное</span>
  </button>
</div>

<div id="fullPlayer" class="sheet">
  <div class="sheet-bar"></div>
  <div class="sheet-header">
    <span class="sheet-title">Сейчас играет</span>
    <button class="sheet-close" onclick="closeFullPlayer()">✕</button>
  </div>
  <div class="f-cover-container">
    <img src="" id="fImg" class="f-img" alt="">
  </div>
  <div class="f-info">
    <div id="fTitle" class="f-title">Название станции</div>
    <div class="f-track-box">
      <div id="fTrack" class="f-track">Прямой эфир</div>
    </div>
  </div>
  <div class="f-controls">
    <button class="f-secondary-btn" id="fFavBtn" onclick="toggleFavoriteCurrent()">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </button>
    <button class="f-play" onclick="togglePlay()" id="fPlayBtn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="f-secondary-btn" onclick="openChat()" title="Чат эфира">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
    </button>
  </div>
</div>

<div id="chatSheet" class="sheet">
  <div class="sheet-bar"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="chatTitle">Чат эфира</span>
    <a href="#" target="_blank" id="chatTgLink" class="chat-tg-btn" style="display:none;">
      <span>Открыть в TG</span>
    </a>
    <button class="sheet-close" onclick="closeChatSheet()">✕</button>
  </div>
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Ваше сообщение в эфир..." onkeydown="if(event.key==='Enter') sendChatMessage()">
      <button onclick="sendChatMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="carModeModal" class="modal-overlay">
  <h2 style="font-size:24px; font-weight:700;">Режим Авто</h2>
  <p id="carStationName" style="color:#aaa; margin-top:4px; font-size:16px;">Станция не выбрана</p>
  <div class="car-grid">
    <button class="car-btn car-play-btn" onclick="togglePlay()" id="carPlayBtn">
      <svg viewBox="0 0 24 24" style="width:48px;height:48px;"><path d="M8 5v14l11-7z"/></svg>
      <span style="font-weight:700; font-size:16px;">СТАРТ</span>
    </button>
    <button class="car-btn" onclick="carPrev()">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      <span>Назад</span>
    </button>
    <button class="car-btn" onclick="carNext()">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg>
      <span>Вперед</span>
    </button>
  </div>
  <button class="car-close" onclick="closeCarMode()">Выйти из режима авто</button>
</div>

<script>
// Словарь умных картинок с Unsplash по смыслу жанров (тегов) станций
const fallbackImages = {
  deep: 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=250&auto=format&fit=crop&q=80',   // DJ-пульт, неон
  pop: 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=250&auto=format&fit=crop&q=80',    // Поп-микрофон
  rock: 'https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=250&auto=format&fit=crop&q=80',   // Рок-гитара
  retro: 'https://images.unsplash.com/photo-1516280440614-37939bbacd6a?w=250&auto=format&fit=crop&q=80',  // Ретро кассета/винил
  shanson: 'https://images.unsplash.com/photo-1510915361894-db8b60106cb1?w=250&auto=format&fit=crop&q=80',// Акустическая гитара
  news: 'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=250&auto=format&fit=crop&q=80',   // Новости/Студия
  edm: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=250&auto=format&fit=crop&q=80',    // Фестиваль, лазеры
  chill: 'https://images.unsplash.com/photo-1518609878373-06d740f60d8b?w=250&auto=format&fit=crop&q=80',  // Лаундж/винил
  rap: 'https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?w=250&auto=format&fit=crop&q=80',    // Сцена, микрофон
  dnb: 'https://images.unsplash.com/photo-1506157786151-b8491531f063?w=250&auto=format&fit=crop&q=80',    // Клуб, рейв
  trance: 'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=250&auto=format&fit=crop&q=80', // Транс/Световое шоу
  techno: 'https://images.unsplash.com/photo-1557672172-298e090bd0f1?w=250&auto=format&fit=crop&q=80', // Техно абстракция
  jazz: 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=250&auto=format&fit=crop&q=80',   // Джаз/Саксофон
  classic: 'https://images.unsplash.com/photo-1520523839897-bd0b52f945a0?w=250&auto=format&fit=crop&q=80',// Пианино
  foreign: 'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=250&auto=format&fit=crop&q=80' // Зарубежный стадион
};

// Функция для получения ссылки на обложку (смысловой дефолт, если logo пустой)
function getStationCover(station) {
  if (station.logo && station.logo.trim() !== '') {
    return station.logo;
  }
  return fallbackImages[station.tag] || 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=250&auto=format&fit=crop&q=80';
}

let activeTab = 'all'; 
let curIdx = -1;
let favorites = JSON.parse(localStorage.getItem('favs') || '[]');
let hls = null;
let audio = new Audio();
let trackTimer = null;
let chatInterval = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

function applyTheme() {
  const isDark = window.Telegram?.WebApp?.colorScheme === 'dark' || false;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeColorMeta').setAttribute('content', isDark ? '#000000' : '#ffffff');
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeColorMeta').setAttribute('content', next === 'dark' ? '#000000' : '#ffffff');
}

function renderTabs() {
  const container = document.getElementById('tabs');
  if (activeTab === 'fav') {
    container.innerHTML = '';
    return;
  }
  let html = `<button class="tab-btn active" onclick="filterGenre('all', this)">Все</button>`;
  window.genres.forEach(g => {
    if (g.id !== 'all') {
      html += `<button class="tab-btn" onclick="filterGenre('${g.id}', this)">${g.label}</button>`;
    }
  });
  container.innerHTML = html;
}

function filterGenre(genreId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList(genreId, document.getElementById('searchBar').value);
}

function switchNavTab(tab) {
  activeTab = tab;
  document.getElementById('navAll').classList.toggle('active', tab === 'all');
  document.getElementById('navFav').classList.toggle('active', tab === 'fav');
  document.getElementById('headerTitle').textContent = tab === 'fav' ? 'Избранное' : 'Radio Go';
  renderTabs();
  renderList();
}

function renderList(genreId = 'all', query = '') {
  const container = document.getElementById('stationList');
  container.innerHTML = '';
  const q = query.toLowerCase().trim();

  window.stations.forEach((s, idx) => {
    const isFav = favorites.includes(s.name);
    if (activeTab === 'fav' && !isFav) return;
    if (genreId !== 'all' && s.tag !== genreId) return;
    if (q && !s.name.toLowerCase().includes(q) && !s.genre.toLowerCase().includes(q)) return;

    const item = document.createElement('div');
    item.className = `station-item ${curIdx === idx ? 'active' : ''}`;
    item.onclick = () => selectStation(idx);

    const coverSrc = getStationCover(s);
    const fallbackSrc = fallbackImages[s.tag] || 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=250&auto=format&fit=crop&q=80';

    item.innerHTML = `
      <img src="${coverSrc}" class="station-img" onerror="this.onerror=null; this.src='${fallbackSrc}';" alt="">
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-genre">${s.genre}</div>
      </div>
      <div class="station-right">
        <div class="listeners-count">${s.listeners || 1200}</div>
        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${s.name}', this)">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
      </div>
    `;
    container.appendChild(item);
  });
}

function searchStations() {
  const activeTabBtn = document.querySelector('.tab-btn.active');
  const genreId = activeTabBtn ? activeTabBtn.getAttribute('onclick').match(/'([^']+)'/)[1] : 'all';
  renderList(genreId, document.getElementById('searchBar').value);
}

function selectStation(idx) {
  if (curIdx === idx && !audio.paused) return;
  curIdx = idx;
  const s = window.stations[curIdx];

  document.querySelectorAll('.station-item').forEach((el, i) => {
    el.classList.toggle('active', i === curIdx);
  });

  const coverSrc = getStationCover(s);
  const fallbackSrc = fallbackImages[s.tag] || 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=250&auto=format&fit=crop&q=80';

  document.getElementById('mImg').src = coverSrc;
  document.getElementById('mImg').onerror = function() { this.src = fallbackSrc; };
  document.getElementById('mTitle').textContent = s.name;
  document.getElementById('mSub').textContent = 'Загрузка...';

  document.getElementById('fImg').src = coverSrc;
  document.getElementById('fImg').onerror = function() { this.src = fallbackSrc; };
  document.getElementById('fTitle').textContent = s.name;
  document.getElementById('fTrack').textContent = 'Загрузка...';
  document.getElementById('fTrack').classList.remove('scrollable');

  document.getElementById('miniPlayer').classList.remove('hidden');
  updateFavBtnState();

  if (Hls.isSupported() && s.stream.includes('m3u8')) {
    if (hls) { hls.destroy(); hls = null; }
    audio.src = '';
    hls = new Hls({ maxBufferSize: 0, maxBufferLength: 2, liveSyncDurationCount: 3 });
    hls.loadSource(s.stream);
    hls.attachMedia(audio);
  } else {
    if (hls) { hls.destroy(); hls = null; }
    audio.src = s.stream;
  }

  audio.play().then(() => { updateUI(); }).catch(() => { updateUI(); });
  setupAudioListeners();

  if (trackTimer) clearInterval(trackTimer);
  fetchTrack(s.stream);
  trackTimer = setInterval(() => fetchTrack(s.stream), 15000);
  
  applyCarMode();
}

function setupAudioListeners() {
  audio.onwaiting = () => {
    document.getElementById('mSub').textContent = 'Буферизация...';
    document.getElementById('fTrack').textContent = 'Буферизация...';
  };
  audio.onplaying = () => {
    if (curIdx !== -1) fetchTrack(window.stations[curIdx].stream);
  };
}

function togglePlay() {
  if (curIdx === -1) return;
  if (audio.paused) {
    audio.play().then(() => updateUI()).catch(() => updateUI());
  } else {
    audio.pause();
    updateUI();
  }
}

function updateUI() {
  const isPlaying = !audio.paused;
  const playSvg = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  const pauseSvg = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
  
  document.getElementById('mPlayBtn').innerHTML = isPlaying ? pauseSvg : playSvg;
  document.getElementById('fPlayBtn').innerHTML = isPlaying ? pauseSvg : playSvg;
  
  const carBtn = document.getElementById('carPlayBtn');
  if (carBtn) {
    carBtn.innerHTML = isPlaying ? 
      `<svg viewBox="0 0 24 24" style="width:48px;height:48px;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg><span style="font-weight:700;font-size:16px;">ПАУЗА</span>` : 
      `<svg viewBox="0 0 24 24" style="width:48px;height:48px;"><path d="M8 5v14l11-7z"/></svg><span style="font-weight:700;font-size:16px;">СТАРТ</span>`;
  }
}

function toggleFavorite(name, btn) {
  const idx = favorites.indexOf(name);
  if (idx > -1) favorites.splice(idx, 1);
  else favorites.push(name);
  localStorage.setItem('favs', JSON.stringify(favorites));
  if (btn) btn.classList.toggle('active', idx === -1);
  if (activeTab === 'fav') renderList();
  updateFavBtnState();
}

function toggleFavoriteCurrent() {
  if (curIdx === -1) return;
  toggleFavorite(window.stations[curIdx].name, null);
}

function updateFavBtnState() {
  if (curIdx === -1) return;
  const isFav = favorites.includes(window.stations[curIdx].name);
  document.getElementById('fFavBtn').classList.toggle('active', isFav);
  document.querySelectorAll('.station-item').forEach((item) => {
    const nameEl = item.querySelector('.station-name');
    if (nameEl && nameEl.textContent === window.stations[curIdx].name) {
      const fBtn = item.querySelector('.fav-btn');
      if (fBtn) fBtn.classList.toggle('active', isFav);
    }
  });
}

function openFullPlayer() { document.getElementById('fullPlayer').classList.add('open'); }
function closeFullPlayer() { document.getElementById('fullPlayer').classList.remove('open'); }

/* ЧАТ: ТОЛЬКО ШТОРКА + СТАБИЛЬНАЯ ИСТОРИЯ ЧЕРЕЗ CLOUDFLARE */
function openChat() {
  if (curIdx === -1) return;
  const s = window.stations[curIdx];
  
  document.getElementById('chatTitle').textContent = `Чат: ${s.name}`;
  document.getElementById('chatSheet').classList.add('open');
  
  // Управление ссылкой ручного перехода в TG-чат
  const tgLink = document.getElementById('chatTgLink');
  if (s.chat && s.chat.trim() !== '') {
    tgLink.href = s.chat;
    tgLink.style.display = 'inline-flex';
  } else {
    tgLink.style.display = 'none';
  }

  // Сбрасываем контейнер и загружаем историю немедленно
  document.getElementById('chatMessages').innerHTML = '<div style="text-align:center;color:var(--text-sec);padding:20px;font-size:13px;">Загрузка сообщений...</div>';
  loadChatHistory();
  
  // Интервал автообновления раз в 3 секунды
  if (chatInterval) clearInterval(chatInterval);
  chatInterval = setInterval(loadChatHistory, 3000);
}

function closeChatSheet() {
  document.getElementById('chatSheet').classList.remove('open');
  if (chatInterval) {
    clearInterval(chatInterval);
    chatInterval = null;
  }
}

// Защита вывода текста сообщений чата от XSS-инъекций
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

async function loadChatHistory() {
  if (curIdx === -1) return;
  const s = window.stations[curIdx];
  const container = document.getElementById('chatMessages');
  if (!container) return;

  try {
    const stationKey = encodeURIComponent(s.name);
    const res = await fetch(`https://radio-chat.deadked2011.workers.dev/messages?station=${stationKey}`);
    if (!res.ok) throw new Error('Network error');
    
    const messages = await res.json();
    
    if (!messages || messages.length === 0) {
      container.innerHTML = '<div style="text-align:center;color:var(--text-sec);padding:20px;font-size:14px;">Здесь пока пусто. Напишите первое сообщение!</div>';
      return;
    }

    container.innerHTML = messages.map(msg => {
      const user = escapeHtml(msg.user || 'Аноним');
      const text = escapeHtml(msg.text || '');
      const time = msg.time ? new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      return `
        <div class="chat-msg">
          <div class="msg-meta">
            <span class="msg-author">${user}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-text">${text}</div>
        </div>
      `;
    }).join('');

    container.scrollTop = container.scrollHeight;
  } catch (e) {
    console.error('Ошибка истории чата:', e);
    if (!container.querySelector('.chat-msg')) {
      container.innerHTML = '<div style="text-align:center;color:var(--text-sec);padding:20px;font-size:13px;">Не удалось обновить сообщения. Сервер недоступен.</div>';
    }
  }
}

async function sendChatMessage() {
  if (curIdx === -1) return;
  const s = window.stations[curIdx];
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  let username = 'Слушатель';
  if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe?.user) {
    const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
    username = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
  }

  try {
    input.value = ''; // Мгновенно очищаем инпут для скорости UI
    const res = await fetch(`https://radio-chat.deadked2011.workers.dev/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        station: s.name,
        user: username,
        text: text,
        time: new Date().toISOString()
      })
    });
    if (res.ok) {
      loadChatHistory();
    }
  } catch (e) {
    console.error('Ошибка отправки сообщения:', e);
  }
}

/* РЕЖИМ АВТО */
function openCarMode() { document.getElementById('carModeModal').classList.add('open'); applyCarMode(); }
function closeCarMode() { document.getElementById('carModeModal').classList.remove('open'); }
function applyCarMode() {
  const el = document.getElementById('carStationName');
  if (!el) return;
  if (curIdx !== -1) el.textContent = window.stations[curIdx].name;
  else el.textContent = 'Станция не выбрана';
  updateUI();
}
function carNext() {
  if (window.stations.length === 0) return;
  let next = curIdx + 1;
  if (next >= window.stations.length) next = 0;
  selectStation(next);
}
function carPrev() {
  if (window.stations.length === 0) return;
  let prev = curIdx - 1;
  if (prev < 0) prev = window.stations.length - 1;
  selectStation(prev);
}

async function fetchTrack(url) {
  try {
    const res = await fetch(`https://radio-chat.deadked2011.workers.dev/now-playing?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const track = data.title && data.title.trim() ? data.title : 'В эфире';
    const trackEl = document.getElementById('fTrack');
    trackEl.textContent = track;
    document.getElementById('mSub').textContent = track;
    if (track.length > 22) trackEl.classList.add('scrollable');
    else trackEl.classList.remove('scrollable');
    if (curIdx !== -1) updateMediaSession(window.stations[curIdx], track);
  } catch (e) {
    if (curIdx !== -1) {
      const fallback = window.stations[curIdx].genre || 'Радио';
      document.getElementById('mSub').textContent = fallback;
      document.getElementById('fTrack').textContent = fallback;
      document.getElementById('fTrack').classList.remove('scrollable');
    }
  }
}

function updateMediaSession(s, track) {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: s.name,
      artist: track,
      artwork: [{ src: getStationCover(s), sizes: '250x250', type: 'image/jpeg' }]
    });
  }
}

function initMediaSessionActions() {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('play', () => togglePlay());
    navigator.mediaSession.setActionHandler('pause', () => togglePlay());
    navigator.mediaSession.setActionHandler('previoustrack', () => carPrev());
    navigator.mediaSession.setActionHandler('nexttrack', () => carNext());
  }
}

window.addEventListener('resize', () => {
  renderTabs();
  renderList();
  if (window.innerWidth >= 1024) { closeFullPlayer(); closeChatSheet(); }
  applyCarMode();
});

window.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  initMediaSessionActions();
  renderTabs();
  renderList();
});
</script>
