<!DOCTYPE html>
  <html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📻 Радио</title>
    <meta name="theme-color" content="#211F26" id="themeColor">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

      html, body {
        min-height: 100vh;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: var(--surf);
        color: var(--text);
        overflow-x: hidden;
      }

      html[data-theme="dark"] {
        --primary:      #D0BCFF;
        --on-primary:   #381E72;
        --prim-cont:    #4F378B;
        --surf:         #211F26;
        --surf-hi:      #302D38;
        --surf-hir:     #3B3744;
        --text:         #E6E0E9;
        --text-med:     #CAC4D0;
        --text-dim:     #938F99;
        --outline:      #49454F;
        --shadow:       rgba(0,0,0,.55);
      }
      html[data-theme="light"] {
        --primary:      #6750A4;
        --on-primary:   #FFFFFF;
        --prim-cont:    #EADDFF;
        --surf:         #FEF7FF;
        --surf-hi:      #F3EDF7;
        --surf-hir:     #EDE8F5;
        --text:         #1C1B1F;
        --text-med:     #49454F;
        --text-dim:     #938F99;
        --outline:      #CAC4D0;
        --shadow:       rgba(0,0,0,.18);
      }

      button { cursor: pointer; font-family: inherit; }
      img { display: block; }

      /* HEADER - fixed, never sticky */
      #hdr {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 60;
        background: var(--surf);
        border-bottom: 1px solid var(--outline);
      }
      #hdr-top {
        display: flex; align-items: center;
        height: 56px; padding: 0 8px 0 16px;
      }
      #hdr-title { font-size: 20px; font-weight: 700; color: var(--text); flex: 1; }

      #btnAuto {
        padding: 6px 14px; border-radius: 20px; border: none;
        font-size: 12px; font-weight: 700; letter-spacing: .5px;
        background: var(--surf-hi); color: var(--text-dim); height: 36px;
      }
      #btnAuto.on { background: var(--primary); color: var(--on-primary); }

      #btnTheme {
        width: 44px; height: 44px; border-radius: 22px; border: none;
        background: transparent; color: var(--text-med); font-size: 20px;
        display: flex; align-items: center; justify-content: center;
      }

      /* Chip scrollbar hidden on all browsers */
      #chips {
        display: flex; gap: 8px; padding: 0 16px 10px;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      #chips::-webkit-scrollbar { display: none; }

      .chip {
        flex-shrink: 0; display: flex; align-items: center; gap: 5px;
        padding: 7px 13px; border-radius: 20px;
        border: 1.5px solid var(--outline);
        background: transparent; color: var(--text-med);
        font-size: 13px; white-space: nowrap;
      }
      .chip.active { background: var(--primary); color: var(--on-primary); border-color: transparent; }

      /* CONTENT - offset below fixed header (56 title + 44 chips + 8 border = ~110px) */
      #content { padding-top: 110px; padding-bottom: 148px; }

      /* STATION LIST */
      #tabStations { padding: 8px 16px; display: flex; flex-direction: column; gap: 6px; }
      .station-row {
        display: flex; align-items: center; gap: 14px;
        padding: 10px 14px; border-radius: 16px;
        border: 1.5px solid transparent; background: var(--surf);
        cursor: pointer; -webkit-user-select: none; user-select: none;
      }
      .station-row:active { opacity: .7; }
      .station-row.active { background: var(--prim-cont); border-color: var(--primary); }
      .station-logo {
        width: 50px; height: 50px; border-radius: 12px;
        object-fit: cover; background: var(--surf-hi); flex-shrink: 0;
      }
      .station-info { flex: 1; min-width: 0; }
      .station-name {
        font-size: 14px; font-weight: 600; color: var(--text);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .station-genre { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
      .station-badge {
        width: 32px; height: 32px; border-radius: 16px;
        display: flex; align-items: center; justify-content: center; font-size: 16px;
      }
      .station-row.active .station-badge { background: var(--primary); color: var(--on-primary); }

      /* HISTORY + COMMENTS */
      #tabHistory, #tabComments { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
      .hist-item {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 14px; background: var(--surf-hi); border-radius: 14px;
      }
      .hist-logo { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--surf); }
      .hist-info { flex: 1; min-width: 0; }
      .hist-track { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .hist-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
      .hist-time { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

      .comment-form { display: flex; gap: 8px; margin-bottom: 4px; }
      .comment-form input {
        flex: 1; padding: 10px 14px; border-radius: 14px;
        border: 1.5px solid var(--outline); background: var(--surf-hi);
        color: var(--text); font-size: 14px;
      }
      .comment-form input::placeholder { color: var(--text-dim); }
      .comment-form button {
        padding: 10px 18px; border-radius: 14px; border: none;
        background: var(--primary); color: var(--on-primary); font-size: 16px;
      }
      .comment-item {
        display: flex; gap: 10px; padding: 10px 14px;
        background: var(--surf-hi); border-radius: 14px;
      }
      .comment-avatar {
        width: 36px; height: 36px; border-radius: 18px;
        background: var(--primary); color: var(--on-primary);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; flex-shrink: 0;
      }
      .comment-body { flex: 1; min-width: 0; }
      .comment-name { font-size: 12px; font-weight: 700; color: var(--text); }
      .comment-text { font-size: 13px; color: var(--text-med); margin-top: 2px; word-break: break-word; }
      .comment-time { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
      .no-items { color: var(--text-dim); text-align: center; padding: 40px 0; font-size: 14px; }

      /* MINI PLAYER */
      #miniPlayer { position: fixed; left: 12px; right: 12px; bottom: 68px; z-index: 70; display: none; }
      #miniPlayer.vis { display: block; }
      #miniInner {
        display: flex; align-items: center; gap: 12px;
        background: var(--surf-hir); border-radius: 20px;
        padding: 10px 10px 10px 12px;
        box-shadow: 0 4px 24px var(--shadow); cursor: pointer;
      }
      #miniArt { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: var(--surf-hi); flex-shrink: 0; }
      #miniArt.spin { -webkit-animation: spin 12s linear infinite; animation: spin 12s linear infinite; }
      #miniInfo { flex: 1; min-width: 0; }
      #miniName { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #miniTrack { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mbtn {
        width: 40px; height: 40px; border-radius: 20px; border: none;
        background: transparent; color: var(--text-med); font-size: 18px;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      #miniPlayBtn { background: var(--primary); color: var(--on-primary); }

      /* BOTTOM NAV */
      #nav {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 80;
        background: var(--surf-hi); border-top: 1px solid var(--outline);
        display: flex; height: 64px;
      }
      .nbtn {
        flex: 1; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 4px; border: none; background: transparent;
        color: var(--text-dim); font-size: 11px;
      }
      .nbtn .nicon {
        width: 64px; height: 28px; border-radius: 14px;
        display: flex; align-items: center; justify-content: center; font-size: 20px;
      }
      .nbtn.act { color: var(--primary); }
      .nbtn.act .nicon { background: var(--prim-cont); }

      /* FULL PLAYER - fixed overlay, disabled when closed */
      #fp {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 200;
        -webkit-transform: translateY(100%);
        transform: translateY(100%);
        -webkit-transition: -webkit-transform .35s cubic-bezier(.32,.72,0,1);
        transition: transform .35s cubic-bezier(.32,.72,0,1);
        pointer-events: none;
        overflow-y: auto; -webkit-overflow-scrolling: touch;
      }
      #fp.open { -webkit-transform: translateY(0); transform: translateY(0); pointer-events: auto; }

      #fp-bg {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; overflow: hidden;
      }
      #fp-bg-img {
        position: absolute; top: -40px; left: -40px; right: -40px; bottom: -40px;
        width: calc(100% + 80px); height: calc(100% + 80px);
        object-fit: cover;
        filter: blur(60px) brightness(.28) saturate(1.8);
      }
      #fp-bg-ov { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(28,27,31,.55); }

      #fp-body {
        position: relative; z-index: 1;
        min-height: 100vh;
        display: flex; flex-direction: column; align-items: center;
        padding: 58px 28px 48px;
      }
      #fp-pill {
        position: absolute; top: 14px; left: 50%; margin-left: -18px;
        width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,.3);
      }
      #fp-close {
        position: absolute; top: 18px; right: 16px;
        width: 40px; height: 40px; border-radius: 20px; border: none;
        background: rgba(255,255,255,.14); color: #fff; font-size: 18px;
        display: flex; align-items: center; justify-content: center;
      }
      #fp-art-wrap {
        width: 250px; height: 250px; border-radius: 125px;
        overflow: hidden; box-shadow: 0 8px 48px rgba(0,0,0,.6);
        margin: 8px 0 28px; flex-shrink: 0;
      }
      #fp-art { width: 100%; height: 100%; object-fit: cover; }
      #fp-art.spin { -webkit-animation: spin 12s linear infinite; animation: spin 12s linear infinite; }

      #fp-name { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 4px; }
      #fp-genre { font-size: 14px; color: rgba(255,255,255,.6); text-align: center; margin-bottom: 6px; }
      #fp-track { font-size: 13px; color: rgba(255,255,255,.75); text-align: center; min-height: 20px; margin-bottom: 32px; }

      #fp-ctrl { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
      .fp-btn {
        width: 56px; height: 56px; border-radius: 28px; border: none;
        background: rgba(255,255,255,.14); color: #fff; font-size: 24px;
        display: flex; align-items: center; justify-content: center;
      }
      #fp-play-btn { width: 72px; height: 72px; border-radius: 36px; background: #fff; color: #211F26; font-size: 28px; }
      #fp-listeners { font-size: 12px; color: rgba(255,255,255,.45); text-align: center; }

      /* SPIN */
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @-webkit-keyframes spin { from { -webkit-transform: rotate(0deg); } to { -webkit-transform: rotate(360deg); } }

      /* TAB VISIBILITY */
      .tab { display: none; }
      .tab.on { display: block; }
    </style>
  </head>
  <body>
  <audio id="audio" preload="none"></audio>

  <!-- HEADER -->
  <div id="hdr">
    <div id="hdr-top">
      <span id="hdr-title">📻 Радио</span>
      <button id="btnAuto" onclick="toggleAuto()">AUTO</button>
      <button id="btnTheme" onclick="toggleTheme()">☀️</button>
    </div>
    <div id="chips">
      <button class="chip on" data-g="all"    onclick="setGenre('all')">🎵 Все</button>
      <button class="chip"    data-g="pop"    onclick="setGenre('pop')">⭐ Поп</button>
      <button class="chip"    data-g="deep"   onclick="setGenre('deep')">🎧 Deep House</button>
      <button class="chip"    data-g="edm"    onclick="setGenre('edm')">⚡ Электро</button>
      <button class="chip"    data-g="rap"    onclick="setGenre('rap')">🎤 Рэп</button>
      <button class="chip"    data-g="chill"  onclick="setGenre('chill')">🌊 Чилл</button>
      <button class="chip"    data-g="rock"   onclick="setGenre('rock')">🎸 Рок</button>
      <button class="chip"    data-g="dnb"    onclick="setGenre('dnb')">🥁 DnB</button>
      <button class="chip"    data-g="trance" onclick="setGenre('trance')">✨ Trance</button>
      <button class="chip"    data-g="techno" onclick="setGenre('techno')">🔊 Techno</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="tabStations" class="tab on"></div>
    <div id="tabHistory"  class="tab"></div>
    <div id="tabComments" class="tab">
      <div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">
        <div class="comment-form">
          <input id="cInput" type="text" placeholder="Написать комментарий..." maxlength="200">
          <button onclick="addComment()">→</button>
        </div>
        <div id="cList"></div>
      </div>
    </div>
  </div>

  <!-- MINI PLAYER -->
  <div id="miniPlayer">
    <div id="miniInner" onclick="openFP()">
      <img id="miniArt" src="" alt="">
      <div id="miniInfo">
        <div id="miniName">—</div>
        <div id="miniTrack">Нажмите для подробностей</div>
      </div>
      <button class="mbtn" onclick="goPrev(event)">⏮</button>
      <button class="mbtn" id="miniPlayBtn" onclick="togglePlay(event)">▶</button>
      <button class="mbtn" onclick="goNext(event)">⏭</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="nav">
    <button class="nbtn act" id="nb0" onclick="setTab(0)"><div class="nicon">📻</div><span>Станции</span></button>
    <button class="nbtn"     id="nb1" onclick="setTab(1)"><div class="nicon">🕓</div><span>История</span></button>
    <button class="nbtn"     id="nb2" onclick="setTab(2)"><div class="nicon">💬</div><span>Комменты</span></button>
  </div>

  <!-- FULL PLAYER -->
  <div id="fp">
    <div id="fp-bg"><img id="fp-bg-img" src="" alt=""><div id="fp-bg-ov"></div></div>
    <div id="fp-body">
      <div id="fp-pill"></div>
      <button id="fp-close" onclick="closeFP()">✕</button>
      <div id="fp-art-wrap"><img id="fp-art" src="" alt=""></div>
      <div id="fp-name">—</div>
      <div id="fp-genre">—</div>
      <div id="fp-track"></div>
      <div id="fp-ctrl">
        <button class="fp-btn" onclick="goPrev()">⏮</button>
        <button class="fp-btn" id="fp-play-btn" onclick="togglePlay()">▶</button>
        <button class="fp-btn" onclick="goNext()">⏭</button>
      </div>
      <div id="fp-listeners"></div>
    </div>
  </div>

  <script src="stations.js"></script>
  <script>
  // ── STATE ──────────────────────────────────────────────────────
  var curIdx    = -1;
  var playing   = false;
  var fpOpen    = false;
  var autoMode  = false;
  var curGenre  = 'all';
  var curTab    = 0;
  var curTrack  = '';
  var hls       = null;
  var tTimer    = null;

  var hist     = JSON.parse(localStorage.getItem('rh')  || '[]');
  var comments = JSON.parse(localStorage.getItem('rcc') || '[]');
  var theme    = localStorage.getItem('rt') || 'dark';

  var audio = document.getElementById('audio');

  // ── THEME ──────────────────────────────────────────────────────
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('btnTheme').textContent = theme === 'dark' ? '☀️' : '🌙';
    var ov = document.getElementById('fp-bg-ov');
    if (ov) ov.style.background = theme === 'dark'
      ? 'rgba(28,27,31,0.58)' : 'rgba(254,247,255,0.58)';
  }
  function toggleTheme() {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('rt', theme);
    applyTheme();
  }
  applyTheme();

  // ── GENRE ──────────────────────────────────────────────────────
  function setGenre(g) {
    curGenre = g;
    document.querySelectorAll('#chips .chip').forEach(function(c) {
      var active = c.getAttribute('data-g') === g;
      if (active) c.classList.add('active'); else c.classList.remove('active');
    });
    renderStations();
  }
  function filtered() {
    if (!window.stations) return [];
    if (curGenre === 'all') return window.stations;
    return window.stations.filter(function(s){ return s.tag === curGenre; });
  }

  // ── TABS ───────────────────────────────────────────────────────
  var tabs = ['tabStations','tabHistory','tabComments'];
  function setTab(i) {
    curTab = i;
    tabs.forEach(function(id,j){ document.getElementById(id).classList.toggle('on', j===i); });
    for(var j=0;j<3;j++) document.getElementById('nb'+j).classList.toggle('act', j===i);
    if (i===1) renderHistory();
    if (i===2) renderComments();
  }

  // ── STATION RENDER ─────────────────────────────────────────────
  function renderStations() {
    var list = filtered();
    var el = document.getElementById('tabStations');
    var h = '';
    list.forEach(function(s) {
      var idx = window.stations.indexOf(s);
      var act = idx === curIdx;
      var ic  = act && playing ? '⏸' : '▶';
      h += '<div class="station-row'+(act?' active':'')+'" onclick="playStation('+idx+')">'
         + '<img class="station-logo" src="'+e(s.logo)+'" onerror="this.src='icon-192.png'" alt="" loading="lazy">'
         + '<div class="station-info"><div class="station-name">'+e(s.name)+'</div>'
         + '<div class="station-genre">'+e(s.genre)+'</div></div>'
         + '<div class="station-badge">'+ic+'</div></div>';
    });
    el.innerHTML = h || '<div class="no-items">Нет станций</div>';
  }

  // ── HISTORY RENDER ─────────────────────────────────────────────
  function renderHistory() {
    var el = document.getElementById('tabHistory');
    if (!hist.length){ el.innerHTML='<div class="no-items">История пустая</div>'; return; }
    var h='';
    hist.slice().reverse().forEach(function(x){
      h+='<div class="hist-item">'
        +'<img class="hist-logo" src="'+e(x.logo||'')+'" onerror="this.src='icon-192.png'" alt="">'
        +'<div class="hist-info"><div class="hist-track">'+e(x.track||x.name)+'</div>'
        +'<div class="hist-meta">'+e(x.name)+'</div></div>'
        +'<div class="hist-time">'+e(x.time||'')+'</div></div>';
    });
    el.innerHTML=h;
  }

  // ── COMMENTS ──────────────────────────────────────────────────
  function renderComments() {
    var el = document.getElementById('cList');
    if (!comments.length){ el.innerHTML='<div class="no-items">Комментариев пока нет</div>'; return; }
    var h='';
    comments.slice().reverse().forEach(function(c){
      h+='<div class="comment-item"><div class="comment-avatar">😊</div>'
        +'<div class="comment-body"><div class="comment-name">Слушатель</div>'
        +'<div class="comment-text">'+e(c.text)+'</div>'
        +'<div class="comment-time">'+e(c.time||'')+'</div></div></div>';
    });
    el.innerHTML=h;
  }
  function addComment() {
    var inp=document.getElementById('cInput');
    var txt=(inp.value||'').trim(); if(!txt) return;
    var now=new Date(), t=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    comments.push({text:txt,time:t});
    if(comments.length>100) comments.shift();
    localStorage.setItem('rcc',JSON.stringify(comments));
    inp.value=''; renderComments();
  }

  // ── PLAY ───────────────────────────────────────────────────────
  function playStation(idx) {
    if (!window.stations||!window.stations[idx]) return;
    curIdx=idx; playing=true;
    openFP();
    startStream();
    updateUI();
  }
  window.playStation = playStation;

  function startStream() {
    var s = window.stations[curIdx]; if(!s) return;
    if (hls){ try{hls.destroy();}catch(ex){} hls=null; }
    audio.pause(); audio.src='';

    if (typeof Hls!=='undefined' && Hls.isSupported() && s.stream && s.stream.indexOf('.m3u8')>=0) {
      hls = new Hls({enableWorker:true,lowLatencyMode:false,maxBufferLength:30});
      hls.loadSource(s.stream);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, function(){ audio.play().catch(function(){}); });
      hls.on(Hls.Events.ERROR, function(ev,d){
        if(d.fatal){ playing=false; updateUI(); if(autoMode) setTimeout(goNext,2000); }
      });
    } else if (audio.canPlayType && audio.canPlayType('application/vnd.apple.mpegurl')
               && s.stream && s.stream.indexOf('.m3u8')>=0) {
      audio.src=s.stream; audio.load(); audio.play().catch(function(){});
    } else {
      audio.src=s.stream; audio.load(); audio.play().catch(function(){});
    }

    var now=new Date(), t=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    hist.push({name:s.name,logo:s.logo,track:'В эфире',time:t});
    if(hist.length>200) hist.shift();
    localStorage.setItem('rh',JSON.stringify(hist));

    schedTrack();
  }

  function togglePlay(e) {
    if(e){e.stopPropagation();}
    if(curIdx===-1) return;
    if(playing){ audio.pause(); playing=false; if(hls){try{hls.destroy();}catch(ex){} hls=null;} }
    else { playing=true; startStream(); }
    updateUI();
  }
  window.togglePlay = togglePlay;

  function goPrev(e) {
    if(e) e.stopPropagation();
    var list=filtered(); if(!list.length) return;
    if(curIdx===-1){ playStation(window.stations.indexOf(list[0])); return; }
    var fi=list.findIndex(function(s){ return window.stations.indexOf(s)===curIdx; });
    fi=(fi-1+list.length)%list.length;
    playStation(window.stations.indexOf(list[fi]));
  }
  window.goPrev = goPrev;

  function goNext(e) {
    if(e) e.stopPropagation();
    var list=filtered(); if(!list.length) return;
    if(curIdx===-1){ playStation(window.stations.indexOf(list[0])); return; }
    var fi=list.findIndex(function(s){ return window.stations.indexOf(s)===curIdx; });
    fi=(fi+1)%list.length;
    playStation(window.stations.indexOf(list[fi]));
  }
  window.goNext = goNext;

  // ── FULL PLAYER ────────────────────────────────────────────────
  function openFP() { fpOpen=true; document.getElementById('fp').classList.add('open'); }
  function closeFP() { fpOpen=false; document.getElementById('fp').classList.remove('open'); }

  // ── TRACK FETCH ───────────────────────────────────────────────
  function schedTrack() {
    if(tTimer){ clearTimeout(tTimer); tTimer=null; }
    fetchTrack();
  }
  function fetchTrack() {
    if(curIdx===-1||!playing) return;
    var s=window.stations[curIdx];
    var m=s&&s.logo&&s.logo.match(/radiopotok\.ru\/f\/station\/\d+\/(\d+)\.png/);
    if(!m){ setTrack('🎵 Live stream'); tTimer=setTimeout(fetchTrack,30000); return; }
    fetch('https://radiopotok.ru/ajax/track?id='+m[1])
      .then(function(r){return r.json();})
      .then(function(d){
        var t=d.artist&&d.title ? d.artist+' — '+d.title : d.title||'🎵 В эфире';
        setTrack(t);
        if(hist.length){ hist[hist.length-1].track=t; localStorage.setItem('rh',JSON.stringify(hist)); }
      })
      .catch(function(){ setTrack('🎵 В эфире'); });
    tTimer=setTimeout(fetchTrack,15000);
  }
  function setTrack(t) {
    curTrack=t;
    var a=document.getElementById('miniTrack'), b=document.getElementById('fp-track');
    if(a) a.textContent=t; if(b) b.textContent=t;
  }

  // ── AUTO ──────────────────────────────────────────────────────
  function toggleAuto() {
    autoMode=!autoMode;
    document.getElementById('btnAuto').classList.toggle('on',autoMode);
  }

  // ── UPDATE UI ─────────────────────────────────────────────────
  function updateUI() {
    var s=curIdx>=0?window.stations[curIdx]:null;
    var mp=document.getElementById('miniPlayer');

    if(s){
      mp.classList.add('vis');
      document.getElementById('miniArt').src=s.logo||'';
      document.getElementById('miniName').textContent=s.name;
      var mpb=document.getElementById('miniPlayBtn');
      mpb.textContent=playing?'⏸':'▶';
      var ma=document.getElementById('miniArt');
      if(playing) ma.classList.add('spin'); else ma.classList.remove('spin');

      document.getElementById('fp-bg-img').src=s.logo||'';
      document.getElementById('fp-art').src=s.logo||'';
      document.getElementById('fp-name').textContent=s.name;
      document.getElementById('fp-genre').textContent=s.genre;
      document.getElementById('fp-listeners').textContent=
        s.listeners ? '👥 '+s.listeners.toLocaleString('ru-RU')+' слушателей' : '';
      var fpb=document.getElementById('fp-play-btn');
      fpb.textContent=playing?'⏸':'▶';
      var fa=document.getElementById('fp-art');
      if(playing) fa.classList.add('spin'); else fa.classList.remove('spin');
    } else {
      mp.classList.remove('vis');
    }
    renderStations();
  }

  // ── AUDIO EVENTS ──────────────────────────────────────────────
  audio.addEventListener('playing', function(){ playing=true; updateUI(); });
  audio.addEventListener('pause',   function(){ if(playing){ playing=false; updateUI(); } });
  audio.addEventListener('error',   function(){ playing=false; updateUI(); if(autoMode&&curIdx>=0) setTimeout(goNext,2000); });
  audio.addEventListener('stalled', function(){
    if(playing) setTimeout(function(){ if(playing&&audio.paused) startStream(); },8000);
  });

  // ── HELPER ────────────────────────────────────────────────────
  function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── INIT ──────────────────────────────────────────────────────
  function init(){
    if(!window.stations){ setTimeout(init,100); return; }
    // Mark first chip active
    document.querySelectorAll('#chips .chip').forEach(function(c){
      c.classList.toggle('active', c.getAttribute('data-g')==='all');
    });
    renderStations();
  }
  window.addEventListener('load', init);

  // SW registration
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  }
  </script>
  <script src="player-fixes.js"></script>
  </body>
  </html>
