<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Go</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* Основные переменные и стили */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f7f6f3; --card:#fff; --text:#1a1a1a; --muted:#9a9a9a;
  --accent:#1a1a1a; --border:#e8e6e1; --pill:#f0ede8; --pill-text:#7a7a7a;
  --green:#4caf7d; --red:#e05555; --orange:#f0a030;
  --shadow:0 2px 18px rgba(0,0,0,.07); --shadow-deep:0 6px 28px rgba(0,0,0,.14);
  /* Шрифты */
  --f-now-name:clamp(15px,3.8vw,28px);
}
:root.dark {
  --bg:#141416; --card:#1e1e22; --text:#f0f0f0; --muted:#6e6e78;
  --accent:#e8e8e8; --border:#2a2a30; --pill:#26262c; --pill-text:#8e8e98;
}

/* Оптимизация для разных экранов */
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); transition:background .3s; min-height:100vh; overflow-x:hidden; }
.app { width:100%; max-width:680px; margin:0 auto; padding: 15px; }

/* Кнопка "Назад" для авторежима */
#backBtn { display: none; margin-bottom: 15px; width: fit-content; }

/* Виджет обсуждений (под плеером) */
.discussion-widget {
  background: var(--card);
  border-radius: 20px;
  padding: 15px;
  margin-top: 15px;
  box-shadow: var(--shadow);
  display: none; /* Скрыт по умолчанию, включается кнопкой */
  flex-direction: column;
  gap: 10px;
}
.discussion-widget.visible { display: flex; }
.msg-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
.msg-item { background: var(--pill); padding: 8px 12px; border-radius: 12px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* Стилизация громкости */
.vol-slider-wrap { flex: 1; position: relative; height: 30px; display: flex; align-items: center; }
input[type=range].vol-input {
  width: 100%;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: var(--border);
  outline: none;
}
/* Кастомный ползунок */
input[type=range].vol-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%; background: #fff;
  border: 2px solid var(--accent);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  cursor: pointer;
}

/* Авторежим (Car Mode) */
body.auto-mode .tabs, 
body.auto-mode .search-wrap, 
body.auto-mode .genres, 
body.auto-mode .section-label, 
body.auto-mode .list,
body.auto-mode .bottom-spacer { display: none !important; }
body.auto-mode #backBtn { display: flex; }
body.auto-mode .now-card { transform: scale(1.05); margin-top: 40px; }

/* Шазам кнопка */
.shazam-btn {
  background: var(--pill);
  border: none;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--muted);
  transition: 0.2s;
}
.shazam-btn:active { transform: scale(0.95); background: #0088cc; color: #fff; }

/* Иконки в хедере */
.header-right { display: flex; gap: 10px; align-items: center; }
.icon-btn { width: 40px; height: 40px; border-radius: 10px; border: none; background: var(--pill); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.icon-btn.active { color: var(--green); }

</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-title" id="mainTitle">Radio Go</div>
    <div class="header-right">
      <button class="icon-btn" onclick="toggleMessages()" id="msgBtn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="icon-btn" onclick="toggleDark()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" onclick="toggleAutoMode()" id="autoBtn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="10" width="22" height="9" rx="2"/><path d="m6.5 10 2-6h7l2 6"/><circle cx="7.5" cy="19" r="1.5"/><circle cx="16.5" cy="19" r="1.5"/></svg>
      </button>
    </div>
  </div>

  <button class="tab-btn active" id="backBtn" onclick="toggleAutoMode()">← Назад</button>

  <div class="tabs">...</div>
  <div class="search-wrap">...</div>
  <div class="genres">...</div>

  <div class="now-card visible" id="nowCard">
    <div class="now-top">
      <div class="now-logo" id="nowLogo">🎵</div>
      <div class="now-info">
        <div class="now-name" id="nowName">Выберите станцию</div>
        <button class="shazam-btn" onclick="shazam()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.48 0-4.5-2.02-4.5-4.5S9.52 7.5 12 7.5s4.5 2.02 4.5 4.5-2.02 4.5-4.5 4.5z"/></svg>
          Что играет?
        </button>
      </div>
    </div>
    
    <div class="controls">...</div>

    <div class="vol-row">
      <div class="vol-slider-wrap">
        <input type="range" class="vol-input" id="volSlider" min="0" max="100" value="80" oninput="updateVolume(this.value)">
      </div>
    </div>
  </div>

  <div class="discussion-widget" id="discussionWidget">
    <div class="msg-list" id="msgList">
      <div class="msg-item">Добро пожаловать в чат Radio Go! 🎧</div>
    </div>
    <div style="display:flex; gap:5px;">
      <input type="text" id="msgInput" placeholder="Ваше сообщение..." style="flex:1; border:none; background:var(--pill); padding:10px; border-radius:10px; color:var(--text); outline:none;">
      <button onclick="sendMsg()" style="border:none; background:var(--accent); color:var(--bg); padding:10px; border-radius:10px;">Отправить</button>
    </div>
  </div>

  <div class="section-label">Все станции</div>
  <div class="list" id="stationList">...</div>
</div>

<script>
// 1. Логика громкости с изменением цвета
function updateVolume(val) {
  const slider = document.getElementById('volSlider');
  let color = '#ffffff'; // 0-50% белый
  if (val > 50 && val <= 80) color = '#4caf7d'; // 50-80% зеленый
  else if (val > 80) color = '#f0a030'; // 80-100% оранжевый

  // Применяем градиент к треку для визуализации заполнения
  const percent = val + '%';
  slider.style.background = `linear-gradient(to right, ${color} ${percent}, var(--border) ${percent})`;
  
  if(window.player) window.player.volume = val / 100;
}

// 2. Управление виджетом сообщений
function toggleMessages() {
  const widget = document.getElementById('discussionWidget');
  const btn = document.getElementById('msgBtn');
  widget.classList.toggle('visible');
  btn.classList.toggle('active');
}

function sendMsg(text) {
  const input = document.getElementById('msgInput');
  const msgText = text || input.value.trim();
  if (!msgText) return;

  const list = document.getElementById('msgList');
  const div = document.createElement('div');
  div.className = 'msg-item';
  div.textContent = msgText;
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
  if(!text) input.value = '';
}

// 3. Функция "Шазам"
function shazam() {
  const trackName = document.getElementById('nowName').textContent;
  if (trackName && trackName !== 'Выберите станцию') {
    sendMsg(`🔎 Распознан трек: ${trackName}`);
    if(window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
  }
}

// 4. Оптимизированный Авторежим
function toggleAutoMode() {
  document.body.classList.toggle('auto-mode');
  const isAuto = document.body.classList.contains('auto-mode');
  
  // Telegram Haptic
  if(window.Telegram && Telegram.WebApp) Telegram.WebApp.HapticFeedback.impactOccurred('medium');
}

// Инициализация при загрузке
window.onload = () => {
  updateVolume(80);
  
  // Оптимизация HLS для слабого интернета
  if (Hls.isSupported()) {
    const config = {
      capLevelToPlayerSize: true, // экономит трафик на маленьких экранах
      maxBufferLength: 30,         // увеличиваем буфер для стабильности
      startLevel: 0               // начинаем с минимального качества
    };
    // Здесь должна быть ваша инициализация плеера с этим конфигом
  }
};
</script>
</body>
</html>
