<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══ RESET & STRICT BOUNDARIES ═══════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* Жесткая фиксация страницы к экрану устройства */
html, body {
  position: fixed; width: 100%; height: 100%; height: 100dvh;
  overflow: hidden; overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
}

:root {
  --bg: #f6f5f1; --card: #ffffff; --text: #121214; --muted: #8e8e93;
  --accent: #121214; --brand: #2bbd6e; --border: rgba(0,0,0,0.06);
  --pill: #eae8e2; --pill-text: #636366; --green: #2bbd6e; --red: #ff3b30; --orange: #ff9500;
  --shadow: 0 8px 32px rgba(0,0,0,0.03), 0 1px 4px rgba(0,0,0,0.02);
  --px: clamp(14px, 4vw, 24px); --gap: 10px; --sp-sm: 12px; --sp-md: 20px;
  --r-card: 28px; --r-row: 16px; --r-btn: 14px;
  --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px); --sar: env(safe-area-inset-right, 0px);
}

:root.dark, body.dark {
  --bg: #0b0b0d; --card: #16161a; --text: #f5f5f7; --muted: #7c7c82;
  --accent: #f5f5f7; --brand: #2bbd6e; --border: rgba(255,255,255,0.06);
  --pill: #222227; --pill-text: #a1a1aa;
  --shadow: 0 12px 40px rgba(0,0,0,0.4);
}

/* ══ BACKGROUND ARTWORK ══════════════════════════════════ */
.ambient-bg {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background-size: cover; background-position: center;
  filter: blur(100px) saturate(1.8) brightness(0.4);
  opacity: 0; transition: opacity 1.5s ease, background-image 1s ease;
  transform: scale(1.15);
}
.ambient-bg.on { opacity: 0.32; }
body.dark .ambient-bg.on { opacity: 0.45; }

html.plt-ios body, html.plt-mac body { --sys-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
html.plt-android body { --sys-font: 'Google Sans', 'Roboto', sans-serif; }
html.plt-windows body { --sys-font: 'Segoe UI Variable Display', sans-serif; }
html body { --sys-font: 'DM Sans', sans-serif; }
body { font-family: var(--sys-font); background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }

/* ══ SMART APP LAYOUT ════════════════════════════════════ */
.page {
  position: relative; z-index: 1; display: flex; flex-direction: column;
  height: 100%; padding: calc(var(--sat) + 12px) calc(var(--sar) + var(--px)) calc(var(--sab) + 12px) calc(var(--sal) + var(--px));
}
.scroll-area {
  flex: 1; min-height: 0; overflow-y: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.scroll-area::-webkit-scrollbar { display: none; }
.app { height: 100%; display: flex; flex-direction: column; width: 100%; max-width: 600px; margin: 0 auto; transition: max-width 0.4s; }

/* ══ SPLIT MODE (STRICT GRID - NO SCROLL BOUNCE) ═════════ */
body.split .app { max-width: 1200px; }
body.split .scroll-area { overflow: hidden; /* Отключаем глобальный скролл */ }
body.split .app-inner {
  flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 380px; gap: 32px;
  height: 100%; overflow: hidden;
}
body.split .app-left, body.split .app-right {
  height: 100%; overflow-y: auto; padding-right: 8px; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
body.split .app-left::-webkit-scrollbar, body.split .app-right::-webkit-scrollbar { display: none; }
body.split .app-right { display: flex; flex-direction: column; gap: 16px; }

body.split .chat-section {
  display: flex !important; margin: 0; flex: 1; min-height: 350px;
  background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border: 1px solid rgba(0,0,0,0.04); box-shadow: var(--shadow);
}
body.dark.split .chat-section { background: rgba(22, 22, 26, 0.4); border-color: rgba(255,255,255,0.05); }

body.split #chatToggleBtn { display: none; }
body.split .car-recs { display: flex !important; padding: 0; flex-direction: column; gap: 10px; flex-shrink: 0; }
body.split #carRecs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
body.split .list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

@media (max-width: 960px) {
  body.split .scroll-area { overflow-y: auto; }
  body.split .app-inner { display: flex; flex-direction: column; gap: 16px; overflow: visible; height: auto; }
  body.split .app-left, body.split .app-right { height: auto; overflow: visible; padding-right: 0; }
  body.split .list { grid-template-columns: 1fr; }
  body.split #chatToggleBtn { display: flex; }
  body.split #carRecs { grid-template-columns: 1fr; }
  body.split .chat-section { flex: none; height: 260px !important; min-height: 260px; }
}

/* ══ HEADER COMPONENTS ═══════════════════════════════════ */
.header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-md); }
.header-title { font-family: 'DM Serif Display', serif; font-size: clamp(24px, 5vw, 32px); letter-spacing: -0.5px; }
.header-right { display: flex; align-items: center; gap: 8px; position: relative; }
.clock { font-size: 14px; color: var(--muted); font-weight: 500; font-variant-numeric: tabular-nums; margin-right: 4px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
.live-dot.on { background: var(--green); animation: pulseLive 2s infinite; }
@keyframes pulseLive { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.15); } }

.icon-btn {
  width: 42px; height: 42px; border-radius: var(--r-btn); background: var(--pill); border: 1px solid transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--pill-text);
  transition: all 0.2s; flex-shrink: 0;
}
.icon-btn svg { width: 20px; height: 20px; }
.icon-btn:active, .icon-btn.on { background: var(--accent); color: var(--bg); }

/* ══ NAVIGATION & FILTERS ════════════════════════════════ */
.tabs { flex-shrink: 0; display: flex; gap: var(--gap); margin-bottom: var(--sp-sm); align-items: center; justify-content: space-between; }
.tab-btn {
  flex: 1; padding: 12px 16px; border-radius: 100px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; background: var(--pill); color: var(--pill-text);
  display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;
}
.tab-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.tab-btn.active { background: var(--accent); color: var(--bg); }

.search-wrap { flex-shrink: 0; position: relative; margin-bottom: var(--sp-sm); }
.search-input {
  width: 100%; padding: 13px 16px 13px 44px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; font-size: 14px; font-weight: 500; color: var(--text); box-shadow: var(--shadow); outline: none; transition: all 0.25s;
}
.search-input:focus { border-color: var(--brand); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); display: flex; }

.genres { flex-shrink: 0; display: flex; gap: 8px; overflow-x: auto; margin-bottom: var(--sp-md); padding-bottom: 4px; scrollbar-width: none; }
.genres::-webkit-scrollbar { display: none; }
.genre-pill {
  padding: 8px 16px; border-radius: 100px; background: var(--pill); color: var(--pill-text);
  font-size: 12px; font-weight: 600; cursor: pointer; border: none; white-space: nowrap; text-transform: uppercase;
}
.genre-pill.active { background: var(--brand); color: #fff; box-shadow: 0 4px 12px rgba(43,189,110,0.2); }

/* ══ NOW PLAYING CARD ════════════════════════════════════ */
.now-card {
  flex-shrink: 0; background: var(--card); border-radius: var(--r-card); padding: var(--sp-md); box-shadow: var(--shadow);
  margin-bottom: var(--sp-sm); display: none; transition: background 0.3s; position: relative; overflow: hidden;
}
.now-card.visible { display: block; }
.now-card-bg {
  position: absolute; inset: -30px; z-index: 0; background-size: cover; background-position: center;
  filter: blur(36px) saturate(1.5) brightness(0.5); opacity: 0; transition: opacity 0.8s; transform: scale(1.1);
}
.now-card.has-bg .now-card-bg { opacity: 1; }
.now-card-bg-overlay { position: absolute; inset: 0; z-index: 1; background: linear-gradient(145deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.45) 100%); opacity: 0; transition: opacity 0.8s; }
.now-card.has-bg .now-card-bg-overlay { opacity: 1; }
.now-card-content { position: relative; z-index: 2; }

.now-card.has-bg .now-name { color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
.now-card.has-bg .now-genre { color: rgba(255,255,255,0.75); }
.now-card.has-bg .fav-btn { color: rgba(255,255,255,0.5); }
.now-card.has-bg .fav-btn.on { color: #ff2d55; }
.now-card.has-bg .ctrl { background: rgba(255,255,255,0.12); color: #fff; backdrop-filter: blur(10px); }
.now-card.has-bg .play-btn { background: #ffffff; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.now-card.has-bg .play-btn svg { fill: #121214; }
.now-card.has-bg .vol-row { border-top-color: rgba(255,255,255,0.12); }
.now-card.has-bg .vol-icon-svg, .now-card.has-bg .vol-val { color: rgba(255,255,255,0.7) !important; }
.now-card.has-bg .vol-track-bg { background: rgba(255,255,255,0.2); }
.now-card.has-bg input.vol-input::-webkit-slider-thumb { background: #fff; border-color: rgba(255,255,255,0.2); }
.now-card.has-bg .loading-bar { background: rgba(255,255,255,0.15); }
.now-card.has-bg .loading-bar-inner { background: #ffffff; }

.now-top { display: flex; align-items: center; gap: 16px; margin-bottom: var(--sp-md); }
.now-logo {
  width: clamp(68px, 11vw, 88px); height: clamp(68px, 11vw, 88px); border-radius: 50%; background: var(--pill);
  overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 26px; box-shadow: 0 6px 20px rgba(0,0,0,0.12); border: 2px solid rgba(255,255,255,0.1);
}
.now-logo img { width: 100%; height: 100%; object-fit: cover; }
.now-info { flex: 1; min-width: 0; }
.now-name { font-family: 'DM Serif Display', serif; font-size: clamp(20px, 4.5vw, 25px); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; margin-bottom: 2px; }
.now-genre { font-size: 12px; font-weight: 700; color: var(--text); opacity: 0.6; text-transform: uppercase; letter-spacing: 0.8px; }
.now-track { font-size: 13px; font-weight: 600; color: var(--orange); margin-top: 6px; white-space: nowrap; overflow: hidden; max-width: 100%; display: none; }
.now-track.visible { display: block; }
.now-track-inner { display: inline-block; padding-right: 40px; }
.now-track.marquee .now-track-inner { animation: streamingMarquee 15s linear infinite; }
@keyframes streamingMarquee { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-50%,0,0); } }
.now-card.has-bg .now-track { color: #f0a030; }

.fav-btn { background: none; border: none; cursor: pointer; font-size: 26px; color: var(--muted); flex-shrink: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: transform 0.15s; }
.fav-btn:active { transform: scale(1.18); }
.fav-btn.on { color: var(--brand); }

/* VISUALIZER */
.loading-bar { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: var(--sp-sm); overflow: hidden; display: none; }
.loading-bar.active { display: block; }
.loading-bar-inner { height: 100%; width: 30%; background: var(--accent); border-radius: 99px; animation: streamLoad 1.2s infinite; }
@keyframes streamLoad { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

.viz {
  height: 26px; display: flex; align-items: flex-end; gap: 3px; margin: 0 auto var(--sp-sm);
  width: 160px; justify-content: center; mask-image: linear-gradient(to right, transparent 0%, #000 15%, #000 85%, transparent 100%);
  -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 15%, #000 85%, transparent 100%);
}
.bar { width: 3.5px; min-width: 3.5px; background: rgba(128,128,128,0.2); border-radius: 99px; height: 4px; transition: background 0.3s; }
.bar.on { background: var(--accent); animation: dynamicWave var(--dur, 0.8s) ease-in-out infinite alternate; }
.now-card.has-bg .bar { background: rgba(255,255,255,0.25); }
.now-card.has-bg .bar.on { background: rgba(255,255,255,0.95); }
@keyframes dynamicWave { from { height: 4px; } to { height: 26px; } }

/* CONTROLS */
.controls { display: flex; align-items: center; justify-content: space-between; gap: var(--gap); margin-bottom: var(--sp-sm); }
.ctrl { width: 50px; height: 50px; border-radius: var(--r-btn); background: var(--pill); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--pill-text); transition: transform 0.15s; flex-shrink: 0; }
.ctrl:active { transform: scale(0.94); }
.ctrl svg { width: 22px; height: 22px; }
.play-btn { width: 66px; height: 66px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.15); transition: transform 0.2s; flex-shrink: 0; }
.play-btn:active { transform: scale(0.92); }
.play-btn svg { width: 24px; height: 24px; fill: var(--bg); margin-left: 3px; }
.play-btn.playing svg { margin-left: 0; }

.vol-row { display: flex; align-items: center; gap: 12px; padding-top: var(--sp-sm); border-top: 1px solid var(--border); }
.vol-icon-svg { display: flex; align-items: center; flex-shrink: 0; color: var(--muted); width: 20px; height: 20px; }
.vol-icon-svg svg { width: 100%; height: 100%; }
.vol-wrap { flex: 1; position: relative; display: flex; align-items: center; height: 32px; }
.vol-track-bg { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 5px; border-radius: 99px; background: var(--border); pointer-events: none; }
.vol-fill { position: absolute; top: 50%; transform: translateY(-50%); height: 5px; border-radius: 99px; background: var(--brand); pointer-events: none; }
input.vol-input { position: relative; z-index: 2; width: 100%; -webkit-appearance: none; height: 5px; background: transparent; outline: none; cursor: pointer; }
input.vol-input::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--card); border: 2.5px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: transform 0.15s; }
input.vol-input:active::-webkit-slider-thumb { transform: scale(1.3); }
.vol-val { font-size: 13px; font-weight: 700; color: var(--muted); min-width: 36px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* ══ STATION LIST ════════════════════════════════════════ */
.section-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-weight: 700; margin-bottom: 12px; padding: 0 2px; margin-top: 20px; flex-shrink: 0; }
.list { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.row {
  background: var(--card); border-radius: var(--r-row); padding: 12px 14px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; user-select: none; box-shadow: var(--shadow); border: 1px solid transparent; transition: transform 0.2s; min-height: 64px;
}
.row:active { transform: scale(0.985); }
.row.active { border-color: var(--brand); box-shadow: 0 4px 16px rgba(43,189,110,0.06); }
.row-img { width: 44px; height: 44px; min-width: 44px; border-radius: 12px; background: var(--pill); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.row-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.row-info { flex: 1; min-width: 0; overflow: hidden; }
.row-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.row-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; margin-left: 4px; }
.row-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.row.active .row-dot { display: none; }
.row-eq { display: none; align-items: flex-end; gap: 2px; height: 13px; }
.row.active .row-eq { display: flex; }
.row-eq-bar { width: 2.5px; background: var(--brand); border-radius: 99px; animation: eqPulse .6s ease-in-out infinite alternate; transform-origin: bottom; }
.row-eq-bar:nth-child(1) { height: 4px; animation-delay: 0s; }
.row-eq-bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.row-eq-bar:nth-child(3) { height: 7px; animation-delay: 0.3s; }
.row-eq-bar:nth-child(4) { height: 13px; animation-delay: 0.08s; }
@keyframes eqPulse { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }

/* ══ TIKTOK MOBILE VIEW ══════════════════════════════════ */
/* Prevent white flash on load for mobile */
@media (max-width: 768px) {
  html { background: #000 !important; }
  body { background: #000 !important; }
}

@media (max-width: 768px) {
  html, body { overflow: hidden !important; }
  body.tiktok-mode .page,
  body.tiktok-mode #bufferWrap,
  body.tiktok-mode #desktopVolumeWrap { display: none !important; }

  /* Main container — black instantly, no flash */
  #tiktokView {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
    overflow: hidden;
    touch-action: none; /* we handle all touch ourselves */
    -webkit-user-select: none; user-select: none;
  }

  /* Horizontal slider: 3 slides side by side, center is current */
  #ttTrack3 {
    position: absolute; top: 0; left: 0;
    width: 300%; height: 100%;
    display: flex; flex-direction: row;
    will-change: transform;
    /* NO transition here — we add it only for snap */
  }
  #ttTrack3.snapping {
    transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94);
  }

  /* Each slide is 1/3 of track (= 100vw) */
  .tt-slide3 {
    width: 33.3333%; height: 100%;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
    /* GPU layer per slide */
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
  }

  /* BG — simplified filter for low-end phones */
  .tt-bg {
    position: absolute; inset: -20px; z-index: 0;
    background-size: cover; background-position: center;
    filter: blur(40px) brightness(0.3);
    transform: scale(1.08) translateZ(0);
    -webkit-transform: scale(1.08) translateZ(0);
  }
  .tt-bg-overlay {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0) 35%,rgba(0,0,0,0) 50%,rgba(0,0,0,0.65) 100%);
  }

  /* Logo */
  .tt-logo {
    width: 44vw; max-width: 190px; min-width: 130px;
    height: 44vw; max-height: 190px; min-height: 130px;
    border-radius: 50%; background: #1a1a1a;
    overflow: hidden; flex-shrink: 0;
    box-shadow: 0 16px 50px rgba(0,0,0,0.55), 0 0 0 3px rgba(255,255,255,0.07);
    position: relative; z-index: 3;
    margin-bottom: 20px;
  }
  .tt-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
  /* Spin only when playing — CSS custom property avoids JS repaint */
  .tt-logo.playing { animation: ttLogoSpin 9s linear infinite; }
  @keyframes ttLogoSpin { to { transform: rotate(360deg); } }

  .tt-info { position: relative; z-index: 3; text-align: center; padding: 0 28px; margin-bottom: 6px; }
  .tt-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(22px, 6.5vw, 34px);
    color: #fff; line-height: 1.15; margin-bottom: 5px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  }
  .tt-genre {
    font-size: 11px; font-weight: 700; letter-spacing: 1.8px;
    text-transform: uppercase; color: rgba(255,255,255,0.6);
  }
  .tt-track {
    position: relative; z-index: 3;
    font-size: 12px; font-weight: 600; color: #f0a030;
    max-width: 74vw; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
    margin-top: 6px; min-height: 18px;
  }

  /* Visualizer — fewer bars for perf */
  .tt-viz {
    position: relative; z-index: 3;
    display: flex; align-items: flex-end; gap: 3px;
    height: 28px; margin: 16px 0 0; justify-content: center;
  }
  .tt-bar {

function loadStation(idx, autoplay) {
  if (typeof stations === 'undefined' || !stations.length) return;
  curIdx = idx; const s = stations[idx];
  
  // Умная загрузка обложек (с Fallback)
  const coverUrl = s.logo || getFallbackImg(s.name);
  document.getElementById("nowLogo").innerHTML = `<img src="${coverUrl}" onerror="this.src='${getFallbackImg(s.name)}'">`;
  document.getElementById("nowName").textContent = s.name;
  document.getElementById("nowGenre").textContent = s.genre;
  
  const card = document.getElementById("nowCard"); card.classList.add("visible"); card.classList.add("has-bg");
  document.getElementById("nowCardBg").style.backgroundImage = `url(${coverUrl})`;
  document.getElementById("ambientBg").style.backgroundImage = `url(${coverUrl})`; document.getElementById("ambientBg").classList.add("on");
  
  updateFavBtn(); renderList(); startNowPlaying(s.stream); renderCarRecs(idx);
  
  if (autoplay || playing) playStream(s.stream);
  else { if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; } audio.pause(); audio.src = ""; setPlaying(false); }
}

function playStream(url) {
  if (!url) return;
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  document.getElementById("loadingBar").classList.add("active");
  document.querySelectorAll('.bar').forEach(b => b.classList.remove("on"));
  
  if (url.includes(".m3u8")) {
    if (audio.canPlayType("application/vnd.apple.mpegurl")) {
      audio.src = url; audio.play().then(() => setPlaying(true)).catch(onPlayError); return;
    }
    if (typeof Hls !== "undefined" && Hls.isSupported()) {
      hlsInstance = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 90,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        manifestLoadingTimeOut: 20000,
        manifestLoadingMaxRetry: 8,
        levelLoadingMaxRetry: 8,
        fragLoadingMaxRetry: 10
      });
      hlsInstance.loadSource(url); hlsInstance.attachMedia(audio);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { audio.play().then(() => setPlaying(true)).catch(onPlayError); });
      hlsInstance.on(Hls.Events.ERROR, (_, d) => {
        console.warn("HLS ERROR", d);

        if (!navigator.onLine) {
          showOfflineState(true);
          return;
        }

        if (d.fatal) {
          switch (d.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              console.warn("Сетевая ошибка — восстанавливаем поток");
              setTimeout(() => {
                try { hlsInstance.startLoad(); } catch(e){}
              }, 1500);
              break;

            case Hls.ErrorTypes.MEDIA_ERROR:
              console.warn("Media error — recoverMediaError()");
              try { hlsInstance.recoverMediaError(); } catch(e){}
              break;

            default:
              onPlayError();
              try { hlsInstance.destroy(); } catch(e){}
              break;
          }
        }
      });
      return;
    }
  }
  audio.src = url; audio.play().then(() => setPlaying(true)).catch(onPlayError);
}

function setPlaying(on) {
  playing = on; document.getElementById("loadingBar").classList.remove("active");
  document.querySelectorAll('.bar').forEach(b => on ? b.classList.add("on") : b.classList.remove("on"));
  document.getElementById("liveDot").classList.toggle("on", on);
  document.getElementById("playBtn").classList.toggle("playing", on);
  document.getElementById("playIcon").innerHTML = on ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>' : '<polygon points="5 3 19 12 5 21 5 3"/>';
}

function onPlayError() {
  playing = false; setPlaying(false); document.getElementById("loadingBar").classList.remove("active");
  
  // АВТО-СКИП ЕСЛИ ПОТОК УМЕР
  const inner = document.getElementById("nowTrackInner");
  const el = document.getElementById("nowTrack");
  if(inner && el) {
    inner.textContent = "⚠️ Поток недоступен. Переключаем...";
    el.classList.add("visible");
  }
  setTimeout(() => { if(!playing) next(); }, 3000);
}

function togglePlay() {
  if (!playing) playStream(stations[curIdx].stream);
  else { if(hlsInstance){hlsInstance.destroy();hlsInstance=null;} audio.pause(); setPlaying(false); }
}
function prev() { loadStation((curIdx - 1 + stations.length) % stations.length, true); }
function next() { loadStation((curIdx + 1) % stations.length, true); }

function renderGenres() {

  const set = new Set(); stations.forEach(s => { if(s.tag) set.add(s.tag); });

    b.onclick = () => { activeGenre = g; renderGenres(); renderList(); }; el.appendChild(b);
  });
}

let expanded = false;
function renderList() {
  if(typeof stations === 'undefined') return;
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  const el = document.getElementById("stationList"); el.innerHTML = "";

  let filtered = stations.filter(s => {
    if (activeTab === "fav" && !favs.includes(s.id)) return false;
    if (activeTab === "all" && activeGenre !== "all" && s.tag !== activeGenre) return false;
    if (q && !s.name.toLowerCase().includes(q) && !(s.genre && s.genre.toLowerCase().includes(q))) return false;
    return true;
  });

  document.getElementById("listLabel").textContent = activeTab === "fav" ? `Избранное (${filtered.length})` : `Все станции (${filtered.length})`;
  if (!filtered.length) { el.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }

  const showCount = expanded ? filtered.length : Math.min(8, filtered.length);
  filtered.slice(0, showCount).forEach(s => {
    const idx = stations.indexOf(s); const row = document.createElement("div"); row.className = "row" + (idx === curIdx ? " active" : "");
    const rowImg = s.logo || getFallbackImg(s.name);
    row.innerHTML = `
      <div class="row-img"><img src="${rowImg}" onerror="this.src='${getFallbackImg(s.name)}'"></div>
      <div class="row-info"><div class="row-name">${s.name}</div><div class="row-sub">${s.genre || "Радио"}</div></div>
      <div class="row-right"><div class="row-dot"></div><div class="row-eq"><div class="row-eq-bar"></div><div class="row-eq-bar"></div><div class="row-eq-bar"></div><div class="row-eq-bar"></div></div></div>`;
    row.onclick = () => loadStation(idx, true); el.appendChild(row);
  });

  if (filtered.length > 8) {
    const btn = document.createElement("button"); btn.className = "show-more-btn" + (expanded ? " expanded" : "");
    btn.innerHTML = expanded ? `Свернуть` : `Ещё ${filtered.length - 8} станций`;
    btn.onclick = () => { expanded = !expanded; renderList(); }; el.appendChild(btn);
  }
}

function renderCarRecs(idx) {
  const recs = document.getElementById("carRecs"); if (!recs || typeof stations === 'undefined') return;
  const cur = stations[idx]; if (!cur) { recs.innerHTML = ""; return; }
  const similar = stations.filter(s => s.tag === cur.tag && stations.indexOf(s) !== idx).slice(0, 4);
  if (!similar.length) { recs.innerHTML = ""; return; }
  
  recs.innerHTML = '<div class="car-recs-title">🎵 Рекомендации</div>';
  similar.forEach(s => {
    const si = stations.indexOf(s); const btn = document.createElement("button"); btn.className = "car-rec-row";
    const recImg = s.logo || getFallbackImg(s.name);
    btn.innerHTML = `<div class="car-rec-img"><img src="${recImg}" onerror="this.src='${getFallbackImg(s.name)}'"></div><div class="car-rec-info"><div class="car-rec-name">${s.name}</div><div class="car-rec-genre">${s.genre || "Радио"}</div></div>`;
    btn.onclick = () => loadStation(si, true); recs.appendChild(btn);
  });
}

async function fetchNowPlaying(streamUrl) {
  const el = document.getElementById("nowTrack"), inner = document.getElementById("nowTrackInner"); if (!el || !inner) return;
  try {
    const res = await fetch(`${CHAT_API_BASE}/now-playing?url=${encodeURIComponent(streamUrl)}`);
    if (!res.ok) return; const { title } = await res.json();
    if (title && title.trim()) {
      const text = "♪ " + title.trim(); const long = title.length > 35;
      inner.textContent = long ? text + "   " + text : text; el.classList.add("visible"); el.classList.toggle("marquee", long);
    } else { inner.textContent = ""; el.classList.remove("visible", "marquee"); }
  } catch (e) { el.classList.remove("visible", "marquee"); }
}
function startNowPlaying(streamUrl) {
  if (nowPlayingTimer) clearInterval(nowPlayingTimer);
  document.getElementById("nowTrackInner").textContent = ""; document.getElementById("nowTrack").classList.remove("visible", "marquee");
  fetchNowPlaying(streamUrl); nowPlayingTimer = setInterval(() => fetchNowPlaying(streamUrl), 15000);
}

async function loadChatMessages() {
  const container = document.getElementById("chatMessages"); if(!container) return;
  try {
    const res = await fetch(`${CHAT_API_BASE}/get-messages`); if (!res.ok) return;
    const msgs = await res.json(); const list = Array.isArray(msgs) ? msgs : []; container.innerHTML = "";
    if (!list.length) { container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:14px">Пока нет сообщений</div>'; return; }
    list.forEach(m => {
      const div = document.createElement("div"); div.className = "chat-msg";
      const t = m.time ? new Date(m.time).toLocaleTimeString("ru", {hour:"2-digit", minute:"2-digit"}) : "";
      const hue = ([...m.name].reduce((a, c) => a + c.charCodeAt(0), 0) * 47) % 360;
      div.innerHTML = `<div class="chat-msg-avatar" style="background:hsl(${hue},50%,44%)">${(m.name[0] || '?').toUpperCase()}</div><div class="chat-msg-body"><div class="chat-msg-name">${m.name}${t ? ' <span style="font-weight:400;opacity:.6">' + t + '</span>' : ''}</div><div class="chat-msg-text">${m.text}</div></div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  } catch(e) {}
}
function openChat() { const url = "https://t.me/your_radio_chat_link"; if(tg) tg.openTelegramLink(url); else window.open(url, "_blank"); }

let bufferedSeconds = 0;
let targetBuffer = 30;

function updateBufferUI(){
  const percent = Math.min((bufferedSeconds / targetBuffer) * 100, 100);

  const progress = document.getElementById("bufferProgress");
  const text = document.getElementById("bufferText");

  if(progress) progress.style.width = percent + "%";

  if(text){
    if(bufferedSeconds >= targetBuffer){
      text.innerText = "Буфер готов • 30 секунд";
    } else {
      text.innerText = "Буферизация " + bufferedSeconds + " сек";
    }
  }
}

function simulateBuffering(){
  bufferedSeconds = 0;
  updateBufferUI();

  let stage1 = setInterval(() => {
    if(bufferedSeconds < 10){
      bufferedSeconds++;
      updateBufferUI();
    } else {
      clearInterval(stage1);

      let stage2 = setInterval(() => {
        if(bufferedSeconds < 30){
          bufferedSeconds += 5;
          updateBufferUI();
        } else {
          clearInterval(stage2);
        }
      }, 3000);
    }
  }, 1000);
}

audio.addEventListener("playing", () => {
  simulateBuffering();
});

audio.addEventListener("timeupdate", () => {
  try{
    const title = document.getElementById("trackTitle");

    if(title && stations && stations[curIdx]){
      title.innerText = "🎵 " + stations[curIdx].name + " • LIVE";
    }
  }catch(e){}
});

document.addEventListener("DOMContentLoaded", () => {
  const bar = document.getElementById("bufferBar");

  if(bar){
    bar.addEventListener("click", (e) => {
      const rect = bar.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;

      bufferedSeconds = Math.floor(targetBuffer * percent);
      updateBufferUI();
    });
  }
});

</script>

<script>
(function(){
let bufferedSeconds = 0;
const targetBuffer = 30;

function updateBuffer(){
  const progress = document.getElementById("bufferProgress");
  const text = document.getElementById("bufferText");

  const percent = Math.min((bufferedSeconds/targetBuffer)*100,100);

  if(progress){
    progress.style.width = percent + "%";
  }

  if(text){
    if(bufferedSeconds >= 30){
      text.innerText = "Буфер готов • 30 секунд";
    } else {
      text.innerText = "Буферизация " + bufferedSeconds + " сек";
    }
  }
}

function startBuffering(){
  bufferedSeconds = 0;
  updateBuffer();

  let first = setInterval(() => {
    if(bufferedSeconds < 10){
      bufferedSeconds++;
      updateBuffer();
    } else {
      clearInterval(first);

      let second = setInterval(() => {
        if(bufferedSeconds < 30){
          bufferedSeconds += 5;
          updateBuffer();
        } else {
          clearInterval(second);

  cx.appendChild(tr);

  // Viz bars — 12 for perf
  var viz = document.createElement('div'); viz.className='tt-viz';
  for(var i=0;i<12;i++){
    var b=document.createElement('div'); b.className='tt-bar'+(isPlaying?' on':'');
    b.style.setProperty('--dur',(0.35+Math.random()*0.5)+'s');
    viz.appendChild(b);
  }
  cx.appendChild(viz);
  el.appendChild(cx);

  // Bottom controls
  var piSvg = isPlaying
    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="#111"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="#111" style="margin-left:2px"><polygon points="5 3 19 12 5 21 5 3"/></svg>';

  var ctrl = document.createElement('div'); ctrl.className='tt-controls';
  ctrl.innerHTML=
    '<div class="tt-bottom-info">'+
      '<div class="tt-bottom-left">'+
        '<div class="tt-station-label">Сейчас играет</div>'+
        '<div class="tt-station-name-sm">'+s.name+'</div>'+
        '<div class="tt-genre-sm">'+(s.genre||'Радио')+'</div>'+
      '</div>'+
      '<div class="tt-actions">'+
        '<button class="tt-action-btn" ontouchend="ttToggleFav(event)" onclick="ttToggleFav(event)">'+
          '<div class="tt-action-icon'+(isFav?' fav-on':'')+'"'+(idx===(typeof curIdx!=='undefined'?curIdx:0)?' id="ttFavIcon"':'')+'>'+
            (isFav?'♥':'♡')+
          '</div>'+
          '<div class="tt-action-label">Избранное</div>'+
        '</button>'+
        '<button class="tt-action-btn" ontouchend="ttTapPlay(event)" onclick="ttTapPlay(event)">'+
          '<div class="tt-action-icon play-icon"'+(idx===(typeof curIdx!=='undefined'?curIdx:0)?' id="ttPlayIcon"':'')+'>'+piSvg+'</div>'+
          '<div class="tt-action-label"'+(idx===(typeof curIdx!=='undefined'?curIdx:0)?' id="ttPlayLabel"':'')+'>'+
            (isPlaying?'Пауза':'Играть')+
          '</div>'+
        '</button>'+
        '<button class="tt-action-btn" ontouchend="ttOpenSearch()" onclick="ttOpenSearch()">'+
          '<div class="tt-action-icon">'+
            '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'+
          '</div>'+
          '<div class="tt-action-label">Поиск</div>'+
        '</button>'+
      '</div>'+
    '</div>';
  el.appendChild(ctrl);
}

// ── Render all 3 slides around curIdx ─────────────────
function renderAll(){
  var st = getSt(); if(!st.length) return;
  var ci = (typeof curIdx!=='undefined') ? curIdx : 0;
  var n  = st.length;
  var li = (ci-1+n)%n;
  var ri = (ci+1)%n;
  buildSlide(slideL, li);
  buildSlide(slideC, ci);
  buildSlide(slideR, ri);
  resetTrackPos();
}

// ── Swipe to next/prev ────────────────────────────────
function goNext(){
  if(animating) return; animating=true;
  track.classList.add('snapping');
  track.style.transform='translateX(-66.6666%)';
  track.addEventListener('transitionend', function onEnd(){
    track.removeEventListener('transitionend', onEnd);
    track.classList.remove('snapping');
    if(typeof next==='function') next();
    renderAll();
    animating=false;
  });
}

function goPrev(){
  if(animating) return; animating=true;
  track.classList.add('snapping');
  track.style.transform='translateX(0%)';
  track.addEventListener('transitionend', function onEnd(){
    track.removeEventListener('transitionend', onEnd);
    track.classList.remove('snapping');
    if(typeof prev==='function') prev();
    renderAll();
    animating=false;
  });
}

// ── Touch handling ────────────────────────────────────
function onTouchStart(e){
  if(!overlaysClosed()) return;
  touching=true;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchLiveX  = touchStartX;
  track.style.transition='none';
}

function onTouchMove(e){
  if(!touching || animating) return;
  touchLiveX = e.touches[0].clientX;
  var dx = touchLiveX - touchStartX;
  var dy = e.touches[0].clientY - touchStartY;
  // If more vertical than horizontal, ignore swipe
  if(Math.abs(dy) > Math.abs(dx) * 1.5 && Math.abs(dx) < 20) return;
  e.preventDefault();
  // Move track with finger, starting from -33.3333%
  var baseX = -window.innerWidth; // -33.3333% of 300vw = -1vw * vw
  var pct = ((baseX + dx) / (window.innerWidth*3)) * 100;
  track.style.transform = 'translateX('+pct+'%)';
}

function onTouchEnd(e){
  if(!touching) return; touching=false;
  var dx = touchLiveX - touchStartX;
  var thresh = window.innerWidth * 0.22; // 22% of screen width
  if(dx < -thresh)      goNext();
  else if(dx > thresh)  goPrev();
  else {
    // snap back
    track.classList.add('snapping');
    resetTrackPos();
    setTimeout(function(){ track.classList.remove('snapping'); }, 350);
  }
}

function overlaysClosed(){
  return listOverlay.style.display==='none' &&
         !searchOverlay.classList.contains('open');
}

// ── Sync play state on current slide ─────────────────
window.ttSyncPlay = function(){
  var isP = (typeof playing!=='undefined') && playing;
  var logo = document.getElementById('ttLogo');
  var pi   = document.getElementById('ttPlayIcon');
  var pl   = document.getElementById('ttPlayLabel');
  if(logo){ if(isP) logo.classList.add('playing'); else logo.classList.remove('playing'); }
  if(pi){
    pi.innerHTML = isP
      ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="#111"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>'
      : '<svg width="20" height="20" viewBox="0 0 24 24" fill="#111" style="margin-left:2px"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  }
  if(pl) pl.textContent = isP?'Пауза':'Играть';
  document.querySelectorAll('.tt-bar').forEach(function(b){
    if(isP) b.classList.add('on'); else b.classList.remove('on');
  });
};

// ── Sync track text ───────────────────────────────────
function ttSyncTrackEl(el){
  var src = document.getElementById('nowTrackInner');
  if(src && el) el.textContent = src.textContent.replace(/\s{3,}.*/,'').trim();
}
function ttSyncTrack(){
  var el = document.getElementById('ttTrack');
  ttSyncTrackEl(el);
}

// ── Fav & Play buttons ─────────────────────────────────
window.ttToggleFav = function(e){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  if(typeof toggleFav==='function') toggleFav();
  setTimeout(function(){
    var fi = document.getElementById('ttFavIcon');
    var st = getSt(); var ci = typeof curIdx!=='undefined'?curIdx:0;
    var isFav = (typeof favs!=='undefined') && st[ci] && favs.includes(st[ci].id);
    if(fi){ fi.textContent=isFav?'♥':'♡'; if(isFav) fi.classList.add('fav-on'); else fi.classList.remove('fav-on'); }
  }, 60);
};

window.ttTapPlay = function(e){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  if(typeof togglePlay==='function') togglePlay();
  setTimeout(window.ttSyncPlay, 120);
};

// ── Search ────────────────────────────────────────────
window.ttOpenSearch = function(){
  searchInput.value='';
  ttSearchFilter();
  searchOverlay.classList.add('open');
  setTimeout(function(){ searchInput.focus(); }, 350);
};
window.ttCloseSearch = function(){
  searchOverlay.classList.remove('open');
  searchInput.blur();
};

window.ttSearchFilter = function(){
  var q = (searchInput.value||'').toLowerCase().trim();
  var st = getSt();
  var res = q ? st.filter(function(s){ return s.name.toLowerCase().includes(q)||(s.genre&&s.genre.toLowerCase().includes(q)); }) : st.slice(0,20);
  renderSearchResults(res);
};

function renderSearchResults(list){
  searchResults.innerHTML='';
  if(!list.length){
    searchResults.innerHTML='<div class="tt-search-empty">Ничего не найдено</div>';
    return;
  }
  list.slice(0,30).forEach(function(s){
    var ci = typeof curIdx!=='undefined'?curIdx:0;
    var idx = getSt().indexOf(s);
    var isActive = idx===ci;
    var cover = s.logo || fbImg(s.name);
    var item = document.createElement('div'); item.className='tt-search-item';
    item.innerHTML=
      '<div class="tt-search-img"><img src="'+cover+'" onerror="this.src=\''+fbImg(s.name)+'\'" loading="lazy"></div>'+
      '<div style="flex:1;min-width:0"><div class="tt-search-name">'+s.name+'</div><div class="tt-search-genre">'+(s.genre||'Радио')+'</div></div>'+
      (isActive?'<div class="tt-search-playing">▶</div>':'');
    (function(i){
      item.onclick=function(){
        if(typeof loadStation==='function') loadStation(i,true);
        ttCloseSearch();
        setTimeout(function(){ renderAll(); setTimeout(window.ttSyncPlay,150); },100);
      };
    })(idx);
    searchResults.appendChild(item);
  });
}

// ── Station list ──────────────────────────────────────
window.ttOpenList = function(){
  listOverlay.style.display='block';
  buildListDOM();
};
window.ttCloseList = function(){
  listOverlay.style.display='none';
};

function buildListDOM(){
  listEl.innerHTML='';
  var st = getSt(); var ci = typeof curIdx!=='undefined'?curIdx:0;
  st.forEach(function(s,idx){
    var isActive = idx===ci;
    var cover = s.logo || fbImg(s.name);
    var row = document.createElement('div');
    row.className='tt-list-item'+(isActive?' active-item':'');
    row.innerHTML=
      '<div class="tt-list-img"><img src="'+cover+'" onerror="this.src=\''+fbImg(s.name)+'\'" loading="lazy"></div>'+
      '<div style="flex:1;min-width:0"><div class="tt-list-name">'+s.name+'</div><div class="tt-list-genre">'+(s.genre||'Радио')+'</div></div>'+
      (isActive?'<div style="color:#2bbd6e;font-size:16px;flex-shrink:0">▶</div>':'');
    (function(i){
      row.onclick=function(){
        if(typeof loadStation==='function') loadStation(i,true);
        ttCloseList();
        setTimeout(function(){ renderAll(); setTimeout(window.ttSyncPlay,150); },100);
      };
    })(idx);
    listEl.appendChild(row);
  });
}

// ── Init ──────────────────────────────────────────────
function ttInit(){
  if(initialized || !isMob()) return;
  initialized=true;

  view.style.display='block';
  document.body.classList.add('tiktok-mode');

  // Wait for stations then render
  var tries=0;
  var wait=setInterval(function(){
    tries++;
    if(getSt().length || tries>40){
      clearInterval(wait);
      renderAll();

      if(!localStorage.getItem('ttHintSeen2')){
        hint.style.display='flex';
        localStorage.setItem('ttHintSeen2','1');
        setTimeout(function(){ hint.style.display='none'; },3000);
      }
    }
  },200);

  // Touch events — passive where possible, active for move to prevent scroll
  view.addEventListener('touchstart', onTouchStart, {passive:true});
  view.addEventListener('touchmove',  onTouchMove,  {passive:false});
  view.addEventListener('touchend',   onTouchEnd,   {passive:true});

  // Keyboard
  document.addEventListener('keydown', function(e){
    if(!isMob()) return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown') goNext();
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp') goPrev();
  });

  // Patch setPlaying to update TikTok UI
  var origSP = window.setPlaying;
  window.setPlaying = function(on){
    if(origSP) origSP(on);
    if(isMob()) setTimeout(window.ttSyncPlay, 80);
  };

  // Track text sync
  setInterval(function(){ if(isMob()) ttSyncTrack(); }, 6000);

  // Swipe search hint close on outside tap
  document.addEventListener('touchstart', function(e){
    if(searchOverlay.classList.contains('open') && !searchOverlay.contains(e.target)){
      ttCloseSearch();
    }
  }, {passive:true});
}

window.addEventListener('resize', function(){
  if(isMob()){
    if(!initialized){ ttInit(); }
    else { view.style.display='block'; document.body.classList.add('tiktok-mode'); }
  } else {
    view.style.display='none';
    document.body.classList.remove('tiktok-mode');
  }
});

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(ttInit,300); });
} else {
  setTimeout(ttInit,300);
}

})();
</script>
