<!DOCTYPE html>
  <html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📻 Радио</title>
    <meta name="theme-color" content="#211F26">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
    // Kill stale service workers so old cached files don't show
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(r) {
        if (!r.length) return;
        Promise.all(r.map(function(sw){ return sw.unregister(); })).then(function(){
          caches.keys().then(function(k){ Promise.all(k.map(function(n){ return caches.delete(n); })).then(function(){ location.reload(true); }); });
        });
      });
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100vh;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}
  [data-theme=dark]{--pr:#D0BCFF;--op:#381E72;--pc:#4F378B;--bg:#211F26;--s1:#302D38;--s2:#3B3744;--tx:#E6E0E9;--t2:#CAC4D0;--t3:#938F99;--ol:#49454F;--sh:rgba(0,0,0,.55);--fpbg:#211F26}
  [data-theme=light]{--pr:#6750A4;--op:#fff;--pc:#EADDFF;--bg:#FEF7FF;--s1:#F3EDF7;--s2:#EDE8F5;--tx:#1C1B1F;--t2:#49454F;--t3:#938F99;--ol:#CAC4D0;--sh:rgba(0,0,0,.18);--fpbg:#1a1a2e}
  button{cursor:pointer;font-family:inherit}
  img{display:block}

  /* HEADER */
  #H{position:fixed;top:0;left:0;right:0;z-index:60;background:var(--bg);border-bottom:1px solid var(--ol)}
  #HT{display:flex;align-items:center;height:56px;padding:0 8px 0 16px}
  #Htl{font-size:20px;font-weight:700;color:var(--tx);flex:1}
  #btnA{padding:6px 14px;border-radius:20px;border:none;height:36px;font-size:12px;font-weight:700;letter-spacing:.5px;background:var(--s1);color:var(--t3)}
  #btnA.on{background:var(--pr);color:var(--op)}
  #btnT{width:44px;height:44px;border-radius:22px;border:none;background:transparent;color:var(--t2);font-size:20px;margin-left:4px;display:flex;align-items:center;justify-content:center}
  #chips{display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  #chips::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;white-space:nowrap;border:1.5px solid var(--ol);background:transparent;color:var(--t2);font-size:13px}
  .chip.on{background:var(--pr);color:var(--op);border-color:transparent}

  /* CONTENT */
  #C{padding-top:110px;padding-bottom:148px}
  .pane{display:none}
  .pane.on{display:block}

  /* STATIONS */
  #pSt{padding:8px 16px;display:flex;flex-direction:column;gap:6px}
  .sr{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:16px;border:1.5px solid transparent;background:var(--bg);cursor:pointer;-webkit-user-select:none;user-select:none}
  .sr:active{opacity:.7}
  .sr.on{background:var(--pc);border-color:var(--pr)}
  .slo{width:50px;height:50px;border-radius:12px;object-fit:cover;background:var(--s1);flex-shrink:0}
  .sin{flex:1;min-width:0}
  .snm{font-size:14px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sgn{font-size:12px;color:var(--t3);margin-top:2px}
  .sbd{width:32px;height:32px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .sr.on .sbd{background:var(--pr);color:var(--op)}

  /* HISTORY */
  #pHi{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
  .hr{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border-radius:14px}
  .hlo{width:42px;height:42px;border-radius:10px;object-fit:cover;background:var(--bg);flex-shrink:0}
  .hin{flex:1;min-width:0}
  .htr{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hmt{font-size:11px;color:var(--t3);margin-top:2px}
  .htm{font-size:11px;color:var(--t3);flex-shrink:0}

  /* COMMENTS */
  #pCo{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
  .cfrm{display:flex;gap:8px}
  .cfrm input{flex:1;padding:10px 14px;border-radius:14px;border:1.5px solid var(--ol);background:var(--s1);color:var(--tx);font-size:14px}
  .cfrm input::placeholder{color:var(--t3)}
  .cfrm button{padding:10px 18px;border-radius:14px;border:none;background:var(--pr);color:var(--op);font-size:16px}
  .cit{display:flex;gap:10px;padding:10px 14px;background:var(--s1);border-radius:14px}
  .cav{width:36px;height:36px;border-radius:18px;background:var(--pr);color:var(--op);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .cbo{flex:1;min-width:0}
  .cnm{font-size:12px;font-weight:700;color:var(--tx)}
  .ctx{font-size:13px;color:var(--t2);margin-top:2px;word-break:break-word}
  .ctm{font-size:11px;color:var(--t3);margin-top:4px}
  .emp{color:var(--t3);text-align:center;padding:40px 0;font-size:14px}

  /* MINI PLAYER */
  #MP{position:fixed;left:12px;right:12px;bottom:68px;z-index:70;display:none}
  #MP.vis{display:block}
  #MPi{display:flex;align-items:center;gap:12px;background:var(--s2);border-radius:20px;padding:10px 10px 10px 12px;box-shadow:0 4px 24px var(--sh);cursor:pointer}
  #MPa{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--s1);flex-shrink:0}
  #MPa.sp{-webkit-animation:sp 12s linear infinite;animation:sp 12s linear infinite}
  #MPn{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #MPt{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mb{width:40px;height:40px;border-radius:20px;border:none;background:transparent;color:var(--t2);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #MPpl{background:var(--pr);color:var(--op)}

  /* BOTTOM NAV */
  #NAV{position:fixed;left:0;right:0;bottom:0;z-index:80;background:var(--s1);border-top:1px solid var(--ol);display:flex;height:64px}
  .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--t3);font-size:11px}
  .nb .ni{width:64px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .nb.on{color:var(--pr)}
  .nb.on .ni{background:var(--pc)}

  /* ==============================================
     FULL PLAYER — KEY FIX:
     - #FP: position:fixed, overflow:hidden (NO overflow-y:auto here!)
     - Solid fallback background so it's never transparent
     - #FPbg: position:ABSOLUTE (not fixed) — fixed inside transformed breaks iOS
     - #FPsc: the actual scroll container (absolute, covers FP, overflow-y:auto)
     ============================================== */
  #FP{
    position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
    background:var(--fpbg); /* solid fallback — always dark */
    overflow:hidden; /* clip everything inside */
    -webkit-transform:translateY(100%);transform:translateY(100%);
    -webkit-transition:-webkit-transform .35s cubic-bezier(.32,.72,0,1);
    transition:transform .35s cubic-bezier(.32,.72,0,1);
    pointer-events:none;
  }
  #FP.op{-webkit-transform:translateY(0);transform:translateY(0);pointer-events:auto}

  /* Background art layer — absolute, NOT fixed (iOS compat) */
  #FPbg{position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;overflow:hidden}
  #FPbi{
    position:absolute;
    top:-40px;left:-40px;
    width:calc(100% + 80px);height:calc(100% + 80px);
    object-fit:cover;
    -webkit-filter:blur(60px) brightness(.28) saturate(1.8);
    filter:blur(60px) brightness(.28) saturate(1.8);
  }
  #FPov{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(20,18,24,.55)}

  /* Scroll container — absolute, covers FP, scrollable */
  #FPsc{
    position:absolute;top:0;left:0;right:0;bottom:0;
    z-index:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  #FPbd{
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:58px 28px 48px;
    position:relative;
  }

  #FPpl{position:absolute;top:14px;left:50%;margin-left:-18px;width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.3)}
  #FPcl{position:absolute;top:18px;right:16px;width:40px;height:40px;border-radius:20px;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
  #FPaw{width:250px;height:250px;border-radius:125px;overflow:hidden;box-shadow:0 8px 48px rgba(0,0,0,.6);margin:8px 0 28px;flex-shrink:0;background:rgba(255,255,255,.08)}
  #FPa{width:100%;height:100%;object-fit:cover}
  #FPa.sp{-webkit-animation:sp 12s linear infinite;animation:sp 12s linear infinite}
  #FPnm{font-size:22px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px}
  #FPgn{font-size:14px;color:rgba(255,255,255,.6);text-align:center;margin-bottom:6px}
  #FPtr{font-size:13px;color:rgba(255,255,255,.75);text-align:center;min-height:20px;margin-bottom:32px}
  #FPct{display:flex;align-items:center;gap:20px;margin-bottom:20px}
  .fb{width:56px;height:56px;border-radius:28px;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center}
  #FPpl2{width:72px;height:72px;border-radius:36px;background:#fff;color:#211F26;font-size:28px}
  #FPls{font-size:12px;color:rgba(255,255,255,.45);text-align:center}

  @keyframes sp{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @-webkit-keyframes sp{from{-webkit-transform:rotate(0deg)}to{-webkit-transform:rotate(360deg)}}
    </style>
  </head>
  <body>
  <audio id="AU" preload="none"></audio>

  <!-- HEADER -->
  <div id="H">
    <div id="HT">
      <span id="Htl">📻 Радио</span>
      <button id="btnA" onclick="toggleAuto()">AUTO</button>
      <button id="btnT" onclick="toggleTheme()">☀️</button>
    </div>
    <div id="chips">
      <button class="chip on" data-g="all"    onclick="sg('all')">🎵 Все</button>
      <button class="chip"    data-g="pop"    onclick="sg('pop')">⭐ Поп</button>
      <button class="chip"    data-g="deep"   onclick="sg('deep')">🎧 Deep</button>
      <button class="chip"    data-g="edm"    onclick="sg('edm')">⚡ Электро</button>
      <button class="chip"    data-g="rap"    onclick="sg('rap')">🎤 Рэп</button>
      <button class="chip"    data-g="chill"  onclick="sg('chill')">🌊 Чилл</button>
      <button class="chip"    data-g="rock"   onclick="sg('rock')">🎸 Рок</button>
      <button class="chip"    data-g="dnb"    onclick="sg('dnb')">🥁 DnB</button>
      <button class="chip"    data-g="trance" onclick="sg('trance')">✨ Trance</button>
      <button class="chip"    data-g="techno" onclick="sg('techno')">🔊 Techno</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="C">
    <div id="pSt" class="pane on"></div>
    <div id="pHi" class="pane"></div>
    <div id="pCo" class="pane">
      <div class="cfrm"><input id="cIn" type="text" placeholder="Написать комментарий..." maxlength="200"><button onclick="addCom()">→</button></div>
      <div id="cList"></div>
    </div>
  </div>

  <!-- MINI PLAYER -->
  <div id="MP">
    <div id="MPi" onclick="openFP()">
      <img id="MPa" src="" alt="" onerror="this.style.display='none'">
      <div style="flex:1;min-width:0"><div id="MPn">—</div><div id="MPt">Нажмите для подробностей</div></div>
      <button class="mb" onclick="prev(event)">⏮</button>
      <button class="mb" id="MPpl" onclick="tog(event)">▶</button>
      <button class="mb" onclick="nxt(event)">⏭</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="NAV">
    <button class="nb on" id="nb0" onclick="stab(0)"><div class="ni">📻</div><span>Станции</span></button>
    <button class="nb"    id="nb1" onclick="stab(1)"><div class="ni">🕓</div><span>История</span></button>
    <button class="nb"    id="nb2" onclick="stab(2)"><div class="ni">💬</div><span>Комменты</span></button>
  </div>

  <!-- FULL PLAYER — fixed overlay, dark background, scroll inside abs container -->
  <div id="FP">
    <div id="FPbg">
      <img id="FPbi" src="" alt="">
      <div id="FPov"></div>
    </div>
    <div id="FPsc">
      <div id="FPbd">
        <div id="FPpl"></div>
        <button id="FPcl" onclick="closeFP()">✕</button>
        <div id="FPaw"><img id="FPa" src="" alt="" onerror="this.style.opacity='.3'"></div>
        <div id="FPnm">—</div>
        <div id="FPgn"></div>
        <div id="FPtr"></div>
        <div id="FPct">
          <button class="fb" onclick="prev()">⏮</button>
          <button class="fb" id="FPpl2" onclick="tog()">▶</button>
          <button class="fb" onclick="nxt()">⏭</button>
        </div>
        <div id="FPls"></div>
      </div>
    </div>
  </div>

  <script src="stations.js"></script>
  <script>
  var cI=-1,pl=false,fpO=false,au_=false,gn_='all',tb_=0,hls=null,tT=null;
  var hist=[],coms=[],thm=localStorage.getItem('rt')||'dark';
  try{hist=JSON.parse(localStorage.getItem('rh')||'[]');}catch(x){hist=[];}
  try{coms=JSON.parse(localStorage.getItem('rc')||'[]');}catch(x){coms=[];}
  var AU=document.getElementById('AU');

  function apTh(){
    document.documentElement.setAttribute('data-theme',thm);
    document.getElementById('btnT').textContent=thm==='dark'?'☀️':'🌙';
  }
  function toggleTheme(){thm=thm==='dark'?'light':'dark';localStorage.setItem('rt',thm);apTh();}
  apTh();

  function sg(g){
    gn_=g;
    document.querySelectorAll('#chips .chip').forEach(function(c){c.classList.toggle('on',c.getAttribute('data-g')===g);});
    rSt();
  }
  function filt(){
    if(!window.stations)return[];
    return gn_==='all'?window.stations:window.stations.filter(function(s){return s.tag===gn_;});
  }

  function stab(i){
    tb_=i;
    ['pSt','pHi','pCo'].forEach(function(id,j){document.getElementById(id).classList.toggle('on',j===i);});
    for(var j=0;j<3;j++)document.getElementById('nb'+j).classList.toggle('on',j===i);
    if(i===1)rHi();
    if(i===2)rCo();
  }

  function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function rSt(){
    var list=filt(),el=document.getElementById('pSt'),h='';
    list.forEach(function(s){
      var idx=window.stations.indexOf(s),act=idx===cI,ic=act&&pl?'⏸':'▶';
      h+='<div class="sr'+(act?' on':'')+'" onclick="play('+idx+')">'
        +'<img class="slo" src="'+e(s.logo||'')+'" onerror="this.style.opacity='.4\'" alt="" loading="lazy">'
        +'<div class="sin"><div class="snm">'+e(s.name)+'</div><div class="sgn">'+e(s.genre)+'</div></div>'
        +'<div class="sbd">'+ic+'</div></div>';
    });
    el.innerHTML=h||'<div class="emp">Нет станций</div>';
  }

  function rHi(){
    var el=document.getElementById('pHi');
    if(!hist.length){el.innerHTML='<div class="emp">История пустая — сыграйте любую станцию</div>';return;}
    var h='';hist.slice().reverse().forEach(function(x){
      h+='<div class="hr"><img class="hlo" src="'+e(x.logo||'')+'" onerror="this.style.opacity='.4\'" alt="">'
        +'<div class="hin"><div class="htr">'+e(x.track||x.name)+'</div><div class="hmt">'+e(x.name)+'</div></div>'
        +'<div class="htm">'+e(x.time||'')+'</div></div>';
    });el.innerHTML=h;
  }

  function rCo(){
    var el=document.getElementById('cList');
    if(!coms.length){el.innerHTML='<div class="emp">Комментариев пока нет</div>';return;}
    var h='';coms.slice().reverse().forEach(function(c){
      h+='<div class="cit"><div class="cav">😊</div><div class="cbo">'
        +'<div class="cnm">Слушатель</div><div class="ctx">'+e(c.text)+'</div>'
        +'<div class="ctm">'+e(c.time||'')+'</div></div></div>';
    });el.innerHTML=h;
  }
  function addCom(){
    var inp=document.getElementById('cIn'),txt=(inp.value||'').trim();if(!txt)return;
    var now=new Date(),t=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    coms.push({text:txt,time:t});if(coms.length>100)coms.shift();
    localStorage.setItem('rc',JSON.stringify(coms));inp.value='';rCo();
  }

  function play(idx){
    if(!window.stations||!window.stations[idx])return;
    cI=idx;pl=true;openFP();strm();upd();
  }
  function strm(){
    var s=window.stations[cI];if(!s)return;
    if(hls){try{hls.destroy();}catch(x){}hls=null;}
    AU.pause();AU.src='';
    var url=s.stream||'';
    if(typeof Hls!=='undefined'&&Hls.isSupported()&&url.indexOf('.m3u8')>=0){
      hls=new Hls({enableWorker:true,lowLatencyMode:false,maxBufferLength:30});
      hls.loadSource(url);hls.attachMedia(AU);
      hls.on(Hls.Events.MANIFEST_PARSED,function(){AU.play().catch(function(){});});
      hls.on(Hls.Events.ERROR,function(ev,d){if(d.fatal){pl=false;upd();if(au_)setTimeout(nxt,2000);}});
    }else if(AU.canPlayType&&AU.canPlayType('application/vnd.apple.mpegurl')&&url.indexOf('.m3u8')>=0){
      AU.src=url;AU.load();AU.play().catch(function(){});
    }else{AU.src=url;AU.load();AU.play().catch(function(){});}
    var now=new Date(),t=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    hist.push({name:s.name,logo:s.logo||'',track:'В эфире',time:t});
    if(hist.length>200)hist.shift();
    localStorage.setItem('rh',JSON.stringify(hist));
    sFch();
  }
  function tog(ev){if(ev)ev.stopPropagation();if(cI===-1)return;if(pl){AU.pause();pl=false;if(hls){try{hls.destroy();}catch(x){}hls=null;}}else{pl=true;strm();}upd();}
  function prev(ev){if(ev)ev.stopPropagation();var l=filt();if(!l.length)return;var fi=cI===-1?0:l.findIndex(function(s){return window.stations.indexOf(s)===cI;});play(window.stations.indexOf(l[(fi-1+l.length)%l.length]));}
  function nxt(ev){if(ev)ev.stopPropagation();var l=filt();if(!l.length)return;var fi=cI===-1?-1:l.findIndex(function(s){return window.stations.indexOf(s)===cI;});play(window.stations.indexOf(l[(fi+1)%l.length]));}

  function openFP(){fpO=true;document.getElementById('FP').classList.add('op');}
  function closeFP(){fpO=false;document.getElementById('FP').classList.remove('op');}

  function sFch(){if(tT){clearTimeout(tT);tT=null;}dFch();}
  function dFch(){
    if(cI===-1||!pl)return;
    var s=window.stations[cI];
    var m=s&&s.logo&&s.logo.match(/radiopotok\.ru\/f\/station\/\d+\/(\d+)\.png/);
    if(!m){sTrk('🎵 Live stream');tT=setTimeout(dFch,30000);return;}
    fetch('https://radiopotok.ru/ajax/track?id='+m[1])
      .then(function(r){return r.json();})
      .then(function(d){var t=d.artist&&d.title?d.artist+' — '+d.title:d.title||'🎵 В эфире';sTrk(t);if(hist.length){hist[hist.length-1].track=t;localStorage.setItem('rh',JSON.stringify(hist));}})
      .catch(function(){sTrk('🎵 В эфире');});
    tT=setTimeout(dFch,15000);
  }
  function sTrk(t){var a=document.getElementById('MPt'),b=document.getElementById('FPtr');if(a)a.textContent=t;if(b)b.textContent=t;}

  function toggleAuto(){au_=!au_;document.getElementById('btnA').classList.toggle('on',au_);}

  function upd(){
    var s=cI>=0?window.stations[cI]:null,mp=document.getElementById('MP');
    if(!s){mp.classList.remove('vis');return;}
    mp.classList.add('vis');
    var ma=document.getElementById('MPa');
    ma.src=s.logo||'';ma.style.display='';
    document.getElementById('MPn').textContent=s.name;
    document.getElementById('MPpl').textContent=pl?'⏸':'▶';
    if(pl)ma.classList.add('sp');else ma.classList.remove('sp');
    document.getElementById('FPbi').src=s.logo||'';
    var fa=document.getElementById('FPa');fa.src=s.logo||'';fa.style.opacity='';
    document.getElementById('FPnm').textContent=s.name;
