<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Go</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f11; --card: #18181b; --accent: #ffffff;
            --text: #f4f4f5; --muted: #a1a1aa; --border: #27272a;
            --green: #22c55e; --gap: 12px; --r-card: 20px;
        }
        body.light {
            --bg: #f8f8f8; --card: #ffffff; --accent: #18181b;
            --text: #18181b; --muted: #71717a; --border: #e4e4e7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: background 0.3s; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        /* Header */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; letter-spacing: -0.5px; }
        .header-btns { display: flex; gap: 10px; }
        .btn-round { width: 40px; height: 40px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Player Card */
        .player-card { padding: 20px; background: var(--card); border-bottom: 1px solid var(--border); }
        .now-playing { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
        .station-img { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; background: var(--border); }
        .station-info { flex: 1; min-width: 0; }
        .station-info h2 { font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-info p { color: var(--muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        .controls { display: flex; align-items: center; justify-content: space-around; margin: 15px 0; }
        .play-btn { width: 70px; height: 70px; border-radius: 35px; background: var(--accent); color: var(--bg); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; }
        .play-btn:active { transform: scale(0.9); }
        .play-btn svg { width: 30px; height: 30px; fill: currentColor; }

        /* Volume Slider */
        .volume-box { display: flex; align-items: center; gap: 15px; padding: 10px 0; }
        .vol-slider-wrap { flex: 1; position: relative; height: 6px; background: var(--border); border-radius: 3px; cursor: pointer; }
        .vol-fill { position: absolute; height: 100%; background: var(--accent); border-radius: 3px; width: 80%; transition: width 0.1s; }
        .vol-input { position: absolute; width: 100%; opacity: 0; cursor: pointer; top: -10px; height: 30px; }

        /* Search & Categories */
        .search-area { padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .search-bar { width: 100%; padding: 12px 15px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; }
        .categories { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-tag { padding: 6px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; color: var(--muted); }
        .cat-tag.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* List */
        .station-list { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .station-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .station-row:active { opacity: 0.7; }
        .row-img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
        .row-info { flex: 1; }
        .row-name { font-weight: 500; font-size: 15px; }
        .row-genre { font-size: 12px; color: var(--muted); }
        .row-live { width: 8px; height: 8px; border-radius: 4px; background: var(--border); }
        .row-live.active { background: var(--green); box-shadow: 0 0 8px var(--green); }

        /* Loading */
        .loading-line { height: 2px; background: var(--accent); width: 0; transition: width 0.3s; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <div class="loading-line" id="loader"></div>
    <div class="app-container">
        <div class="header">
            <h1>Radio Go</h1>
            <div class="header-btns">
                <button class="btn-round" onclick="toggleTheme()">🌓</button>
            </div>
        </div>

        <div class="player-card">
            <div class="now-playing">
                <img id="curLogo" class="station-img" src="https://radiopotok.ru/f/station/256/1260.png">
                <div class="station-info">
                    <p id="curGenre">DEEP HOUSE</p>
                    <h2 id="curName">SOUNDPARK DEEP</h2>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn-round" onclick="changeStation(-1)">⏮</button>
                <button class="play-btn" id="playBtn" onclick="togglePlay()">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="btn-round" onclick="changeStation(1)">⏭</button>
            </div>

            <div class="volume-box">
                <span>🔈</span>
                <div class="vol-slider-wrap">
                    <div class="vol-fill" id="volFill"></div>
                    <input type="range" class="vol-input" min="0" max="1" step="0.01" value="0.8" oninput="setVol(this.value)">
                </div>
                <span>🔊</span>
            </div>
        </div>

        <div class="search-area">
            <input type="text" class="search-bar" id="searchInput" placeholder="Поиск среди 1000+ станций..." oninput="handleSearch()">
        </div>

        <div class="categories" id="catList"></div>

        <div class="station-list" id="list"></div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

<script>
    // База станций (здесь пример структуры, расширяется до 1000+)
    const baseStations = [
        { name: "SOUNDPARK DEEP", genre: "Deep House", tag: "deep", logo: "https://radiopotok.ru/f/station/256/1260.png", url: "https://h.getradio.me/spdeep/hls.m3u8" },
        { name: "Record Dance", genre: "EDM", tag: "dance", logo: "https://radiopotok.ru/f/station/256/16.png", url: "https://radiorecord.hostingradio.ru/rr_main96.aacp" },
        { name: "Europa Plus", genre: "Pop", tag: "pop", logo: "https://radiopotok.ru/f/station/256/2.png", url: "https://ep128.hostingradio.ru:8030/ep128" },
        { name: "Cafe del Mar", genre: "Chillout", tag: "relax", logo: "https://radiopotok.ru/f/station/256/1105.png", url: "https://stream.cafedelmar.com.au/radio/8000/aac.mp3" },
        { name: "Lofi Girl", genre: "Lo-Fi", tag: "relax", logo: "https://upload.wikimedia.org/wikipedia/en/d/d3/Lofi_Girl_logo.jpg", url: "https://icecast.lofigirl.com/lofigirl.mp3" },
        { name: "Rock FM", genre: "Rock", tag: "rock", logo: "https://radiopotok.ru/f/station/256/32.png", url: "https://rock.hostingradio.ru:80/rock128.mp3" },
        { name: "Radio Jazz", genre: "Jazz", tag: "jazz", logo: "https://radiopotok.ru/f/station/256/67.png", url: "https://jazz.streamr.ru/jazz-64.aac" },
        { name: "Classic FM", genre: "Classical", tag: "classic", logo: "https://radiopotok.ru/f/station/256/141.png", url: "https://media-ssl.musicradio.com/ClassicFM" }
    ];

    // Авто-генерация для имитации 1000+ станций (в реальном проекте тут массив из JSON)
    let stations = [...baseStations];
    const genres = ["All", "Deep", "Dance", "Pop", "Relax", "Rock", "Jazz", "Classic", "Metal", "Rap", "Country", "80s", "90s"];
    
    // Эмуляция большого списка для теста CDN и поиска
    for(let i=0; i<1000; i++) {
        const randomBase = baseStations[Math.floor(Math.random() * baseStations.length)];
        stations.push({
            ...randomBase,
            name: `${randomBase.name} #${i+1}`,
            tag: genres[Math.floor(Math.random() * genres.length)].toLowerCase()
        });
    }

    let curIdx = 0;
    let isPlaying = false;
    let hls = new Hls();
    const audio = document.getElementById('audio');
    let audioCtx, gainNode;

    // Инициализация звукового движка (Нормализация)
    function initAudioEngine() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audio);
            gainNode = audioCtx.createGain();
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }
    }

    function renderCategories() {
        const container = document.getElementById('catList');
        genres.forEach(g => {
            const span = document.createElement('span');
            span.className = `cat-tag ${g === 'All' ? 'active' : ''}`;
            span.textContent = g;
            span.onclick = () => filterByCategory(g);
            container.appendChild(span);
        });
    }

    function renderList(data = stations) {
        const list = document.getElementById('list');
        list.innerHTML = '';
        // Рендерим первые 50 для скорости, остальные по подгрузке ( упрощено для примера)
        data.slice(0, 100).forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = 'station-row';
            div.innerHTML = `
                <img class="row-img" src="${s.logo}" loading="lazy">
                <div class="row-info">
                    <div class="row-name">${s.name}</div>
                    <div class="row-genre">${s.genre}</div>
                </div>
                <div class="row-live ${curIdx === stations.indexOf(s) ? 'active' : ''}"></div>
            `;
            div.onclick = () => playStation(stations.indexOf(s));
            list.appendChild(div);
        });
    }

    function playStation(idx) {
        initAudioEngine();
        curIdx = idx;
        const s = stations[idx];
        
        document.getElementById('curName').textContent = s.name;
        document.getElementById('curGenre').textContent = s.genre;
        document.getElementById('curLogo').src = s.logo;
        
        document.getElementById('loader').style.width = '50%';
        
        if (s.url.includes('m3u8')) {
            if (Hls.isSupported()) {
                hls.loadSource(s.url);
                hls.attachMedia(audio);
            }
        } else {
            hls.detachMedia();
            audio.src = s.url;
        }

        audio.play().then(() => {
            isPlaying = true;
            updateUI();
            document.getElementById('loader').style.width = '100%';
            setTimeout(() => document.getElementById('loader').style.width = '0', 400);
        });
        
        renderList(stations);
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
        } else {
            audio.play();
            isPlaying = true;
        }
        updateUI();
    }

    function updateUI() {
        const btn = document.getElementById('playIcon');
        btn.parentElement.innerHTML = isPlaying 
            ? '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>'
            : '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    }

    function setVol(v) {
        if (gainNode) gainNode.gain.value = v; // Софтверное усиление/нормализация
        audio.volume = v;
        document.getElementById('volFill').style.width = (v * 100) + '%';
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = stations.filter(s => s.name.toLowerCase().includes(q) || s.genre.toLowerCase().includes(q));
        renderList(filtered);
    }

    function filterByCategory(cat) {
        document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if (cat === 'All') return renderList(stations);
        const filtered = stations.filter(s => s.tag === cat.toLowerCase());
        renderList(filtered);
    }

    function toggleTheme() {
        document.body.classList.toggle('light');
    }

    function changeStation(dir) {
        let newIdx = curIdx + dir;
        if (newIdx < 0) newIdx = stations.length - 1;
        if (newIdx >= stations.length) newIdx = 0;
        playStation(newIdx);
    }

    // Запуск
    renderCategories();
    renderList();
    
    // Нативная поддержка Telegram
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.backgroundColor = '#0f0f11';
    tg.headerColor = '#0f0f11';
</script>
</body>
</html>
