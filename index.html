<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══ RESET & GLOBAL STREAMING ESSENTIALS ════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ══ PREMIUM DESIGN SYSTEM TOKENS ═══════════════════════ */
:root {
  --bg: #f6f5f1;
  --card: #ffffff;
  --text: #121214;
  --muted: #8e8e93;
  --accent: #121214;
  --brand: #2bbd6e;
  --border: rgba(0,0,0,0.06);
  --pill: #eae8e2;
  --pill-text: #636366;
  --green: #2bbd6e;
  --red: #ff3b30;
  --orange: #ff9500;
  --shadow: 0 8px 32px rgba(0,0,0,0.03), 0 1px 4px rgba(0,0,0,0.02);
  --px: clamp(14px, 4vw, 24px);
  --gap: 10px;
  --sp-sm: 12px;
  --sp-md: 20px;
  --r-card: 28px;
  --r-row: 16px;
  --r-btn: 14px;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}

:root.dark {
  --bg: #0b0b0d;
  --card: #16161a;
  --text: #f5f5f7;
  --muted: #7c7c82;
  --accent: #f5f5f7;
  --brand: #2bbd6e;
  --border: rgba(255,255,255,0.06);
  --pill: #222227;
  --pill-text: #a1a1aa;
  --shadow: 0 12px 40px rgba(0,0,0,0.4);
}

/* ══ FLUID BACKGROUND ARTWORK ═══════════════════════════ */
.ambient-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-size: cover; background-position: center;
  filter: blur(100px) saturate(1.8) brightness(0.4);
  opacity: 0; transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1), background-image 1s ease;
  transform: scale(1.15);
}
.ambient-bg.on { opacity: 0.32; }
:root.dark .ambient-bg.on { opacity: 0.45; }
.page, .scroll-area, .app { position: relative; z-index: 1; }

/* PLATFORM SPECIFIC FONTS */
html.plt-ios body, html.plt-mac body { --sys-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
html.plt-android body { --sys-font: 'Google Sans', 'Roboto', sans-serif; }
html.plt-windows body { --sys-font: 'Segoe UI Variable Display', 'Segoe UI', sans-serif; }
html body { --sys-font: 'DM Sans', sans-serif; }
body { font-family: var(--sys-font); background: var(--bg); color: var(--text); transition: background 0.3s ease, color 0.3s ease; overflow: hidden; }

/* ══ RESPONSIVE GRID & INTERFACE LAYOUT ════════════════ */
.page { display: flex; flex-direction: column; height: 100vh; padding: calc(var(--sat) + 12px) calc(var(--sar) + var(--px)) 0 calc(var(--sal) + var(--px)); }
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--sab) + 32px); padding-right: 2px; }
.scroll-area::-webkit-scrollbar { width: 6px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
.app { width: 100%; max-width: 600px; margin: 0 auto; transition: max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1); }

/* PREMIUM SPLIT DEKSTOP/TABLET LAYOUT */
body.split .app { max-width: 1200px; }
body.split .app-inner { display: grid; grid-template-columns: 1fr 380px; gap: 32px; align-items: start; }
body.split .app-right { position: sticky; top: 20px; display: flex; flex-direction: column; gap: 20px; }
.split-spacer { flex-shrink: 0; transition: height 0.3s ease; }

body.split .chat-section {
  display: flex !important; margin: 0;
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(30px) saturate(120%); -webkit-backdrop-filter: blur(30px) saturate(120%);
  border: 1px solid rgba(0,0,0,0.04); box-shadow: var(--shadow);
}
:root.dark body.split .chat-section {
  background: rgba(22, 22, 26, 0.4);
  border-color: rgba(255,255,255,0.05);
}
body.split #chatToggleBtn { display: none; }
body.split .car-recs { display: flex !important; padding: 0; flex-direction: column; gap: 10px; }
body.split #carRecs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
body.split .list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
body.split .row { margin-bottom: 0; }

@media (max-width: 960px) {
  body.split .app-inner { grid-template-columns: 1fr; gap: 16px; }
  body.split .app-right { position: static; }
  body.split .list { grid-template-columns: 1fr; }
  body.split #chatToggleBtn { display: flex; }
  body.split #carRecs { grid-template-columns: 1fr; }
  body.split .chat-section { height: 260px !important; }
  .split-spacer { display: none !important; }
}

/* ══ HEADER COMPONENTS ═════════════════════════════════ */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-md); }
.header-title { font-family: 'DM Serif Display', serif; font-size: clamp(24px, 5vw, 32px); letter-spacing: -0.5px; line-height: 1; }
.header-right { display: flex; align-items: center; gap: 8px; position: relative; }
.clock { font-size: 14px; color: var(--muted); font-weight: 500; font-variant-numeric: tabular-nums; margin-right: 4px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s ease; flex-shrink: 0; }
.live-dot.on { background: var(--green); animation: pulseLive 2s infinite; }
@keyframes pulseLive { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.15); } }

.icon-btn {
  width: 42px; height: 42px; border-radius: var(--r-btn); background: var(--pill); border: 1px solid transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--pill-text);
  transition: all 0.2s cubic-bezier(0.2, 0, 0, 1); flex-shrink: 0;
}
.icon-btn svg { width: 20px; height: 20px; }
.icon-btn:active, .icon-btn.on { background: var(--accent); color: var(--bg); border-color: transparent; }
@media (hover: hover) { .icon-btn:hover { transform: translateY(-1px); background: var(--border); } }

.split-tooltip {
  position: absolute; top: calc(100% + 8px); right: 0; background: var(--accent); color: var(--bg);
  font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 10px; white-space: nowrap;
  pointer-events: none; opacity: 0; transform: translateY(-4px); transition: all 0.25s cubic-bezier(0.2, 0, 0, 1); z-index: 100;
}
.split-tooltip.show { opacity: 1; transform: translateY(0); }

/* ══ NAVIGATION & FILTERS ══════════════════════════════ */
.tabs { display: flex; gap: var(--gap); margin-bottom: var(--sp-sm); align-items: center; justify-content: space-between; }
.tab-btn {
  flex: 1; padding: 12px 16px; border-radius: 100px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; background: var(--pill); color: var(--pill-text);
  display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease;
}
.tab-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.tab-btn.active { background: var(--accent); color: var(--bg); }

.shazam-btn {
  flex: 0 0 auto; height: 41px; padding: 0 18px; border-radius: 100px; border: none; cursor: pointer;
  background: linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%); color: #fff; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 16px rgba(58,123,213,0.25);
  transition: all 0.2s ease; letter-spacing: 0.3px;
}
.shazam-btn:active { transform: scale(0.96); }

/* SEARCH & GENRES */
.search-wrap { position: relative; margin-bottom: var(--sp-sm); }
.search-input {
  width: 100%; padding: 13px 16px 13px 44px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; font-size: 14px; font-weight: 500; color: var(--text); box-shadow: var(--shadow);
  outline: none; transition: all 0.25s ease;
}
.search-input:focus { border-color: var(--brand); box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; display: flex; }
.search-icon svg { width: 18px; height: 18px; }

.genres { display: flex; gap: 8px; overflow-x: auto; margin-bottom: var(--sp-md); padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.genres::-webkit-scrollbar { display: none; }
.genre-pill {
  padding: 8px 16px; border-radius: 100px; background: var(--pill); color: var(--pill-text);
  font-size: 12px; font-weight: 600; cursor: pointer; border: none; white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s ease;
}
.genre-pill.active { background: var(--brand); color: #fff; box-shadow: 0 4px 12px rgba(43,189,110,0.2); }

/* RESUME BADGE */
.resume-badge {
  display: none; align-items: center; gap: 10px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 12px 18px; margin-bottom: var(--sp-sm); font-size: 14px; font-weight: 500;
  cursor: pointer; box-shadow: var(--shadow); animation: slideIn 0.3s cubic-bezier(0.2, 0, 0, 1);
}
.resume-badge.show { display: flex; }
.resume-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); animation: pulseLive 1.2s infinite; flex-shrink: 0; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

/* ══ NOW PLAYING PREMIUM CARD ═════════════════════════ */
.now-card {
  background: var(--card); border-radius: var(--r-card); padding: var(--sp-md); box-shadow: var(--shadow);
  margin-bottom: var(--sp-sm); display: none; transition: background 0.3s ease; position: relative; overflow: hidden;
}
.now-card.visible { display: block; }
.now-card-bg {
  position: absolute; inset: -30px; z-index: 0; background-size: cover; background-position: center;
  filter: blur(36px) saturate(1.5) brightness(0.5); opacity: 0; transition: opacity 0.8s ease; transform: scale(1.1);
}
.now-card.has-bg .now-card-bg { opacity: 1; }
.now-card-bg-overlay { position: absolute; inset: 0; z-index: 1; background: linear-gradient(145deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.45) 100%); opacity: 0; transition: opacity 0.8s; }
.now-card.has-bg .now-card-bg-overlay { opacity: 1; }
.now-card-content { position: relative; z-index: 2; }

/* Adaptive Dynamic Contrast Styles */
.now-card.has-bg .now-name { color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
.now-card.has-bg .now-genre { color: rgba(255,255,255,0.75); }
.now-card.has-bg .fav-btn { color: rgba(255,255,255,0.5); }
.now-card.has-bg .fav-btn.on { color: #ff2d55; }
.now-card.has-bg .ctrl { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.08); color: #fff; backdrop-filter: blur(10px); }
.now-card.has-bg .ctrl:active { background: rgba(255,255,255,0.25); }
.now-card.has-bg .play-btn { background: #ffffff; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.now-card.has-bg .play-btn svg { fill: #121214; }
.now-card.has-bg .vol-row { border-top-color: rgba(255,255,255,0.12); }
.now-card.has-bg .vol-icon-svg, .now-card.has-bg .vol-val { color: rgba(255,255,255,0.7) !important; }
.now-card.has-bg .vol-track-bg { background: rgba(255,255,255,0.2); }
.now-card.has-bg input.vol-input::-webkit-slider-thumb { background: #fff; border-color: rgba(255,255,255,0.2); }
.now-card.has-bg .loading-bar { background: rgba(255,255,255,0.15); }
.now-card.has-bg .loading-bar-inner { background: #ffffff; }

.now-top { display: flex; align-items: center; gap: 16px; margin-bottom: var(--sp-md); }
.now-logo {
  width: clamp(68px, 11vw, 88px); height: clamp(68px, 11vw, 88px); border-radius: 50%; background: var(--pill);
  overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 26px; box-shadow: 0 6px 20px rgba(0,0,0,0.12); border: 2px solid rgba(255,255,255,0.1);
}
.now-logo img { width: 100%; height: 100%; object-fit: cover; }

.now-info { flex: 1; min-width: 0; }
.now-name { font-family: 'DM Serif Display', serif; font-size: clamp(20px, 4.5vw, 25px); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; margin-bottom: 2px; }
.now-genre { font-size: 12px; font-weight: 700; color: var(--text); opacity: 0.6; text-transform: uppercase; letter-spacing: 0.8px; }
.now-track { font-size: 13px; font-weight: 600; color: var(--brand); margin-top: 6px; white-space: nowrap; overflow: hidden; max-width: 100%; display: none; }
.now-track.visible { display: block; }
.now-track-inner { display: inline-block; padding-right: 40px; }
.now-track.marquee .now-track-inner { animation: streamingMarquee 15s linear infinite; }
@keyframes streamingMarquee { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-50%,0,0); } }
.now-card.has-bg .now-track { color: #52d98c; }

.fav-btn { background: none; border: none; cursor: pointer; font-size: 26px; color: var(--muted); flex-shrink: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: transform 0.15s ease; }
.fav-btn:active { transform: scale(1.18); }
.fav-btn.on { color: var(--brand); }

/* PROGRESSIVE LOADING BAR */
.loading-bar { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: var(--sp-sm); overflow: hidden; display: none; }
.loading-bar.active { display: block; }
.loading-bar-inner { height: 100%; width: 30%; background: var(--accent); border-radius: 99px; animation: streamLoad 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
@keyframes streamLoad { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

/* WAVEFORM INTERACTIVES */
.viz {
  height: 26px; display: flex; align-items: flex-end; gap: 3px; margin: 0 auto var(--sp-sm);
  width: 160px; justify-content: center;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 15%, #000 85%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, #000 15%, #000 85%, transparent 100%);
}
.bar { width: 3.5px; min-width: 3.5px; background: rgba(128,128,128,0.2); border-radius: 99px; height: 4px; transition: background 0.3s; }
.bar.on { background: var(--accent); animation: dynamicWave var(--dur, 0.8s) ease-in-out infinite alternate; }
.now-card.has-bg .bar { background: rgba(255,255,255,0.25); }
.now-card.has-bg .bar.on { background: rgba(255,255,255,0.95); }
@keyframes dynamicWave { from { height: 4px; } to { height: 26px; } }

/* CONTROLS HUB */
.controls { display: flex; align-items: center; justify-content: space-between; gap: var(--gap); margin-bottom: var(--sp-sm); }
.ctrl { width: 50px; height: 50px; border-radius: var(--r-btn); background: var(--pill); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--pill-text); transition: all 0.15s ease; flex-shrink: 0; }
.ctrl:active { transform: scale(0.94); opacity: 0.8; }
.ctrl svg { width: 22px; height: 22px; }

.play-btn { width: 66px; height: 66px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.15); transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1); flex-shrink: 0; }
.play-btn:active { transform: scale(0.92); }
.play-btn svg { width: 24px; height: 24px; fill: var(--bg); margin-left: 3px; }
.play-btn.playing svg { margin-left: 0; }

.mute-btn { display: none; width: 48px; height: 48px; border-radius: 14px; border: none; cursor: pointer; background: transparent; color: var(--text); align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.mute-btn svg { width: 22px; height: 22px; }
.mute-btn.muted { color: var(--red); }

/* VOLUME ENGINE */
.vol-row { display: flex; align-items: center; gap: 12px; padding-top: var(--sp-sm); border-top: 1px solid var(--border); }
.vol-icon-svg { display: flex; align-items: center; flex-shrink: 0; color: var(--muted); width: 20px; height: 20px; }
.vol-icon-svg svg { width: 100%; height: 100%; }
.vol-wrap { flex: 1; position: relative; display: flex; align-items: center; height: 32px; }
.vol-track-bg { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 5px; border-radius: 99px; background: var(--border); pointer-events: none; }
.vol-fill { position: absolute; top: 50%; transform: translateY(-50%); height: 5px; border-radius: 99px; background: var(--brand); pointer-events: none; }
.now-card.has-bg .vol-fill { background: #fff; }
input.vol-input { position: relative; z-index: 2; width: 100%; -webkit-appearance: none; appearance: none; height: 5px; background: transparent; outline: none; cursor: pointer; }
input.vol-input::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--card); border: 2.5px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: transform 0.15s; }
input.vol-input:active::-webkit-slider-thumb { transform: scale(1.3); }
.vol-val { font-size: 13px; font-weight: 700; color: var(--muted); min-width: 36px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* ══ CAR AUTOMOTIVE MODE ═══════════════════════════════ */
body.car { --r-card: 32px; --r-row: 20px; --r-btn: 18px; }
body.car .app { max-width: 720px; }
body.car .icon-btn { width: 54px; height: 54px; border-radius: 18px; }
body.car .icon-btn svg { width: 24px; height: 24px; }
body.car .tab-btn { font-size: 16px; padding: 15px 20px; }
body.car .genre-pill { font-size: 15px; padding: 12px 22px; }
body.car .now-logo { width: 96px; height: 96px; }
body.car .now-name { font-size: 28px; font-weight: 700; }
body.car .now-genre { font-size: 14px; }
body.car .ctrl { width: 68px; height: 68px; }
body.car .ctrl svg { width: 28px; height: 28px; }
body.car .play-btn { width: 88px; height: 88px; }
body.car .play-btn svg { width: 32px; height: 32px; }
body.car .mute-btn { display: flex; }
body.car .row { min-height: 76px; padding: 14px 18px; }
body.car .row-img { width: 54px; height: 54px; min-width: 54px; border-radius: 14px; font-size: 22px; }
body.car .row-name { font-size: 17px; font-weight: 700; }
body.car .row-sub { font-size: 14px; }

/* CAR RECOMMENDATIONS */
.car-recs { display: none; padding: 12px 0 16px; flex-direction: column; gap: 8px; }
body.car .car-recs, body.split .car-recs { display: flex; }
body.split .car-recs { padding: 0; }
.car-recs-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
.car-rec-row { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: var(--pill); border-radius: var(--r-row); cursor: pointer; border: none; width: 100%; text-align: left; font-family: var(--sys-font); transition: opacity 0.15s ease; }
.car-rec-row:active { opacity: 0.75; }
.car-rec-img { width: 44px; height: 44px; min-width: 44px; border-radius: 10px; background: var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.car-rec-img img { width: 100%; height: 100%; object-fit: cover; }
.car-rec-info { flex: 1; min-width: 0; }
.car-rec-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.car-rec-genre { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ══ STATION ROWS & LIST ═══════════════════════════════ */
.section-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-weight: 700; margin-bottom: 12px; padding: 0 2px; margin-top: 20px; }
.list { display: flex; flex-direction: column; gap: 8px; }
.row { background: var(--card); border-radius: var(--r-row); padding: 12px 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none; box-shadow: var(--shadow); border: 1px solid transparent; transition: all 0.2s cubic-bezier(0.2, 0, 0, 1); min-height: 64px; width: 100%; }
.row:active { transform: scale(0.985); opacity: 0.9; }
.row.active { border-color: var(--brand); background: var(--card); box-shadow: 0 4px 16px rgba(43,189,110,0.06); }
.row-img { width: 44px; height: 44px; min-width: 44px; border-radius: 12px; background: var(--pill); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.row-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.row-info { flex: 1; min-width: 0; overflow: hidden; }
.row-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.row-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; margin-left: 4px; }
.row-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.row.active .row-dot { display: none; }

.row-eq { display: none; align-items: flex-end; gap: 2px; height: 13px; }
.row.active .row-eq { display: flex; }
.row-eq-bar { width: 2.5px; background: var(--brand); border-radius: 99px; animation: eqPulse .6s ease-in-out infinite alternate; transform-origin: bottom; }
.row-eq-bar:nth-child(1) { height: 4px; animation-delay: 0s; }
.row-eq-bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
.row-eq-bar:nth-child(3) { height: 7px; animation-delay: 0.3s; }
.row-eq-bar:nth-child(4) { height: 13px; animation-delay: 0.08s; }
@keyframes eqPulse { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }

.empty { text-align: center; color: var(--muted); padding: 48px 24px; font-size: 14px; font-weight: 500; }
.empty-icon { display: block; font-size: 36px; margin-bottom: 10px; }
.show-more-btn { width: 100%; margin-top: 8px; padding: 14px; border: none; cursor: pointer; background: var(--pill); color: var(--pill-text); border-radius: var(--r-row); font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.show-more-btn svg { width: 16px; height: 16px; transition: transform 0.3s ease; }
.show-more-btn.expanded svg { transform: rotate(180deg); }

/* ══ GLASSMORPHIC CHAT COMPONENT ══════════════════════ */
.chat-section {
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(30px) saturate(120%); -webkit-backdrop-filter: blur(30px) saturate(120%);
  border: 1px solid rgba(0,0,0,0.04); border-radius: 24px; box-shadow: var(--shadow);
  margin-top: var(--gap); display: none; flex-direction: column; height: 250px; transition: all 0.3s;
}
:root.dark .chat-section { background: rgba(22, 22, 26, 0.45); border-color: rgba(255,255,255,0.05); }
.chat-section.show { display: flex; margin-bottom: 16px; }
body.split .chat-section.show { display: flex; margin: 0; }
.chat-section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.chat-section-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }

.chat-open-btn {
  background: var(--pill); color: var(--pill-text); border: none; border-radius: 100px;
  padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.chat-open-btn:hover { background: var(--accent); color: var(--bg); }

.chat-msgs { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; min-height: 0; scrollbar-width: none; }
.chat-msgs::-webkit-scrollbar { display: none; }
.chat-msg { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; animation: msgIn 0.25s cubic-bezier(0.2, 0, 0, 1); }
@keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.chat-msg-avatar { width: 30px; height: 30px; min-width: 30px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.chat-msg-body { background: rgba(0,0,0,0.03); padding: 8px 12px; border-radius: 14px; max-width: 85%; }
:root.dark .chat-msg-body { background: rgba(255,255,255,0.04); }
.chat-msg-name { font-weight: 700; font-size: 11px; margin-bottom: 2px; color: var(--muted); }
.chat-msg-text { word-break: break-word; line-height: 1.45; font-size: 13px; color: var(--text); }
</style>
<script>if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));</script>

<body>

<div class="ambient-bg" id="ambientBg"></div>

<div class="page">
  <div class="scroll-area">
    <div class="app">

      <div class="header">
        <div class="header-title">Radio Go</div>
        <div class="header-right">
          <span class="live-dot" id="liveDot"></span>
          <span class="clock" id="clock"></span>
          <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="Сменить тему">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="icon-btn" id="carBtn" onclick="toggleCar()" title="Авторежим">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l3-4h8l3 4h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/><circle cx="7.5" cy="17" r="2"/><circle cx="16.5" cy="17" r="2"/><path d="M7.5 15h9"/></svg>
          </button>
          <button class="icon-btn" id="splitBtn" onclick="onSplitClick()" title="Разделить экран">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
          </button>
          <div class="split-tooltip" id="splitTooltip">Только для широких экранов</div>
          <button class="icon-btn" id="chatToggleBtn" onclick="toggleChat()" title="Чат радио">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
        </div>
      </div>

      <div class="app-inner">
      <div class="app-left">

      <div class="resume-badge" id="resumeBadge">
        <span class="resume-dot"></span>
        <span id="resumeText">Восстанавливаю последнюю станцию…</span>
      </div>

      <div class="tabs" id="tabs">
        <button class="tab-btn active" id="tabAll" onclick="setTab('all')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          Все станции
        </button>
        <button class="shazam-btn" title="AI Radio" onclick="alert('Умный AI-подбор в разработке!')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg>
          AI Radio
        </button>
        <button class="tab-btn" id="tabFav" onclick="setTab('fav')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          Избранное
        </button>
      </div>

      <div id="searchWrap" class="search-wrap">
        <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input class="search-input" id="searchInput" placeholder="Поиск любимой волны..." oninput="renderList()">
      </div>
      <div class="genres" id="genrePills"></div>

      <div class="now-card" id="nowCard">
        <div class="now-card-bg" id="nowCardBg"></div>
        <div class="now-card-bg-overlay"></div>
        <div class="now-card-content">
          <div class="now-top">
            <div class="now-logo" id="nowLogo">🎵</div>
            <div class="now-info">
              <div class="now-name" id="nowName">—</div>
              <div class="now-genre" id="nowGenre">—</div>
              <div class="now-track" id="nowTrack"><span class="now-track-inner" id="nowTrackInner"></span></div>
            </div>
            <button class="fav-btn" id="favBtn" onclick="toggleFav()">♡</button>
          </div>
          <div class="loading-bar" id="loadingBar"><div class="loading-bar-inner"></div></div>
          <div class="viz" id="viz"></div>
          <div class="controls">
            <button class="ctrl" onclick="prev()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
            </button>
            <button class="play-btn" id="playBtn" onclick="togglePlay()">
              <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <button class="ctrl" onclick="next()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
            </button>
            <button class="mute-btn" id="muteBtn" onclick="toggleMute()">
              <svg id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              </svg>
            </button>
          </div>
          <div class="vol-row">
            <span class="vol-icon-svg" id="volIconWrap">
              <svg id="volIconSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path id="volWave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path id="volWave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <line id="volMuteLine1" x1="23" y1="9" x2="17" y2="15" style="display:none"/>
                <line id="volMuteLine2" x1="17" y1="9" x2="23" y2="15" style="display:none"/>
              </svg>
            </span>
            <div class="vol-wrap" id="volWrap">
              <div class="vol-track-bg"></div>
              <div class="vol-fill" id="volFill"></div>
              <input type="range" class="vol-input" id="volSlider" min="0" max="100" value="80"
                oninput="onVolChange(this.value)"
                onmousedown="this.classList.add('dragging')" onmouseup="this.classList.remove('dragging')"
                ontouchstart="this.classList.add('dragging')" ontouchend="this.classList.remove('dragging')">
            </div>
            <span class="vol-val" id="volVal">80%</span>
          </div>
        </div>
      </div>

      <div class="section-label" id="listLabel">Все станции</div>
      <div class="list" id="stationList"></div>

      </div><div class="app-right">

        <div class="split-spacer" id="splitSpacer"></div>

        <div class="chat-section" id="chatSection">
          <div class="chat-section-header">
            <span class="chat-section-title">💬 Живой чат радио</span>
            <button class="chat-open-btn" onclick="openChat()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              В Telegram
            </button>
          </div>
          <div class="chat-msgs" id="chatMessages">
            <div style="text-align:center;color:var(--muted);padding:44px 16px;font-size:14px">Загружаю сообщения слушателей…</div>
          </div>
        </div>

        <div class="car-recs" id="carRecs"></div>

      </div></div></div></div></div><audio id="audio"></audio>

<script src="stations.js"></script>

<script>
const CHAT_API_BASE = "https://radio-chat.deadked2011.workers.dev";

// ── Smart Platform Bridge Engine ───────────────────
(function(){
  const ua=navigator.userAgent,pl=navigator.platform||'';
  let c='plt-other';
  if(/iPhone|iPad|iPod/.test(ua)||(/Mac/.test(pl)&&navigator.maxTouchPoints>1))c='plt-ios';
  else if(/Macintosh/.test(ua))c='plt-mac';
  else if(/Android/.test(ua))c='plt-android';
  else if(/Win/.test(pl)||/Windows/.test(ua))c='plt-windows';
  document.documentElement.classList.add(c);
})();

const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.enableClosingConfirmation();}

// ── APPLICATION STATE LOGIC ─────────────────────────
let state = {
  stations: [],
  favorites: JSON.parse(localStorage.getItem('rg_favs') || '[]'),
  currentStation: null,
  isPlaying: false,
  volume: parseInt(localStorage.getItem('rg_vol') || '80'),
  isMuted: localStorage.getItem('rg_muted') === 'true',
  currentTab: 'all',
  selectedGenre: 'all',
  isDark: localStorage.getItem('rg_dark') !== 'false',
  isCar: localStorage.getItem('rg_car') === 'true',
  isSplit: localStorage.getItem('rg_split') === 'true',
  expandedList: false,
  chatVisible: localStorage.getItem('rg_chat') === 'true'
};

let hls = null;
const audio = document.getElementById('audio');

// ── ULTIMATE INITIALIZATION ENGINE (FIXED SCOPE) ───
window.addEventListener('DOMContentLoaded', () => {
  // Исправлено: Проверка существования переменных во всех возможных скоупах
  try {
    if (typeof stations !== 'undefined') {
      state.stations = stations;
    } else if (typeof stationsData !== 'undefined') {
      state.stations = stationsData;
    } else if (window.stations) {
      state.stations = window.stations;
    } else if (window.stationsData) {
      state.stations = window.stationsData;
    }
  } catch (e) {
    console.error("Ошибка при поиске переменной станций:", e);
  }
  
  applyTheme();
  applyCarMode();
  applySplitMode();
  buildGenres();
  initVolume();
  initClock();
  
  const lastId = localStorage.getItem('rg_last_id');
  if (lastId && state.stations.length) {
    const st = state.stations.find(s => s.id == lastId);
    if (st) showResumeBadge(st);
  }
  
  renderList();
  renderRecs();
  updateChatVisibility();
  
  setInterval(loadChatMessages, 12000);
  loadChatMessages();
  
  window.addEventListener('resize', syncSplitSpacer);
  
  // High-performance waveform visualizer initializer
  const viz = document.getElementById('viz');
  viz.innerHTML = '';
  for(let i=0; i<24; i++){
    const b = document.createElement('div');
    b.className = 'bar';
    b.style.setProperty('--dur', (0.45 + Math.random()*0.55)+'s');
    viz.appendChild(b);
  }
});

function initClock() {
  const el = document.getElementById('clock');
  const dot = document.getElementById('liveDot');
  function up() {
    const d = new Date();
    el.textContent = d.toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
    dot.classList.add('on');
  }
  up();
  setInterval(up, 30000);
}

// ── UI INTERACTION MANAGEMENT ──────────────────────
function toggleDark() {
  state.isDark = !state.isDark;
  localStorage.setItem('rg_dark', state.isDark);
  applyTheme();
}
function applyTheme() {
  document.documentElement.classList.toggle('dark', state.isDark);
  document.getElementById('darkBtn').classList.toggle('on', state.isDark);
}

function toggleCar() {
  state.isCar = !state.isCar;
  localStorage.setItem('rg_car', state.isCar);
  applyCarMode();
}
function applyCarMode() {
  document.body.classList.toggle('car', state.isCar);
  document.getElementById('carBtn').classList.toggle('on', state.isCar);
  syncSplitSpacer();
}

function onSplitClick() {
  if (window.innerWidth < 960) {
    const tip = document.getElementById('splitTooltip');
    tip.classList.add('show');
    setTimeout(() => tip.classList.remove('show'), 2000);
    return;
  }
  state.isSplit = !state.isSplit;
  localStorage.setItem('rg_split', state.isSplit);
  applySplitMode();
}
function applySplitMode() {
  document.body.classList.toggle('split', state.isSplit);
  document.getElementById('splitBtn').classList.toggle('on', state.isSplit);
  syncSplitSpacer();
}

function toggleChat() {
  state.chatVisible = !state.chatVisible;
  localStorage.setItem('rg_chat', state.chatVisible);
  updateChatVisibility();
}
function updateChatVisibility() {
  const sect = document.getElementById('chatSection');
  const btn = document.getElementById('chatToggleBtn');
  if (state.chatVisible) {
    sect.classList.add('show');
    btn.classList.add('on');
  } else {
    sect.classList.remove('show');
    btn.classList.remove('on');
  }
  syncSplitSpacer();
}

function syncSplitSpacer() {
  const spacer = document.getElementById('splitSpacer');
  if (!document.body.classList.contains('split') || window.innerWidth < 960) {
    spacer.style.height = '0px';
    return;
  }
  const nowCard = document.getElementById('nowCard');
  if (nowCard && nowCard.classList.contains('visible')) {
    const h = nowCard.offsetHeight;
    const tabsH = document.getElementById('tabs').offsetHeight;
    const searchH = document.getElementById('searchWrap').offsetHeight;
    const genresH = document.getElementById('genrePills').offsetHeight;
    spacer.style.height = (tabsH + searchH + genresH + h + 36) + 'px';
  } else {
    spacer.style.height = '0px';
  }
}

// ── PLAYBACK FLOW CORE ENGINE ───────────────────────
function selectStation(st) {
  hideResumeBadge();
  state.currentStation = st;
  localStorage.setItem('rg_last_id', st.id);
  
  const card = document.getElementById('nowCard');
  card.classList.add('visible');
  
  document.getElementById('nowName').textContent = st.name;
  document.getElementById('nowGenre').textContent = st.genre;
  
  const logo = document.getElementById('nowLogo');
  logo.innerHTML = st.img ? `<img src="${st.img}" alt="${st.name}">` : "🎵";
  
  const bg = document.getElementById('nowCardBg');
  if (st.img) {
    card.classList.add('has-bg');
    bg.style.backgroundImage = `url(${st.img})`;
    document.getElementById('ambientBg').style.backgroundImage = `url(${st.img})`;
    document.getElementById('ambientBg').classList.add('on');
  } else {
    card.classList.remove('has-bg');
    document.getElementById('ambientBg').classList.remove('on');
  }
  
  updateFavBtn();
  playStream(st.stream);
  
  document.querySelectorAll('.row').forEach(r => {
    r.classList.toggle('active', r.getAttribute('data-id') == st.id);
  });
  
  syncSplitSpacer();
  loadChatMessages();
}

function playStream(url) {
  showLoading(true);
  state.isPlaying = true;
  updatePlayBtn();
  
  if (hls) { hls.destroy(); hls = null; }
  
  if (url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      hls = new Hls({ maxLiveSyncPlaybackRate: 1.5, liveSyncDurationCount: 3 });
      hls.loadSource(url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        audio.play().catch(onPlayError);
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) showLoading(false);
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url;
      audio.play().catch(onPlayError);
    }
  } else {
    audio.src = url;
    audio.play().catch(onPlayError);
  }
}

audio.addEventListener('playing', () => {
  showLoading(false);
  toggleBars(true);
});
audio.addEventListener('waiting', () => showLoading(true));
audio.addEventListener('pause', () => toggleBars(false));

function onPlayError() {
  state.isPlaying = false;
  updatePlayBtn();
  showLoading(false);
  toggleBars(false);
}

// ── CONTROLS MANAGEMENT ─────────────────────────────
function togglePlay() {
  if (!state.currentStation) return;
  if (state.isPlaying) {
    audio.pause();
    state.isPlaying = false;
  } else {
    if (audio.src) {
      audio.play().catch(onPlayError);
      state.isPlaying = true;
    } else {
      playStream(state.currentStation.stream);
    }
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  const btn = document.getElementById('playBtn');
  const icon = document.getElementById('playIcon');
  if (state.isPlaying) {
    btn.classList.add('playing');
    icon.innerHTML = '<rect x="4" y="4" width="4" height="16" rx="1"></rect><rect x="16" y="4" width="4" height="16" rx="1"></rect>';
  } else {
    btn.classList.remove('playing');
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  }
}

function toggleBars(on) {
  document.querySelectorAll('#viz .bar').forEach(b => b.classList.toggle('on', on));
}
function showLoading(l) {
  document.getElementById('loadingBar').classList.toggle('active', l);
}

function getFilteredStations() {
  return state.stations.filter(s => {
    if (state.currentTab === 'fav' && !state.favorites.includes(s.id)) return false;
    if (state.selectedGenre !== 'all' && s.genre !== state.selectedGenre) return false;
    const q = document.getElementById('searchInput').value.toLowerCase();
    return s.name.toLowerCase().includes(q) || (s.genre && s.genre.toLowerCase().includes(q));
  });
}

function prev() {
  const list = getFilteredStations();
  if(!list.length) return;
  let idx = state.currentStation ? list.findIndex(s => s.id == state.currentStation.id) : -1;
  idx = idx <= 0 ? list.length - 1 : idx - 1;
  selectStation(list[idx]);
}

function next() {
  const list = getFilteredStations();
  if(!list.length) return;
  let idx = state.currentStation ? list.findIndex(s => s.id == state.currentStation.id) : -1;
  idx = idx === -1 || idx >= list.length - 1 ? 0 : idx + 1;
  selectStation(list[idx]);
}

// ── SMART VOLUME ENGINE ─────────────────────────────
function initVolume() {
  audio.volume = state.isMuted ? 0 : state.volume / 100;
  onVolChange(state.volume, false);
}

function onVolChange(val, writeAudio = true) {
  state.volume = parseInt(val);
  if (writeAudio && !state.isMuted) audio.volume = state.volume / 100;
  localStorage.setItem('rg_vol', state.volume);
  
  document.getElementById('volSlider').value = state.volume;
  document.getElementById('volVal').textContent = state.volume + '%';
  document.getElementById('volFill').style.width = state.volume + '%';
  
  updateVolumeIcons();
}

function toggleMute() {
  state.isMuted = !state.isMuted;
  localStorage.setItem('rg_muted', state.isMuted);
  audio.volume = state.isMuted ? 0 : state.volume / 100;
  updateVolumeIcons();
}

function updateVolumeIcons() {
  const isM = state.isMuted || state.volume === 0;
  document.getElementById('muteBtn').classList.toggle('muted', isM);
  
  const w1 = document.getElementById('volWave1');
  const w2 = document.getElementById('volWave2');
  const m1 = document.getElementById('volMuteLine1');
  const m2 = document.getElementById('volMuteLine2');
  
  if (isM) {
    w1.style.display = 'none'; w2.style.display = 'none';
    m1.style.display = 'block'; m2.style.display = 'block';
  } else {
    w1.style.display = 'block';
    w2.style.display = state.volume > 60 ? 'block' : 'none';
    m1.style.display = 'none'; m2.style.display = 'none';
  }
}

// ── FAVORITES ENGINE ────────────────────────────────
function toggleFav() {
  if (!state.currentStation) return;
  const id = state.currentStation.id;
  if (state.favorites.includes(id)) {
    state.favorites = state.favorites.filter(f => f !== id);
  } else {
    state.favorites.push(id);
  }
  localStorage.setItem('rg_favs', JSON.stringify(state.favorites));
  updateFavBtn();
  if (state.currentTab === 'fav') renderList();
}

function updateFavBtn() {
  const btn = document.getElementById('favBtn');
  if (!state.currentStation) return;
  const isF = state.favorites.includes(state.currentStation.id);
  btn.textContent = isF ? '♥' : '♡';
  btn.classList.toggle('on', isF);
}

// ── PERSISTENT RUNTIME RESUME BADGE ─────────────────
function showResumeBadge(st) {
  const b = document.getElementById('resumeBadge');
  b.classList.add('show');
  document.getElementById('resumeText').textContent = `Слушать ${st.name}`;
  b.onclick = () => selectStation(st);
}
function hideResumeBadge() {
  document.getElementById('resumeBadge').classList.remove('show');
}

// ── RENDER ENGINE FOR STATIONS & GENRES ─────────────
function buildGenres() {
  const container = document.getElementById('genrePills');
  if(!container || !state.stations.length) return;
  container.innerHTML = '';
  
  const set = new Set();
  state.stations.forEach(s => { if(s.genre) set.add(s.genre); });
  const list = ['all', ...Array.from(set)];
  
  list.forEach(g => {
    const btn = document.createElement('button');
    btn.className = `genre-pill ${state.selectedGenre === g ? 'active' : ''}`;
    btn.textContent = g === 'all' ? 'Все' : g;
    btn.onclick = () => {
      state.selectedGenre = g;
      document.querySelectorAll('.genre-pill').forEach(p => p.classList.toggle('active', p === btn));
      renderList();
    };
    container.appendChild(btn);
  });
}

function setTab(tab) {
  state.currentTab = tab;
  document.getElementById('tabAll').classList.toggle('active', tab === 'all');
  document.getElementById('tabFav').classList.toggle('active', tab === 'fav');
  renderList();
}

function renderList() {
  const container = document.getElementById('stationList');
  if (!container) return;
  container.innerHTML = '';
  
  const filtered = getFilteredStations();
  document.getElementById('listLabel').textContent = `${state.currentTab === 'fav' ? 'Избранное' : 'Все станции'} (${filtered.length})`;
  
  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><span class="empty-icon">📻</span>Ничего не найдено</div>';
    return;
  }
  
  const limit = state.expandedList ? filtered.length : 6;
  const slice = filtered.slice(0, limit);
  
  slice.forEach(st => {
    const row = document.createElement('div');
    const isAct = state.currentStation && state.currentStation.id == st.id;
    row.className = `row ${isAct ? 'active' : ''}`;
    row.setAttribute('data-id', st.id);
    row.onclick = () => selectStation(st);
    
    row.innerHTML = `
      <div class="row-img">${st.img ? `<img src="${st.img}" alt="${st.name}">` : "📻"}</div>
      <div class="row-info">
        <div class="row-name">${st.name}</div>
        <div class="row-sub">${st.genre || 'Радио'}</div>
      </div>
      <div class="row-right">
        <div class="row-dot"></div>
        <div class="row-eq">
          <div class="row-eq-bar"></div>
          <div class="row-eq-bar"></div>
          <div class="row-eq-bar"></div>
          <div class="row-eq-bar"></div>
        </div>
      </div>
    `;
    container.appendChild(row);
  });
  
  if (filtered.length > 6) {
    const moreBtn = document.createElement('button');
    moreBtn.className = `show-more-btn ${state.expandedList ? 'expanded' : ''}`;
    moreBtn.innerHTML = state.expandedList ? 'Скрыть список' : `Показать все волны (${filtered.length})`;
    moreBtn.onclick = () => {
      state.expandedList = !state.expandedList;
      renderList();
    };
    container.appendChild(moreBtn);
  }
}

function renderRecs() {
  const recs = document.getElementById('carRecs');
  if (!recs || !state.stations.length) return;
  recs.innerHTML = '';
  
  recs.innerHTML = '<div class="car-recs-title" style="grid-column: 1/-1">Рекомендуем послушать</div>';
  const shuffle = [...state.stations].sort(() => 0.5 - Math.random()).slice(0, 4);
  
  shuffle.forEach(si => {
    const btn = document.createElement('button');
    btn.className = 'car-rec-row';
    btn.innerHTML = `
      <div class="car-rec-img">${si.img ? `<img src="${si.img}" alt="${si.name}">` : "🎵"}</div>
      <div class="car-rec-info">
        <div class="car-rec-name">${si.name}</div>
        <div class="car-rec-genre">${si.genre || 'Радио'}</div>
      </div>
    `;
    btn.onclick = () => { selectStation(si); };
    recs.appendChild(btn);
  });
}

// ── REALTIME TELEGRAM CHAT LIVE WORKER ENGINE ───────
async function loadChatMessages(){
  const container=document.getElementById("chatMessages");
  if(!container) return;
  try{
    const res=await fetch(`${CHAT_API_BASE}/get-messages`);
    if(!res.ok)return;
    const msgs=await res.json();
    const list=Array.isArray(msgs)?msgs:[];
    container.innerHTML="";
    if(!list.length){
      container.innerHTML='<div style="text-align:center;color:var(--muted);padding:44px 16px;font-size:13px">В чате пока тихо</div>';
      return;
    }
    list.forEach(m=>{
      const div=document.createElement("div"); div.className="chat-msg";
      const t=m.time?new Date(m.time).toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"}):"";
      const hue=([...m.name].reduce((a,c)=>a+c.charCodeAt(0),0)*47)%360;
      div.innerHTML=`<div class="chat-msg-avatar" style="background:hsl(${hue},55%,42%)">${(m.name[0]||\"?\").toUpperCase()}</div><div class="chat-msg-body"><div class="chat-msg-name">${m.name}${t?` <span style="font-weight:400;opacity:0.45;margin-left:4px">${t}</span>`:""}</div><div class="chat-msg-text">${m.text}</div></div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  }catch(e){}
}

function openChat(){
  const tgLink = "https://t.me/your_radio_chat_link";
  if(tg && tg.openTelegramLink){
    tg.openTelegramLink(tgLink);
  } else {
    window.open(tgLink, "_blank");
  }
}
</script>
