<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Go</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
    <!-- Официальный скрипт виджета обсуждений Telegram -->
    <script async src="https://telegram.org/js/telegram-widget.js?22"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#f7f6f3; --card:#fff; --text:#1a1a1a; --muted:#9a9a9a;
            --accent:#1a1a1a; --border:#e8e6e1; --pill:#f0ede8; --pill-text:#7a7a7a;
            --green:#4caf7d; --red:#e05555; --orange:#f0a030;
            --shadow:0 2px 18px rgba(0,0,0,.07); --shadow-deep:0 6px 28px rgba(0,0,0,.14);
            --f-title:clamp(18px,4.5vw,28px); --f-clock:clamp(11px,2.2vw,16px);
            --f-pill:clamp(10px,2vw,14px); --f-tab:clamp(12px,2.4vw,16px);
            --f-label:clamp(10px,1.8vw,13px); --f-now-name:clamp(15px,3.8vw,28px);
            --f-now-gen:clamp(10px,1.9vw,13px); --f-row-name:clamp(13px,2.8vw,19px);
            --f-row-sub:clamp(10px,1.9vw,13px); --f-comment:clamp(12px,2.4vw,15px);
            --f-cmeta:clamp(10px,1.9vw,12px);
            --icon-btn:clamp(32px,7vw,52px); --now-logo:clamp(52px,12vw,96px);
            --fav-size:clamp(22px,5vw,36px); --play-size:clamp(60px,15vw,120px);
            --play-icon:clamp(20px,5.5vw,44px); --ctrl-size:clamp(52px,12vw,96px);
            --ctrl-icon:clamp(20px,4.5vw,34px); --vol-thumb:clamp(16px,3.5vw,26px);
            --vol-track:clamp(4px,.9vw,8px); --row-img:clamp(42px,10vw,80px);
            --row-min-h:clamp(58px,13.5vw,90px); --avatar-sz:clamp(28px,6.5vw,44px);
            --gap:clamp(6px,1.5vw,12px); --space-sm:clamp(8px,2vw,18px);
            --space-md:clamp(12px,3vw,24px); --r-card:clamp(16px,3.5vw,26px);
            --r-row:clamp(12px,2.8vw,20px); --r-icon:clamp(9px,2vw,14px);
            --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
            --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
        }
        :root.dark {
            --bg:#141416; --card:#1e1e22; --text:#f0f0f0; --muted:#6e6e78;
            --accent:#e8e8e8; --border:#2a2a30; --pill:#26262c; --pill-text:#8e8e98;
            --shadow:0 2px 18px rgba(0,0,0,.35); --shadow-deep:0 6px 28px rgba(0,0,0,.55);
        }
        body.car {
            --play-size:clamp(90px,22vw,170px); --play-icon:clamp(32px,8vw,62px);
            --ctrl-size:clamp(80px,18vw,140px); --ctrl-icon:clamp(28px,6vw,48px);
            --now-logo:clamp(80px,18vw,140px); --f-now-name:clamp(20px,5vw,36px);
            --row-min-h:clamp(72px,16vw,110px); --f-row-name:clamp(15px,3.2vw,22px);
            --f-row-sub:clamp(12px,2.4vw,16px); --row-img:clamp(52px,12vw,90px);
            --f-pill:clamp(12px,2.4vw,17px); --f-tab:clamp(13px,2.6vw,18px);
            --vol-thumb:clamp(22px,4.5vw,34px); --vol-track:clamp(6px,1.2vw,10px);
        }
        html,body { height:100%; overscroll-behavior:none; -webkit-tap-highlight-color:transparent; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .3s,color .3s; }
        .page { display:flex; flex-direction:column; min-height:100vh; padding:calc(var(--safe-t) + clamp(10px,2.5vw,18px)) calc(var(--safe-r) + clamp(12px,3vw,24px)) 0 calc(var(--safe-l) + clamp(12px,3vw,24px)); }
        .scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:clamp(10px,2.5vw,20px); }
        .app { width:100%; max-width:680px; margin:0 auto; }
        .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-md); }
        .header-title { font-family:'DM Serif Display',serif; font-size:var(--f-title); letter-spacing:-.3px; line-height:1; }
        .header-right { display:flex; align-items:center; gap:var(--gap); }
        .clock { font-size:var(--f-clock); color:var(--muted); font-weight:300; }
        .live-dot { width:clamp(7px,1.6vw,11px); height:clamp(7px,1.6vw,11px); border-radius:50%; background:var(--muted); transition:background .3s; }
        .live-dot.on { background:var(--green); animation:blink 1.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
        .icon-btn { width:var(--icon-btn); height:var(--icon-btn); border-radius:var(--r-icon); background:var(--pill); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:all .2s; flex-shrink:0; }
        .icon-btn:active,.icon-btn.on { background:var(--accent); color:var(--bg); }
        .icon-btn svg { width:44%; height:44%; }
        .icon-btn.comment-on { background:var(--accent); color:var(--bg); }
        .back-btn { display:none; }
        .tabs { display:flex; gap:var(--gap); margin-bottom:var(--space-sm); }
        .tab-btn { flex:1; padding:clamp(8px,2vw,14px) 0; border-radius:100px; font-family:'DM Sans',sans-serif; font-size:var(--f-tab); font-weight:500; cursor:pointer; border:none; background:var(--pill); color:var(--pill-text); transition:all .2s; display:flex; align-items:center; justify-content:center; gap:6px; }
        .tab-btn.active { background:var(--accent); color:var(--bg); }
        .tab-btn svg { width:clamp(12px,2.2vw,16px); height:clamp(12px,2.2vw,16px); }
        .search-wrap { position:relative; margin-bottom:var(--space-sm); }
        .search-input { width:100%; padding:clamp(9px,2.1vw,15px) clamp(14px,3vw,22px) clamp(9px,2.1vw,15px) clamp(36px,8vw,56px); background:var(--card); border:none; border-radius:clamp(10px,2.5vw,18px); font-family:'DM Sans',sans-serif; font-size:var(--f-tab); color:var(--text); box-shadow:0 1px 6px rgba(0,0,0,.05); outline:none; -webkit-appearance:none; transition:background .3s,color .3s,box-shadow .2s; }
        .search-input:focus { box-shadow:0 0 0 2px var(--accent); }
        .search-input::placeholder { color:var(--muted); }
        .search-icon { position:absolute; left:clamp(12px,2.8vw,20px); top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; display:flex; }
        .search-icon svg { width:clamp(15px,3.2vw,22px); height:clamp(15px,3.2vw,22px); }
        .genres { display:flex; gap:var(--gap); overflow-x:auto; margin-bottom:var(--space-md); padding-bottom:4px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
        .genres::-webkit-scrollbar { display:none; }
        .genre-pill { padding:clamp(6px,1.4vw,11px) clamp(12px,2.5vw,22px); border-radius:100px; background:var(--pill); color:var(--pill-text); font-size:var(--f-pill); font-weight:500; cursor:pointer; transition:all .2s; border:none; white-space:nowrap; text-transform:uppercase; letter-spacing:.3px; flex-shrink:0; }
        .genre-pill.active { background:var(--accent); color:var(--bg); }
        .resume-badge { display:none; align-items:center; gap:8px; background:var(--card); border:1.5px solid var(--border); border-radius:clamp(8px,2vw,14px); padding:clamp(7px,1.8vw,12px) clamp(12px,2.8vw,20px); margin-bottom:var(--space-sm); font-size:var(--f-now-gen); color:var(--muted); }
        .resume-badge.show { display:flex; }
        .resume-dot { width:8px; height:8px; border-radius:50%; background:var(--orange); animation:blink 1s infinite; flex-shrink:0; }
        .now-card { background:var(--card); border-radius:var(--r-card); padding:var(--space-md); box-shadow:var(--shadow); margin-bottom:0; display:none; transition:background .3s; border-bottom-left-radius:0; border-bottom-right-radius:0; }
        .now-card.visible { display:block; }
        .now-card.connected { border-bottom-left-radius:0; border-bottom-right-radius:0; margin-bottom:0; box-shadow:0 -2px 18px rgba(0,0,0,.07); }
        .now-top { display:flex; align-items:center; gap:var(--gap); margin-bottom:var(--space-md); }
        .now-logo { width:var(--now-logo); height:var(--now-logo); border-radius:clamp(10px,2.5vw,20px); background:var(--pill); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:clamp(22px,5.5vw,44px); transition:width .3s,height .3s; }
        .now-logo img { width:100%; height:100%; object-fit:cover; }
        .now-info { flex:1; min-width:0; }
        .now-name { font-family:'DM Serif Display',serif; font-size:var(--f-now-name); margin-bottom:clamp(2px,.5vw,6px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.1; transition:font-size .3s; }
        .now-genre { font-size:var(--f-now-gen); color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
        .fav-btn { background:none; border:none; cursor:pointer; font-size:var(--fav-size); color:var(--muted); flex-shrink:0; padding:4px; transition:transform .15s; line-height:1; }
        .fav-btn:active { transform:scale(1.25); }
        .fav-btn.on { color:var(--red); }
        .loading-bar { height:clamp(2px,.5vw,4px); background:var(--border); border-radius:99px; margin-bottom:var(--space-sm); overflow:hidden; display:none; }
        .loading-bar.active { display:block; }
        .loading-bar-inner { height:100%; width:35%; background:var(--accent); border-radius:99px; animation:loadAnim 1.1s ease-in-out infinite; }
        @keyframes loadAnim { 0%{transform:translateX(-150%)} 100%{transform:translateX(450%)} }
        .viz { height:clamp(28px,7vw,56px); display:flex; align-items:center; gap:clamp(1px,.4vw,3px); margin-bottom:var(--space-md); }
        .bar { flex:1; background:var(--border); border-radius:99px; height:4px; }
        .bar.on { background:var(--accent); animation:pulse var(--dur,.8s) ease-in-out infinite alternate; }
        @keyframes pulse { from{height:var(--min,4px)} to{height:var(--max,24px)} }
        .controls { display:flex; align-items:center; justify-content:space-between; gap:var(--gap); margin-bottom:var(--space-md); }
        .ctrl { width:var(--ctrl-size); height:var(--ctrl-size); border-radius:clamp(14px,3vw,24px); background:var(--pill); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:all .15s; flex-shrink:0; }
        .ctrl:active { background:var(--border); color:var(--text); transform:scale(.95); }
        .ctrl svg { width:var(--ctrl-icon); height:var(--ctrl-icon); }
        .play-btn { width:var(--play-size); height:var(--play-size); border-radius:50%; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-deep); transition:transform .15s,background .3s,width .3s,height .3s; flex-shrink:0; }
        .play-btn:active { transform:scale(.93); }
        .play-btn svg { width:var(--play-icon); height:var(--play-icon); fill:var(--bg); margin-left:8%; transition:fill .3s; }
        .play-btn.playing svg { margin-left:0; }
        .vol-row { display:flex; align-items:center; gap:clamp(8px,2vw,16px); padding-top:var(--space-sm); border-top:1px solid var(--border); }
        .vol-emoji { font-size:clamp(15px,3vw,22px); display:inline-block; flex-shrink:0; transition:transform .2s; }
        .vol-wrap { flex:1; position:relative; display:flex; align-items:center; height:clamp(32px,7vw,48px); }
        .vol-track-bg { position:absolute; left:0; top:50%; transform:translateY(-50%); width:100%; height:var(--vol-track); border-radius:99px; background:var(--border); pointer-events:none; }
        .vol-fill { position:absolute; left:0; top:50%; transform:translateY(-50%); height:var(--vol-track); border-radius:99px; pointer-events:none; transition:width .06s linear, background-color .25s ease; }
        input.vol-input { position:relative; z-index:2; width:100%; -webkit-appearance:none; height:var(--vol-track); border-radius:99px; background:transparent; outline:none; cursor:pointer; }
        input.vol-input::-webkit-slider-thumb { -webkit-appearance:none; width:var(--vol-thumb); height:var(--vol-thumb); border-radius:50%; background:var(--card); border:2.5px solid var(--border); cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.15); transition:transform .15s, box-shadow .15s, border-color .25s; }
        input.vol-input:active::-webkit-slider-thumb,input.vol-input.dragging::-webkit-slider-thumb { transform:scale(1.18); box-shadow:0 3px 14px rgba(0,0,0,.22); }
        .vol-val { font-size:clamp(11px,2vw,14px); font-weight:600; color:var(--muted); min-width:clamp(26px,5vw,36px); text-align:right; flex-shrink:0; transition:color .25s; }

        /* Виджет обсуждений */
        .telegram-discussion-widget { margin-top: var(--space-md); display: none; }
        .telegram-discussion-widget.show { display: block; }
        .car-recommendations { display:none; margin-top:var(--space-md); padding:0 clamp(8px,2vw,16px); }
        .car-recommendations.show { display:block; }
        .car-rec-title { font-size:var(--f-label); color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:clamp(8px,2vw,14px); }
        .car-rec-grid { display:flex; flex-wrap:wrap; gap:clamp(8px,2vw,14px); }
        .car-rec-item { background:var(--card); border-radius:clamp(8px,2vw,16px); padding:clamp(8px,2vw,14px) clamp(10px,2.5vw,18px); cursor:pointer; box-shadow:var(--shadow); transition:all .2s; display:flex; align-items:center; gap:clamp(6px,1.5vw,10px); min-width:clamp(120px,30vw,180px); flex:1; }
        .car-rec-item:active { transform:scale(.97); }
        .car-rec-img { width:clamp(36px,8vw,54px); height:clamp(36px,8vw,54px); border-radius:clamp(6px,1.5vw,12px); background:var(--pill); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:clamp(16px,3.5vw,24px); }
        .car-rec-img img { width:100%; height:100%; object-fit:cover; border-radius:inherit; }
        .car-rec-name { font-size:var(--f-row-name); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .car-rec-genre { font-size:var(--f-row-sub); color:var(--muted); }

        .section-label { font-size:var(--f-label); text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:500; margin-bottom:clamp(6px,1.5vw,12px); padding:0 2px; }
        .list { display:flex; flex-direction:column; gap:clamp(5px,1.2vw,10px); }
        .row { background:var(--card); border-radius:var(--r-row); padding:clamp(10px,2.4vw,18px) clamp(12px,2.8vw,22px); display:flex; align-items:center; gap:clamp(10px,2.4vw,18px); cursor:pointer; box-shadow:0 1px 5px rgba(0,0,0,.04); transition:box-shadow .2s,background .3s; user-select:none; min-height:var(--row-min-h); }
        .row:active { box-shadow:var(--shadow); }
        .row.active { outline:clamp(1.5px,.3vw,2.5px) solid var(--accent); }
        .row-img { width:var(--row-img); height:var(--row-img); border-radius:clamp(8px,2vw,16px); background:var(--pill); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:clamp(17px,4vw,30px); transition:width .3s,height .3s; }
        .row-img img { width:100%; height:100%; object-fit:cover; }
        .row-info { flex:1; min-width:0; }
        .row-name { font-size:var(--f-row-name); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .row-sub { font-size:var(--f-row-sub); color:var(--muted); margin-top:clamp(2px,.5vw,5px); }
        .row-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
        .row-dot { width:clamp(6px,1.4vw,10px); height:clamp(6px,1.4vw,10px); border-radius:50%; background:var(--border); }
        .row.active .row-dot { background:var(--green); animation:blink 1.5s infinite; }
        .row-cnt { font-size:clamp(9px,1.9vw,12px); color:var(--muted); }
        .empty { text-align:center; color:var(--muted); font-size:var(--f-row-sub); padding:clamp(24px,6vw,48px) 0; line-height:1.6; }
        .empty-icon { font-size:clamp(28px,7vw,46px); display:block; margin-bottom:8px; }
    </style>
</head>
<body>
<div class="page">
    <div class="scroll-area">
        <div class="app">
            <div class="header">
                <div class="header-title">Radio Go</div>
                <div class="header-right">
                    <button class="icon-btn back-btn" id="backBtn" onclick="toggleCar()" title="Назад">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="Тёмная тема">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <button class="icon-btn" id="carBtn" onclick="toggleCar()" title="Авторежим">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="10" width="22" height="9" rx="2"/><path d="m6.5 10 2-6h7l2 6"/><circle cx="7.5" cy="19" r="1.5"/><circle cx="16.5" cy="19" r="1.5"/></svg>
                    </button>
                    <button class="icon-btn" id="commentToggleBtn" onclick="toggleCommentsWidget()" title="Обсуждение">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </button>
                    <button class="icon-btn" id="shazamBtn" onclick="shazam()" title="Распознать трек">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    </button>
                    <span class="live-dot" id="liveDot"></span>
                    <span class="clock" id="clock"></span>
                </div>
            </div>

            <div class="resume-badge" id="resumeBadge"><span class="resume-dot"></span><span id="resumeText">Восстанавливаю радио…</span></div>

            <div class="tabs" id="tabs">
                <button class="tab-btn active" id="tabAll" onclick="setTab('all')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg> Все станции</button>
                <button class="tab-btn" id="tabFav" onclick="setTab('fav')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg> Избранное</button>
            </div>

            <div class="search-wrap" id="searchWrap">
                <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
                <input class="search-input" id="searchInput" placeholder="Поиск станции..." oninput="renderList()">
            </div>
            <div class="genres" id="genrePills"></div>

            <div class="now-card" id="nowCard">
                <div class="now-top">
                    <div class="now-logo" id="nowLogo">🎵</div>
                    <div class="now-info">
                        <div class="now-name" id="nowName">—</div>
                        <div class="now-genre" id="nowGenre">—</div>
                    </div>
                    <button class="fav-btn" id="favBtn" onclick="toggleFav()">♡</button>
                </div>
                <div class="loading-bar" id="loadingBar"><div class="loading-bar-inner"></div></div>
                <div class="viz" id="viz"></div>
                <div class="controls">
                    <button class="ctrl" onclick="prev()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button class="play-btn" id="playBtn" onclick="togglePlay()"><svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
                    <button class="ctrl" onclick="next()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                </div>
                <div class="vol-row">

</div>
<audio id="audio"></audio>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

    // ─── НАСТРОЙКИ ВИДЖЕТА ───
    const DISCUSSION_USERNAME = "https://t.me/strmradiochat";   // ← замените на @username вашего канала (без @)
    const DISCUSSION_POST_ID = "https://t.me/strmradiochat/2";   // ← замените на номер поста (например, "2")

    // Станции
    const stations = [
        {name:"SOUNDPARK DEEP", genre:"Deep House", tag:"deep", logo:"https://radiopotok.ru/f/station/256/1260.png", stream:"https://h.getradio.me/spdeep/hls.m3u8", listeners:3317},
        {name:"Русское Радио", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/85.png", stream:"https://h.getradio.me/rp85/hls.m3u8", listeners:17757},
        {name:"Маруся ФМ", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/1323.png", stream:"https://h.getradio.me/rp1323/hls.m3u8", listeners:15262},

        {name:"Вести FM", genre:"Новости", tag:"news", logo:"https://radiopotok.ru/f/station/256/644.png", stream:"https://h.getradio.me/rp644/hls.m3u8", listeners:7716},
        {name:"Дорожное радио", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/83.png", stream:"https://h.getradio.me/rp83/hls.m3u8", listeners:4922},
        {name:"Авторадио", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/66.png", stream:"https://h.getradio.me/rp66/hls.m3u8", listeners:9200},
        {name:"Юмор FM", genre:"Юмор", tag:"pop", logo:"https://radiopotok.ru/f/station/256/158.png", stream:"https://h.getradio.me/rp158/hls.m3u8", listeners:3700},
        {name:"Романтика", genre:"Лирика", tag:"pop", logo:"https://radiopotok.ru/f/station/256/177.png", stream:"https://h.getradio.me/rp177/hls.m3u8", listeners:2001},
        {name:"Русская Волна", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/1543.png", stream:"https://h.getradio.me/rp1543/hls.m3u8", listeners:13308},
        {name:"Радио ЭНЕРДЖИ", genre:"Электро", tag:"edm", logo:"https://radiopotok.ru/f/station/256/4.png", stream:"https://h.getradio.me/rp4/hls.m3u8", listeners:1473},
        {name:"Шоколад", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/780.png", stream:"https://h.getradio.me/rp780/hls.m3u8", listeners:4212},
        {name:"Хорошее Радио", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/487.png", stream:"https://h.getradio.me/rp487/hls.m3u8", listeners:3818},
        {name:"Радио Монте-Карло", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/603.png", stream:"https://h.getradio.me/rp603/hls.m3u8", listeners:5059},
        {name:"Русский Рок", genre:"Рок", tag:"rock", logo:"https://radiopotok.ru/f/station/256/1594.png", stream:"https://h.getradio.me/rp1594/hls.m3u8", listeners:2345},
        {name:"Наше Радио", genre:"Рок", tag:"rock", logo:"https://radiopotok.ru/f/station/256/256.png", stream:"https://h.getradio.me/rp256/hls.m3u8", listeners:7300},
        {name:"Серебряный Дождь", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/130.png", stream:"https://h.getradio.me/rp130/hls.m3u8", listeners:4400},
        {name:"Для фона", genre:"Лаундж", tag:"chill", logo:"https://radiopotok.ru/f/station/256/1480.png", stream:"https://h.getradio.me/rp1480/hls.m3u8", listeners:900},
        {name:"Для души", genre:"Лирика", tag:"chill", logo:"https://radiopotok.ru/f/station/256/1434.png", stream:"https://h.getradio.me/rp1434/hls.m3u8", listeners:800},
        {name:"TOP 100", genre:"Хиты", tag:"pop", logo:"https://radiopotok.ru/f/station/256/1992.png", stream:"https://h.getradio.me/rp1992/hls.m3u8", listeners:1678},
        {name:"Ретро FM", genre:"Ретро", tag:"retro", logo:"https://radiopotok.ru/f/station/256/189.png", stream:"https://h.getradio.me/rp189/hls.m3u8", listeners:12000},
        {name:"Радио КП", genre:"Поп", tag:"pop", logo:"https://radiopotok.ru/f/station/256/250.png", stream:"https://h.getradio.me/rp250/hls.m3u8", listeners:2800},
        {name:"Relax FM", genre:"Лаундж", tag:"chill", logo:"https://radiopotok.ru/f/station/256/267.png", stream:"https://h.getradio.me/rp267/hls.m3u8", listeners:2600},
        {name:"Дядя Ваня на даче", genre:"Шансон", tag:"shanson", logo:"https://radiopotok.ru/f/station/256/1743.png", stream:"https://h.getradio.me/rp1743/hls.m3u8", listeners:1702}
    ];

    const genres = [
        {id:"all",label:"Все"},{id:"deep",label:"Deep House"},{id:"pop",label:"Поп"},
        {id:"rock",label:"Рок"},{id:"retro",label:"Ретро"},{id:"shanson",label:"Шансон"},
        {id:"news",label:"Новости"},{id:"edm",label:"Электро"},{id:"chill",label:"Чилаут"}
    ];

    const recommendedStations = [
        {name:"SOUNDPARK DEEP", genre:"Deep House", tag:"deep", logo:"https://radiopotok.ru/f/station/256/1260.png", stream:"https://h.getradio.me/spdeep/hls.m3u8"},
        {name:"Ретро FM", genre:"Ретро хиты", tag:"retro", logo:null, stream:"https://retro.hostingradio.ru/retro96.aacp"},
        {name:"Radio Jazz", genre:"Jazz", tag:"jazz", logo:null, stream:"https://jazz.hostingradio.ru/jazz96.aacp"},
        {name:"Наше Радио", genre:"Русский рок", tag:"rock", logo:null, stream:"https://nashe.hostingradio.ru/nashe96.aacp"}
    ];

    let curIdx=0, playing=false, activeGenre="all", activeTab="all";
    let darkMode=localStorage.getItem("rDark")==="1";
    let carMode=localStorage.getItem("rCar")==="1";
    let favs=JSON.parse(localStorage.getItem("rfavs")||"[]");
    let userPaused=false, wasInterrupted=false, resumeTimer=null, lastAudioTime=0;
    const audio=document.getElementById("audio");
    audio.volume=0.8;
    let hlsInstance=null;

    if(darkMode||tg?.colorScheme==="dark"){darkMode=true;document.documentElement.classList.add("dark");}
    if(carMode) applyCarMode(carMode);
    document.getElementById("darkBtn").classList.toggle("on",darkMode);
    document.getElementById("carBtn").classList.toggle("on",carMode);

    function toggleDark(){darkMode=!darkMode;document.documentElement.classList.toggle("dark",darkMode);document.getElementById("darkBtn").classList.toggle("on",darkMode);localStorage.setItem("rDark",darkMode?"1":"0");}

    function toggleCar(){
        carMode=!carMode;
        document.body.classList.toggle("car",carMode);
        document.getElementById("carBtn").classList.toggle("on",carMode);
        localStorage.setItem("rCar",carMode?"1":"0");
        applyCarMode(carMode);
        document.getElementById("backBtn").style.display=carMode?'flex':'none';
    }

    function applyCarMode(on){
        document.getElementById("tabs").style.display=on?'none':'';
        document.getElementById("searchWrap").style.display=on?'none':'';
        document.getElementById("genrePills").style.display=on?'none':'';
        document.getElementById("listLabel").style.display=on?'none':'';
        document.getElementById("stationList").style.display=on?'none':'';
        document.getElementById("carRecommendations").classList.toggle("show", on);
        if(on) renderCarRecommendations();
    }

    function renderCarRecommendations(){
        const grid = document.getElementById("carRecGrid");
        grid.innerHTML = "";
        recommendedStations.forEach(s => {
            const item = document.createElement("div");
            item.className = "car-rec-item";
            item.innerHTML = `<div class="car-rec-img">${s.logo ? `<img src="${s.logo}" onerror="this.innerHTML='🎵'">` : "🎵"}</div><div><div class="car-rec-name">${s.name}</div><div class="car-rec-genre">${s.genre}</div></div>`;
            item.onclick = ()=>{
                const idx = stations.findIndex(st=>st.name===s.name || st.stream===s.stream);
                if(idx!==-1) loadStation(idx, true);
            };
            grid.appendChild(item);
        });
    }

    function tick(){const n=new Date();document.getElementById("clock").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");}
    setInterval(tick,1000);tick();

    const bars=[];const vizEl=document.getElementById("viz");
    for(let i=0;i<30;i++){const b=document.createElement("div");b.className="bar";const mn=3+Math.random()*4,mx=10+Math.random()*20,dur=.4+Math.random()*.75;b.style.cssText=`height:${mn}px;--min:${mn}px;--max:${mx}px;--dur:${dur}s;animation-delay:${(Math.random()*.5).toFixed(2)}s`;vizEl.appendChild(b);bars.push(b);}
    function vizOn(on){bars.forEach(b=>on?b.classList.add("on"):b.classList.remove("on"));}
    function setLoading(on){document.getElementById("loadingBar").classList.toggle("active",on);}
    function showBadge(t){document.getElementById("resumeText").textContent=t;document.getElementById("resumeBadge").classList.add("show");}
    function hideBadge(){document.getElementById("resumeBadge").classList.remove("show");}

    audio.addEventListener("pause",()=>{if(userPaused||!playing)return;wasInterrupted=true;lastAudioTime=Date.now();showBadge("Радио прервано — восстановлю после…");clearTimeout(resumeTimer);resumeTimer=setTimeout(()=>{if(wasInterrupted&&!userPaused&&!document.hidden)attemptResume();},1200);});
    audio.addEventListener("ended",()=>{if(!userPaused&&playing){wasInterrupted=true;attemptResume();}});
    document.addEventListener("visibilitychange",()=>{if(!document.hidden&&wasInterrupted&&!userPaused){clearTimeout(resumeTimer);resumeTimer=setTimeout(attemptResume,600);}});
    if(tg)tg.onEvent("activated",()=>{if(wasInterrupted&&!userPaused){clearTimeout(resumeTimer);resumeTimer=setTimeout(attemptResume,600);}});
    setInterval(()=>{if(wasInterrupted&&!userPaused&&!document.hidden&&Date.now()-lastAudioTime>3000)attemptResume();},3000);

    async function attemptResume(){wasInterrupted=false;showBadge("Возвращаю радио…");audio.volume=0;playStream(stations[curIdx].stream);const target=Number(document.getElementById("volSlider").value)/100;let v=0;const fade=setInterval(()=>{v+=0.04;if(v>=target){v=target;clearInterval(fade);hideBadge();}audio.volume=v;},60);}

    function updateMediaSession(s){if(!("mediaSession" in navigator))return;navigator.mediaSession.metadata=new MediaMetadata({title:s.name,artist:s.genre,album:"Radio Go"});navigator.mediaSession.setActionHandler("previoustrack",prev);navigator.mediaSession.setActionHandler("nexttrack",next);navigator.mediaSession.setActionHandler("play",()=>{userPaused=false;playStream(stations[curIdx].stream);});navigator.mediaSession.setActionHandler("pause",()=>{userPaused=true;audio.pause();setPlaying(false);});}

    function playStream(url){if(!url)return;if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}setLoading(true);vizOn(false);if(url.includes(".m3u8")){if(audio.canPlayType("application/vnd.apple.mpegurl")){audio.src=url;audio.play().then(()=>{setLoading(false);setPlaying(true);hideBadge();}).catch(()=>setLoading(false));return;}if(typeof Hls!=="undefined"&&Hls.isSupported()){hlsInstance=new Hls({enableWorker:true,lowLatencyMode:true,backBufferLength:30});hlsInstance.loadSource(url);hlsInstance.attachMedia(audio);hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{audio.play().then(()=>{setLoading(false);setPlaying(true);hideBadge();}).catch(()=>setLoading(false));});hlsInstance.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){if(d.type===Hls.ErrorTypes.NETWORK_ERROR)hlsInstance.startLoad();else if(d.type===Hls.ErrorTypes.MEDIA_ERROR)hlsInstance.recoverMediaError();else{setLoading(false);setPlaying(false);}}});return;}}audio.src=url;audio.play().then(()=>{setLoading(false);setPlaying(true);hideBadge();}).catch(()=>setLoading(false));}

    function ge(tag){return{deep:"🎧",pop:"🎤",rock:"🎸",retro:"📻",shanson:"🎶",news:"📰",edm:"🎛",chill:"🌊"}[tag]||"🎵";}

    function loadStation(idx,autoplay){
        curIdx=idx;const s=stations[idx];
        document.getElementById("nowLogo").innerHTML=s.logo?`<img src="${s.logo}" onerror="this.parentElement.innerHTML='${ge(s.tag)}'">`:ge(s.tag);
        document.getElementById("nowName").textContent=s.name;
        document.getElementById("nowGenre").textContent=s.genre;
        document.getElementById("nowCard").classList.add("visible");
        updateFavBtn();updateMediaSession(s);renderList();
        if(autoplay||playing){userPaused=false;playStream(s.stream);}
        else{if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}audio.pause();audio.src="";setPlaying(false);}
    }

    function setPlaying(on){playing=on;vizOn(on);document.getElementById("liveDot").classList.toggle("on",on);document.getElementById("playBtn").classList.toggle("playing",on);document.getElementById("playIcon").innerHTML=on?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>':'<polygon points="5 3 19 12 5 21 5 3"/>';if("mediaSession" in navigator)navigator.mediaSession.playbackState=on?"playing":"paused";}
    function togglePlay(){if(tg)tg.HapticFeedback?.impactOccurred("light");if(!playing){userPaused=false;wasInterrupted=false;hideBadge();playStream(stations[curIdx].stream);}else{userPaused=true;wasInterrupted=false;clearTimeout(resumeTimer);if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}audio.pause();setPlaying(false);hideBadge();}}
    function prev(){if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation((curIdx-1+stations.length)%stations.length,true);}
    function next(){if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation((curIdx+1)%stations.length,true);}

    const volSlider=document.getElementById("volSlider");const volFill=document.getElementById("volFill");const volVal=document.getElementById("volVal");const volEmoji=document.getElementById("volEmoji");let lastEmoji="🔈";
    function volColor(v){if(v===0) return "transparent";if(v<=50) return "#d0cdc8";if(v<=80) return "#4caf7d";return "#f0a030";}
    function updateVolUI(v){v=Number(v);volFill.style.width=v+"%";volFill.style.backgroundColor=volColor(v);volVal.textContent=Math.round(v)+"%";volVal.style.color=v===0?"var(--muted)":v<=50?"var(--muted)":v<=80?"#4caf7d":"#f0a030";const em=v===0?"🔇":v<30?"🔈":v<70?"🔉":"🔊";if(em!==lastEmoji){lastEmoji=em;volEmoji.textContent=em;}}
    function onVolStart(){volSlider.classList.add("dragging");}
    function onVolEnd(){volSlider.classList.remove("dragging");}
    function onVolChange(v){audio.volume=v/100;updateVolUI(v);}
    updateVolUI(80);

    function toggleFav(){if(tg)tg.HapticFeedback?.notificationOccurred("success");const name=stations[curIdx].name;const i=favs.indexOf(name);if(i===-1)favs.push(name);else favs.splice(i,1);localStorage.setItem("rfavs",JSON.stringify(favs));updateFavBtn();if(activeTab==="fav")renderList();}
    function updateFavBtn(){const on=favs.includes(stations[curIdx].name);const b=document.getElementById("favBtn");b.textContent=on?"♥":"♡";b.classList.toggle("on",on);}
    function setTab(tab){activeTab=tab;document.getElementById("tabAll").classList.toggle("active",tab==="all");document.getElementById("tabFav").classList.toggle("active",tab==="fav");document.getElementById("searchWrap").style.display=tab==="all"?"":"none";document.getElementById("genrePills").style.display=tab==="all"?"":"none";if(tab==="all")renderGenres();renderList();}
    function renderGenres(){const el=document.getElementById("genrePills");el.innerHTML="";genres.forEach(g=>{const b=document.createElement("button");b.className="genre-pill"+(g.id===activeGenre?" active":"");b.textContent=g.label;b.onclick=()=>{activeGenre=g.id;renderGenres();renderList();};el.appendChild(b);});}
    function renderList(){const q=(document.getElementById("searchInput").value||"").toLowerCase();const el=document.getElementById("stationList");el.innerHTML="";const filtered=activeTab==="fav"?stations.filter(s=>favs.includes(s.name)):stations.filter(s=>(activeGenre==="all"||s.tag===activeGenre)&&(!q||s.name.toLowerCase().includes(q)||s.genre.toLowerCase().includes(q)));document.getElementById("listLabel").textContent=activeTab==="fav"?`Избранное (${filtered.length})`:activeGenre==="all"?`Все станции (${filtered.length})`:` ${filtered.length} станций`;if(!filtered.length){el.innerHTML=activeTab==="fav"?'<div class="empty"><span class="empty-icon">♡</span>Нажмите ♡ на любой станции</div>':'<div class="empty"><span class="empty-icon">🔍</span>Ничего не найдено</div>';return;}filtered.forEach(s=>{const idx=stations.indexOf(s);const row=document.createElement("div");row.className="row"+(idx===curIdx?" active":"");row.innerHTML=`<div class="row-img">${s.logo?`<img src="${s.logo}" onerror="this.parentElement.innerHTML='${ge(s.tag)}'">`:ge(s.tag)}</div><div class="row-info"><div class="row-name">${s.name}</div><div class="row-sub">${s.genre}</div></div><div class="row-right"><div class="row-dot"></div><div class="row-cnt">${(s.listeners||0).toLocaleString("ru")}</div></div>`;row.onclick=()=>{if(tg)tg.HapticFeedback?.impactOccurred("light");loadStation(idx,true);};el.appendChild(row);});}

    // ─── ВИДЖЕТ ОБСУЖДЕНИЙ ───
    let discussionVisible = false;
    function toggleCommentsWidget(){
        discussionVisible = !discussionVisible;
        const widgetDiv = document.getElementById("telegramDiscussionWidget");
        widgetDiv.classList.toggle("show", discussionVisible);
        document.getElementById("commentToggleBtn").classList.toggle("comment-on", discussionVisible);
        if(discussionVisible && !widgetDiv.hasChildNodes()){
            // Создаём виджет
            Telegram.Discussion.create(widgetDiv, {
                username: DISCUSSION_USERNAME,
                post_id: DISCUSSION_POST_ID,
                comments_limit: 50,
                dark: darkMode
            });
        }
    }

    // Shazam (заглушка)
    function shazam(){
        if(!playing) return;
        alert("Распознавание треков недоступно без сервера. Настройте серверную часть.");
    }

    // Старт
    renderGenres();renderList();loadStation(0,false);
    if(!carMode){ document.getElementById("backBtn").style.display='none'; document.getElementById("carRecommendations").classList.remove("show"); }
</script>
