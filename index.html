<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radio Go</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" id="themeColorMeta">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="stations.js"></script>

<style>
  /* ═══════════════════════════════════════════════════════════
     ТОКЕНЫ
  ═══════════════════════════════════════════════════════════ */
  :root {
    --bg: #ffffff;
    --text: #000000;
    --text-sec: #8e8e93;
    --surface: #f2f2f7;
    --accent: #fc3c44;
    --player-bg: rgba(255,255,255,0.85);
    --border: rgba(0,0,0,0.08);
    --safe-t: env(safe-area-inset-top,    20px);
    --safe-b: env(safe-area-inset-bottom, 20px);
    --sidebar: 320px;
    --chat:    380px;
  }
  body.dark {
    --bg: #000000; --text: #ffffff;
    --text-sec: rgba(235,235,245,.6);
    --surface: #1c1c1e; --player-bg: rgba(28,28,30,.85);
    --border: rgba(255,255,255,.1);
  }

  /* ═══════════════════════════════════════════════════════════
     БАЗА
  ═══════════════════════════════════════════════════════════ */
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); transition: background .3s; }

  /* ═══════════════════════════════════════════════════════════
     ПРЕЛОАДЕР
  ═══════════════════════════════════════════════════════════ */
  #preloader {
    position: fixed; inset: 0; background: var(--bg); z-index: 999999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity .6s ease;
  }
  .droplet {
    width: 60px; height: 60px; background: var(--accent);
    border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
    animation: pulse-droplet 1.5s infinite ease-in-out; margin-bottom: 20px;
  }
  .preloader-brand { font-size: 24px; font-weight: 800; letter-spacing: -.5px; opacity: 0; animation: fade-brand .8s ease forwards .3s; }
  @keyframes pulse-droplet { 50% { transform: scale(1.15) rotate(-45deg); } }
  @keyframes fade-brand    { to  { opacity: 1; } }

  /* ═══════════════════════════════════════════════════════════
     МАКЕТ: всегда flex-row даже на мобиле (sidebar скрывается
     через position:fixed на плеере)
  ═══════════════════════════════════════════════════════════ */
  .app-layout { display: flex; width: 100%; height: 100%; overflow: hidden; }

  /* ── САЙДБАР ── */
  .sidebar-panel {
    width: 100%;            /* мобиле — на весь экран */
    display: flex; flex-direction: column; height: 100%;
    background: var(--bg); flex-shrink: 0; position: relative; z-index: 10;
    border-right: 1px solid var(--border);
  }
  .header {
    padding: calc(var(--safe-t) + 16px) 20px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .header-left { display: flex; flex-direction: column; min-width: 0; flex: 1; margin-right: 12px; }
  .header h1   { font-size: 24px; font-weight: 800; letter-spacing: -.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .live-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-sec); font-weight: 600; margin-top: 2px; }
  .live-dot    { width: 8px; height: 8px; background: #34c759; border-radius: 50%; }
  body.playing .live-dot { animation: pulse-dot 1.5s infinite; }
  @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(52,199,89,.4); } 70% { box-shadow: 0 0 0 6px rgba(52,199,89,0); } }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .header-actions button {
    background: var(--surface); border: none; width: 36px; height: 36px;
    border-radius: 50%; color: var(--text); cursor: pointer;
    display: flex; justify-content: center; align-items: center; transition: background .2s;
  }
  .header-actions button.active { background: var(--text); color: var(--bg); }

  .content-scroll { flex: 1; overflow-y: auto; padding: 0 20px calc(var(--safe-b) + 30px); -webkit-overflow-scrolling: touch; }
  .content-scroll::-webkit-scrollbar { display: none; }

  .search-box { margin: 16px 0; background: var(--surface); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .search-box input { border: none; background: transparent; width: 100%; font-size: 16px; color: var(--text); outline: none; }
  .search-box input::placeholder { color: var(--text-sec); }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 6px; -webkit-overflow-scrolling: touch; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 8px 16px; border-radius: 20px; background: var(--surface); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; border: none; transition: .2s; }
  .tab.active { background: var(--text); color: var(--bg); }

  .station-row { display: flex; align-items: center; gap: 14px; padding: 10px 0; cursor: pointer; border-bottom: 1px solid var(--border); transition: opacity .2s; }
  .station-row:active { opacity: .6; }
  .station-row:hover  { opacity: .85; }
  .station-img  { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .station-info { flex: 1; min-width: 0; }
  .station-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .station-meta-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-sec); }
  .station-listeners-count { display: inline-flex; align-items: center; gap: 3px; }
  .playing-icon { display: none; color: var(--accent); font-size: 12px; font-weight: bold; flex-shrink: 0; }
  .station-row.active .playing-icon { display: block; }
  .station-row.active .station-name { color: var(--accent); }

  /* ── ЧАТ ПАНЕЛЬ (ПК) ── */
  .chat-panel {
    display: none; width: var(--chat); height: 100%;
    border-left: 1px solid var(--border); flex-direction: column; flex-shrink: 0; z-index: 10;
  }
  .chat-area   { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 2px; }
  body.dark .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); }
  .chat-msg { background: var(--bg); padding: 10px 14px; border-radius: 14px; max-width: 85%; width: fit-content; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .msg-user  { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  .msg-text  { font-size: 14px; line-height: 1.4; word-break: break-word; }
  .msg-time  { font-size: 10px; color: var(--text-sec); text-align: right; margin-top: 4px; }
  .chat-write-action { padding: 12px 16px calc(env(safe-area-inset-bottom,12px) + 4px); background: var(--bg); border-top: 1px solid var(--border); }
  .tg-group-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #24a1de; color: #fff; padding: 12px 16px; border-radius: 14px;
    font-weight: 700; font-size: 15px; box-shadow: 0 4px 12px rgba(36,161,222,.25);
    width: 100%; cursor: pointer; border: none; transition: opacity .2s;
  }
  .tg-group-btn:active { opacity: .8; transform: scale(.98); }

  /* ── МОБИЛЬНАЯ ШТОРКА ── */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    opacity: 0; pointer-events: none; transition: opacity .3s ease; z-index: 19999;
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .chat-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; height: 85vh;
    background: var(--bg); border-radius: 24px 24px 0 0;
    box-shadow: 0 -10px 30px rgba(0,0,0,.15);
    transform: translateY(100%); transition: transform .4s cubic-bezier(.25,.8,.25,1);
    z-index: 20000; display: flex; flex-direction: column;
  }
  .chat-sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 5px; background: var(--text-sec); border-radius: 3px; margin: 8px auto 0; opacity: .4; flex-shrink: 0; }
  .sheet-header { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
  .sheet-title  { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
  .sheet-close  { background: var(--surface); border: none; width: 32px; height: 32px; border-radius: 50%; color: var(--text); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; }

  /* ── МИНИ-ПЛЕЕР ── */
  .mini-player {
    position: fixed; bottom: calc(var(--safe-b) + 12px); left: 12px; right: 12px;
    background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 8px 16px 8px 8px; display: flex; align-items: center; gap: 12px;
    z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.12);
    cursor: pointer; transition: transform .4s cubic-bezier(.25,.8,.25,1);
  }
  .mini-player.hidden { transform: translateY(180%); }
  .mini-art  { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .mini-info { flex: 1; min-width: 0; overflow: hidden; }
  .mini-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-sub   { font-size: 13px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-controls { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .btn-icon { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; }
  .btn-icon svg { width: 26px; height: 26px; fill: currentColor; }

  /* ═══════════════════════════════════════════════════════════
     ЦЕНТРАЛЬНЫЙ ПЛЕЕР
     Главное решение: fp-content — обычный flex-column,
     картинка получает фиксированный размер через CSS custom
     property --art-size, которая пересчитывается JS при resize.
     Никаких aspect-ratio + max-height конфликтов.
  ═══════════════════════════════════════════════════════════ */
  .full-player {
    background: var(--bg); display: flex; flex-direction: column;
    position: relative; height: 100%; overflow: hidden;
  }
  .fp-bg {
    position: absolute; top: -50px; left: -50px; right: -50px; bottom: -50px;
    background-size: cover; background-position: center;
    filter: blur(60px) brightness(.6); z-index: 1; opacity: .5;
    transition: background-image .5s ease-in-out; pointer-events: none;
  }
  body.dark .fp-bg { opacity: .3; }

  .fp-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between;
    width: 100%; height: 100%;
    max-width: 500px; margin: 0 auto;
    padding: calc(var(--safe-t) + 12px) 28px calc(var(--safe-b) + 20px);
    min-height: 0;
  }

  /* ШАПКА плеера */
  .fp-header { display: flex; justify-content: space-between; align-items: center; width: 100%; flex-shrink: 0; padding-bottom: 8px; }
  .fp-down {
    background: rgba(128,128,128,.2); border: none; color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%; backdrop-filter: blur(10px);
  }
  .fp-down svg { width: 24px; height: 24px; }
  .fp-desktop-title { font-size: 15px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.5px; }

  /* ══════════════════════════════════════════════════════════
     КРУГЛАЯ КАРТИНКА — единственный правильный способ:
     • ширина и высота берутся из --art-size (вычисляется JS)
     • никакого aspect-ratio, никакого max-height на враппере
     • flex-shrink:0 — не сжимается
  ══════════════════════════════════════════════════════════ */
  .fp-art-wrap {
    width:  var(--art-size, 260px);
    height: var(--art-size, 260px);
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
    background: var(--surface);
    box-shadow: 0 16px 40px rgba(0,0,0,.28);
    user-select: none; pointer-events: none;
    /* плавная анимация смены размера при ресайзе */
    transition: width .3s ease, height .3s ease, box-shadow .3s ease;
  }
  .fp-art {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%; /* двойная защита */
    animation: spin 18s linear infinite;
    animation-play-state: paused;
    transform: scale(.92);
    filter: brightness(.8);
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), filter .4s;
  }
  .fp-art.playing { animation-play-state: running; transform: scale(1); filter: brightness(1); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ИНФО */
  .fp-info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; flex-shrink: 0; padding: 0 4px; }
  .fp-titles   { flex: 1; min-width: 0; overflow: hidden; }
  .fp-title    { font-size: clamp(18px, 2.2vw, 26px); font-weight: 800; letter-spacing: -.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .fp-track-wrap { display: flex; align-items: center; gap: 10px; overflow: hidden; }
  .fp-track    { font-size: clamp(13px, 1.4vw, 16px); color: var(--accent); font-weight: 500; white-space: nowrap; display: inline-block; }
  body.playing .fp-track.scrollable { animation: marquee 12s linear infinite; }
  @keyframes marquee { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-30%); } }

  .visualizer-bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; width: 22px; flex-shrink: 0; opacity: .85; }
  .v-bar { width: 3px; height: 100%; background: var(--accent); border-radius: 1px; transform-origin: bottom; transform: scaleY(.2); transition: transform .1s ease; }

  .fp-meta-info { display: flex; align-items: center; gap: 12px; margin-top: 6px; font-size: 13px; color: var(--text-sec); }
  .fp-genre { font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; background: var(--surface); padding: 3px 8px; border-radius: 6px; }
  .fp-listeners { display: inline-flex; align-items: center; gap: 4px; }

  .fav-btn { background: none; border: none; color: var(--text); cursor: pointer; flex-shrink: 0; margin-left: 10px; transition: transform .1s; padding: 6px; }
  .fav-btn:active { transform: scale(.8); }
  .fav-btn.active { color: var(--accent); }
  .fav-btn svg { width: 22px; height: 22px; }

  /* КНОПКИ */
  .fp-controls { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 12px; flex-shrink: 0; }
  .fp-main-btn {
    width: clamp(60px, 8vw, 76px); height: clamp(60px, 8vw, 76px);
    border-radius: 50%; background: var(--text); color: var(--bg);
    border: none; display: flex; justify-content: center; align-items: center;
    cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,.12); transition: transform .1s; flex-shrink: 0;
  }
  .fp-main-btn:active { transform: scale(.92); }
  .fp-main-btn svg { width: clamp(26px, 3.5vw, 34px); height: clamp(26px, 3.5vw, 34px); fill: currentColor; }
  .fp-sec-btn  { background: none; border: none; color: var(--text); cursor: pointer; transition: transform .1s; padding: 8px; }
  .fp-sec-btn:active { transform: scale(.85); }
  .fp-sec-btn svg { width: clamp(26px, 3.5vw, 34px); height: clamp(26px, 3.5vw, 34px); fill: currentColor; }

  /* ГРОМКОСТЬ */
  .vol-bar { display: flex; align-items: center; gap: 12px; color: var(--text-sec); width: 100%; padding: 0 6px; flex-shrink: 0; }
  .vol-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: rgba(128,128,128,.3); outline: none; }
  .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,.25); cursor: pointer; }

  /* ── КНОПКА ВЫХОДА ИЗ АВТОРЕЖИМА ── */
  .car-exit-header { display: none; width: 100%; justify-content: center; padding: 6px 0; flex-shrink: 0; }
  .car-exit-btn {
    background: rgba(252,60,68,.15); border: 1px solid rgba(252,60,68,.3); color: #fc3c44;
    padding: 12px 24px; border-radius: 30px; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px);
    transition: all .2s;
  }
  .car-exit-btn:active { transform: scale(.96); }

  /* ═══════════════════════════════════════════════════════════
     МОБИЛЬ < 1024px  — плеер едет снизу
  ═══════════════════════════════════════════════════════════ */
  @media (max-width: 1023px) {
    .full-player {
      position: fixed; inset: 0; z-index: 9999;
      transform: translateY(100%); transition: transform .4s cubic-bezier(.25,.8,.25,1);
    }
    .full-player.open { transform: translateY(0); }
    .vol-bar { display: none !important; }
    .fp-desktop-title { display: none !important; }
    /* на мобиле art-size вычисляется JS, но даём резервное значение */
    .fp-art-wrap { --art-size: min(56vw, 46vh); width: var(--art-size); height: var(--art-size); }
  }

  /* ═══════════════════════════════════════════════════════════
     ПК ≥ 1024px
  ═══════════════════════════════════════════════════════════ */
  @media (min-width: 1024px) {
    .app-layout { flex-direction: row; }
    .fp-bg {
      position: fixed !important; top: -50px; left: -50px;
      width: calc(100vw + 100px); height: calc(100vh + 100px); z-index: 0 !important;
    }
    .sidebar-panel {
      width: var(--sidebar) !important;
      background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 10;
    }
    .full-player  { flex: 1; height: 100%; background: transparent !important; border-right: 1px solid var(--border); z-index: 1; position: relative; }
    .chat-panel   { display: flex; width: var(--chat) !important; background: var(--player-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 10; }
    .chat-area    { background: transparent; }
    .chat-msg     { background: var(--surface); }
    .chat-write-action { background: transparent; padding-bottom: 24px; }
    .fp-down, .mini-player, .chat-sheet, .sheet-backdrop { display: none !important; }
    .fp-desktop-title { display: block !important; }
    .mobile-only-btn  { display: none !important; }
    /* Art-size на ПК — тоже считает JS */
    .fp-art-wrap { --art-size: min(38vh, 340px); width: var(--art-size); height: var(--art-size); }
  }

  /* ═══════════════════════════════════════════════════════════
     АВТОРЕЖИМ
  ═══════════════════════════════════════════════════════════ */
  body.car .sidebar-panel,
  body.car .chat-panel,
  body.car .mini-player,
  body.car .sheet-backdrop,
  body.car .chat-sheet { display: none !important; }

  body.car .full-player {
    display: flex !important; position: fixed !important; inset: 0; z-index: 99999; background: var(--bg) !important;
  }
  body.car .fp-down          { display: none !important; }
  body.car .fp-desktop-title { display: none !important; }
  body.car .car-exit-header  { display: flex !important; }
  body.car .fp-content {
    max-width: 560px;
    padding: calc(var(--safe-t) + 10px) 24px calc(var(--safe-b) + 20px);
    text-align: center;
  }
  body.car .fp-art-wrap { --art-size: min(42vw, 38vh, 280px); width: var(--art-size); height: var(--art-size); }
  body.car .fp-info-row  { flex-direction: column; gap: 10px; }
  body.car .fp-titles    { text-align: center; }
  body.car .fp-track-wrap { justify-content: center; }
  body.car .fp-meta-info  { justify-content: center; }
  body.car .fav-btn       { margin-left: 0; }
  body.car .fp-controls   { max-width: 420px; justify-content: space-around; }
  body.car .fp-main-btn   { width: 92px; height: 92px; }
  body.car .fp-main-btn svg, body.car .fp-sec-btn svg { width: 44px; height: 44px; }
  body.car .vol-bar { display: none !important; }

  @media (min-width: 768px) {
    body.car .fp-content {
      max-width: 900px !important;
      display: grid !important;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto 1fr auto;
      gap: 16px 48px; align-items: center;
      padding: 36px !important;
      text-align: left;
    }
    body.car .car-exit-header  { grid-column: span 2; justify-content: flex-start; padding: 0; }
    body.car .fp-art-wrap      { grid-column: 1; grid-row: 2; --art-size: min(42vh, 360px); width: var(--art-size); height: var(--art-size); }
    body.car .fp-info-row      { grid-column: 2; grid-row: 2; flex-direction: column; align-items: flex-start; gap: 14px; margin: 0; }
    body.car .fp-titles        { text-align: left; }
    body.car .fp-track-wrap    { justify-content: flex-start; }
    body.car .fp-meta-info     { justify-content: flex-start; }
    body.car .fp-controls      { grid-column: span 2; grid-row: 3; justify-content: flex-start; gap: 32px; padding: 0; max-width: none; }
    body.car .vol-bar          { grid-column: span 2; display: flex !important; max-width: 500px; }
  }

  .panel-section { display: flex; flex-direction: column; flex: 1; min-height: 0; }
</style>
</head>
<body>

<div id="preloader"><div class="droplet"></div><div class="preloader-brand">Radio Go</div></div>

<div class="app-layout">

  <!-- ── САЙДБАР ── -->
  <div class="sidebar-panel">
    <div class="header">
      <div class="header-left">
        <h1 id="headerTitle">Радио</h1>

      <div class="header-actions">

        </button>
        <button onclick="openChatSheet()" id="headerChatBtn" title="Чат эфира" class="mobile-only-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button onclick="toggleTheme()" id="themeBtn" title="Переключить тему">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

    <div class="content-scroll">
      <div class="search-box">

  <!-- ── ПЛЕЕР ── -->

    <div class="fp-bg" id="fBg"></div>
    <div class="fp-content">

      <div class="car-exit-header">
        <button class="car-exit-btn" onclick="toggleCarMode()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

      <div class="fp-header">

      <!-- Круглая картинка -->

      <div class="fp-info-row">
        <div class="fp-titles">

          <div class="fp-track-wrap">
            <div style="overflow:hidden;white-space:nowrap;max-width:95%;">
              <div class="fp-track" id="fTrack">Radio Go</div>
            </div>
            <div class="visualizer-bars">
              <div class="v-bar"></div><div class="v-bar"></div>
              <div class="v-bar"></div><div class="v-bar"></div>
            </div>
          </div>
          <div class="fp-meta-info">
            <span class="fp-genre" id="fGenre">Эфир</span>
            <span class="fp-listeners" id="fListenersRow" style="display:none;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5.42 5 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              <span id="fListenersCount">0</span>
            </span>
          </div>
        </div>
        <button class="btn-icon fav-btn" id="fFavBtn" onclick="toggleFav()" style="visibility:hidden;">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" width="22" height="22"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>

      <div class="fp-controls">
        <button class="fp-sec-btn" onclick="prevStation()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="fp-main-btn" onclick="togglePlay()"><svg id="fPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="fp-sec-btn" onclick="nextStation()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>

      </div>

    </div>
  </div>

  <!-- ── ЧАТ ПК ── -->
  <div class="chat-panel" id="pcRightPanel">
    <div class="panel-section" id="pcChatSection" style="border-bottom:1px solid var(--border);">
      <div style="padding:calc(var(--safe-t)+22px) 20px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid var(--border);">

    </div>
  </div>

</div><!-- /.app-layout -->

<!-- ── МОБИЛЬНАЯ ШТОРКА ЧАТА ── -->
<div class="sheet-backdrop" id="chatBackdrop" onclick="closeChatSheet()"></div>
<div class="chat-sheet" id="chatSheet">
  <div class="sheet-handle"></div>

        <button onclick="toggleChat(false)" style="background:var(--surface);border:none;padding:6px 10px;border-radius:12px;color:var(--text);font-size:12px;font-weight:600;">Скрыть</button>

        История
        <button id="mobileRestoreChatBtn" onclick="toggleChat(false)" style="display:none;background:var(--accent);border:none;padding:2px 8px;border-radius:10px;color:#fff;font-size:11px;font-weight:600;">Чат</button>

<!-- ── МИНИ-ПЛЕЕР ── -->
<div class="mini-player hidden" id="miniPlayer" onclick="openFullPlayer()">
  <img src="" class="mini-art" id="mArt" alt="">
  <div class="mini-info">
    <div class="mini-title" id="mTitle">Название станции</div>
    <div class="mini-sub"   id="mSub">Прямой эфир</div>
  </div>
  <div class="mini-controls">
    <button class="btn-icon" onclick="event.stopPropagation();prevStation()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
    <button class="btn-icon" onclick="event.stopPropagation();togglePlay()"><svg id="mPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    <button class="btn-icon" onclick="event.stopPropagation();nextStation()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
  </div>
</div>

<audio id="audio"></audio>

<script>
/* ── TELEGRAM FALLBACK ── */
if (!window.Telegram?.WebApp || !Object.keys(window.Telegram.WebApp).length) {
  window.Telegram = { WebApp: {
    initDataUnsafe: { user: { first_name:"Гость", username:"guest" } },
    ready:()=>{}, expand:()=>{},
    colorScheme: window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light',
    HapticFeedback: { impactOccurred:()=>{}, selectionChanged:()=>{}, notificationOccurred:()=>{} },
    openTelegramLink: url => window.open(url,'_blank')
  }};
}

const WORKER_URL     = "https://radio-chat.deadked2011.workers.dev";
const TELEGRAM_GROUP = "strmradiochat";
const tg = window.Telegram.WebApp;
if (tg.ready)  tg.ready();
if (tg.expand) tg.expand();

const stations    = window.stations  || [];
const radioGenres = window.genres    || [{id:"all",label:"Все"}];

const audio = document.getElementById('audio');
audio.crossOrigin = "anonymous";

let curIdx = -1, isPlaying = false, activeTab = "all", hls = null;
let trackPoll = null, chatPoll = null;
let stallTO = null, recoveries = 0;
let isChatHiddenPC = false, isChatHiddenMobile = false;
let carMode  = localStorage.getItem('radio_car')  === '1';
let isDark   = localStorage.getItem('radio_dark') === '1' || tg.colorScheme === 'dark';
const favs   = JSON.parse(localStorage.getItem('radio_favs')    || '[]');
let history  = JSON.parse(localStorage.getItem('radio_history') || '[]');

let audioCtx = null, analyser = null, vizInited = false;

/* ════════════════════════════════════
   ART-SIZE: вычисляем идеальный размер
   круглой картинки под текущий экран.
   Всегда квадрат — никакого овала.
   ════════════════════════════════════ */
function recalcArtSize() {
  const wrap = document.getElementById('fpArtWrap');
  if (!wrap) return;
  const isPC     = window.innerWidth >= 1024;
  const isCar    = document.body.classList.contains('car');
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let size;
  if (isCar && vw >= 768) {
    /* авторежим на планшете/ПК — левая колонка ~50% */
    size = Math.min(vh * 0.44, vw * 0.42, 360);
  } else if (isCar) {
    size = Math.min(vw * 0.50, vh * 0.38, 280);
  } else if (isPC) {
    /* ПК: плеер занимает оставшееся место между sidebar и chat */
    const playerW = vw - 320 - 380; /* sidebar + chat */
    /* доступная высота за вычетом заголовка, инфо, кнопок, громкости */
    const reserved = 56 + 96 + 72 + 40 + 32; /* header+info+controls+vol+gaps */
    size = Math.min(playerW * 0.62, vh - reserved, 340);
  } else {
    /* мобиль */
    const reserved = 56 + 88 + 72 + 48; /* header+info+controls+gaps */
    size = Math.min(vw * 0.70, vh - reserved, 300);
  }

  size = Math.max(size, 120); /* минимум */
  /* Применяем как inline style — переопределяет CSS custom property */
  wrap.style.width  = size + 'px';
  wrap.style.height = size + 'px';
}

/* ── ЧАСЫ ── */
function tick() {
  const n = new Date(), p = x => String(x).padStart(2,'0');
  const el = document.getElementById('liveClock');
  if (el) el.textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}
setInterval(tick, 1000);

/* ── ТЕМА ── */
function applyTheme() {
  document.body.classList.toggle('dark', isDark);
  document.getElementById('themeColorMeta').content = isDark ? '#1c1c1e' : '#ffffff';
  try { tg.setHeaderColor?.(isDark ? '#1c1c1e' : '#ffffff'); tg.setBackgroundColor?.(isDark ? '#000000' : '#ffffff'); } catch(_){}
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('radio_dark', isDark ? '1' : '0');
  applyTheme();
  tg.HapticFeedback.impactOccurred('light');
}

/* ── АВТОРЕЖИМ ── */
function applyCarMode() {
  document.body.classList.toggle('car', carMode);
  document.getElementById('carBtn').classList.toggle('active', carMode);
  if (window.innerWidth < 1024) {
    document.getElementById('fullPlayer').classList.toggle('open', carMode);
  }
  recalcArtSize();
}
function toggleCarMode() {
  carMode = !carMode;
  localStorage.setItem('radio_car', carMode ? '1' : '0');
  applyCarMode();
  tg.HapticFeedback.impactOccurred('medium');
}

/* ── ВКЛАДКИ ── */
function renderTabs() {
  const el = document.getElementById('genreTabs');
  const list = [...radioGenres];
  if (!list.some(g => g.id==='fav')) list.splice(1,0,{id:'fav',label:'Избранное'});
  el.innerHTML = list.map(g =>
    `<button class="tab ${activeTab===g.id?'active':''}" onclick="setTab('${g.id}')">${g.label}</button>`
  ).join('');
}
function setTab(id) { activeTab=id; renderTabs(); renderList(); tg.HapticFeedback.selectionChanged(); }
function onSearchInput() { renderList(); }

/* ── СПИСОК СТАНЦИЙ ── */
function renderList() {
  const el = document.getElementById('stationList');
  const q  = document.getElementById('searchInput').value.toLowerCase();
  const filtered = stations.filter(s => {
    if (activeTab==='fav'  && !favs.includes(s.name)) return false;
    if (activeTab!=='all'  && activeTab!=='fav' && s.tag!==activeTab) return false;
    if (q && !s.name.toLowerCase().includes(q)) return false;
    return true;
  });
  if (!filtered.length) { el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text-sec)">Ничего не найдено</div>`; return; }
  el.innerHTML = filtered.map(s => {
    const idx   = stations.indexOf(s);
    const cover = (s.logo && s.logo.trim()) ? s.logo : fallbackLogo(s.name);
    return `
      <div class="station-row ${idx===curIdx?'active':''}" onclick="playStation(${idx})">
        <img src="${cover}" class="station-img" loading="lazy" onerror="this.onerror=null;this.src='${fallbackLogo(s.name.replace(/'/g,"\\'"))}'">
        <div class="station-info">
          <div class="station-name">${esc(s.name)}</div>
          <div class="station-meta-row">
            <span class="station-genre">${esc(s.genre||'Радио')}</span>
            <span class="station-listeners-count">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="opacity:.7"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5.42 5 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              ${s.listeners||0}
            </span>
          </div>
        </div>
        <div class="playing-icon">ЭФИР ▶</div>
      </div>`;
  }).join('');
}

/* ── ХЕЛПЕРЫ ── */
function fallbackLogo(n) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(n||'R')}&background=fc3c44&color=fff&bold=true&size=256`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function sanitize(name, station) {
  if (!name) return "Прямой эфир";
  const el = document.createElement('textarea'); el.innerHTML = name; let c = el.value;
  c = c.replace(/https?:\/\/\S+|ftp:\/\/\S+|[a-zA-Z0-9-]+\.[a-zA-Z]{2,6}(\/\S*)*|\bwww\.\S+|\/[a-zA-Z0-9-_]+\.(mp3|aac|ogg|m3u8)/gi,'');
  ['icecast','shoutcast','stream','live','online','playing','advert','reklama','реклама','эфир','вещание','aac','mp3','kbps','mount','status','server']
    .forEach(w => { c = c.replace(new RegExp('\\b'+w+'\\b','gi'),''); });
  c = c.replace(/^[_\-\s|*+:/]+|[_\-\s|*+:/]+$/g,'').replace(/\s+/g,' ').trim();
  if (!c || c.length < 3 || /^[\d\W_]+$/.test(c)) return "Прямой эфир";
  if (station && c.toLowerCase()===station.toLowerCase()) return "Прямой эфир";
  return c;
}

/* ── ВОСПРОИЗВЕДЕНИЕ ── */
function playStation(idx) {
  if (curIdx===idx && isPlaying) { if (window.innerWidth<1024) openFullPlayer(); return; }
  tg.HapticFeedback.impactOccurred('medium');
  clearTimeout(stallTO); recoveries = 0; curIdx = idx;
  updateUI();
  if (window.innerWidth < 1024 && !carMode) document.getElementById('miniPlayer').classList.remove('hidden');

  if (hls) { hls.destroy(); hls = null; }
  audio.pause(); audio.src=''; audio.load(); audio.crossOrigin='anonymous';
  initViz();
  if (audioCtx?.state==='suspended') audioCtx.resume();

  const s = stations[idx];
  if (s.stream?.includes('.m3u8') && typeof Hls!=='undefined' && Hls.isSupported()) {
    hls = new Hls({ enableWorker:true, lowLatencyMode:false, maxBufferLength:30 });
    hls.loadSource(s.stream); hls.attachMedia(audio);
    hls.on(Hls.Events.MANIFEST_PARSED, () => audio.play().catch(()=>{}));
  } else if (s.stream) {
    audio.src = s.stream;
    audio.play().catch(() => fatalError());
  }

  isPlaying = true;
  document.body.classList.add('playing');
  updateBtns(); renderList();
  updateMS(s,'Загрузка...');
  fetchTrack(s.stream);
  if (trackPoll) clearInterval(trackPoll);
  trackPoll = setInterval(() => fetchTrack(s.stream), 15000);
  closingConfirm();
}

function togglePlay() {
  if (curIdx===-1) return stations.length ? playStation(0) : null;
  tg.HapticFeedback.impactOccurred('light');
  clearTimeout(stallTO); initViz(); if (audioCtx?.state==='suspended') audioCtx.resume();
  if (isPlaying) { audio.pause(); isPlaying=false; document.body.classList.remove('playing'); }
  else {
    const s=stations[curIdx];
    if (s?.stream && !hls && audio.src!==s.stream) audio.src=s.stream;
    audio.play().catch(()=>{});
    isPlaying=true; document.body.classList.add('playing');
  }
  updateBtns(); updateUI();
  if (stations[curIdx]) updateMS(stations[curIdx], document.getElementById('fTrack').textContent);
  closingConfirm();
}

function nextStation() { if (stations.length) playStation((curIdx+1)%stations.length); }
function prevStation() { if (stations.length) playStation((curIdx-1+stations.length)%stations.length); }
function changeVolume(v) { audio.volume = v/100; }

/* ── WATCHDOG ── */
function initWatchdog() {
  audio.addEventListener('stalled', () => { if (isPlaying) recover('stalled'); });
  audio.addEventListener('waiting', () => { if (isPlaying) { clearTimeout(stallTO); stallTO=setTimeout(()=>recover('waiting'),8000); }});
  audio.addEventListener('playing', () => { clearTimeout(stallTO); recoveries=0; });
  audio.addEventListener('error',   () => fatalError());
}
function fatalError() {
  document.getElementById('fTrack').textContent = "Станция недоступна 😔";
  document.getElementById('mSub').textContent   = "Переключаем...";
  clearTimeout(stallTO); setTimeout(()=>{ if(isPlaying) nextStation(); },2500);
}
function recover(r) {
  if (curIdx===-1 || !isPlaying) return;
  if (++recoveries>3) { fatalError(); return; }
  const s=stations[curIdx]; if(!s?.stream) return;
  if (hls) { hls.destroy(); hls=new Hls({enableWorker:true,maxBufferLength:30}); hls.loadSource(s.stream); hls.attachMedia(audio); hls.on(Hls.Events.MANIFEST_PARSED,()=>audio.play().catch(()=>{})); }
  else { const v=audio.volume; audio.pause(); audio.src=s.stream; audio.load(); audio.volume=v; audio.play().catch(()=>fatalError()); }
}

/* ── MEDIASESSION ── */
function updateMS(s, title='Прямой эфир') {
  if (!('mediaSession' in navigator)) return;
  const cover=(s.logo&&s.logo.trim())?s.logo:fallbackLogo(s.name);
  navigator.mediaSession.metadata=new MediaMetadata({title:s.name,artist:title,album:s.genre||'Радио',artwork:[{src:cover,sizes:'256x256',type:'image/jpeg'}]});
}
function initMS() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.setActionHandler('play',          ()=>togglePlay());
  navigator.mediaSession.setActionHandler('pause',         ()=>togglePlay());
  navigator.mediaSession.setActionHandler('previoustrack', ()=>prevStation());
  navigator.mediaSession.setActionHandler('nexttrack',     ()=>nextStation());
}

/* ── UI ── */
function updateUI() {
  const favBtn = document.getElementById('fFavBtn');
  const hdr    = document.getElementById('headerTitle');
  if (curIdx===-1 || !stations[curIdx]) {
    hdr.textContent='Радио';
    ['mTitle','fTitle'].forEach(id=>document.getElementById(id).textContent='Выберите станцию');
    document.getElementById('mSub').textContent='';
    document.getElementById('fTrack').textContent='Radio Go';
    document.getElementById('fGenre').textContent='Эфир';
    document.getElementById('fListenersRow').style.display='none';
    document.getElementById('fArt').style.opacity='0';
    document.getElementById('fBg').style.backgroundImage='none';
    favBtn.style.visibility='hidden'; return;
  }
  const s=(stations[curIdx]);
  const cover=(s.logo&&s.logo.trim())?s.logo:fallbackLogo(s.name);
  const isFav=favs.includes(s.name);
  hdr.textContent=s.name;
  document.getElementById('mTitle').textContent=s.name;
  document.getElementById('fTitle').textContent=s.name;
  document.getElementById('fGenre').textContent=s.genre||'Радио';
  favBtn.style.visibility='visible';
  if (s.listeners!==undefined) { document.getElementById('fListenersCount').textContent=s.listeners; document.getElementById('fListenersRow').style.display='inline-flex'; }
  else document.getElementById('fListenersRow').style.display='none';

  const img=new Image(); img.src=cover;
  const apply=url=>{ const a=document.getElementById('fArt'); a.style.opacity='1'; a.src=url; document.getElementById('mArt').src=url; document.getElementById('fBg').style.backgroundImage=`url(${url})`; isPlaying?a.classList.add('playing'):a.classList.remove('playing'); };
  img.onload=()=>apply(cover); img.onerror=()=>apply(fallbackLogo(s.name));

  favBtn.innerHTML=isFav
    ?`<svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`
    :`<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" width="22" height="22"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  favBtn.classList.toggle('active',isFav);
}
function updateBtns() {
  const pl=`<path d="M8 5v14l11-7z"/>`, pa=`<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
  document.getElementById('mPlayIcon').innerHTML=isPlaying?pa:pl;
  document.getElementById('fPlayIcon').innerHTML=isPlaying?pa:pl;
}

/* ── ПЛЕЕР OPEN/CLOSE ── */
function openFullPlayer() { if (window.innerWidth<1024||carMode) { document.getElementById('fullPlayer').classList.add('open'); updateUI(); } }
function closeFullPlayer() { if (!carMode) document.getElementById('fullPlayer').classList.remove('open'); }

/* ── СВАЙПЫ ── */
function initSwipe() {
  const fp=document.getElementById('fullPlayer'); let sx=0,sy=0;
  fp.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  fp.addEventListener('touchend',e=>{
    if(!sx||!sy) return;
    const dx=sx-e.changedTouches[0].clientX, dy=sy-e.changedTouches[0].clientY;
    if (Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>60) { dx>0?nextStation():prevStation(); }
    else if (window.innerWidth<1024&&dy<-60&&Math.abs(dy)>Math.abs(dx)) closeFullPlayer();
    sx=0;sy=0;
  },{passive:true});
}

/* ── ИЗБРАННОЕ ── */
function toggleFav() {
  if (curIdx===-1) return;
  tg.HapticFeedback.notificationOccurred('success');
  const n=stations[curIdx].name, i=favs.indexOf(n);
  if (i>-1) favs.splice(i,1); else favs.push(n);
  localStorage.setItem('radio_favs',JSON.stringify(favs));
  updateUI(); if (activeTab==='fav') renderList();
}

/* ── ИСТОРИЯ ── */
function addToHistory(st,tr) {
  if (['Прямой эфир','Radio Go','Станция недоступна 😔','Загрузка...',''].includes(tr)) return;
  if (history.length&&history[0].track===tr&&history[0].station===st) return;
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  history.unshift({station:st,track:tr,time:t}); if (history.length>30) history.pop();
  localStorage.setItem('radio_history',JSON.stringify(history)); renderHistory();
}
function clearHistory() {
  tg.HapticFeedback.notificationOccurred('warning');
  history=[]; localStorage.removeItem('radio_history'); renderHistory();
}
function renderHistory() {
  const html=history.length===0
    ?`<div style="text-align:center;padding:30px;color:var(--text-sec);font-size:14px;">История пуста</div>`
    :history.map(it=>`<div class="chat-msg" style="max-width:100%;width:100%;background:var(--bg);"><div class="msg-user" style="font-size:12px;color:var(--text-sec);font-weight:500;">${esc(it.station)}</div><div class="msg-text" style="font-weight:600;">${esc(it.track)}</div><div class="msg-time">${it.time}</div></div>`).join('');
  ['pcHistoryList','mobileHistoryList'].forEach(id=>{const el=document.getElementById(id);if(el) el.innerHTML=html;});
}

/* ── ЧАТ ── */
async function loadChat() {
  if (isChatHiddenPC&&window.innerWidth>=1024) return;
  if (isChatHiddenMobile&&window.innerWidth<1024) return;
  try {
    const res=await fetch(`${WORKER_URL}/get-messages`); if(!res.ok) return;
    const msgs=await res.json();
    const id=window.innerWidth>=1024?'pcChatMessages':'mobileChatMessages';
    const box=document.getElementById(id); if(!box) return;
    const atBot=(box.scrollHeight-box.scrollTop-box.clientHeight)<40||box.scrollHeight===0;
    box.innerHTML=msgs.map(m=>{
      const t=m.time||new Date(m.timestamp||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      return `<div class="chat-msg"><div class="msg-user">${esc(m.user||'Слушатель')}</div><div class="msg-text">${esc(m.text)}</div><div class="msg-time">${t}</div></div>`;
    }).join('');
    if (atBot) box.scrollTop=box.scrollHeight;
  } catch(_){}
}
function startChatPoll() { if(chatPoll) clearInterval(chatPoll); loadChat(); chatPoll=setInterval(loadChat,4000); }
function stopChatPoll()  { if(chatPoll){clearInterval(chatPoll);chatPoll=null;} }

function toggleChat(isPC) {
  if(isPC){
    isChatHiddenPC=!isChatHiddenPC;
    document.getElementById('pcChatSection').style.display=isChatHiddenPC?'none':'flex';
    document.getElementById('pcRestoreChatBtn').style.display=isChatHiddenPC?'inline-block':'none';
    if(!isChatHiddenPC) loadChat();
  } else {
    isChatHiddenMobile=!isChatHiddenMobile;
    document.getElementById('mobileChatSection').style.display=isChatHiddenMobile?'none':'flex';
    document.getElementById('mobileRestoreChatBtn').style.display=isChatHiddenMobile?'inline-block':'none';
    if(!isChatHiddenMobile) loadChat();
  }
  tg.HapticFeedback.impactOccurred('light');
}

function redirectToTelegramChat() {
  tg.HapticFeedback.impactOccurred('medium');
  const u='https://t.me/'+TELEGRAM_GROUP;
  window.Telegram?.WebApp?.openTelegramLink ? window.Telegram.WebApp.openTelegramLink(u) : window.open(u,'_blank');
}

function openChatSheet() {
  document.getElementById('chatSheet').classList.add('open');
  document.getElementById('chatBackdrop').classList.add('open');
  startChatPoll(); tg.HapticFeedback.impactOccurred('light');
}
function closeChatSheet() {
  document.getElementById('chatSheet').classList.remove('open');
  document.getElementById('chatBackdrop').classList.remove('open');
  stopChatPoll();
}

function initSheetGestures() {
  const sh=document.getElementById('chatSheet'); let sy=0,cy=0;
  sh.addEventListener('touchstart',e=>{
    if(window.innerWidth>=1024)return;
    const cb=document.getElementById('mobileChatMessages'),hb=document.getElementById('mobileHistoryList');
    if(((cb?cb.scrollTop<=0:true)&&(hb?hb.scrollTop<=0:true))||e.target.closest('.sheet-header')||e.target.closest('.sheet-handle')) sy=e.touches[0].clientY; else sy=0;
  },{passive:true});
  sh.addEventListener('touchmove',e=>{
    if(!sy||window.innerWidth>=1024)return;
    cy=e.touches[0].clientY; const d=cy-sy;
    if(d>0){sh.style.transform=`translateY(${d}px)`;sh.style.transition='none';}
  },{passive:true});
  sh.addEventListener('touchend',()=>{
    if(!sy||!cy||window.innerWidth>=1024)return;
    sh.style.transition='transform .4s cubic-bezier(.25,.8,.25,1)';
    if(cy-sy>120) closeChatSheet(); else sh.style.transform='translateY(0)';
    sy=0;cy=0;
  },{passive:true});
}

/* ── ВИЗУАЛИЗАТОР ── */
function initViz() {
  if (vizInited) return;
  try {
    const AC=window.AudioContext||window.webkitAudioContext;
    audioCtx=new AC(); analyser=audioCtx.createAnalyser(); analyser.fftSize=64;
    const src=audioCtx.createMediaElementSource(audio);
    src.connect(analyser); analyser.connect(audioCtx.destination);
    vizInited=true; vizLoop();
  } catch(_) { vizFallback(); }
}
function vizLoop() {
  const bars=document.querySelectorAll('.v-bar'), data=new Uint8Array(analyser.frequencyBinCount);
  (function r(){
    requestAnimationFrame(r);
    if(!isPlaying||audio.paused){bars.forEach(b=>b.style.transform='scaleY(.2)');return;}
    analyser.getByteFrequencyData(data);
    const sum=data.reduce((a,v)=>a+v,0);
    if(!sum){const t=Date.now()*.004;bars.forEach((b,i)=>b.style.transform=`scaleY(${Math.sin(t+i*.7)*.4+.6})`);return;}
    [2,5,8,12].forEach((bin,i)=>bars[i].style.transform=`scaleY(${.2+(data[bin]||0)/255*.8})`);
  })();
}
function vizFallback() {
  const bars=document.querySelectorAll('.v-bar');
  (function r(){requestAnimationFrame(r);if(!isPlaying||audio.paused){bars.forEach(b=>b.style.transform='scaleY(.2)');return;}const t=Date.now()*.005;bars.forEach((b,i)=>b.style.transform=`scaleY(${.2+Math.sin(t+i*1.2)*.4+.4})`);})();
}

/* ── FETCH TRACK ── */
async function fetchTrack(url) {
  try {
    const res=await fetch(`${WORKER_URL}/now-playing?url=${encodeURIComponent(url)}`);
    if(!res.ok) throw 0;
    const data=await res.json();
    const st=stations[curIdx], track=sanitize(data.title,st?.name||'');
    const el=document.getElementById('fTrack');
    el.textContent=track; document.getElementById('mSub').textContent=track;
    el.classList.toggle('scrollable',track.length>22);
    addToHistory(st?.name||'',track); if(st) updateMS(st,track);
  } catch(_) {
    if(curIdx!==-1&&stations[curIdx]){
      const fb=stations[curIdx].genre||'Прямой эфир';
      document.getElementById('mSub').textContent=fb;
      const el=document.getElementById('fTrack'); el.textContent=fb; el.classList.remove('scrollable');
    }
  }
}

/* ── ПРОЧЕЕ ── */
function closingConfirm() {
  if(tg.enableClosingConfirmation) isPlaying?tg.enableClosingConfirmation():tg.disableClosingConfirmation();
}
window.addEventListener('beforeunload',e=>{if(isPlaying){e.preventDefault();e.returnValue='';}});

function initWheelGenres() {
  const el=document.getElementById('genreTabs');
  if(el) el.addEventListener('wheel',e=>{if(e.deltaY){e.preventDefault();el.scrollLeft+=e.deltaY*1.2;}},{passive:false});
}

/* ── RESIZE — пересчитываем картинку ── */
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    recalcArtSize();
    renderTabs(); renderList();
    if(window.innerWidth>=1024){closeFullPlayer();closeChatSheet();startChatPoll();}
    else if(!document.getElementById('chatSheet').classList.contains('open')) stopChatPoll();
    applyCarMode();
  },60);
});

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',()=>{
  applyTheme(); applyCarMode();
  initMS(); initWatchdog(); closingConfirm();
  audio.volume=.8;
  renderTabs(); renderList(); updateUI(); renderHistory();
  initSwipe(); initSheetGestures(); initWheelGenres();
  recalcArtSize();
  if(window.innerWidth>=1024) startChatPoll();
  tick();

  /* Service Worker */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
});

window.addEventListener('load',()=>{
  const p=document.getElementById('preloader');
  if(p){p.style.opacity='0';setTimeout(()=>p.remove(),600);}
});
</script>
